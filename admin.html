<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATI Academy — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f4f2ea;--bg-2:#ece9df;--card:#fffdf8;--ink:#191c22;--text:#21242b;--text-2:#5b616b;--text-3:#8b909a;--line:#e6e1d4;--line-2:#efeae0;
  --brand:#c5812a;--brand-deep:#9a6214;--brand-soft:#f4e7cd;--brand-tint:#faf2e0;--teal-deep:#123f43;--pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
  --display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:var(--brand-deep);text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
header.nav{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav .wrap{display:flex;align-items:center;gap:14px;height:62px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--ink),var(--teal-deep));display:grid;place-items:center}
.brand b{font-family:var(--display);font-weight:600;font-size:16px;color:var(--ink)}
.brand .t{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--fail);font-weight:600;margin-top:2px}
.sp{flex:1}
.nav a.back{font-size:13.5px;font-weight:700;color:var(--text-2)}
h1{font-family:var(--display);font-weight:600;font-size:28px;color:var(--ink);margin:26px 0 4px}
.lead{font-size:14px;color:var(--text-2);margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;box-shadow:var(--sh-1)}
.kpi .n{font-family:var(--display);font-weight:600;font-size:24px;color:var(--ink);line-height:1}
.kpi .l{font-size:11.5px;color:var(--text-2);margin-top:4px}
.tabs{display:flex;gap:4px;margin:24px 0 14px;border-bottom:1px solid var(--line)}
.tabs button{font-family:var(--body);font-weight:700;font-size:14px;padding:10px 14px;border:none;background:none;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);border-bottom-color:var(--brand)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-1);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600;background:var(--bg-2)}
td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.nm{font-weight:700;color:var(--ink)}.sub{font-size:12px;color:var(--text-3)}
.pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:999px;display:inline-block}
.pill.admin{background:var(--teal-deep);color:#fff}.pill.student{background:var(--bg-2);color:var(--text-2)}.pill.instructor{background:var(--brand-tint);color:var(--brand-deep)}
.pill.ok{background:var(--pass-soft);color:var(--pass)}.pill.no{background:var(--fail-soft);color:var(--fail)}
select.role{font-family:var(--mono);font-size:12px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;background:var(--card)}
button.act{font-family:var(--body);font-weight:600;font-size:12.5px;padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer}
button.act:hover{border-color:var(--brand)}
button.act.danger:hover{border-color:var(--fail);color:var(--fail)}
.mono{font-family:var(--mono);font-size:12px}
.muted{color:var(--text-3)}
@media(max-width:820px){.cards{grid-template-columns:repeat(3,1fr)}table{font-size:12.5px}}
</style>
</head>
<body>
<header class="nav"><div class="wrap">
  <span class="logo"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#e0a043" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/></svg></span>
  <span class="brand"><b>ATI Academy</b><div class="t">Admin console</div></span>
  <div class="sp"></div>
  <a class="back" href="/">← Dashboard</a>
</div></header>

<div class="wrap">
  <h1>Admin console</h1>
  <div class="lead">Full control over accounts, enrollments, certificates, and the audit trail.</div>
  <div class="cards" id="kpis"></div>

  <div class="tabs">
    <button class="on" data-t="users" onclick="tab('users')">Users</button>
    <button data-t="certs" onclick="tab('certs')">Certificates</button>
    <button data-t="audit" onclick="tab('audit')">Audit log</button>
  </div>
  <div class="panel" id="panel"><table><tr><td class="muted" style="padding:24px">Loading…</td></tr></table></div>
</div>

<script>
function esc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fmtDate(ts){if(!ts)return '—';try{var d=(typeof ts==='number')?new Date(ts*1000):new Date(ts);return isNaN(d.getTime())?'—':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return '—';}}
async function api(path,opts){var r=await fetch('/admin/api'+path,Object.assign({credentials:'same-origin'},opts||{}));if(r.status===403){document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Admins only.</p>';throw 0;}return r.json();}
async function post(path,body){return api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});}

var CUR='users';
function tab(t){CUR=t;document.querySelectorAll('.tabs button').forEach(function(b){b.classList.toggle('on',b.dataset.t===t);});render();}

async function loadKpis(){
  var o=await api('/overview');
  var states=Object.keys(o.byState).map(function(s){return s+' '+o.byState[s];}).join(' · ')||'—';
  document.getElementById('kpis').innerHTML=[
    ['Users',o.users],['Students',o.students],['Admins',o.admins],['Enrollments',o.enrollments],['Certificates',o.certificates],['Suspended',o.suspended]
  ].map(function(k){return '<div class="kpi"><div class="n">'+k[1]+'</div><div class="l">'+k[0]+'</div></div>';}).join('');
}

async function render(){
  var p=document.getElementById('panel');
  if(CUR==='users'){
    var d=await api('/users');
    p.innerHTML='<table><thead><tr><th>Name</th><th>Role</th><th>State</th><th>Progress</th><th>Cert</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
      d.users.map(function(u){return '<tr>'+
        '<td><div class="nm">'+esc(u.fullName)+'</div><div class="sub">'+esc(u.email)+'</div></td>'+
        '<td><select class="role" onchange="setRole(\''+u.id+'\',this.value)"><option'+(u.role==='student'?' selected':'')+'>student</option><option'+(u.role==='instructor'?' selected':'')+'>instructor</option><option'+(u.role==='admin'?' selected':'')+'>admin</option></select></td>'+
        '<td class="mono">'+esc(u.state||'—')+'</td>'+
        '<td>'+u.sectionsDone+' sections</td>'+
        '<td>'+(u.hasCert?'<span class="pill ok">issued</span>':'<span class="muted">—</span>')+'</td>'+
        '<td>'+(u.status==='suspended'?'<span class="pill no">suspended</span>':'<span class="pill ok">active</span>')+'</td>'+
        '<td><button class="act danger" onclick="toggleSuspend(\''+u.id+'\','+(u.status==='suspended'?'false':'true')+')">'+(u.status==='suspended'?'Reinstate':'Suspend')+'</button></td>'+
      '</tr>';}).join('')+'</tbody></table>';
  } else if(CUR==='certs'){
    var d=await api('/certificates');
    p.innerHTML=d.certificates.length? '<table><thead><tr><th>Certificate</th><th>Holder</th><th>Course</th><th>Issued</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
      d.certificates.map(function(c){var rev=!!c.revokedAt;return '<tr>'+
        '<td class="mono">'+esc(c.certNumber)+'</td>'+
        '<td class="nm">'+esc(c.holder)+'</td>'+
        '<td>'+esc(c.course)+'</td>'+
        '<td class="mono">'+fmtDate(c.issuedAt)+'</td>'+
        '<td>'+(rev?'<span class="pill no">revoked</span>':'<span class="pill ok">valid</span>')+'</td>'+
        '<td><button class="act'+(rev?'':' danger')+'" onclick="revoke(\''+c.id+'\','+(rev?'true':'false')+')">'+(rev?'Reinstate':'Revoke')+'</button></td>'+
      '</tr>';}).join('')+'</tbody></table>' : '<table><tr><td class="muted" style="padding:24px">No certificates issued yet.</td></tr></table>';
  } else {
    var d=await api('/audit');
    p.innerHTML=d.audit.length? '<table><thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th></tr></thead><tbody>'+
      d.audit.map(function(a){return '<tr><td class="mono">'+fmtDate(a.createdAt)+'</td><td class="nm">'+esc(a.actor)+'</td><td class="mono">'+esc(a.action)+'</td><td class="mono muted">'+esc(a.targetType)+'</td></tr>';}).join('')+'</tbody></table>'
      : '<table><tr><td class="muted" style="padding:24px">No activity yet.</td></tr></table>';
  }
}
async function setRole(id,role){await post('/users/'+id+'/role',{role:role});loadKpis();}
async function toggleSuspend(id,s){await post('/users/'+id+'/suspend',{suspend:s});render();loadKpis();}
async function revoke(id,reinstate){if(!reinstate&&!confirm('Revoke this certificate?'))return;await post('/certificates/'+id+'/revoke',{reinstate:reinstate});render();loadKpis();}
loadKpis();render();
</script>
</body>
</html>
