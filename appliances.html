/* ================= STEPS ================= */
const STEPS=[
/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'Operate & report',type:'lesson',
 body:()=>`<span class="eyebrow">Appliances · Orientation</span><h1>Run it, watch it, and report what's deficient.</h1>
 <p class="lead">Appliances are the most hands-on system you'll inspect — you actually <b>operate</b> each permanently installed unit. Your job isn't to repair, certify, or grade them. It's to <b>run each one through its ordinary controls, confirm the safety devices, and report deficiencies</b> so your client can decide.</p>
 <p>Under the TREC Standards of Practice (§535.232), you inspect and operate the appliances that are <em>built in and connected</em>. Three ideas run through every finding in this section:</p>
 <ul class="num"><li><b>Operation</b> — does it run normally from its own controls?</li><li><b>Safety device</b> — is the anti-tip bracket, garage reverse, GFCI, or proper vent present and working?</li><li><b>Connection</b> — gas, drain, and exhaust hooked up the right way, to the right place.</li></ul>
 <p>Get those three right on each unit and you've inspected the system. Miss the safety device — the bracket that isn't there, the door that won't reverse — and you've missed the part that actually hurts people.</p>
 <p>Every appliance runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Appliance</div></div><div class="seg"><div class="n">02</div><div class="w">Operate</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>What you'll inspect</h2>
 <ul class="clean"><li><b>Dishwasher</b> — operation, air gap / high loop, leaks</li><li><b>Food waste disposer</b> — operation, leaks, jams</li><li><b>Range, oven &amp; cooktop</b> — gas &amp; electric, anti-tip bracket, connections</li><li><b>Range exhaust / hood</b> — ducted to exterior vs. recirculating</li><li><b>Built-in microwave &amp; trash compactor</b> — operation</li><li><b>Garage door operator</b> — auto-reverse and photo-eye</li><li><b>Dryer exhaust duct</b> — to the exterior, the right material</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Safety &amp; scope</div><p>You operate appliances <b>using their normal controls only</b> — you don't run self-cleaning cycles, calibrate thermostats, dismantle units, or evaluate appliances that aren't connected. Watch for <b>gas odors</b> at connections and <b>tip-over and entrapment hazards</b> (ranges, garage doors). You report what's <em>operable and accessible</em> and note anything you couldn't operate, and why.</p></div></div>`,
 quiz:[
  {q:'The inspector\'s role with appliances is to:',o:['Repair units that don\'t work and certify the rest','Operate each installed unit by its normal controls and report deficiencies','Run every special cycle the unit offers','Replace aging appliances'],a:1,e:'You operate permanently installed appliances with their ordinary controls and report deficiencies — you don\'t repair, certify, or run special cycles.'},
  {q:'Which is NOT part of operating appliances under the SOP?',o:['Running the dishwasher through a cycle','Testing each cooktop burner','Running the oven\'s self-cleaning cycle','Operating the garage door from its controls'],a:2,e:'You use ordinary controls. Self-clean, thermostat calibration, and dismantling are outside the standard.'},
  {q:'The three things to confirm on each appliance are:',o:['Brand, age, and color','Operation, safety device, and proper connection','Energy rating, price, and warranty','Size, weight, and finish'],a:1,e:'Does it operate normally; is the safety device present and working; is gas/drain/exhaust connected correctly. That\'s the whole read.'},
  {q:'If an appliance is present but not connected, you:',o:['Operate it anyway','Don\'t evaluate it — note it isn\'t connected','Connect it to test it','Report it as broken'],a:1,e:'You inspect installed and connected appliances. An unconnected unit is outside scope — note that you didn\'t evaluate it and why.'},
 ]},

/* ===== L1 DISHWASHER & DISPOSER ===== */
{id:'l1',kind:'Lesson 1',label:'Dishwasher & Disposer',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · Under the sink</span><h1>The two wet appliances — and where they back up.</h1>
 <p class="lead">The dishwasher and food waste disposer live at the sink, and both fail in ways that put dirty water where it shouldn't be. Operate each, then check the one connection that protects the clean side.</p>
 <h2>Dishwasher — operate, then check backflow</h2>
 <p>Run the dishwasher through a portion of a normal cycle from its own controls. You're confirming it fills, runs, and drains — and watching for <b>leaks</b> at the door, hoses, and the cabinet floor below. The key safety check is <b>backflow protection</b>: a counter-mounted <b>air gap</b>, or a <b>high loop</b> (the drain hose looped up high under the counter) so dirty sink or disposer water can't <em>back-siphon</em> into the clean tub.</p>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="60" y1="60" x2="660" y2="60"/>${_mono(70,52,10,'counter','#918c7d','start')}
     <rect x="300" y="40" width="120" height="20"/>${_mono(360,34,9,'sink','#918c7d')}
     <rect x="90" y="80" width="150" height="150"/>${_mono(165,160,10,'dishwasher','#918c7d')}
     <rect x="470" y="44" width="20" height="16" stroke="#3d7d50"/>${_mono(480,34,9,'air gap','#3d7d50')}
     <rect x="520" y="120" width="60" height="110"/>${_mono(550,180,9,'disposer','#918c7d')}
   </g>
   <path d="M240 110 H 470 V 70" stroke="#3d7d50" stroke-width="2.4" fill="none"/>${_mono(360,100,9,'high loop — up high, then down','#3d7d50','start')}
   <path d="M490 70 q40 10 40 50" stroke="#3c5870" stroke-width="2" fill="none"/>
   <text x="300" y="245" font-family="JetBrains Mono" font-size="9" fill="#3d7d50">looped high so wastewater can't siphon back into the tub</text>
 </svg><div class="cap">Backflow protection: an air gap or a high loop keeps drain water from siphoning back into the dishwasher.</div></div>
 <h2>Food waste disposer — operate and listen</h2>
 ${conds('',[['Operation','Run it from its switch with water flowing. It should spin freely with a steady grind sound.'],['Hums but won\'t turn','A jam or failed motor. Report it inoperable — you operate the switch, you don\'t reach into the grinding chamber.'],['Leaks','Check the housing and the connections to the sink and dishwasher drain for drips.']])}
 ${W('match','duty')}
 ${story('Inspector in the house',`A spotless kitchen had a faint stain on the cabinet floor under the sink. The dishwasher ran fine — but its drain hose went straight to the disposer with no high loop and no air gap. **The dishwasher worked; the connection didn't.** The report named the missing backflow protection and the stain as evidence, and recommended a high loop or air gap.`)}`,
 quiz:[
  {q:'A dishwasher is operated by:',o:['Running its self-cleaning cycle','Running a portion of a normal cycle with its own controls','Disconnecting the drain to test it','Filling it with dishes'],a:1,e:'You run it through a normal cycle using its controls, confirming it fills, runs, and drains, and watching for leaks.'},
  {q:'An air gap or high loop on the dishwasher drain prevents:',o:['Slow draining','Dirty water from back-siphoning into the clean tub','Noise','High energy use'],a:1,e:'It\'s backflow protection — keeping contaminated sink/disposer water from siphoning back into the dishwasher. Report it missing.'},
  {q:'A disposer that hums but doesn\'t turn is:',o:['Working normally','Jammed or failed — report it inoperable','A GFCI issue','A drain problem only'],a:1,e:'Humming without spinning means a jam or failed motor. Report it inoperable; you operate the switch but don\'t reach into the chamber.'},
  {q:'A water stain on the cabinet floor under the sink should be:',o:['Ignored if appliances run','Reported as evidence of a leak and traced to its source','Wiped up and forgotten','Assumed to be condensation'],a:1,e:'Staining is evidence. Report the leak and its likely source (dishwasher, supply, drain, or disposer connection).'},
 ]},

/* ===== L2 RANGE, OVEN & COOKTOP ===== */
{id:'l2',kind:'Lesson 2',label:'Range, Oven & Cooktop',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · The cooking appliances</span><h1>The range that can tip — and the gas that can leak.</h1>
 <p class="lead">Ranges, ovens, and cooktops carry the section's two biggest hazards: a free-standing range that can <b>tip over</b>, and a gas unit that can <b>leak</b>. Operate the cooking functions, then check the safety items.</p>
 <h2>Operate the cooking functions</h2>
 <ul class="clean"><li><b>Oven</b> — run <em>bake</em> and <em>broil</em>; confirm the elements or burner heat and the unit responds to its controls.</li><li><b>Cooktop / surface burners</b> — operate <em>each</em> burner; gas burners should light promptly with a steady blue flame, electric elements should heat.</li><li><b>Report</b> inoperable elements, burners that won't light, and damaged controls.</li></ul>
 <h2>The anti-tip bracket — check behind every free-standing range</h2>
 <p>A <b>free-standing range</b> must be anchored by an <b>anti-tip bracket</b> so a child climbing or an adult leaning on the open oven door can't pull the range over onto themselves. Required on new ranges since the early 1990s, the bracket is one of the most commonly <em>missing</em> items — it ships in the box and never gets installed. Press down gently on the open oven door, or look behind the unit for the floor/wall bracket engaging a rear leg.</p>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="60" y1="210" x2="660" y2="210"/>${_mono(70,204,9,'floor','#918c7d','start')}
     <rect x="120" y="90" width="150" height="120"/>${_mono(195,150,10,'free-standing range','#918c7d')}
     <line x1="120" y1="110" x2="270" y2="110"/>
     <!-- open door + weight -->
     <path d="M120 170 l-46 30 h90" stroke="#b85436" stroke-width="2"/><circle cx="95" cy="194" r="6" fill="#b85436" opacity="0.5" stroke="#b85436"/>${_mono(60,222,9,'weight on open door','#b85436','start')}
     <!-- bracket at rear -->
     <path d="M270 200 l16 0 l0 -14" stroke="#3d7d50" stroke-width="2.4"/>${_mono(300,196,9,'anti-tip bracket','#3d7d50','start')}
   </g>
   <path d="M300 150 q40 -20 0 -40" stroke="#3d7d50" stroke-width="2" fill="none"/>
   <text x="305" y="120" font-family="JetBrains Mono" font-size="9" fill="#3d7d50">rear leg captured — can't tip forward</text>
 </svg><div class="cap">A free-standing range must be held by an anti-tip bracket so weight on the open door can't tip it forward.</div></div>
 <h2>Gas connections — odor, connectors, and electric circuits</h2>
 ${conds('',[['Gas leaks','A gas odor, hiss, or bubble test at a connection means a suspected leak. Report it, recommend shut-off, and refer to a qualified technician — you don\'t repair gas.'],['Flexible connectors','The corrugated connector should be in good condition and not kinked, corroded, or routed through the cabinet/floor. Old or improper connectors are reportable.'],['Electric cooktops &amp; wall ovens','These 240-volt units need an appropriately sized circuit. Report obvious deficiencies — undersized wiring, scorching, improper connections.']])}
 ${W('spot','kitchen')}
 ${story('Inspector in the house',`A remodel left a gleaming gas range — and a faint gas smell at the back where the prior connector had been reused, kinked tight against the wall. The burners all lit beautifully. **A unit can work perfectly and still be unsafe.** The report flagged the suspected leak and improper connector and recommended a qualified gas technician before close.`)}`,
 quiz:[
  {q:'A free-standing range is required to have:',o:['A GFCI cord','An anti-tip bracket','A recirculating hood','A high loop'],a:1,e:'The anti-tip bracket keeps the range from tipping when weight is applied to the open oven door. A missing bracket is a reportable safety hazard.'},
  {q:'Each surface burner on a cooktop should be:',o:['Tested all at once','Operated individually and confirmed to light/heat','Left alone if the oven works','Tested only if gas'],a:1,e:'Operate each burner. Gas should light promptly with a steady flame; electric elements should heat. Report any that don\'t.'},
  {q:'A faint gas odor at a range connection should be:',o:['Ignored if burners light','Reported as a suspected leak; recommend shut-off and a qualified technician','Fixed by tightening the fitting','Tested by lighting all burners'],a:1,e:'A gas odor signals a leak. Report it and refer to a qualified technician — you don\'t repair gas systems.'},
  {q:'An electric cooktop or wall oven should be on:',o:['A 15 A countertop circuit','An appropriately sized 240 V circuit','A GFCI receptacle','An extension cord'],a:1,e:'These heavy-draw units need a properly sized 240 V circuit. Report obvious wiring deficiencies.'},
  {q:'An old, kinked flexible gas connector routed through the cabinet is:',o:['Acceptable if it doesn\'t leak','Improper and reportable','Required by code','Only a cosmetic issue'],a:1,e:'Kinked, corroded, or panel-routed connectors are improper. Report the connector even before considering a leak.'},
 ]},

/* ===== L3 VENTILATION: HOOD & DRYER ===== */
{id:'l3',kind:'Lesson 3',label:'Hood & Dryer Exhaust',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · Where the air goes</span><h1>Exhaust has to go outside — or it's a finding.</h1>
 <p class="lead">Two appliances move air: the range hood and the clothes dryer. The whole inspection question for both is <em>where does the exhaust end up</em> — and for the dryer, <em>what is the duct made of</em>.</p>
 <h2>Range hood — ducted or recirculating</h2>
 <p>A range hood is one of two types, and your job is to identify and report which:</p>
 ${conds('',[['Ducted to the exterior','The hood exhausts cooking air, moisture, and grease outside through a duct and an exterior cap. Confirm the fan runs and the duct goes outside.'],['Recirculating (ductless)','Air passes through a charcoal filter and returns to the room — no outside duct. Not a defect, but report it as recirculating so the client knows it doesn\'t remove moisture, heat, or odor outdoors.']])}
 <p>The mistake to avoid is assuming every hood vents outside. A capped duct that blows back into the room is a recirculating hood — report it accurately, not as "broken."</p>
 <h2>Dryer exhaust — outside, in metal</h2>
 <p>The <b>dryer exhaust duct</b> has two firm requirements, and both are common field failures:</p>
 <ul class="clean"><li><b>Terminate outside</b> — to the exterior with a proper hooded cap. <em>Never</em> into an attic, crawlspace, or wall cavity. Moisture and lint dumped indoors cause condensation, mold, and a fire hazard.</li><li><b>Smooth metal duct</b> — rigid or semi-rigid metal, not combustible white-vinyl or foil flex, which traps lint and can melt or burn.</li></ul>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <path d="M60 70 L360 30 L660 70"/><line x1="60" y1="70" x2="60" y2="210"/><line x1="660" y1="70" x2="660" y2="210"/><line x1="60" y1="210" x2="660" y2="210"/>
     <line x1="60" y1="120" x2="660" y2="120" stroke-width="1"/>${_mono(360,112,9,'ceiling','#918c7d')}
     <rect x="110" y="150" width="70" height="60"/>${_mono(145,184,9,'dryer','#918c7d')}
     <!-- bad: into attic -->
     <path d="M180 165 q40 -6 50 -50" stroke="#b85436" stroke-width="2" fill="none" stroke-dasharray="4 2"/><circle cx="232" cy="108" r="3" fill="#b85436"/>${_mono(238,100,9,'into attic — WRONG','#b85436','start')}
     <!-- good: out the wall -->
     <rect x="470" y="150" width="70" height="60"/>${_mono(505,184,9,'dryer','#918c7d')}
     <path d="M540 170 H 660" stroke="#3d7d50" stroke-width="2.4" fill="none"/><path d="M654 164 l8 6 l-8 6" stroke="#3d7d50" stroke-width="2.4" fill="none"/>${_mono(600,162,9,'out the wall — RIGHT','#3d7d50')}
   </g>
 </svg><div class="cap">Dryer exhaust must terminate outside through metal duct — never into the attic, crawlspace, or a wall cavity.</div></div>
 ${W('sort','terminate')}
 ${story('Inspector in the house',`A finished laundry room hid a white-vinyl dryer duct snaking up and ending a few feet into the attic, lint matted on the joists. The dryer tumbled and heated fine. **The appliance was the least of it — the duct was a fire waiting on a spark.** Report: combustible duct, attic termination, both corrected to metal venting to the exterior.`)}`,
 quiz:[
  {q:'A range hood that filters air through charcoal and returns it to the room is:',o:['Defective','A recirculating (ductless) hood — report its type','A ducted hood','Illegal'],a:1,e:'Recirculating hoods are a legitimate type. Identify and report it as recirculating so the client knows it doesn\'t exhaust outside.'},
  {q:'A clothes dryer exhaust must terminate:',o:['In the attic','Outside the building','In the crawlspace','At a wall cavity'],a:1,e:'Always to the exterior with a hooded cap — never into an attic, crawl, or wall cavity. Indoor lint and moisture are a fire/mold hazard.'},
  {q:'The proper dryer duct material is:',o:['White vinyl flex','Smooth rigid or semi-rigid metal','PVC','Foil flex'],a:1,e:'Smooth metal resists lint buildup and won\'t burn. Combustible vinyl/foil flex is a reportable fire hazard.'},
  {q:'A range hood duct that is capped and blows back into the room is:',o:['A broken ducted hood','A recirculating hood — report it as such','A code violation in all cases','A dryer duct'],a:1,e:'It\'s functioning as a recirculating hood. Report the type accurately rather than calling it broken.'},
  {q:'A dryer venting into the attic is a problem because it adds:',o:['Only a little efficiency loss','Moisture and lint indoors — condensation, mold, and fire risk','Helpful attic humidity','Nothing if the attic is vented'],a:1,e:'Moist, lint-laden exhaust inside the envelope causes condensation, mold, and fire risk. It must vent outside.'},
 ]},

/* ===== L4 BUILT-IN MICROWAVE & TRASH COMPACTOR ===== */
{id:'l4',kind:'Lesson 4',label:'Microwave & Compactor',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · The other built-ins</span><h1>Operate it normally, report if it won't run.</h1>
 <p class="lead">The built-in microwave and the trash compactor are simpler: you operate each through one normal cycle with its own controls and report whether it works. You don't test radiation leakage, capacity, or take anything apart.</p>
 <h2>Built-in microwave</h2>
 ${conds('',[['Operation','Run a short cycle (a cup of water is the usual test). Confirm it powers on, runs, and the turntable/light/fan respond.'],['Over-the-range units','Many double as the range hood — note whether that hood is ducted or recirculating, just like a standalone hood.'],['Limits','You report whether it operates. You don\'t test microwave leakage or evaluate cooking performance.']])}
 <h2>Trash compactor</h2>
 ${conds('',[['Operation','Run it through its normal cycle from the controls; confirm the ram cycles and the unit stops. Report if it won\'t run.'],['Don\'t load or dismantle','You operate the controls — you don\'t fill it with trash to test capacity or take the ram apart.'],['Leaks &amp; damage','Note any leaks, damage, or missing components.']])}
 <h2>Other built-in appliances</h2>
 <p>The same method covers <b>any other permanently installed appliance</b> you find — wine coolers, built-in coffee systems, warming drawers, instant-hot dispensers. Operate it with its normal controls, confirm it runs, check the connection, and report deficiencies. If it isn't connected, you note that you didn't evaluate it.</p>
 ${W('match','term')}
 ${story('Inspector in the house',`An over-the-range microwave was dead — no display, nothing. The breaker was on. **You don't pull the unit to chase a fuse; you report it inoperable using normal controls.** The same morning, the trash compactor wouldn't cycle. Two built-ins, two simple findings: operate, observe, report — and move on.`)}`,
 quiz:[
  {q:'A built-in microwave is tested by:',o:['Measuring radiation leakage','Running a short normal cycle with its controls','Dismantling it to find the fuse','Checking the manufacturer\'s label only'],a:1,e:'Operate it with normal controls — a cup of water is the usual test. You report whether it runs; you don\'t test leakage or dismantle it.'},
  {q:'A trash compactor is operated by:',o:['Filling it with trash to test capacity','Running its normal cycle from the controls','Taking the ram apart','Ignoring it'],a:1,e:'Run it through a normal cycle with its controls and report if it won\'t run. You don\'t load or disassemble it.'},
  {q:'A dead built-in microwave with the breaker on should be:',o:['Disassembled to find the fault','Reported as inoperable using normal controls','Left out of the report','Reset repeatedly'],a:1,e:'You operate built-ins with their controls and report any that don\'t function. You don\'t dismantle the unit to diagnose it.'},
  {q:'An over-the-range microwave with a vent function is:',o:['Always ducted outside','Either ducted or recirculating — report its hood type like any hood','Exempt from venting rules','Not an appliance'],a:1,e:'Its hood is either ducted to the exterior or recirculating. Identify and report which, just as you would a standalone range hood.'},
 ]},

/* ===== L5 GARAGE DOOR OPERATOR ===== */
{id:'l5',kind:'Lesson 5',label:'Garage Door Operator',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · The opener &amp; its two reverses</span><h1>The appliance most likely to crush a child — test both reverses.</h1>
 <p class="lead">The powered garage door operator is an appliance under the SOP, and it's the one with the highest stakes. It has <b>two independent safety reverses</b>, and you test both — because a door that won't back off is an entrapment hazard.</p>
 <h2>Two safety reverses</h2>
 ${conds('',[['Auto-reverse (contact)','Place a flat 2×4 (or a roll of paper towels) on the floor in the door\'s path. When the closing door contacts it, the door must reverse. A door that keeps pushing or stalls without reversing has failed.'],['Photo-eye (non-contact)','Paired sensors mounted low (within ~6 in of the floor). When the door is closing and you break the beam, the door must reverse. Misaligned, blocked, or mounted-too-high eyes fail this test.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="60" y1="40" x2="660" y2="40"/>${_mono(70,32,9,'ceiling','#918c7d','start')}
     <rect x="330" y="44" width="40" height="18"/>${_mono(350,76,9,'opener','#918c7d')}
     <line x1="120" y1="40" x2="120" y2="210"/><line x1="580" y1="40" x2="580" y2="210"/><line x1="120" y1="210" x2="580" y2="210"/>
     <rect x="120" y="60" width="460" height="90" stroke-width="1"/><line x1="120" y1="105" x2="580" y2="105" stroke-width="1"/>${_mono(350,128,9,'door (closing)','#918c7d')}
     <path d="M350 150 v50" stroke="#b85436" stroke-width="2"/><path d="M344 194 l6 8 l6 -8" stroke="#b85436" stroke-width="2"/>
     <!-- 2x4 -->
     <rect x="330" y="200" width="40" height="8" fill="#b85436" opacity="0.5" stroke="#b85436"/>${_mono(350,224,9,'2×4 — must reverse','#b85436')}
     <!-- photo eyes -->
     <circle cx="126" cy="200" r="4" stroke="#3d7d50"/><circle cx="574" cy="200" r="4" stroke="#3d7d50"/><path d="M130 200 H 570" stroke="#3d7d50" stroke-width="1.4" stroke-dasharray="6 4"/>${_mono(150,194,9,'photo-eye beam','#3d7d50','start')}
   </g>
 </svg><div class="cap">Test both: the door reverses on contact with the 2×4, and reverses when the low photo-eye beam is broken.</div></div>
 <h2>What you report</h2>
 <ul class="clean"><li><b>Failed contact reverse</b> — door pushes or stalls on the 2×4 instead of backing off.</li><li><b>Failed / missing photo-eye</b> — door doesn't reverse on a broken beam, or sensors are misaligned, blocked, or mounted too high.</li><li><b>Other deficiencies</b> — damaged springs/cables, missing manual release, or an opener that won't run from its controls.</li></ul>
 ${W('spot','utility')}
 ${W('era','safety')}
 ${story('Inspector in the house',`The seller swore the garage door was "brand new and safe." The 2×4 test told the truth: the door met the wood, pushed hard, and stalled — no reverse — and one photo-eye was twisted to the side. **Both safety systems were down on a door a toddler opens by reaching up.** Report: failed auto-reverse and misaligned photo-eye, recommend service before occupancy.`)}`,
 quiz:[
  {q:'A powered garage door operator must reverse:',o:['Only from the wall button','On contact with an obstruction AND on a broken photo-eye beam','Only in summer','Only on metal doors'],a:1,e:'Two independent reverses: contact (the 2×4 test) and the non-contact photo-eye. Either failing or missing is an entrapment hazard.'},
  {q:'The 2×4 test checks:',o:['The photo-eye','The contact auto-reverse','The spring tension','The wall switch'],a:1,e:'A flat 2×4 in the door\'s path checks that the door reverses on contact. Pushing or stalling without reversing is a failure.'},
  {q:'Photo-eye sensors should be mounted:',o:['Near the ceiling','Low, within about 6 inches of the floor','On the door itself','Anywhere convenient'],a:1,e:'Low mounting (about 6 in) catches a child or pet in the door\'s path. Eyes mounted too high, misaligned, or blocked fail the test.'},
  {q:'A door that contacts the 2×4 and keeps pushing without reversing is:',o:['Working normally','A failed contact auto-reverse — report it as an entrapment hazard','A photo-eye problem only','Fine if the photo-eye works'],a:1,e:'The door must reverse on contact. Pushing instead is a failed auto-reverse and a reportable child-entrapment hazard.'},
  {q:'A misaligned photo-eye is:',o:['Cosmetic','A failed non-contact safety reverse — report and recommend realignment','Not part of the inspection','Acceptable if the contact reverse works'],a:1,e:'A twisted or blocked eye can\'t reliably reverse a closing door. Report the misaligned non-contact safety and recommend service.'},
 ]},

/* ===== L6 ELECTRICAL PROTECTION & GAS ===== */
{id:'l6',kind:'Lesson 6',label:'GFCI, AFCI & Gas',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · The protection behind the plug</span><h1>The appliance works — but is the circuit protected?</h1>
 <p class="lead">Appliances live on electrical circuits and gas lines, and several findings have nothing to do with whether the unit runs. Two protections come up again and again: <b>GFCI</b> on the receptacles, and proper handling of the <b>gas</b> connections.</p>
 <h2>GFCI — ground-fault protection</h2>
 <p>A <b>GFCI</b> watches the current going out against the current coming back; the instant they don't match (current leaking through a person to ground), it cuts power in milliseconds. It's required at <b>kitchen counter receptacles</b> and other wet or outdoor locations. Missing GFCI where it's required is a reportable electrical safety deficiency.</p>
 ${W('gfi')}
 <h2>AFCI — arc-fault protection</h2>
 <p>An <b>AFCI</b> detects the erratic signature of a dangerous arc (a frayed cord, a loose connection) and trips before it starts a fire. Arc-fault requirements keep expanding to more circuits. Where applicable protection is clearly missing on a circuit you can see, note it.</p>
 <h2>Gas connections — the appliance side</h2>
 ${conds('',[['Suspected leaks','Odor, hiss, or a bubble test at an appliance connection — report it, recommend shut-off, refer to a qualified technician. You don\'t repair gas.'],['Improper connectors','Kinked, corroded, over-long, or panel-routed flexible connectors are reportable on ranges, dryers, and other gas appliances.'],['Shutoffs &amp; sediment','Note a missing appliance shutoff valve where one should be present.']])}
 ${W('sort','report')}
 ${story('Inspector in the house',`Every appliance in the kitchen ran. But the counter receptacles by the sink had no GFCI, and the gas range\'s connector was kinked behind the unit. **None of that shows when you just turn things on.** The report carried three clean findings — missing GFCI, improper gas connector — separate from the appliances themselves, each with its own recommendation.`)}`,
 quiz:[
  {q:'GFCI protection is required at:',o:['Bedroom receptacles only','Kitchen counter receptacles and other wet/outdoor locations','Nowhere in a kitchen','240 V circuits only'],a:1,e:'GFCI is required at kitchen counter receptacles and wet/outdoor locations. Report missing GFCI as an electrical safety deficiency.'},
  {q:'A GFCI protects against:',o:['Overloads','A ground fault — current leaking to ground through a person','Arc faults','Gas leaks'],a:1,e:'It compares current out vs. back and trips on the tiny imbalance of a ground fault, cutting power in milliseconds.'},
  {q:'An AFCI is designed to detect:',o:['Ground faults','The signature of a dangerous electrical arc, to prevent fires','Gas odors','Water leaks'],a:1,e:'Arc-fault protection trips on the erratic signature of a dangerous arc (frayed cords, loose connections). Note missing protection where applicable.'},
  {q:'A suspected gas leak at an appliance connection is handled by:',o:['Tightening it yourself','Reporting it, recommending shut-off, and referring to a qualified technician','Lighting the burner to burn it off','Ignoring it if the unit works'],a:1,e:'Report the suspected leak and refer to a qualified gas technician. Inspectors don\'t repair gas systems.'},
  {q:'Whether an appliance runs and whether its circuit is GFCI-protected are:',o:['The same finding','Separate findings — report each on its own','Only relevant for gas units','Out of scope'],a:1,e:'Operation and protection are distinct. A unit can run perfectly while its required GFCI is missing — report both, separately.'},
 ]},

/* ===== L7 PUTTING IT TOGETHER ===== */
{id:'l7',kind:'Lesson 7',label:'The Full Walk-through',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Putting it together</span><h1>One method, every appliance: operate, check the safety, report.</h1>
 <p class="lead">The appliances section is a checklist of small, repeatable reads. The skill isn't any single test — it's running the <em>same three questions</em> on each unit without skipping the one that matters.</p>
 <h2>The walk-through, appliance by appliance</h2>
 <ul class="num"><li><b>Dishwasher</b> — runs a cycle, drains, no leaks; air gap or high loop present.</li><li><b>Disposer</b> — spins and grinds, no leak; not jammed (humming without turning).</li><li><b>Range / oven / cooktop</b> — bake, broil, each burner; <b>anti-tip bracket</b>; gas connector and any odor.</li><li><b>Range hood</b> — runs; identified as ducted or recirculating.</li><li><b>Built-in microwave</b> — runs a short cycle; hood type if over-the-range.</li><li><b>Trash compactor</b> — cycles from its controls.</li><li><b>Garage door operator</b> — <b>contact reverse</b> (2×4) and <b>photo-eye</b> both pass.</li><li><b>Dryer exhaust duct</b> — metal, terminates outside.</li><li><b>Electrical / gas</b> — GFCI where required, AFCI where applicable, gas connections sound.</li></ul>
 <h2>The conditions you'll write up most</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Missing anti-tip bracket</span></div><p>Free-standing range not anchored against tipping.</p><div class="meta"><span class="lab">Implication</span><span class="val">Tip-over and scald hazard, especially to children.</span><span class="lab">Report</span><span class="val">Recommend installing the listed anti-tip bracket.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Garage door won't reverse</span></div><p>Failed contact auto-reverse and/or missing/misaligned photo-eye.</p><div class="meta"><span class="lab">Implication</span><span class="val">Child-entrapment / crush hazard.</span><span class="lab">Report</span><span class="val">Report the failed safety and recommend service before occupancy.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Improper venting</span></div><p>Dryer exhaust into the attic/crawl, vinyl duct, or a capped hood reported as ducted.</p><div class="meta"><span class="lab">Implication</span><span class="val">Fire and moisture hazard; misrepresented hood type.</span><span class="lab">Report</span><span class="val">Recommend metal duct terminating outside; report the hood\'s true type.</span></div></div>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The inspector's summary</div><p>Operate every permanently installed appliance with its <b>normal controls</b>, confirm the <b>safety device</b> (anti-tip bracket, garage reverses, GFCI, proper venting and connectors), and verify the <b>connection</b> (gas, drain, exhaust). Name the deficiency, the implication, and the recommendation — and note anything you couldn't operate, and why.</p></div></div>
 ${story('Inspector in the house',`A house full of new appliances looked like a five-minute walkthrough. But the range had no bracket, the dryer vented to the attic, the garage door wouldn't reverse, and the counter had no GFCI — four serious findings behind four units that all "worked." **Operation is the easy part; the safety devices are the inspection.** Same three questions, every appliance, no skips.`)}`,
 quiz:[
  {q:'The inspector\'s through-line for the appliances system is:',o:['Replace what\'s aging','Operate each unit normally, verify its safety device, and report deficiencies','Test only what the seller points out','Repair what\'s broken'],a:1,e:'Operate through ordinary controls, confirm the safety devices and connections, and report deficiencies — the same three questions on every unit.'},
  {q:'The two highest-stakes safety findings in this section are:',o:['Microwave and compactor operation','Missing range anti-tip bracket and a garage door that won\'t reverse','Hood noise and dishwasher cycle time','Disposer and ice-maker leaks'],a:1,e:'A tip-over range and a non-reversing garage door are the life-safety findings — never skip the bracket check or both door reverses.'},
  {q:'For any appliance you couldn\'t operate, you should:',o:['Assume it works','Note that you didn\'t operate it, and why','Leave it off the report','Operate it by force'],a:1,e:'Report what you couldn\'t evaluate and the reason (not connected, inaccessible, unsafe to operate) — that\'s part of a complete report.'},
  {q:'A kitchen of brand-new appliances that all power on:',o:['Needs no further inspection','Can still have missing brackets, improper venting, failed garage reverses, or missing GFCI','Is automatically compliant','Only needs the gas checked'],a:1,e:'Operation is the easy part. The safety devices, venting, and protection are where the real findings hide — check them on every unit.'},
 ]},
