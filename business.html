<!-- ATI · Module IV — Business Operations & Ethics -->
<title>ATI · Module IV — Business Operations &amp; Ethics</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

/* ================= ENGINE ================= */
const KEY='ati_business_ix_v1';
let S={done:{},quiz:{},assessBest:0,cur:0};
async function load(){try{const r=await window.storage.get(KEY,false);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}S.done=S.done||{};S.quiz=S.quiz||{};}
async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>window.__previewAll||i===0||stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}
function rail(){document.getElementById('rail').innerHTML=STEPS.map((s,i)=>{const d=stepDone(i),u=unlocked(i),a=i===S.cur;return `<button class="step ${d?'done':''} ${a?'active':''} ${u?'':'locked'}" ${u?`onclick="goStep(${i})"`:''}><span class="dot">${d?sv(ic.check,3):(i+1)}</span><span class="lbl">${s.label}<span class="kind">${s.kind}</span></span></button>`;}).join('');}
function goStep(i){if(!unlocked(i))return;S.cur=i;save();render();window.scrollTo({top:0,behavior:'smooth'});}
function markDoneAndNext(){S.done[STEPS[S.cur].id]=true;save();updTop();rail();if(S.cur<STEPS.length-1)goStep(S.cur+1);else render();}
function render(){updTop();rail();const s=STEPS[S.cur];({lesson:renderLesson,scenario:renderScenarios,assess:renderAssess,glossary:renderGlossary,source:renderSource}[s.type])(s);}

function renderLesson(s){
  let h=(typeof s.body==='function'?s.body():s.body);
  if(s.quiz&&s.quiz.length){
    h+=`<div class="quiz"><div class="qh">${sv(ic.brain)} Check your understanding</div><div class="qt">${s.label}</div><div class="qsub">${s.quiz.length} questions covering the lesson — answer each to see the reasoning.</div><div class="qbody">${
      s.quiz.map((q,qi)=>`<div class="qblock"><div class="qnum">Question ${qi+1} of ${s.quiz.length}</div><div class="q">${q.q}</div><div class="opts" data-qi="${qi}">${q.o.map((o,k)=>`<button class="opt" onclick="qAns(${qi},${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="qexp" data-qi="${qi}"></div></div>`).join('')

function qAns(qi,k){const s=STEPS[S.cur],q=s.quiz[qi];if(window._ql.answered[qi]!==undefined)return;window._ql.answered[qi]=k;
  const opts=view.querySelector('.opts[data-qi="'+qi+'"]');opts.querySelectorAll('.opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});
  view.querySelector('.qexp[data-qi="'+qi+'"]').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;
  if(Object.keys(window._ql.answered).length===window._ql.total){
    const right=s.quiz.filter((q,i)=>window._ql.answered[i]===q.a).length,sc=view.querySelector('.qscore');sc.style.display='flex';
    sc.innerHTML=`${sv(ic.check,2.4)}<span>You scored <b style="color:${right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)'}">${right}/${s.quiz.length}</b> on this lesson.</span>`;

    S.quiz[s.id]=true;save();const b=document.getElementById('nextBtn');if(b)b.disabled=false;}
}

function renderSource(){view.innerHTML=`<span class="eyebrow">Reference · wrap-up</span><h1>Reference &amp; summary</h1><p class="lead">Everything required is taught in the lessons above. This is the one-screen recap to carry into your practice — the responsibilities that protect your client, your license, and your business.</p><div class="srcnote">${sv(ic.book,2)} Built on the Business Operations and Professional Ethics material for the Texas (TREC) Professional Inspector course. Statute and rule specifics live in the Texas Law module; this section is the practical, plain-language reference.</div><div class="gloss" style="margin-top:18px"><div class="term"><div class="tw">1 · Set the business up right</div><div class="td">Choose an entity, register it, and carry the required insurance before you take a fee. Texas Professional Inspectors must show financial responsibility — E&amp;O coverage — and display the license on reports and advertising.</div></div><div class="term"><div class="tw">2 · Put the agreement first</div><div class="td">A signed pre-inspection agreement before the inspection defines the scope, the limitations and exclusions, the fee, and how disputes are handled. It binds the parties who sign it — get it executed up front.</div></div><div class="term"><div class="tw">3 · Carry the right insurance</div><div class="td">E&amp;O (professional liability) covers claims that you missed or misreported something; general liability covers bodily injury and property damage on site. Texas requires Professional Inspectors to maintain E&amp;O — keep it active and on file.</div></div><div class="term"><div class="tw">4 · Hold the ethics line</div><div class="td">No conflicts of interest: don't inspect a property you have an interest in, don't solicit or perform repairs on what you inspected, disclose any referral relationship, and accept no undisclosed compensation. Your loyalty is to the client paying for an honest opinion.</div></div><div class="term"><div class="tw">5 · Communicate, advertise, and keep records honestly</div><div class="td">Set expectations before, during, and after; report only what you observed; advertise truthfully (no guarantees or false credentials); and retain your reports and agreements for the required period so you can stand behind your work.</div></div><div class="term"><div class="tw">The through-line</div><div class="td">Competence, independence, and honesty — backed by a contract, insurance, and good records — are what turn a skilled inspector into a trustworthy professional.</div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><a class="btn slate" href="index.html" style="text-decoration:none;margin-right:10px">${sv(ic.back)} Module IV</a><button class="btn brass" onclick="finishAll()">${sv(ic.check)} Complete section</button></div>`;}

const GLOSSARY=[
 ['Pre-inspection agreement','The written contract signed before the inspection that defines scope, limitations, fee, and dispute terms, and binds the parties who sign it.'],
 ['Scope of work','What the inspection will and won\'t cover — the systems examined and the method — spelled out in the agreement.'],
 ['Limitations / exclusions','Items the inspection does not cover (e.g., inaccessible areas, code compliance, future life) stated up front in the agreement.'],
 ['Standards of Practice (SOP)','The minimum standards governing what an inspector must inspect and report; the agreement\'s scope is built around them.'],
 ['Arbitration clause','A contract term sending disputes to a neutral arbitrator instead of a court; common in pre-inspection agreements.'],
 ['Limitation of liability','A contract clause that caps the inspector\'s financial exposure; enforceability varies, and it must be clearly disclosed.'],
 ['Errors & omissions (E&O)','Professional-liability insurance covering claims that the inspector missed or misreported a defect; Texas Professional Inspectors must carry it.'],
 ['General liability insurance','Coverage for third-party bodily injury or property damage occurring during the inspection — separate from E&O.'],
 ['Financial responsibility','The state requirement that a Professional Inspector show the means (typically E&O insurance) to answer for claims.'],
 ['Conflict of interest','Any situation where an inspector\'s personal or financial interest could bias the inspection — e.g., inspecting a property they may buy or repair.'],
 ['Undisclosed compensation','Money or benefits (such as referral kickbacks) received without telling the client — a prohibited conflict.'],
 ['Referral disclosure','Telling the client about any relationship or compensation tied to a company you recommend, so they can judge your independence.'],
 ['Independence / objectivity','The inspector\'s duty to report observed conditions honestly, free of outside pressure or personal gain.'],
 ['Standards of conduct','The professional and ethical rules governing honesty, competence, and integrity in practice.'],
 ['Business entity','The legal form of the business (sole proprietor, LLC, corporation) affecting liability and taxes; chosen and registered when setting up.'],
 ['License display','The requirement to show the inspector\'s license number on reports and advertising as proof of authorization to practice.'],
 ['Truthful advertising','Marketing that is accurate and not misleading — no false credentials, guarantees, or claims an inspection can\'t support.'],
 ['Point-in-time opinion','The principle that an inspection reports observable conditions on the day of the inspection — not a warranty or prediction.'],
 ['Expectation setting','Communicating scope, limits, and what the report means before, during, and after the inspection to prevent disputes.'],
 ['Recordkeeping / retention','Keeping signed agreements and reports for the required period so the inspector can support and defend the work.'],
 ['Inspection report','The written deliverable describing observed conditions, deficiencies, and implications — the core work product the client pays for.'],
 ['Fee schedule','The published or agreed pricing for inspections and add-on services, confirmed in the agreement before work begins.'],
 ['Confidentiality','Treating the client\'s report and information as private — generally shared only with the client or as the client directs.'],
 ['Continuing education (CE)','Ongoing required training that keeps an inspector\'s knowledge current and the license in good standing.'],
];

{id:'intro',kind:'Start here',label:'The professional inspector',type:'lesson',
 body:()=>`<span class="eyebrow">Business Operations &amp; Ethics · Orientation</span><h1>The skill gets you in the attic. The business and the ethics keep you in practice.</h1>
 <p class="lead">You can read a roof, a panel, and a furnace cold — but a Texas Professional Inspector is also running a <b>business</b> and standing on a <b>professional reputation</b>. This section is about everything that surrounds the inspection itself: the contract, the insurance, the money, and above all the <b>ethics</b> that make your opinion worth paying for.</p>
 <p>Everything here protects three things at once, and every topic in this module ties back to one of them:</p>
 <ul class="num"><li><b>The client</b> — who is paying for an honest, independent opinion.</li><li><b>Your license</b> — which the state can suspend or revoke for misconduct.</li><li><b>Your business</b> — which a single uninsured claim can end.</li></ul>
 <p>It's tempting to treat this as "the boring part." Don't. More inspectors lose their livelihood to a missing agreement, no insurance, or an ethics lapse than to a wrong call on a water heater. Get this right and the technical work has a place to live.</p>
 <p>Each topic runs through the same simple loop you've used in the other modules:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">The duty</div></div><div class="seg"><div class="n">02</div><div class="w">Why it matters</div></div><div class="seg"><div class="n">03</div><div class="w">The wrong way</div></div><div class="seg"><div class="n">04</div><div class="w">The right way</div></div><div class="seg"><div class="n">05</div><div class="w">How you protect yourself</div></div></div>
 <h2>What this section covers</h2>
 <ul class="clean"><li><b>Setting up the business</b> — entity, registration, and displaying your license</li><li><b>The pre-inspection agreement</b> — scope, limitations, arbitration, who it binds</li><li><b>Fees, scheduling &amp; workflow</b> — running the practice day to day</li><li><b>Insurance</b> — E&amp;O and general liability, and Texas's financial-responsibility rule</li><li><b>Ethics &amp; conflicts of interest</b> — independence, disclosure, no undisclosed pay</li><li><b>Conduct, communication, records &amp; advertising</b> — honesty across the whole job</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Where this fits</div><p>This module teaches the <b>practical</b> business and ethics of inspecting. The exact <b>statutes, rules, and license requirements</b> are covered in the Texas Law module — where a specific number or rule matters, we point to it but keep the focus on what you actually <em>do</em>. When something is jurisdiction-specific, we say so.</p></div></div>`,
 quiz:[
  {q:'The main reason business and ethics matter to an inspector is that:',o:['They make the technical inspection unnecessary','They protect the client, your license, and your business — the things technical skill alone can\'t','They\'re only required for large firms','They replace the need for insurance'],a:1,e:'Technical skill gets the inspection done; the contract, insurance, and ethics are what keep you in practice and protect the client.'},
  {q:'An inspector\'s professional opinion is valuable mainly because it is:',o:['Cheap','Independent and honest','Always positive','Backed by a guarantee'],a:1,e:'Clients pay for an objective, independent opinion. Anything that compromises that independence destroys the value of the inspection.'},
  {q:'The detailed statutes and license rules for Texas inspectors are:',o:['Ignored in practice','Covered in depth in the Texas Law module; this section is the practical side','The same in every state','Optional'],a:1,e:'This module is the practical business-and-ethics side. The Texas Law module carries the statute and rule specifics.'},
  {q:'Which is most likely to end an inspector\'s career?',o:['A single debatable technical call','A missing agreement, no insurance, or an ethics violation','Using an older moisture meter','Working alone'],a:1,e:'Business and ethics failures — no contract, no coverage, a conflict of interest — sink more inspectors than honest technical disagreements.'},
 ]},

/* ===== L1 SETTING UP THE BUSINESS ===== */
{id:'l1',kind:'Lesson 1',label:'Setting Up the Business',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · Hanging your shingle</span><h1>Before the first paid inspection, build the business under it.</h1>
 <p class="lead">Being licensed lets you inspect; it doesn't make you a business. Between the two sits a short list of decisions — entity, registration, license display, and insurance — that you make once and live with for years.</p>
 <h2>License first, then the business around it</h2>
 <p>The <b>Texas Professional Inspector license</b> is the foundation — and it's <em>personal</em> to you, separate from whatever company you form. You must hold it, keep it current with continuing education, and <b>display it</b> as required: on your reports and in your advertising. Operating or advertising without showing your license is a quick way to draw a complaint.</p>
 <h2>Choosing a business entity</h2>
 ${conds('',[['Sole proprietor','Simplest and cheapest to start — but you and the business are the same legal "person," so your personal assets are exposed to business claims.'],['LLC (limited liability company)','The common choice: separates personal and business liability, with flexible taxes. You still must register it and keep finances separate.'],['Corporation','More formal structure and paperwork; sometimes chosen for tax or growth reasons. Usually more than a solo inspector needs.']])}
 <p>You're not a lawyer or an accountant, and you'll often get advice from one — but understand the trade-off: simplicity versus <b>liability protection</b>. Whatever you choose, you <b>register the business</b> (name, state filings, tax IDs) and keep its money separate from yours.</p>
 <div class="dgm"><svg viewBox="0 0 720 210">
   <g ${_gs}>
     <rect x="40" y="80" width="150" height="60" rx="8"/>${_mono(115,108,12,'LICENSE (you)','#7f520a')}${_mono(115,126,9,'held personally','#918c7d')}
     <path d="M190 110 H 270" stroke="#b85436" stroke-width="2.2"/><path d="M262 104 l10 6 l-10 6" stroke="#b85436" stroke-width="2.2"/>
     <rect x="270" y="80" width="170" height="60" rx="8"/>${_mono(355,108,12,'BUSINESS ENTITY','#3c5870')}${_mono(355,126,9,'LLC / sole prop / corp','#918c7d')}
     <path d="M440 110 H 520" stroke="#3d7d50" stroke-width="2.2"/><path d="M512 104 l10 6 l-10 6" stroke="#3d7d50" stroke-width="2.2"/>
     <rect x="520" y="80" width="160" height="60" rx="8"/>${_mono(600,104,12,'INSURED &amp; READY','#3d7d50')}${_mono(600,122,9,'E&amp;O + GL in force','#918c7d')}
   </g>
 </svg><div class="cap">The license is personal and comes first; the entity wraps the business in liability protection; insurance makes you ready to take a fee.</div></div>
 ${W('era','setup')}
 ${story('Setting up shop',`A new inspector passed the exam, printed cards, and started taking jobs the next week — as a sole proprietor, no LLC, no insurance, license number nowhere on the report. The first inspection went fine. **The first claim, eighteen months later, came straight at his house and his savings**, because there was no entity and no policy between him and the client. The order matters: license, entity, insurance — then inspect.`)}`,
 quiz:[
  {q:'Your inspector license is:',o:['Owned by your LLC','Held personally by you, separate from any business entity','Automatically transferred when you form a company','Only needed once you incorporate'],a:1,e:'The license is personal to you. The business entity is a separate legal layer you build around it.'},
  {q:'The main reason a solo inspector forms an LLC instead of staying a sole proprietor is:',o:['It looks more impressive','It separates personal assets from business liability','It removes the need for insurance','It exempts you from licensing'],a:1,e:'An LLC creates a liability shield between your personal assets and business claims. It does not replace insurance or licensing.'},
  {q:'Displaying your license number on reports and advertising is:',o:['Optional branding','A professional and regulatory requirement','Only for franchises','Something only Texas waives'],a:1,e:'You must show your license as required — leaving it off your reports and ads invites a complaint.'},
  {q:'Forming an LLC means you no longer need E&O insurance.',o:['True — the LLC covers everything','False — the entity limits some exposure but insurance still covers professional claims','True if you also incorporate','False only for large firms'],a:1,e:'An entity and insurance do different jobs. The LLC limits personal exposure; E&O responds to professional-negligence claims. You need both.'},
 ]},

/* ===== L2 THE PRE-INSPECTION AGREEMENT ===== */
{id:'l2',kind:'Lesson 2',label:'The Pre-Inspection Agreement',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · The contract</span><h1>The most important document you'll ever sign isn't the report — it's the agreement.</h1>
 <p class="lead">The pre-inspection agreement is the contract between you and your client. It defines what you're agreeing to do, what you're not, what it costs, and what happens if there's a dispute. Signed <b>before</b> the inspection, it protects everyone; skipped, it's the single biggest avoidable risk in the business.</p>
 <h2>What the agreement does</h2>
 ${conds('',[['Defines the scope','States what systems and components the inspection covers — typically built around the Standards of Practice — so there\'s no confusion about what was included.'],['States the limitations &amp; exclusions','Lists what the inspection does <em>not</em> cover (inaccessible areas, code compliance, remaining life, latent defects) and that it\'s a visual, point-in-time examination.'],['Sets the fee &amp; terms','Confirms the price, payment, and scheduling so money is settled before the work.'],['Handles disputes','Often includes an <b>arbitration clause</b> (disputes go to a neutral arbitrator instead of court) and may include a limitation-of-liability clause.']])}
 <h2>Sign it before you inspect — and know who it binds</h2>
 <p>Timing is everything: the agreement should be <b>executed before the inspection begins</b>. After the fact, a client can argue they never agreed to the limitations. And it binds <b>the parties who sign it</b> — usually the client who hired you. That has a practical edge: a buyer's agreement generally doesn't protect a future buyer, and a report prepared for one client isn't a contract with the next.</p>
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The cardinal rule</div><p>No signed pre-inspection agreement, no inspection. A friendly client who says "skip the paperwork" is the one most likely to file a complaint later — because <b>nothing defines the scope, the limits, or the dispute process.</b> Get it signed first, every time.</p></div></div>
 ${W('match','terms')}
 ${story('"Just email me the report"',`A buyer in a rush waved off the agreement — "I trust you, just send the report." The inspector did it once, as a favor. When a basement leak showed up after closing, the client claimed the inspection should have caught a hidden crack, and there was **no document defining scope, no limitations clause, no arbitration term — nothing.** The agreement isn't bureaucracy; it's the boundary of what you promised.`)}`,
 quiz:[
  {q:'The pre-inspection agreement primarily exists to:',o:['Guarantee the home is sound','Define the scope, limitations, fee, and dispute terms of the inspection','Replace the inspection report','Transfer liability to the client entirely'],a:1,e:'It\'s the contract: scope, limits, fee, and how disputes are resolved. It is not a guarantee or a substitute for the report.'},
  {q:'When should the agreement be signed?',o:['After the report is delivered','Before the inspection begins','Only if a dispute arises','At the closing table'],a:1,e:'Execute it up front. Signing after the fact lets a client argue they never agreed to the scope and limitations.'},
  {q:'An arbitration clause in the agreement:',o:['Eliminates the inspector\'s liability','Routes disputes to a neutral arbitrator instead of a court','Guarantees the inspector wins','Is illegal in inspection contracts'],a:1,e:'Arbitration sends disputes to a private arbitrator rather than litigation. It doesn\'t erase liability — it changes how disputes are resolved.'},
  {q:'A signed pre-inspection agreement generally binds:',o:['Everyone who ever owns the home','The parties who sign it — usually the client who hired you','Only the inspector','The real estate agents'],a:1,e:'It binds the signing parties. A report and agreement for one client typically don\'t extend a contract to a future buyer.'},
  {q:'A client says "skip the paperwork, I trust you." You should:',o:['Inspect without an agreement to keep them happy','Have the agreement signed first — the trusting client is often the one who later disputes','Inspect and sign afterward','Charge double instead'],a:1,e:'No signed agreement, no inspection. Without it, nothing defines the scope, limits, or dispute process when something goes wrong.'},
 ]},

/* ===== L3 FEES, SCHEDULING & WORKFLOW ===== */
{id:'l3',kind:'Lesson 3',label:'Fees, Scheduling & Workflow',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · Running the practice</span><h1>A repeatable workflow is what makes every client get the same professional job.</h1>
 <p class="lead">Once the business and the agreement are in place, the day-to-day is about running it well: pricing fairly, scheduling realistically, and following the same dependable sequence from first call to delivered report.</p>
 <h2>Setting fees</h2>
 <p>Build a <b>fee schedule</b> you can state plainly and apply consistently — typically driven by square footage, age, distance, and add-on services (and confirmed in the agreement before the job). Consistent, transparent pricing reads as professional; pricing that shifts based on who's asking or what the agent wants reads as something else. Price for the time the job actually takes — a rushed inspection to fit a low price helps no one.</p>
 <h2>Scheduling and the workflow</h2>
 <p>Most inspections follow the same loop. Knowing it cold lets you give clients accurate expectations and keeps nothing from slipping:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Inquiry &amp; quote</div></div><div class="seg"><div class="n">02</div><div class="w">Agreement signed</div></div><div class="seg"><div class="n">03</div><div class="w">Inspect on site</div></div><div class="seg"><div class="n">04</div><div class="w">Report delivered</div></div><div class="seg"><div class="n">05</div><div class="w">Follow-up &amp; records</div></div></div>
 <ul class="clean"><li><b>Inquiry &amp; quote</b> — capture the property details, give a clear price and time window</li><li><b>Agreement signed</b> — get the pre-inspection agreement executed before you go</li><li><b>Inspect on site</b> — follow your standard route and Standards of Practice every time</li><li><b>Report delivered</b> — a clear, prompt written report is the product the client paid for</li><li><b>Follow-up &amp; records</b> — answer questions, then file the agreement and report</li></ul>
 <h2>Communicating during the job</h2>
 <p>Scheduling is also expectation-setting. Tell the client how long it takes, whether they're welcome to attend, when the report lands, and what the report is (and isn't). A client who knows what to expect rarely becomes a complaint.</p>
 ${story('The squeezed schedule',`An inspector stacked four full inspections into one day to chase volume, then rushed each one and delivered reports late. Two clients felt shortchanged; one filed a complaint that the inspection felt "cursory." **The fix wasn't working faster — it was scheduling honestly** for the time a thorough job and a clear report actually take. Workflow discipline is client protection.`)}`,
 quiz:[
  {q:'A fee schedule should be:',o:['Negotiated secretly per client','Stated plainly and applied consistently, and confirmed in the agreement','Set by the buyer\'s agent','Whatever closes the deal'],a:1,e:'Consistent, transparent pricing reads as professional and is confirmed up front in the agreement. Pricing that shifts to please an agent reads as a conflict.'},
  {q:'Where does signing the agreement fall in the workflow?',o:['After the report','Before the on-site inspection','It\'s optional','At follow-up'],a:1,e:'Inquiry/quote, then signed agreement, then inspect, then deliver, then follow-up and records. The agreement comes before you inspect.'},
  {q:'Cramming too many inspections into a day risks:',o:['Nothing, if you\'re skilled','Rushed, cursory work and late reports — and complaints','Lower insurance costs','Better client relationships'],a:1,e:'Schedule for the time a thorough inspection and a clear report actually take. Volume at the cost of quality invites complaints.'},
  {q:'Telling clients up front how long the inspection takes and what the report covers is:',a:1,o:['A waste of time','Expectation-setting that prevents most disputes','Only needed for first-time buyers','Something to avoid so they don\'t worry'],e:'Clear expectations are client protection. A client who knows what to expect rarely becomes a complaint.'},
 ]},

/* ===== L4 INSURANCE ===== */
{id:'l4',kind:'Lesson 4',label:'E&O & Liability Insurance',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Covering the risk</span><h1>Two policies, two different risks — and in Texas, one of them is required.</h1>
 <p class="lead">No matter how careful you are, inspecting homes carries risk: you might miss something, or something might go wrong on site. Two separate insurance policies answer those two separate risks, and a Professional Inspector in Texas must carry the first one.</p>
 <h2>The two coverages</h2>
 ${conds('',[['Errors &amp; omissions (E&amp;O)','Also called professional liability. It responds to claims that you were <em>negligent in your professional work</em> — you missed a defect, or your report misstated a condition. This is the policy that defends the quality of your opinion.'],['General liability','It responds to <em>bodily injury or property damage</em> arising from your work on site — a client trips over your ladder, or you break a homeowner\'s window. It has nothing to do with the accuracy of your report.']])}
 <p>The distinction is the whole point of this lesson: <b>E&amp;O = mistakes in your professional judgment; general liability = harm to people or property during the job.</b> Mix them up on a claim and you'll reach for the wrong policy.</p>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Texas: financial responsibility</div><p>Texas requires its <b>Professional Inspectors to carry E&amp;O (errors &amp; omissions) insurance</b> — a "financial responsibility" requirement so a wronged client can actually recover. Keep the policy <b>active and on file</b>; letting it lapse can put your license status at risk. (The exact limits and rule citations are in the Texas Law module.)</p></div></div>
 ${W('match','coverage')}
 ${story('The right policy for the claim',`Two claims hit the same firm in one year. In the first, a buyer said the inspector missed a failing furnace heat exchanger — that's **E&O**, a professional-judgment claim. In the second, the inspector knocked a ladder into a glass door and shattered it — that's **general liability**, property damage on site. Same business, two completely different policies. The inspector who only carried one would have been exposed on the other.`)}`,
 quiz:[
  {q:'E&O (errors & omissions) insurance covers:',o:['A visitor injured during the inspection','Claims that you missed or misreported a defect','Damage to your vehicle','Your lost wages'],a:1,e:'E&O is professional liability — it answers for negligence in the inspection or report. Injury and property damage are general liability.'},
  {q:'General liability insurance mainly covers:',o:['Mistakes in your written report','Bodily injury or property damage occurring during the inspection','Failure to find a defect','Your retirement savings'],a:1,e:'General liability handles third-party injury and property damage on site. Errors in your professional opinion are E&O.'},
  {q:'Texas requires Professional Inspectors to demonstrate financial responsibility primarily through:',o:['A large cash deposit','E&O (errors & omissions) insurance','General liability only','A real estate license'],a:1,e:'Texas mandates E&O coverage so a wronged client can recover — a financial-responsibility requirement. Keep it active and on file.'},
  {q:'A client trips over your ladder and is hurt. Which policy responds?',o:['E&O','General liability','Neither — it\'s the homeowner\'s problem','Workers\' compensation'],a:1,e:'Bodily injury on site is general liability. E&O would respond to a claim about a missed or misreported defect instead.'},
  {q:'Letting your required E&O policy lapse can:',o:['Have no consequences','Put your license status at risk and leave you exposed to claims','Lower your premiums','Only matter for big firms'],a:1,e:'In Texas the coverage is required. A lapse can jeopardize your license and leaves you personally exposed if a claim lands.'},
 ]},

/* ===== L5 ETHICS & CONFLICTS OF INTEREST ===== */
{id:'l5',kind:'Lesson 5',label:'Ethics & Conflicts of Interest',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · Independence</span><h1>Your independence is the product. Anything that buys it is a conflict.</h1>
 <p class="lead">Clients don't pay you to inspect a house — plenty of people could poke around a house. They pay you for an <b>honest, independent opinion</b>. Every ethics rule in inspection exists to protect that independence from the things that would quietly bend it: money, relationships, and pressure.</p>
 <h2>What a conflict of interest looks like</h2>
 <p>A conflict of interest is any situation where your <b>personal or financial stake</b> could bias the inspection. Some are obvious, some are subtle, and the rules draw bright lines around the common ones:</p>
 ${conds('',[['Don\'t inspect what you have a stake in','Don\'t inspect a property you own, are buying, or have a financial interest in — your judgment can\'t be trusted to be neutral.'],['Don\'t solicit or perform repairs on what you inspected','Repairing a home you inspected gives you a reason to find (or exaggerate) work. It\'s a classic, prohibited conflict. Refer repairs to independent contractors.'],['Disclose referral relationships','If you recommend a contractor, home-warranty company, or anyone you have a relationship with, the client must know about it.'],['Take no undisclosed compensation','Secret referral fees, kickbacks, or gifts that bias your advice are off the table. Hidden money corrupts the opinion the client paid for.']])}
 <h2>Disclosure is the pressure-release valve</h2>
 <p>Not every relationship is forbidden — but <b>secrecy</b> is what turns a relationship into a violation. If a client knows you co-own a referral company or get a fee, they can weigh your advice accordingly. The rule of thumb: <b>if you'd be uncomfortable for the client to learn about it after the fact, disclose it before — or don't do it.</b></p>
 ${W('sort','ethics')}
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The bright lines</div><p>Don't inspect a property you're interested in. Don't repair what you inspected. Disclose every referral relationship. Accept no undisclosed compensation. Break any of these and the inspection stops being independent — which means it stops being worth anything.</p></div></div>
 ${story('The roofer\'s thank-you',`A roofer offered an inspector $100 per referred client — quietly, "just between us." The work was genuinely good, so it felt harmless. But the moment that fee is hidden, **every roof finding is suspect**: is the inspector flagging a real problem, or steering a paycheck? The clean answer is to refer on merit and disclose any arrangement. Independence you have to hide isn't independence.`)}`,
 quiz:[
  {q:'A conflict of interest is:',o:['Any time a client disagrees with you','A situation where your personal or financial stake could bias the inspection','Required disclosure on every report','Only an issue for new inspectors'],a:1,e:'It\'s anything that could bend your judgment for personal or financial gain — the threat to the independence clients pay for.'},
  {q:'Performing repairs on a home you just inspected is:',o:['A good extra revenue stream','A prohibited conflict of interest','Fine if you found the defect','Encouraged by the standards'],a:1,e:'Repairing what you inspected gives you a reason to find work — a classic, prohibited conflict. Refer repairs to independent contractors.'},
  {q:'A contractor offers you a secret fee for every client you send. You should:',o:['Take it — the work is good','Decline undisclosed compensation; any referral arrangement must be disclosed','Take it but only sometimes','Take it and give the client a discount'],a:1,e:'Undisclosed compensation secretly biases your advice. Refer on merit; if any arrangement exists, it must be disclosed to the client.'},
  {q:'What usually turns a referral relationship into an ethics violation?',o:['The referral itself','Keeping it secret from the client','Recommending more than one company','Charging a fee for the inspection'],a:1,e:'Disclosure is the release valve. A relationship the client knows about can be weighed; a hidden one corrupts the opinion they paid for.'},
  {q:'You\'re asked to inspect a home you\'re planning to buy. The right move is to:',o:['Inspect it — you know it best','Decline; you have a financial stake and can\'t be neutral','Inspect it but disclose nothing','Inspect it for free'],a:1,e:'A financial interest in the property destroys your neutrality. Don\'t inspect what you have a stake in.'},
 ]},

/* ===== L6 CONDUCT, COMMUNICATION, RECORDS & ADVERTISING ===== */
{id:'l6',kind:'Lesson 6',label:'Conduct, Records & Advertising',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · Honesty across the whole job</span><h1>Be honest before, during, and after — in the report, the records, and the ads.</h1>
 <p class="lead">The last piece ties the section together: the standards of conduct that govern how you communicate, what you promise, how you keep records, and how you market. They all come down to one word — <b>honesty</b> — applied at every stage of the job.</p>
 <h2>Standards of conduct &amp; honest communication</h2>
 <p>Carry yourself with <b>competence, integrity, and respect</b>. Set expectations early: an inspection is a <b>limited, visual, point-in-time opinion</b> of observable conditions — not a warranty, not a code certification, not a promise nothing will ever fail. Report only what you actually observed, in plain language, good and bad. The pressure to "make the deal go through" is real; your obligation is to the client and an honest report, regardless of who's pushing.</p>

 <h2>Recordkeeping &amp; retention</h2>
 <p>Keep your <b>signed agreements and delivered reports</b> for the required retention period. They're your defense: if a claim arrives a year later, the agreement proves the agreed scope and limits, and the dated report proves exactly what you observed and reported. Good records, the agreement, and your E&amp;O policy are the three things that carry you through a complaint.</p>
 <h2>Truthful advertising</h2>
 <p>Market your services, but keep it <b>truthful and not misleading</b>. That means <b>no guarantees</b> an inspection can't support ("we catch every defect"), <b>no credentials you don't hold</b> ("master inspector" if you aren't one), and accurate claims about your license, experience, and services. Misrepresentation in advertising can cost you the license you're advertising.</p>
