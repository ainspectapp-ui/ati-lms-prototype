<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATI Academy — Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f4f2ea;--card:#fffdf8;--ink:#191c22;--text:#21242b;--text-2:#5b616b;--text-3:#8b909a;--line:#e6e1d4;
  --brand:#c5812a;--brand-2:#e0a043;--brand-deep:#9a6214;--brand-soft:#f4e7cd;--brand-tint:#faf2e0;--teal-deep:#123f43;
  --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
  --display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding:30px 18px;
  background-image:radial-gradient(900px 480px at 80% -10%,rgba(197,129,42,.06),transparent 60%)}
a{color:var(--brand-deep);text-decoration:none}
.wrap{max-width:760px;margin:0 auto}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.bar a.back{font-size:13.5px;font-weight:700;color:var(--text-2)}
.bar .sp{flex:1}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--body);font-weight:700;font-size:14px;padding:11px 17px;border-radius:11px;border:1px solid transparent;cursor:pointer}
.btn.brass{background:linear-gradient(180deg,var(--brand-2),var(--brand));color:#3a2607;box-shadow:0 6px 16px rgba(154,98,20,.3)}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.msg{padding:18px 20px;border-radius:14px;font-size:14.5px;line-height:1.6;margin-bottom:18px}
.msg.wait{background:var(--brand-tint);border:1px solid var(--brand-soft);color:var(--brand-deep)}
.msg.err{background:var(--fail-soft);color:var(--fail)}
.msg b{font-weight:700}
.remain{margin-top:10px;font-size:13.5px;color:var(--text-2)}
.remain span{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:var(--pill,999px);padding:3px 11px;margin:3px 4px 0 0;font-size:12.5px}

/* the certificate */
.cert{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--sh-2);padding:8px}
.cert-in{border:2px solid var(--brand);border-radius:5px;padding:44px 46px;text-align:center;position:relative;background:
  radial-gradient(420px 200px at 50% -10%,rgba(197,129,42,.06),transparent 70%)}
.cert-in::before,.cert-in::after{content:"";position:absolute;width:26px;height:26px;border:2px solid var(--brand-2)}
.cert-in::before{top:12px;left:12px;border-right:none;border-bottom:none}
.cert-in::after{bottom:12px;right:12px;border-left:none;border-top:none}
.seal{width:54px;height:54px;border-radius:13px;background:linear-gradient(150deg,var(--ink),var(--teal-deep));display:grid;place-items:center;margin:0 auto 16px}
.kick{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--brand-deep)}
.cert h1{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-.01em;color:var(--ink);margin:8px 0 0}
.cert .pre{font-size:14px;color:var(--text-2);margin:22px 0 6px}
.cert .name{font-family:var(--display);font-weight:600;font-size:34px;color:var(--ink);line-height:1.1;border-bottom:1.5px solid var(--brand-soft);display:inline-block;padding:0 18px 8px}
.cert .post{font-size:14px;color:var(--text-2);margin:16px auto 4px;max-width:52ch;line-height:1.6}
.cert .course{font-family:var(--display);font-weight:600;font-size:19px;color:var(--brand-deep);margin-top:4px}
.cert .meta{display:flex;justify-content:center;gap:34px;margin-top:30px;padding-top:22px;border-top:1px solid var(--line);flex-wrap:wrap}
.cert .meta .m .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
.cert .meta .m .v{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);margin-top:4px}
.verify{text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--text-3);margin-top:18px}
.verify a{color:var(--brand-deep)}
@media print{body{background:#fff;padding:0}.bar,.verify{display:none}.cert{box-shadow:none;border:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <a class="back" href="/">← Dashboard</a>
    <div class="sp"></div>
    <button id="printBtn" class="btn ghost" style="display:none" onclick="window.print()">Print / Save PDF</button>
  </div>
  <div id="root"><div class="msg wait">Checking your progress…</div></div>
</div>

<script>
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fmtDate(ts){try{var d=(typeof ts==='number')?new Date(ts*1000):new Date(ts);return isNaN(d.getTime())?'':d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(e){return '';}}

async function main(){
  var me=null; try{var r=await fetch('/api/me',{credentials:'same-origin'}); if(r.ok) me=await r.json();}catch(e){}
  if(!me||!me.user){ location.href='/account.html'; return; }
  var slug=(me.enrollment&&me.enrollment.courseSlug)||'home-inspection-prelicensing-tx';
  var st; try{ st=await (await fetch('/api/certificates/'+encodeURIComponent(slug)+'/status',{credentials:'same-origin'})).json(); }
  catch(e){ document.getElementById('root').innerHTML='<div class="msg err">Couldn’t load certificate status.</div>'; return; }

  if(st.certificate){ render(st.certificate); return; }
  if(st.eligible){
    document.getElementById('root').innerHTML='<div class="msg wait">You’ve passed every required mastery check. <b>Your certificate is ready.</b></div>'+
      '<div style="text-align:center"><button class="btn brass" id="claim">Issue my certificate →</button></div>';
    document.getElementById('claim').onclick=async function(){
      this.disabled=true; this.textContent='Issuing…';
      var j=await (await fetch('/api/certificates/'+encodeURIComponent(slug)+'/claim',{method:'POST',credentials:'same-origin'})).json();
      if(j.certificate) render(j.certificate); else location.reload();
    };
    return;
  }
  // not eligible
  var rem=(st.remaining||[]).map(function(t){return '<span>'+esc(t)+'</span>';}).join('');
  document.getElementById('root').innerHTML='<div class="msg wait">Your certificate unlocks once every required mastery check is passed (80%).<br/>You’ve passed <b>'+st.passedCount+' of '+st.total+'</b>.'+
    (rem?'<div class="remain">Still to pass: '+rem+'</div>':'')+'</div>'+
    '<div style="text-align:center"><a class="btn brass" href="/course.html">Go to my course →</a></div>';
}

function render(c){
  document.getElementById('printBtn').style.display='inline-flex';
  var stateName={TX:'Texas',NY:'New York',WA:'Washington'}[c.state]||'';
  var verifyUrl=location.origin+'/verify.html?code='+encodeURIComponent(c.verificationCode);
  document.getElementById('root').innerHTML=
   '<div class="cert"><div class="cert-in">'+
     '<div class="seal"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e0a043" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><circle cx="11" cy="14" r="2.4"/><path d="m13 16 2.4 2.4"/></svg></div>'+
     '<div class="kick">ATI Academy · Inspector Training</div>'+
     '<h1>Certificate of Completion</h1>'+
     '<div class="pre">This certifies that</div>'+
     '<div class="name">'+esc(c.holder)+'</div>'+
     '<div class="post">has successfully completed the qualifying education curriculum and passed every required mastery assessment for</div>'+
     '<div class="course">'+esc(c.course)+(stateName?' · '+stateName:'')+'</div>'+
     '<div class="meta">'+
       '<div class="m"><div class="l">Issued</div><div class="v">'+fmtDate(c.issuedAt)+'</div></div>'+
       '<div class="m"><div class="l">Certificate No.</div><div class="v">'+esc(c.certNumber)+'</div></div>'+
     '</div>'+
   '</div></div>'+
   '<div class="verify">Verify this certificate at <a href="'+verifyUrl+'">'+verifyUrl.replace(/^https?:\/\//,'')+'</a><br/>code: '+esc(c.verificationCode)+'</div>';
}
main();
</script>
</body>
</html>
