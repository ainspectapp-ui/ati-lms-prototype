<!-- ATI · Module II · Electrical Systems — full interactive section -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATI · Module II — Cooling &amp; Heat Pumps</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

const KEY='ati_cooling_ix_v1';

async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>i===0?true:stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}

function renderLesson(s){

const GLOSSARY=[
 ['Refrigerant','The fluid that carries heat through the system, boiling and condensing as its pressure changes.'],
 ['Compressor','The pump that pressurizes refrigerant and drives it around the loop — the heart of the system and costliest part to replace.'],
 ['Condenser','The outdoor coil where hot refrigerant gives up heat to the outside air and condenses to liquid.'],
 ['Evaporator','The indoor coil where cold refrigerant absorbs heat from house air and boils to gas — where the home actually cools.'],
 ['Expansion / metering device','A capillary tube or thermostatic expansion valve (TXV) that drops pressure and meters refrigerant into the evaporator.'],
 ['Ton','A unit of cooling capacity — one ton = 12,000 BTU/hr.'],
 ['Temperature split','The drop in air temperature across the evaporator coil; ~15–20°F is healthy after the unit runs.'],
 ['CFM per ton','Airflow benchmark — cooling moves ~400–450 CFM per ton, about double a heating system.'],
 ['Crankcase / sump heater','A heater that keeps compressor oil warm so liquid refrigerant boils out of it.'],
 ['Suction line','The large, insulated line carrying cold low-pressure gas back to the compressor.'],
 ['Liquid line','The small, bare line carrying warm high-pressure liquid toward the evaporator.'],
 ['Short cycling','Rapid on/off operation — often a sign of an oversized unit; hard on the compressor.'],
 ['Condensate','Water pulled from the air by the cold coil; routed away by a drain system.'],
 ['Drain pan','The tray that catches condensate beneath the evaporator coil.'],
 ['Float switch','A safety that shuts the unit off if condensate backs up, preventing an overflow.'],
 ['Condensate pump','A pump that lifts condensate to a drain where gravity won\'t carry it.'],
 ['Split system','The common arrangement — condensing unit outdoors, evaporator/air handler indoors, joined by refrigerant lines.'],
 ['Reversing valve','The heat-pump component that reverses refrigerant flow so the system can heat as well as cool.'],
 ['Defrost cycle','A heat pump briefly reversing in winter to melt frost off the outdoor coil — normal, looks like steaming.'],
 ['Auxiliary / supplementary heat','Backup heat (usually electric strips) that assists a heat pump on cold days.'],
 ['Emergency heat','A thermostat setting that runs the backup heat alone, with the compressor off.'],
 ['Heat pump','An air conditioner with a reversing valve, able to move heat into the house in winter and out in summer.'],
];

  el.querySelectorAll('.cycst').forEach(g=>g.onclick=()=>{el.querySelectorAll('.cycst rect').forEach(r=>r.setAttribute('fill','#3a3526'));g.querySelector('rect').setAttribute('fill','#5a4a1e');info.innerHTML=F[g.dataset.s];});
};

WID.sizer=(el)=>{
  el.innerHTML=`<span class="wlabel">Field tool</span><div class="wtitle">Cooling-load estimator</div><div class="wsub">Inspectors don't do formal load calcs, but you give clients a read. Set the home and climate, then compare the installed size.</div>
   <div class="est"><div><label>Conditioned floor area</label><select class="sf"><option value="1000">1,000 sq ft</option><option value="1500">1,500 sq ft</option><option value="2000" selected>2,000 sq ft</option><option value="2500">2,500 sq ft</option><option value="3000">3,000 sq ft</option></select></div>
   <div><label>Climate</label><select class="rg"><option value="south" selected>Southern US (hot)</option><option value="north">Northern US (mild)</option></select></div>
   <div><label>Installed compressor size</label><select class="ts"><option value="1.5">1.5 tons</option><option value="2">2 tons</option><option value="2.5">2.5 tons</option><option value="3" selected>3 tons</option><option value="4">4 tons</option><option value="5">5 tons</option></select></div>
   <div style="display:flex;align-items:flex-end"><div class="est-out" style="margin:0;width:100%"></div></div></div>`;
  const sf=el.querySelector('.sf'),rg=el.querySelector('.rg'),ts=el.querySelector('.ts'),out=el.querySelector('.est-out');
  function go(){const a=+sf.value,south=rg.value==='south',lo=south?700:1000,hi=south?450:700;
    const minT=a/lo, maxT=a/hi, inst=+ts.value, mid=(minT+maxT)/2;
    let cls,ev,ed;
    if(inst>maxT*1.15){cls='bad';ev='Likely oversized';ed=`At ${a.toLocaleString()} sq ft in this climate, roughly ${minT.toFixed(1)}–${maxT.toFixed(1)} tons fits. ${inst} tons is high — expect short cycling, a clammy house, and shortened compressor life.`;}
    else if(inst<minT*0.85){cls='bad';ev='Likely undersized';ed=`Roughly ${minT.toFixed(1)}–${maxT.toFixed(1)} tons fits here. ${inst} tons is low — it may run nonstop and never catch up on the hottest days.`;}
    else{cls='ok';ev='In the right range';ed=`≈ ${minT.toFixed(1)}–${maxT.toFixed(1)} tons suits ${a.toLocaleString()} sq ft in this climate. ${inst} tons fits. Installers often slightly undersize on purpose — that's fine; oversizing is the bigger problem.`;}
    out.className='est-out '+cls;out.innerHTML=`<div class="ev">${ev}</div><div class="ed">${ed}</div>`;}
  sf.onchange=go;rg.onchange=go;ts.onchange=go;go();
};

const STEPS=[
{id:'intro',kind:'Lesson 1',label:'How cooling works',type:'lesson',
 body:()=>`<span class="eyebrow">Cooling &amp; Heat Pumps · Orientation</span><h1>Air conditioning doesn't make cold. It moves heat.</h1>
 <p class="lead">That one idea unlocks the whole system. A cooling system never creates coldness — it picks up heat from the air inside your house and carries it outside, then comes back for more. Everything you'll inspect is just hardware in service of that heat-moving loop. This section covers the entire air-conditioning and heat-pump chapter, with the reading broken up by things to do.</p>
 <p>The carrier is a <b>refrigerant</b> — a fluid that boils and condenses at convenient temperatures. By changing its pressure, the system makes it cold enough to soak up heat indoors and hot enough to dump that heat outdoors. Four components do the work, and you'll meet them in the animation below.</p>
 ${W('cycle')}
 <p>Same five-step loop as always — for every component you'll ask: what is it, what does it do, what goes wrong, why does that matter, and how do you report it.</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <p>Pin the four components to their one job before you go further:</p>
 ${W('match','components')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">What the Standards ask — and a hard safety rule</div><p>You operate the system at the thermostat and inspect what's accessible; opening the sealed condenser cabinet or touching the refrigerant is <b>beyond the Standards</b>. And never run the compressor when it's <b>below 65°F outside</b> — you can destroy it (you'll see why in the compressor lesson).</p></div></div>`,
 quiz:[
  {q:'The fundamental job of an air conditioner is to:',o:['Create cold air','Move heat from inside the house to outside','Add humidity to the air','Generate refrigerant'],a:1,e:'Cooling moves heat outdoors using refrigerant — it never creates coldness. That single idea explains every component.'},
  {q:'Which component releases heat to the outdoors?',o:['Evaporator','Compressor','Condenser','Expansion device'],a:2,e:'The condenser (outdoors) is where the hot refrigerant gives up its heat and condenses to liquid.'},
  {q:'The evaporator\'s job is to:',o:['Pressurize the refrigerant','Absorb heat from the indoor air','Dump heat outdoors','Drop the refrigerant pressure'],a:1,e:'The cold evaporator coil indoors absorbs heat from house air blown across it — that\'s where the home actually cools.'},
  {q:'Opening the sealed condenser cabinet to inspect the compressor is:',o:['Required by the Standards','Beyond the Standards','Done on every inspection','Only skipped on heat pumps'],a:1,e:'Operating the system and inspecting accessible parts is the job; opening the refrigerant circuit is beyond the Standards.'},
  {q:'The compressor should not be run when the outdoor temperature is:',o:['Above 90°F','Below 65°F','Exactly 72°F','Above 100°F'],a:1,e:'Below 65°F, refrigerant can condense into the oil and ruin lubrication — running it can seize the compressor.'},
 ]},
{id:'l2',kind:'Lesson 2',label:'Capacity & Sizing',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · §12.1 Capacity</span><h1>Is it the right size for the house?</h1>
 <p class="lead">Clients ask this constantly, and although a formal load calculation is beyond the Standards, you're expected to give a sensible read. The surprising headline: when AC is the wrong size, <b>bigger is the worse mistake.</b></p>
 <h2>What drives the cooling load</h2>
 <p>The heat a house gains — and therefore the cooling it needs — depends on a long list of factors: outdoor temperature and humidity, the level of insulation, the amount of air leakage, the area of south/east/west glass and whether it's low-e or gas-filled, whether curtains and blinds are used, shading from trees, overhangs, awnings, or neighboring buildings, and the heat thrown off by people and equipment inside. No inspector weighs all that on site — so we use rules of thumb.</p>
 <p>The working guideline is floor area per <b>ton</b> of cooling (one ton = 12,000 BTU/hr): in the <b>southern US, 450–700 sq ft per ton</b>; in the <b>northern US, 700–1,000 sq ft per ton</b> (assuming 8-foot ceilings). Find the local range from installers and other inspectors. Try it:</p>
 ${W('sizer')}
 <h2>Capacity is only half the story — the ducts matter too</h2>
 <p>A correctly sized compressor still under-performs if the duct system can't move the air. This bites hardest when AC was <b>added to a furnace system</b>: the evaporator coil is an extra obstruction, and cooling-season air (around 55°F) is <b>denser and harder to push</b> than the 140°F air of heating season. You also have to move <b>more</b> of it — the temperature difference between conditioned and room air is only about 15–20°F in cooling versus 60–70°F in heating. As a number: cooling needs roughly <b>400–450 CFM per ton</b>, about double a heating system. Ducts sized for heat are frequently undersized for cooling.</p>
 <div class="field brass"><div class="ic">${sv(ic.bolt)}</div><div><div class="t">The temperature split — a real field check</div><p>Let the system run at least <b>15 minutes</b>, then compare the air entering the return to the air leaving a supply register near the coil. A healthy system shows roughly a <b>15–20°F drop</b>. Measuring it is beyond the Standards, but many inspectors do — too small a split hints at low airflow or low refrigerant; too large can mean too little airflow.</p></div></div>
 <h2>Undersized vs. oversized</h2>
 <p>An <b>undersized</b> system runs continuously and still can't hold the setpoint on the hottest days — an inconvenience, not a hazard. An <b>oversized</b> system is the trickier problem: it cools the air fast and shuts off before it has pulled much humidity out, so it <b>short cycles</b> and leaves the house cool but <b>clammy</b>. Short cycling also means frequent start-ups — and compressors suffer the most wear on start-up — so an oversized unit dies younger. Some utilities accept up to ~25% oversize; surveys have found a third to half of systems are oversized. The pros' advice: when in doubt, slightly undersize. Sort the symptoms:</p>
 ${W('sort','sizesymptom')}`,
 quiz:[
  {q:'In the southern US, the rule-of-thumb cooling capacity is about:',o:['100–200 sq ft per ton','450–700 sq ft per ton','1,500–2,000 sq ft per ton','It cannot be estimated'],a:1,e:'Roughly 450–700 sq ft/ton in the south, 700–1,000 in the north (8-ft ceilings). Confirm the local range.'},
  {q:'Compared with an undersized system, an oversized air conditioner is:',o:['Always better','The worse mistake — it short cycles and dehumidifies poorly','Identical in performance','Required in humid climates'],a:1,e:'Oversized units cool fast, shut off before removing humidity, short cycle, leave the house clammy, and wear out early. Better to slightly undersize.'},
  {q:'Why are ducts designed for heating often inadequate for cooling?',o:['Cooling air is warmer','Cooling needs to move about twice the air, and that cooler air is denser/harder to push','Cooling uses no ducts','Heating ducts are always oversized'],a:1,e:'Cooling moves ~400–450 CFM/ton (about double heating) because the temperature split is smaller, and the cool 55°F air is denser.'},
  {q:'A healthy evaporator temperature split (after ~15 min) is about:',o:['2–5°F','15–20°F','40–50°F','60–70°F'],a:1,e:'About a 15–20°F drop across the coil. Too small suggests low airflow or low refrigerant; measuring it is beyond the Standards but common practice.'},
  {q:'An undersized cooling system is best described to a client as:',o:['A fire hazard','A safety hazard','An inconvenience — it may not keep up on the hottest days','A reason to condemn the home'],a:2,e:'Like an undersized electrical service, it\'s an inconvenience, not a hazard. Oversizing is the one that actually harms comfort and the equipment.'},
 ]},
{id:'l3',kind:'Lesson 3',label:'The Condensing Unit',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · §12.2–12.3, 12.8, 12.12 Outdoor Unit</span><h1>The compressor, condenser coil &amp; fan</h1>
 <p class="lead">The outdoor unit holds three of the four components — the compressor, the condenser coil, and the condenser fan — and it's the part most exposed to abuse. It's also home to the single most expensive thing on the system: the compressor.</p>
 <h2>The compressor — the heart of it all</h2>
 <p>The compressor is the pump that drives refrigerant around the loop. On a split system it lives in the condenser cabinet outdoors (sometimes in the attic) as a large, black, hermetically sealed cylinder, running in a refrigerant-filled bath of oil. You don't open the cabinet — that's beyond the Standards. But you do need to understand two things that protect it:</p>
 <p>First, the <b>65°F rule.</b> Below about 65°F outdoors, refrigerant can condense and mix into the oil at the base of the compressor. That mix doesn't lubricate, and starting the compressor on it can seize it. Many systems carry a <b>crankcase (sump) heater</b> that keeps the oil warm enough to boil the refrigerant back out — which is exactly why, after a long shutoff, you can't just flip it on and expect it to be ready.</p>
 <p>Second, the <b>wait-before-restart rule.</b> Low-torque compressors (those using a capillary tube) expect equal pressure on both sides at start-up. When the unit shuts off it has high pressure on the discharge side; the capillary tube needs a little time — about <b>five minutes</b> — to bleed that down. Restart it immediately and it's trying to start against high head pressure, which it can't do. Cycle a unit off and back on too fast and you can damage it.</p>
 ${W('spot','outdoor')}
 <h2>Conditions — outdoor unit</h2>
 ${conds('Eight common compressor problems', [['Won\'t start','No power, failed capacitor/contactor/relay, or a locked rotor. Check the breaker and thermostat first.'],['Short cycling','On and off rapidly — points to oversizing, a control fault, or low refrigerant; hard on the compressor.'],['Runs continuously','Can\'t satisfy the thermostat — undersizing, low charge, a dirty coil, or poor airflow.'],['Noisy or vibrating','Worn bearings, loose mounts, or failing internals.'],['Run below 65°F','Tested in the cold without a crankcase heater — risks seizing.'],['Electrical faults','Bad start/run capacitor, pitted contactor, or failed relay.'],['Unstable or non-level base','Stresses lines and disturbs oil return.'],['Near end of life','Compressors run about 10–15 years; flag a unit near the end of its expectancy.']])}
 ${conds('Four common condenser-fan problems', [['Inoperative / seized motor','No airflow over the coil means the system can\'t reject heat and pressures climb.'],['Noisy or vibrating','Worn motor bearings or an unbalanced blade.'],['Dirty or bent blades','Reduces airflow and strains the motor.'],['Obstructed airflow / wrong rotation','Blocked coil, debris, or a miswired motor moving air the wrong way.']])}
 ${conds('Condenser coil', [['Dirty or blocked fins','Leaves, grass clippings, and cottonwood choke the coil; cleaning restores capacity.'],['Bent or damaged fins','Reduce the airflow area.'],['Inadequate clearance','The unit needs open air on all sides to dump heat.']])}
 <div class="field brass"><div class="ic">${sv(ic.award)}</div><div><div class="t">Reading the age — and watching for a swapped compressor</div><p>Get the unit's age from the <b>condenser data plate</b> (Preston's Guide decodes the serial). The compressor is by far the costliest part to replace, so on any unit more than five years old, the inspector who goes the extra mile checks whether the compressor itself has been replaced. Report a unit near the end of its life so the buyer can budget for it.</p></div></div>
 ${story('Inspector in the House', 'A buyer asked me to "just turn the AC on" during a cold-snap inspection — 50°F outside. I didn\'t. I explained that starting the compressor that cold, with refrigerant pooled in the oil, can seize it, and that I\'d note the system as not tested due to low temperature and recommend a return visit in season. Protecting the equipment you\'re inspecting is part of doing the job right — and it\'s a far better outcome than killing a compressor to satisfy curiosity.')}`,
 quiz:[
  {q:'You should not run the compressor below 65°F outdoors because:',o:['The fan won\'t spin','Refrigerant can condense into the oil, ruining lubrication and risking a seizure','It uses too much electricity','The thermostat won\'t respond'],a:1,e:'Cold lets refrigerant mix into the oil; that mix doesn\'t lubricate, and starting on it can seize the compressor. A crankcase heater is what prevents this.'},
  {q:'The crankcase (sump) heater\'s job is to:',o:['Heat the house in winter','Keep the compressor oil warm so refrigerant boils back out of it','Defrost the coil','Run the condenser fan'],a:1,e:'It keeps the oil warm enough that liquid refrigerant boils off — which is why a unit isn\'t ready the instant you flip it on after a long off period.'},
  {q:'After a low-torque compressor shuts off, you should wait about how long before restarting?',o:['10 seconds','1 minute','5 minutes','1 hour'],a:2,e:'About five minutes for the capillary tube to equalize pressure; restarting against high head pressure can damage the compressor.'},
  {q:'The normal life expectancy of an AC compressor is roughly:',o:['3–5 years','10–15 years','25–30 years','50 years'],a:1,e:'About 10–15 years. The Standards ask you to flag equipment near the end of its expectancy — and the compressor is the costliest part.'},
  {q:'A seized or inoperative condenser fan causes:',o:['Better efficiency','The system to lose its ability to reject heat, so pressures climb','Lower humidity','Faster cooling'],a:1,e:'No airflow over the condenser coil means heat can\'t leave; head pressure rises and the compressor suffers.'},
 ]},
{id:'l4',kind:'Lesson 4',label:'The Indoor Unit',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · §12.4, 12.6, 12.9 Indoor Unit</span><h1>The evaporator, blower &amp; condensate</h1>
 <p class="lead">Inside the house sit the evaporator coil, the blower that pushes air across it, and — because cold coils pull water out of the air — a condensate system to carry that water away. Two failure stories dominate here: a frozen coil and an overflowing drain.</p>
 <h2>The evaporator coil and the frozen-coil trap</h2>
 <p>The evaporator is the cold coil (often an A-shape) in the plenum just above or beside the furnace/air handler. Warm house air blows across it, gives up its heat, and the refrigerant boils. The counter-intuitive failure: <b>too little airflow makes the coil freeze.</b> A dirty filter, a weak blower, or a blocked return starves the coil of warm air, its temperature drops below freezing, and the moisture on it turns to ice — which blocks airflow further, a runaway that ends in a solid block of ice and no cooling. Low refrigerant charge does the same. If you find a frozen coil, the move is to stop the unit, let it thaw, and recommend evaluation.</p>
 ${W('spot','indoor')}
 <h2>The blower (evaporator fan)</h2>
 ${conds('Seven common evaporator-fan problems', [['Inoperative','No air movement — cooling stops and the coil can freeze.'],['Dirty blower wheel','Caked blades move far less air over time.'],['Noisy or vibrating','Worn bearings or an unbalanced wheel.'],['Wrong speed setting','Many blowers are multi-speed; the wrong tap starves or over-drives airflow.'],['Slipping or worn belt','On older belt-drive blowers, a loose belt cuts airflow.'],['Insufficient airflow','From a dirty filter, closed returns, or undersized ducts — the classic coil-freezing cause.'],['Dirty air filter starving the coil','The single most common and most preventable airflow problem.']])}
 <h2>Condensate — where the water goes</h2>
 <p>A cooling coil can pull gallons of water a day out of humid air. That water drips into a <b>drain pan</b> and leaves through a <b>primary drain line</b> to an approved point — a floor drain, a laundry standpipe, or outside (never just onto the ground next to the foundation, and not into a place that's a problem). Because a clog floods whatever is below, good installations add a <b>secondary line, a backup pan, or a float switch</b> that shuts the unit off if water backs up. Where gravity won't carry it, a <b>condensate pump</b> lifts it — and pumps fail.</p>
 ${conds('Condensate-system problems', [['Clogged or slow primary drain','Standing water, a rusty pan, algae — the water has nowhere to go.'],['No secondary protection','No backup pan, secondary drain, or float switch under equipment over finished space.'],['Improper discharge point','Draining where it causes damage, or back into an unsafe location.'],['Condensate pump not working','A failed pump on a basement or attic unit overflows.'],['Uninsulated cold lines/pan sweating','Cold surfaces drip onto ceilings and framing.']])}`,
 quiz:[
  {q:'A frozen evaporator coil is most often caused by:',o:['Too much airflow','Too little airflow (dirty filter, weak blower) or low refrigerant','Outdoor temperatures above 100°F','An oversized condenser fan'],a:1,e:'Starve the coil of warm air and it drops below freezing; moisture ices up and blocks airflow further. Stop the unit, let it thaw, recommend evaluation.'},
  {q:'The purpose of a float switch on the condensate system is to:',o:['Speed up the drain','Shut the unit off if water backs up, preventing an overflow','Cool the refrigerant','Boost airflow'],a:1,e:'It\'s backup protection — if the primary drain clogs, the float switch cuts the unit off before water floods the space below.'},
  {q:'The most common, most preventable cause of weak airflow is:',o:['A dirty air filter','A bent condenser fin','An oversized compressor','A long refrigerant line'],a:0,e:'A clogged filter starves the coil — weak cooling and eventually a frozen evaporator. Regular replacement prevents it.'},
  {q:'A rusty drain pan with standing water indicates:',o:['Normal operation','The condensate isn\'t draining — a clog or slope problem with water-damage risk','Low refrigerant','An oversized system'],a:1,e:'Standing water means it isn\'t draining. Water damage and mold follow; recommend clearing the drain and checking the slope.'},
  {q:'Where gravity can\'t carry condensate to a drain, the installation uses a:',o:['Second compressor','Condensate pump','Crankcase heater','Reversing valve'],a:1,e:'A condensate pump lifts the water to a drain. Pumps fail, so it\'s a point to check on basement and attic units.'},
 ]},
{id:'l5',kind:'Lesson 5',label:'Lines & Expansion Device',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · §12.5, 12.7 Lines &amp; Metering</span><h1>The refrigerant lines and the expansion device</h1>
 <p class="lead">Two copper lines connect the outdoor and indoor units, and a small metering device sits between them. You won't open the sealed circuit, but you can read a lot from the outside — and one clue, an oily smudge, is the classic sign of trouble.</p>
 <h2>Reading the two lines</h2>
 <p>The <b>large line is the suction line</b> — it carries cold, low-pressure gas back to the compressor and <b>must be insulated</b>; left bare it sweats, drips, and wastes efficiency. The <b>small line is the liquid line</b> — warm, high-pressure liquid heading to the evaporator, and it runs bare. So at a glance: big-and-insulated is the cold return; small-and-bare is the warm feed. (On a heat pump, you'll find <b>both</b> lines insulated — a key tell you'll use in the heat-pump lesson.)</p>
 ${W('match','lines')}
 <h2>The expansion (metering) device</h2>
 <p>Between the liquid line and the evaporator sits the <b>expansion device</b> — a capillary tube or a thermostatic expansion valve (TXV). Its job is to drop the pressure suddenly so the refrigerant flashes cold before it enters the evaporator, and to meter how much flows. It's inside the sealed circuit, so you're not servicing it — but knowing it's there explains why a capillary-tube system is "low-torque" and needs that five-minute restart pause from Lesson 3.</p>
 <h2>Conditions — lines and charge</h2>
 ${conds('Refrigerant-line problems', [['Missing suction-line insulation','Sweating, dripping, and lost efficiency. Recommend insulating.'],['Damaged or compressed lines','Kinks restrict flow; crushed insulation lets the line sweat.'],['Oily residue at a fitting or joint','Refrigerant carries oil — an oily film is the visual signature of a leak. Recommend evaluation by a technician.'],['Lines run unprotected or unsupported','Vibration and abrasion lead to failures.'],['Lines too long / improperly routed','Affects performance; beyond what you correct, but note obvious issues.']])}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Charging refrigerant is beyond the Standards</div><p>You don't add, recover, or measure refrigerant — that's licensed work. What you <b>do</b> is observe and report: bare suction lines, oily leak signs, ice on the lines, and performance clues like a weak temperature split. Then point the client to a technician.</p></div></div>`,
 quiz:[
  {q:'On a standard air conditioner, the insulated line is the:',o:['Liquid line (small, warm)','Suction line (large, cold gas)','Drain line','Ground wire'],a:1,e:'The large suction line carries cold gas back to the compressor and must be insulated; the small liquid line runs bare.'},
  {q:'An oily film at a refrigerant-line fitting usually indicates:',o:['Normal lubrication','A refrigerant leak — oil travels with the refrigerant','Condensate','Too much insulation'],a:1,e:'Refrigerant carries oil, so an oily residue is the classic visual sign of a leak. Recommend a technician evaluate.'},
  {q:'The expansion device\'s function is to:',o:['Pump the refrigerant','Drop the pressure so the refrigerant flashes cold, and meter its flow','Release heat outdoors','Filter the air'],a:1,e:'A capillary tube or TXV drops pressure suddenly and meters flow into the evaporator.'},
  {q:'Measuring or adding refrigerant is:',o:['A routine inspection step','Beyond the Standards — licensed work; observe and report instead','Required on every call','Done with the thermostat'],a:1,e:'Inspectors observe symptoms (bare lines, oil traces, ice, weak split) and refer to a technician; charging is licensed work.'},
  {q:'Finding both refrigerant lines insulated is a clue that the unit may be a:',o:['Window unit','Heat pump','Boiler','Gas furnace'],a:1,e:'A standard AC insulates only the suction line; both insulated is a classic heat-pump tell.'},
 ]},
{id:'l6',kind:'Lesson 6',label:'Ducts & Distribution',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · §12.10 Duct System</span><h1>Getting the cool air to the rooms</h1>
 <p class="lead">The best-sized compressor is wasted if the ducts can't deliver the air. Distribution problems are a leading reason systems under-perform — especially when cooling was bolted onto a duct system that was only ever designed for heat.</p>
 <h2>Why cooling is harder on ducts</h2>
 <p>Recall the airflow math from Lesson 2: cooling moves roughly <b>twice the air</b> of heating (about 400–450 CFM per ton), the conditioned air is cooler and denser, and the room-to-supply temperature difference is much smaller. A duct system sized for a furnace is frequently <b>undersized for cooling</b>, so the rooms farthest from the air handler starve. Add the evaporator coil as a new obstruction and airflow drops further.</p>
 ${W('spot','duct')}
 <h2>Conditions — duct system</h2>
 ${conds('Eight common duct problems', [['Undersized for cooling','Especially heating ducts pressed into AC service — poor airflow to far rooms.'],['Leaky or disconnected joints','Conditioned air spills into attics, crawlspaces, and chases instead of rooms.'],['Unsealed seams','Seams should be sealed with mastic or proper tape; bare seams leak surprisingly much.'],['Uninsulated ducts in unconditioned space','Ducts in hot attics or crawlspaces must be insulated, or the cooling is lost before it arrives.'],['Crushed or kinked flex duct','Pinched runs choke airflow to those rooms.'],['Poor balance','Some rooms freeze while others never cool — registers and dampers need adjusting.'],['Obstructed registers or returns','Furniture, rugs, or closed returns strangle the system.'],['Condensation / sweating ducts','Cold ducts in humid, unconditioned space drip and can damage framing or grow mold.']])}
 <div class="field brass"><div class="ic">${sv(ic.bolt)}</div><div><div class="t">A practical tell</div><p>When a client complains that one end of the house never cools, suspect <b>distribution</b> before capacity. Check for closed or blocked returns, crushed flex, disconnected runs in the attic, and whether AC was added to heat-only ducts. The compressor may be perfectly healthy.</p></div></div>`,
 quiz:[
  {q:'A duct system originally designed for heating is often:',o:['Oversized for cooling','Undersized for cooling, because cooling moves about twice the air','Perfect for cooling','Unable to carry warm air'],a:1,e:'Cooling needs ~400–450 CFM/ton (about double heating), with denser air — heating ducts frequently can\'t keep up.'},
  {q:'Ducts running through an unconditioned attic should be:',o:['Left bare for airflow','Insulated, or much of the cooling is lost before it reaches the rooms','Painted','Crushed to fit'],a:1,e:'Uninsulated ducts in hot attics waste cooling; they must be insulated.'},
  {q:'Duct seams should be sealed with:',o:['Nothing — they\'re airtight','Mastic or proper tape','Spray foam only','Drywall mud'],a:1,e:'Unsealed seams leak a surprising amount of air; mastic or a listed tape seals them.'},
  {q:'A client says one end of the house never cools. Your first suspicion should be:',o:['The compressor is dead','Distribution — closed returns, crushed flex, or disconnected/undersized ducts','The thermostat is broken','Low refrigerant'],a:1,e:'Uneven cooling usually points to distribution, not capacity. Check returns, flex runs, and whether AC was added to heat-only ducts.'},
  {q:'A disconnected duct joint in the attic results in:',o:['Better efficiency','Conditioned air dumped into the attic instead of the rooms','Lower humidity indoors','A frozen compressor'],a:1,e:'A separated joint leaks cool air into the attic — a big, common efficiency loss. Reconnect and seal it.'},
 ]},
{id:'l7',kind:'Lesson 7',label:'Thermostats & Controls',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · §12.11 Thermostats</span><h1>The control — and how to test the system without harming it</h1>
 <p class="lead">The thermostat is how you operate the system, and it's the first place a "no cooling" complaint sends you. Most thermostat issues are simple — but you have to test in a way that doesn't damage the compressor.</p>
 <h2>Testing the system at the thermostat</h2>
 <p>To call for cooling, set the mode to cool and lower the setpoint below room temperature. If nothing happens, work the simple causes first: confirm power (breaker on), the mode and setpoint, and dead batteries on an electronic stat. Then remember the lesson from the compressor: many systems have a <b>built-in restart delay</b>, and low-torque compressors need that five-minute pressure-equalization window — so a unit that doesn't fire instantly may simply be in its delay. Don't rapidly cycle it trying to force a start.</p>
 ${W('sort','tstat')}
 <h2>Conditions — thermostats</h2>
 ${conds('Seven common thermostat problems', [['Inoperative','No response to a call for cooling — could be the stat or anything downstream.'],['Not level (mercury type)','An old mercury-bulb stat reads wrong if it isn\'t mounted level.'],['Poor location','Mounted over a supply register, near a lamp or sunny window, or in a draft — it senses the wrong temperature and mis-cycles the system.'],['Dirty contacts','Dust on the contacts causes erratic operation.'],['Loose mounting or wiring','Intermittent operation.'],['Dead batteries / lost programming','Common on electronic stats — simple to fix.'],['Anticipator misadjusted','On older stats, affects cycle length and comfort.']])}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Don\'t mistake a safety for a failure</div><p>If the system won\'t run, the cause may be a tripped <b>safety</b> doing its job — a float switch that opened on a full condensate pan, a breaker that tripped, or a high-pressure cutout — not the thermostat. Diagnose in order: thermostat basics, then power, then safeties, then the equipment.</p></div></div>`,
 quiz:[
  {q:'To call for cooling at the thermostat you should:',o:['Raise the setpoint above room temperature','Set mode to cool and lower the setpoint below room temperature','Switch to heat','Remove the batteries'],a:1,e:'Cool mode, setpoint below the room. If nothing happens, check power, settings, and remember the restart delay before assuming a failure.'},
  {q:'A mercury-bulb thermostat that isn\'t mounted level will:',o:['Work fine','Read the temperature incorrectly and mis-cycle the system','Run the heat only','Trip the breaker'],a:1,e:'A tilted mercury stat senses wrong and switches at the wrong temperatures. It must be level.'},
  {q:'A thermostat mounted over a warm supply register or in direct sun will:',o:['Improve accuracy','Sense the wrong temperature and cause poor, erratic cycling','Save energy','Prevent short cycling'],a:1,e:'Location matters — false readings from a nearby heat source make the system cycle incorrectly.'},
  {q:'A unit that doesn\'t start the instant you lower the thermostat:',o:['Is definitely broken','May simply be in a normal restart delay — don\'t rapidly cycle it','Needs refrigerant','Has a dead compressor for certain'],a:1,e:'Built-in delays and the five-minute pressure-equalization window are normal. Forcing rapid cycling can damage the compressor.'},
  {q:'If the system won\'t run, a tripped float switch on a full condensate pan is an example of:',o:['A thermostat failure','A safety device doing its job — not a fault to "fix" by bypassing','A refrigerant leak','An oversized unit'],a:1,e:'Diagnose in order — thermostat, power, safeties, equipment. A safety that opened is protecting the home, not failing.'},
 ]},
{id:'l8',kind:'Lesson 8',label:'Heat Pumps',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · §12.13–12.14 Heat Pumps</span><h1>An air conditioner that runs in reverse</h1>
 <p class="lead">A heat pump is the same refrigeration loop you already understand — with one extra part that lets it run backwards. In summer it cools like any AC; in winter it reverses, pulling heat out of the cold outdoor air and pumping it inside. Everything you've learned applies, plus a handful of heat-pump-only features and failures.</p>
 <h2>The reversing valve and what changes in winter</h2>
 <p>The added component is the <b>reversing valve</b>. Flip it and the refrigerant flow reverses: the outdoor coil becomes the evaporator (absorbing heat from cold outside air — yes, even cold air holds heat) and the indoor coil becomes the condenser (releasing that heat into the house). Because the outdoor coil runs cold and frosts up, the heat pump periodically runs a <b>defrost cycle</b> — briefly switching to cooling mode to warm and de-ice the outdoor coil, which looks like the unit steaming outside in winter. That's normal, not a malfunction.</p>
 <h2>Auxiliary and emergency heat</h2>
 <p>On cold days a heat pump can't pull enough heat from frigid air, so it's backed by <b>auxiliary (supplementary) heat</b> — usually electric resistance strips in the air handler — that kicks in to help. The thermostat also has an <b>emergency heat</b> setting that runs the backup heat alone with the compressor off, for when the heat pump itself fails. Knowing these exist is half of identifying a heat pump.</p>
 ${W('match','hpid')}
 <h2>Nine ways to spot a heat pump</h2>
 ${conds('Tells that it\'s a heat pump, not a plain AC', [['Outdoor unit runs in heating season','A straight AC sits idle in winter; a heat pump runs.'],['Both refrigerant lines insulated','An AC insulates only the suction line.'],['A reversing valve in the cabinet','The signature component.'],['Two expansion devices with bypasses','Needed to meter flow in both directions.'],['"Emergency heat" on the thermostat','Only heat pumps have it.'],['Electric heat strips in the air handler','The auxiliary backup heat.'],['A defrost cycle in winter','Periodic steaming/ice-melt at the outdoor unit.'],['No fossil-fuel furnace present','Heat with no gas/oil appliance suggests a heat pump.'],['The data plate says so','"Heat pump" or "HP" on the label.']])}
 <h2>Conditions — heat pumps</h2>
 ${conds('Seven common heat-pump problems', [['Oversized for cooling / undersized for heating','Northern heat pumps are almost always undersized for the heating load — describe sizing as suspect and recommend evaluation rather than calling it over- or undersized.'],['Reversing valve stuck or failed','Stuck in one mode — heats but won\'t cool, or vice-versa.'],['Defrost control failure','The outdoor coil ices up because the unit never defrosts.'],['Outdoor coil iced up','From a failed defrost, poor condensate drainage at the unit, or a unit set below snow-drift depth — poor or no heat results.'],['Airflow problems in the house','Same distribution issues as any forced-air system.'],['Auxiliary heat inoperative','No backup on the coldest days, or, if stuck on, sky-high electric bills.'],['Short cycling','Hard on the compressor, as with any system.']])}
 ${story('Inspector in the House', 'On a frosty morning a seller was sure the heat pump was failing — it was "blowing cold and steaming outside." It was simply in a defrost cycle: the unit had reversed for a few minutes to melt ice off the outdoor coil, so the indoor air went briefly cool while the outdoor unit gave off vapor. I explained that defrost is normal heat-pump behavior, showed them the emergency-heat setting for true failures, and noted the system operated as designed. Recognizing normal defrost saves a needless service call — and a needless alarm in the report.')}`,
 quiz:[
  {q:'A heat pump differs from a standard AC by adding a:',o:['Second compressor','Reversing valve that lets it run in reverse to heat','Larger condenser only','Gas burner'],a:1,e:'The reversing valve switches refrigerant flow so the system can heat as well as cool — otherwise it\'s the same loop.'},
  {q:'In winter, a heat pump steaming outside for a few minutes is usually:',o:['A refrigerant leak','A normal defrost cycle melting ice off the outdoor coil','A failed compressor','An overfilled drain pan'],a:1,e:'Defrost briefly reverses to warm and de-ice the outdoor coil — normal behavior, not a fault.'},
  {q:'"Emergency heat" on the thermostat runs:',o:['The compressor at full speed','The backup (auxiliary) heat alone, with the compressor off','The defrost cycle continuously','The condenser fan only'],a:1,e:'Emergency heat uses the backup electric heat by itself, for when the heat pump itself isn\'t working.'},
  {q:'Which is a reliable tell that a unit is a heat pump?',o:['It has a single bare refrigerant line','The outdoor unit runs during the heating season','It has no thermostat','It uses a gas burner'],a:1,e:'A plain AC is idle in winter; a heat pump runs to heat. Both lines insulated, a reversing valve, and an emergency-heat setting are other tells.'},
  {q:'Northern-climate heat pumps are almost always:',o:['Oversized for heating','Undersized for the heating load, often needing auxiliary heat','Unable to cool','Larger than the house needs'],a:1,e:'They rarely meet the full heating demand from cold air, so they rely on auxiliary heat. Describe sizing as suspect and recommend evaluation.'},
 ]},
