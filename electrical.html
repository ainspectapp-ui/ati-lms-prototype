/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'How inspectors read a system',type:'lesson',
 body:()=>`<span class="eyebrow">Electrical Systems · Orientation</span><h1>You're not an electrician. You're an inspector.</h1>
 <p class="lead">Your job isn't to fix, certify, or bring anything up to code. It's to <b>observe what's accessible, recognize the conditions that matter, and report them clearly</b> — with the implication spelled out so your client can decide what to do. This section covers the entire ATI electrical chapter; nothing is skipped, and the reading is broken up with things to <em>do</em>.</p>
 <p>Electricity has its own language. Know the technical terms, but translate for clients — "the wires from the street" lands better than "service drop," and "breakers or fuses" beats "overcurrent protection devices." One precise distinction: a <b>wire</b> is a single conductor; a <b>cable</b> is a group of conductors.</p>
 <p>Every component in this chapter runs through the same five-step loop. Learn it once and it works anywhere:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>The systems you'll inspect</h2>
 <ul class="num"><li>Service drop &amp; entrance</li><li>The grounding system</li><li>The service box (main disconnect, fuses/breakers)</li><li>Distribution panels</li><li>Branch-circuit wiring</li><li>Lights, outlets, switches, junction boxes (plus smoke detectors)</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Safety — non-negotiable</div><p>Checking panels is one of the most dangerous parts of the job. Before you touch anything: <b>(1)</b> wear rubber-soled shoes; <b>(2)</b> don't stand in water or wet areas; <b>(3)</b> use insulated tools to remove covers; <b>(4)</b> keep clients away from an open panel; <b>(5)</b> use a voltage detector to confirm equipment is de-energized. Even with house power off, the service-entrance conductors and a miswired fuse can be live.</p></div></div>
 <p>The complete original chapter is embedded at the end as optional deep-reading — but everything you need to pass is taught right here.</p>`,
 quiz:[
  {q:'The home inspector\'s role with the electrical system is best described as:',o:['Repair the defects found','Certify the system meets current code','Observe accessible components, recognize conditions, and report implications','Calculate and redesign the service load'],a:2,e:'Inspectors observe and report — they don\'t repair, certify, or engineer.'},
  {q:'Which is the correct technical distinction?',o:['Wire and cable mean the same thing','A wire is a single conductor; a cable is a group of conductors','A cable is a single conductor; a wire is a group','Neither term applies to residential work'],a:1,e:'A wire is one conductor; a cable bundles several. Small distinction, but it matters when you describe what you see.'},
  {q:'Before touching equipment in a panel you should:',o:['Assume it\'s safe if the main is off','Use a voltage detector to confirm it\'s de-energized','Pull the main fuses first','Have the client hold the cover'],a:1,e:'Always verify with a voltage detector — SE conductors and miswired fuses can stay live even with house power off. And keep clients clear of an open panel.'},
  {q:'When talking to a client, the better phrasing is:',o:['"The service drop terminates at the weatherhead"','"The wires from the street connect up at the top here"','"Overcurrent protection devices are present"','"The grounded conductor carries the load"'],a:1,e:'Use plain language with clients and save the technical terms for the report. Clear communication is part of the job.'},
  {q:'The five-step loop this section teaches is:',o:['Inspect, photograph, bill, leave, repeat','Component → Function → Common defect → Implication → How you report','Test, repair, certify, document, warranty','Drop, entrance, panel, branch, ground'],a:1,e:'Every component is read the same way — what it is, what it does, what goes wrong, why that matters, and how you write it up.'},
 ]},

/* ===== L1 SERVICE DROP ===== */
{id:'l1',kind:'Lesson 1',label:'Service Drop',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · §7.1 Service Drop</span><h1>Getting power to the house</h1>
 <p class="lead">Before electricity does anything useful inside a home, it has to cross the gap from the utility to the building — safely, and out of everyone's way. Get the vocabulary and the geometry right here and the rest of the service makes sense.</p>
 <h2>What it is, and what to call it</h2>
 <p>The <b>service drop</b> is the bundle of overhead conductors running from the utility pole — usually at the street — to the point where they connect to the house. Clients call these "the overhead wires"; electricians and the utility say "service drop." When the conductors are buried instead, the utility calls them <b>service laterals</b>: they run underground and surface at a meter or head straight inside.</p>
 <p>Wherever the drop ends, it splices to the home's wiring at the <b>service point</b> — the spot where the utility's responsibility hands off to the homeowner's. On an overhead service, this happens at the <b>drip loop</b>: a deliberate U-shaped sag that does two jobs at once. It gives water a low point to <b>drip off</b> before it can travel into the conduit, and its very presence proves the conductors are <b>secured and relaxed</b> — a drip loop can only exist if the wires aren't pulled tight. So a missing drip loop is a tension warning, not just a water issue.</p>
 <p>The drip loop sits at the top of the <b>masthead</b> (also called the service cap, entrance cap, pothead, weatherhead, or servicehead — all the same fitting). From there, the wires down into the box are the <b>service-entrance conductors</b> (Lesson 2). The <b>utility</b> usually owns and maintains the drop; the <b>homeowner</b> owns the entrance — which is why so many drop defects get referred to the utility, not an electrician.</p>
 <div class="dgm"><svg viewBox="0 0 720 240"><defs><marker id="a1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#7f520a" stroke-width="1.4"/></marker></defs><g fill="none" stroke="#3c5870" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
   <line x1="70" y1="34" x2="70" y2="200"/><line x1="48" y1="200" x2="92" y2="200"/><rect x="52" y="56" width="36" height="24" rx="2"/><text x="70" y="100" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#2c4153">UTILITY POLE</text>
   <path d="M72 62 C 180 70, 250 104, 296 104" stroke="#7f520a"/><text x="180" y="58" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#7f520a">service drop (overhead)</text>
   <path d="M296 104 c 9 0 9 16 -2 16 c -9 0 -7 -11 2 -11" stroke="#7f520a"/><text x="300" y="138" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f520a">drip loop / service point</text>
   <line x1="360" y1="40" x2="360" y2="120"/><circle cx="360" cy="58" r="7"/><text x="398" y="55" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#2c4153">masthead</text>
   <line x1="318" y1="108" x2="352" y2="64" marker-end="url(#a1)" stroke="#7f520a"/>
   <rect x="330" y="120" width="60" height="100" rx="4"/><text x="360" y="172" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#2c4153" transform="rotate(-90 360 172)">SE conductors</text>
   <rect x="470" y="120" width="70" height="100" rx="5"/><rect x="482" y="132" width="46" height="13" rx="2"/><text x="505" y="142" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#2c4153">MAIN</text><text x="505" y="236" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#2c4153">SERVICE BOX</text>
   <line x1="392" y1="170" x2="468" y2="170" marker-end="url(#a1)" stroke="#7f520a"/>
   <text x="630" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#918c7d">utility owns →</text><text x="628" y="206" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#918c7d">← homeowner owns</text>
 </g></svg><div class="cap">Pole → drop → drip loop / service point → masthead → service-entrance conductors → service box</div></div>
 <h2>Reading the drop — and the trap of sizing by it</h2>
 <p>A mistake that catches new inspectors: judging the <b>service size</b> from the thickness of the drop wires. Don't. They hang in open air, shed heat easily, and can be <b>smaller</b> than same-ampacity wires inside the house — our ampacity tables assume an enclosed conductor. Size the service from the SE conductors or main disconnect (Lesson 3), never the drop.</p>
 <p>What the drop tells you reliably is the <b>configuration</b>, by conductor count: <b>three wires</b> (black, red, white-neutral) = a standard 240-volt single-phase residential service; <b>two wires</b> = a 120-volt service (rare, inadequate today); <b>four wires</b> = three-phase commercial, beyond a home inspection. The neutral is often bare and doubles as the support cable for the two hots.</p>
 <div class="dgm"><svg viewBox="0 0 720 230"><g fill="none" stroke="#3c5870" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
   <line x1="40" y1="210" x2="700" y2="210"/><line x1="110" y1="210" x2="110" y2="34"/><text x="110" y="26" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#2c4153">pole</text>
   <path d="M112 54 C 250 62, 360 112, 460 112" stroke="#7f520a"/>
   <g stroke="#b85436" stroke-dasharray="4 3"><line x1="190" y1="210" x2="190" y2="138"/><line x1="310" y1="210" x2="310" y2="108"/><line x1="450" y1="210" x2="450" y2="80"/><line x1="600" y1="210" x2="600" y2="96"/></g>
   <text x="190" y="225" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f520a">walking surface</text><text x="190" y="133" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#b85436">10 ft</text>
   <text x="310" y="225" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f520a">driveway</text><text x="310" y="103" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#b85436">12 ft</text>
   <text x="450" y="225" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f520a">roadway</text><text x="450" y="75" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#b85436">18 ft</text>
   <text x="600" y="225" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f520a">pool (any direction)</text><text x="600" y="91" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#b85436">22.5 ft</text>
 </g></svg><div class="cap">Clearances scale with what's underneath — keep conductors out of reach of people, vehicles, and ladders</div></div>
 <h2>The seven conditions you'll write up</h2>
 <p>The clearance numbers above cover the first one. Over a <b>roof</b>: 8 ft above a roof / 10 ft over a walk-out deck, just 3 ft where the slope exceeds 4-in-12 (nobody walks there), and 18 in where the wires project only ~4 ft onto the roof. Run each condition through the loop:</p>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Overhead wires too low</span></div><p>The clearances are the test; the failure is contact by a person, vehicle, ladder, or equipment.</p><div class="meta"><span class="lab">Implication</span><span class="val">Shock to people; danger to roofers; snow/ice damage in cold climates.</span><span class="lab">Strategy</span><span class="val">Check heights and apply the common-sense reach test. The utility is the authority.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Damaged or frayed wires</span></div><p>Sun, abrasion, and age break down the covering — usually the utility's responsibility.</p><div class="meta"><span class="lab">Implication</span><span class="val">Short circuit, loss of service, shock if a wire falls.</span><span class="lab">Strategy</span><span class="val">Examine from the ground, ideally with binoculars.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Trees or vines interfering</span></div><p>Anything rubbing the drop causes trouble two ways.</p><div class="meta"><span class="lab">Implication</span><span class="val">Mechanical abrasion plus reduced heat dissipation where foliage wraps the wire.</span><span class="lab">Strategy</span><span class="val">Inform the client; the utility often clears it.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">4</span><span class="nm">Wires too close to doors or windows</span></div><p>Modern practice wants ~3 ft from the sides/bottoms of windows, doors, and fire escapes — some jurisdictions even for fixed windows (they may be replaced with operable ones).</p><div class="meta"><span class="lab">Implication</span><span class="val">Contact/shock wherever a wire is reachable from an opening.</span><span class="lab">Strategy</span><span class="val">Note it; the utility may have accepted it — point out the common-sense issue.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">5</span><span class="nm">Wires not well secured to the house</span></div><p>The neutral usually carries the mechanical load. Confirm a sound connection.</p><div class="meta"><span class="lab">Implication</span><span class="val">Loose wires can fall — cutting power and dropping live conductors.</span><span class="lab">Strategy</span><span class="val">Look for movement, excess sag, or — the key tell — an absent drip loop (wires under tension).</span></div></div>
 <div class="defect"><div class="dh"><span class="n">6</span><span class="nm">Poor connection between drop and entrance</span></div><p>The splice belongs at the drip loop, not its low point (where water collects).</p><div class="meta"><span class="lab">Implication</span><span class="val">Loss of power and a hazard if wires fall.</span><span class="lab">Strategy</span><span class="val"><b>Electrical tape on the splice signals amateur work</b> — utilities use heat-shrink.</span></div><div class="rep"><b>Report:</b> "Service-drop splice shows strain / amateur repair. Recommend evaluation by the utility."</div></div>
 <div class="defect"><div class="dh"><span class="n">7</span><span class="nm">Inadequate clearance from the roof</span></div><p>The roof figures above are the standard.</p><div class="meta"><span class="lab">Implication</span><span class="val">Mechanical damage and shock during roof repair/maintenance.</span><span class="lab">Strategy</span><span class="val">Know what your utility accepts and advise the client of the risk.</span></div></div>
 ${W('sort','whofixes')}
 ${story('Inspector in the house',`A drop sagged low across the back yard, well under the 10 feet a walking surface calls for — but the homeowner insisted "the power company put it there, so it's fine." Maybe so. <b>The utility is the authority</b>, and you won't win that argument. The move isn't to cite code chapter and verse; it's to write the plain truth — "these wires are within reach of people; this should be checked by the utility and may need to be moved" — and let the experts settle it.`)}`,
 quiz:[
  {q:'You count three conductors entering the service drop. What does that tell you — and what does it NOT?',o:['A 240-volt single-phase residential service; it does not reliably tell you the amperage','A 120-volt service; it tells you the exact amperage','A three-phase commercial service; nothing about voltage','That the service is undersized'],a:0,e:'Three wires = standard 240 V single-phase residential. The wire count is reliable for configuration; the drop-wire size is not reliable for amperage (open-air conductors can be smaller).'},
  {q:'Why is it a mistake to judge service size from the thickness of the drop conductors?',o:['They\'re always aluminum','They hang in open air and shed heat, so they can be smaller than enclosed conductors of the same ampacity','They\'re always larger than in-house wires','The gauge markings are hidden'],a:1,e:'Ampacity tables assume an enclosed conductor; a free-air wire can safely be smaller. Size from the SE conductors or the main disconnect instead.'},
  {q:'Minimum clearance over a residential driveway?',o:['10 feet','12 feet','18 feet','22½ feet'],a:1,e:'Driveway = 12 ft. The ladder: 10 ft walking surface, 12 ft driveway, 18 ft roadway, 22½ ft from a pool in any direction.'},
  {q:'A steep roof (slope > 4-in-12) only needs 3 ft of clearance instead of the higher walkable-roof figure. Why?',o:['Steep roofs are stronger','Nobody walks on it, so contact risk is lower','The wires weigh less up high','It\'s always near a pole'],a:1,e:'Clearances keep conductors out of reach. A roof too steep to stand on carries far less contact risk — so 3 ft, vs. 10 ft over a walkable roof and 18 in where wires project only ~4 ft onto it.'},
  {q:'The drop-to-entrance splice is wrapped in black electrical tape and there\'s no visible drip loop. What do these suggest, and what do you do?',o:['Both normal; note nothing','Tape suggests amateur work (utilities use heat-shrink) and a missing drip loop suggests wires under tension — document both and recommend the utility evaluate','Reseal it and add a drip loop yourself','They indicate an undersized service needing an upgrade'],a:1,e:'Tape = amateur (utilities use heat-shrink); a missing drip loop = wires likely strained. Both are on the utility-owned drop, so document and refer to the utility — never DIY.'},
 ]},

/* ===== L2 SERVICE ENTRANCE WIRES ===== */
{id:'l2',kind:'Lesson 2',label:'Service Entrance Wires',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · §7.2 Service Entrance Wires</span><h1>From the drop down to the equipment</h1>
 <p class="lead">The service-entrance (SE) wires pick up where the drop ends and run down to the service equipment, with the meter usually partway along. This is the homeowner's hardware — and a magnet for water, which is the theme running through nearly every defect here.</p>
 <p>The SE conductors include a black and red (hot) and a white (neutral). Many jurisdictions require them to extend at least <b>30 inches</b> out of the service cap so the utility can make connections and form a drip loop. They may run in a <b>conduit</b> or be a self-protected <b>SE cable</b> — both are permitted. Where SE cable is used without a masthead, the cable is bent into a <b>gooseneck</b> (like a candy cane) to keep water out.</p>
 <p>Where the drop arrives above the roofline, a <b>service mast</b> is required: it extends through the roof, supports the drop, and must be flashed where it penetrates. Good practice attaches the drop within ~12 in of the top, keeps wires ~2 ft above the roof (so the mast usually rises ≥ 3 ft), and adds <b>guy wires</b> on masts taller than 5 ft. For support: secure cable every 30 in–5 ft, conduit every 5–6 ft.</p>
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The through-line: keep water out</div><p>Almost every SE defect is really a <b>water-entry</b> problem. The four spots to scrutinize: <b>conduit joints, the service cap, the roof flashing, and the meter base.</b> Water in the system can shut it down, shock someone, or start a fire.</p></div></div>
 <h2>The eleven service-entrance conditions</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">No drip loop</span></div><p>The slack low point at the splice that sheds water and relieves tension is missing.</p><div class="meta"><span class="lab">Implication</span><span class="val">Water entry and mechanical stress on wires/splices.</span></div></div>
 ${conds('Conditions 2–11 (run the loop on each)',[
   ['No masthead / service cap','Water into the system. Wires should enter the underside of a weather-tight cap.'],
   ['Masthead not weather-tight','Cap loose or wrong angle — water in.'],
   ['SE wires too close to the roof','Mechanical damage and shock during roof work.'],
   ['Mast or conduit bent','Sagging/falling wires, lost clearance, lost weather-tightness. Masts > 5 ft need guy wires; check the flashing.'],
   ['Mast or conduit rusted','Mechanical failure and water entry — worst at horizontal surfaces and cut threads.'],
   ['Mast rotted (wood)','Loss of strength and collapse; wood masts are banned on new work in many areas.'],
   ['Not well secured to the building','Cable every 30 in–5 ft, conduit every 5–6 ft. Look for movement, not numbers.'],
   ['Not weather-tight','The four water-entry points: conduit joints, service cap, roof flashing, meter base.'],
   ['Not sealed at the wall penetration','Water into the system (shock), into the basement (nuisance), and rusting equipment. If below grade, check from inside.'],
   ['SE cable frayed, damaged, or covered by siding','Touching it can shock; live cable against metal siding can energize the whole building skin. Cable must stay accessible — never buried (conduit behind brick is sometimes allowed).'],
 ])}
 ${W('sort','whofixes')}
 <p class="lead" style="font-size:14px;margin-top:6px">Notice how the same routing logic from Lesson 1 still holds — the overhead drop is the utility's, the entrance hardware is the homeowner's/electrician's.</p>`,
 quiz:[
  {q:'Which is NOT one of the four common water-entry points on a service entrance?',o:['Conduit joints','The service cap (masthead)','The roof flashing','The grounding electrode'],a:3,e:'The four are conduit joints, service cap, roof flashing, and meter base. The grounding electrode belongs to the grounding system.'},
  {q:'A service mast taller than 5 feet should have:',o:['A larger meter base','Guy wires for support','A second drip loop','A plastic gooseneck'],a:1,e:'Tall masts carry significant drop-wire load; guy wires keep them from bending or breaking.'},
  {q:'On SE cable used without a masthead, the cable is bent into a gooseneck to:',o:['Increase clearance','Discourage water from entering the cable','Support the drop','Mark the service size'],a:1,e:'The downward "candy-cane" bend keeps water from tracking between the conductors and the sheathing.'},
  {q:'SE cable must be:',o:['Buried where possible to protect it','Kept accessible and visible — never buried','Painted to match the siding','Run inside the living space'],a:1,e:'Cable must stay accessible and visible over its length and is never buried (conduit behind brick is sometimes allowed; cable is not).'},
  {q:'Live SE cable contacting metal siding is dangerous because:',o:['It looks unprofessional','The entire building skin can become electrically charged','It voids the warranty','It increases the service size'],a:1,e:'If a damaged live conductor touches metal siding, the whole metal skin can energize — a serious shock hazard.'},
 ]},

/* ===== L3 SERVICE SIZE ===== */
{id:'l3',kind:'Lesson 3',label:'Service Size',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · §7.3 Service Size</span><h1>How much current the house can carry</h1>
 <p class="lead">Two numbers define a service: voltage and amperage. For ~999 of 1,000 homes the voltage is 240 V, so the real question is ampacity — and the single most important idea in this lesson is which size problems are dangerous and which are merely annoying.</p>
 <p>Common sizes: <b>60 A</b> (obsolete, not allowed on new work), <b>100 A</b> (typical average home), <b>125/150 A</b> (small homes with electric heat or larger ones without), <b>200 A</b> (electric heat or large homes), and rarely <b>400 A</b> (the largest single-phase service, ~6,000+ sq ft). Inspectors don't do load calculations — we use general rules and explain that lifestyle drives demand.</p>
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The distinction that\'s on the exam — and the job</div><p>An <b>undersized service is NOT a safety hazard</b> — it's an inconvenience. Run too much at once and the main simply trips or blows. The problem only appears with simultaneous use. <b>Overfusing</b> (a device too large for the wire) <b>is</b> the hazard, because it won't shut off before the conductor overheats.</p></div></div>
 <h2>Wire gauge runs backwards</h2>
 <p>In <b>AWG</b>, a smaller number is a bigger wire. The sizes used: 14, 12, 10, 8, 6, 4, 3, 2, 1, 0 — then 1/0, 2/0, 3/0, and 4/0 (the largest you'll see in homes, used for aluminum 200 A service entrances).</p>
 <table class="tbl"><tr><th>Service</th><th>Min. copper</th><th>Min. aluminum</th></tr><tr><td>60 A</td><td>#6</td><td>#4</td></tr><tr><td>100 A</td><td>#4</td><td>#2</td></tr><tr><td>200 A</td><td>2/0</td><td>4/0</td></tr></table>
 <h2>Determining the size — in order of reliability</h2>
 <ul class="clean">
  <li><b>Best: the SE conductor size.</b> Read it at the cap or where it enters the box. Aluminum is marked <b>AL / ALUM / ALUMINUM</b>. Don't judge by bare-wire diameter or cable OD. Size the <b>red and black</b>, never the neutral.</li>
  <li><b>Next: the main disconnect.</b> If fused, two fuses (one per hot) — a 100 A service = two 100 A fuses; <b>never add them</b>. If breakered, a <b>double-pole</b> breaker (200 A service = 200 A double-pole). Both fuses must match. Read breaker size off the handle without removing the cover.</li>
  <li><b>The box and panel rating</b> must be ≥ the service size.</li>
  <li><b>No single main?</b> Up to <b>six throws</b> can kill all power; don't add the disconnects — use the SE conductors.</li>
 </ul>
 <p>If you can only read the device, write "<b>apparent</b> 100-amp service." Never remove main fuses or shut house power to read them. Slightly oversized devices can be fine (200 A breakers on 180 A wire, since no 180 A breaker exists). Try the estimator below — change the conductor and the breaker and watch the logic:</p>
 ${W('est')}
 <h2>Advising your client</h2>
 <ul class="clean">
  <li><b>Adequate:</b> report the size; say it suits a typical home of this size (don't promise it fits their lifestyle).</li>
  <li><b>Undersized:</b> report and recommend increasing it — the drop/laterals, SE conductors, box, grounding conductor, and usually the panel.</li>
  <li><b>Marginal:</b> report and suggest a trial basis; it's a convenience improvement, not a necessity. Breakers trip (both); fuses blow (one or both — one blown fuse leaves half the house dead and no 240 V appliances working). Never tell a client to change main fuses.</li>
 </ul>
 ${W('match','wirebrk')}`,
 quiz:[
  {q:'A 200-amp fused service has how many main fuses, of what rating each?',o:['One 200 A fuse','Two 100 A fuses (they add to 200)','Two 200 A fuses','Four 50 A fuses'],a:2,e:'Each hot gets its own fuse, and you never add them. 200 A service = two 200 A fuses; with breakers, a double-pole 200 A.'},
  {q:'An undersized service is best described as:',o:['A fire hazard','A shock hazard','An inconvenience — the main trips/blows under simultaneous heavy use','A code violation requiring immediate replacement'],a:2,e:'Undersized = inconvenience. Overfusing is the genuine hazard.'},
  {q:'The most reliable way to determine service size is:',o:['The drop-wire size','The SE conductor size','The panel rating','The conduit diameter'],a:1,e:'SE conductor size is best; size the red and black, not the neutral. The main disconnect is the next-best indicator.'},
  {q:'In AWG, which is the largest conductor?',o:['#14','#6','#2','4/0'],a:3,e:'AWG runs backwards: smaller number = bigger wire, and after 1/0, 2/0, 3/0, the biggest residential size is 4/0.'},
  {q:'You can read the main breaker but not the SE conductors. How do you phrase the service size?',o:['"Confirmed 100-amp service"','"Apparent 100-amp service"','"Service size unknown"','"200-amp service" (double it)'],a:1,e:'When you size from the device rather than the conductors, hedge it: "apparent 100-amp service." Never pull fuses or kill power just to read them.'},
 ]},
{id:'l4',kind:'Lesson 4',label:'Service Box',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 4 · §7.4 Service Box</span><h1>The one place that shuts it all off</h1>
 <p class=\"lead\">The service box — also called the service equipment or service panel — is where the incoming power first lands inside the house and where it can be switched off entirely. It is the most safety-critical thing you will open all day, and several of its defects can kill someone who doesn't understand them. Read this one slowly.</p>
 <p>Most homes have a metal service box holding a <b>main disconnect</b> and the main overcurrent protection. It may be a stand-alone box, or a <b>combination panel</b> that builds the main disconnect together with the distribution panel and all its branch breakers or fuses. The rule you're checking against: there should be one clear way to kill all the power. Where there's no single main, up to <b>six throws</b> (switches or fuse pulls) are allowed to shut everything off — but if it takes more than six, or there's no organized disconnect at all, recommend a proper service box with a single main.</p>
 ${W('spot','box')}
 <h2>Location, access, and the gas-meter rule</h2>
 <p>Service boxes live indoors, outdoors, or in garages. An exterior box must be <b>weather-tight</b>. You'll sometimes find exterior boxes <b>locked</b> for security — which is a problem, because you can't shut the power off fast in an emergency; if that's common in your area, learn the utility's position (they may want the lock removed or a key staged). A <b>distribution panel should never be locked.</b> Keep one more number in your head: electrical equipment should sit at least <b>three feet from indoor gas meters and outdoor gas relief vents</b> — you don't want an electrical spark next to a gas leak. And there should be clear working space in front of the box; a panel buried behind storage or boxed into a finished closet is a defect worth noting.</p>
 <h2>The four conditions that are genuinely dangerous</h2>
 <p>Most service-box problems imply shock or fire. But four of them are special — they leave equipment <b>live when it looks dead</b>, which is how people get hurt. Understand the mechanism, not just the name:</p>
 ${conds('Memorize these — they defeat the off switch', [['Fused neutral','A fuse or switch placed in the neutral. If that fuse opens, the circuit goes dead — but the equipment downstream can stay energized through the hot, so it looks off and isn\'t. The neutral must never be fused or switched.'],['Fuses upstream of the disconnect','Fuses ahead of the main switch stay energized even with the main off. You cannot make the box safe to work in, because killing the main doesn\'t kill those fuses.'],['Neutral bypasses the service box','The neutral has to land in the box — that\'s the single point where neutral and ground are bonded. A neutral routed around the box defeats the whole grounding scheme.'],['Improper taps','Unauthorized connections made ahead of the main are unprotected — no breaker or fuse stands between them and the incoming power.']])}
 <div class=\"field brass\"><div class=\"ic\">${sv(ic.alert)}</div><div><div class=\"t\">Why \"the power is off\" can be a lie</div><p>Even with the house main switched off, the <b>service-entrance conductors</b> entering the box are still live, and any of the four conditions above can keep parts energized. This is exactly why you confirm de-energization with a voltage detector and never assume. \"Off\" is something you verify, not something you trust.</p></div></div>
 <h2>The rest of the service-box checklist</h2>
 ${conds('The full list of 16 conditions', [['Poor access or location','Blocked, too high, behind finished walls, or locked. Note it; recommend safe access.'],['Loose','The box should be firmly mounted. Movement stresses conductors and connections.'],['Rust or water in the box','Moisture corrodes connections and is a shock hazard. Find the source; recommend evaluation.'],['Unprotected openings','Missing cover, missing knockouts, or open slots let fingers and rodents reach live parts. Install fillers.'],['Damaged parts','Cracked fuse holders, broken switches, damaged enclosure.'],['Overheating','Discoloration, melted insulation, or the smell of hot plastic — an immediate, serious problem.'],['Incorrect fuse/breaker size; box rating too small','The box and its overcurrent devices must be rated at or above the service size.'],['Service-entrance wires exposed in the house','SE conductors have no overcurrent device ahead of them, so they must be enclosed and kept as short as possible inside.'],['Poor connections','Loose lugs and corroded terminals overheat. A frequent finding.'],['Obsolete box','Certain older panels with known failure histories, or any switch not enclosed in a box, should be treated as obsolete.'],['Exterior box not weather-tight','Outdoor boxes must keep water out.']])}
 ${story('Inspector in the House', 'On an older home I found the fuses mounted facing the back of the box, labels turned away — unreadable without pulling them, which you never do. The right move isn\'t to force it. I reported that the service size could not be confirmed from accessible information and recommended evaluation. \"I couldn\'t safely verify it\" is a complete, professional finding.')}`,
 quiz:[
  {q:'Why is a fused neutral dangerous?',o:['It makes the lights flicker','If the neutral fuse opens, downstream equipment can remain energized through the hot while appearing dead','It doubles the available amperage','It is required on all modern services'],a:1,e:'A fuse in the neutral can open while the equipment stays live through the hot conductor — it looks off but isn\'t. The neutral must never be fused or switched.'},
  {q:'Fuses located upstream of the main disconnect are a problem because:',o:['They blow too easily','They remain energized even when the main is switched off, so the box can\'t be made safe','They are always the wrong amperage','They prevent the meter from reading'],a:1,e:'Anything ahead of the main stays live when the main is off — you can\'t safely service the box.'},
  {q:'The minimum clearance between electrical equipment and an indoor gas meter is:',o:['1 foot','3 feet','6 feet','No requirement'],a:1,e:'At least three feet — an electrical spark near a gas leak is an explosion risk.'},
  {q:'You find an exterior service box secured with a padlock. The concern is:',o:['It looks unprofessional','Power can\'t be shut off quickly in an emergency; learn the utility\'s position','Locks cause rust','It voids the warranty'],a:1,e:'A locked service box blocks emergency shutoff. Find out the utility\'s policy — and note that distribution panels should never be locked.'},
  {q:'With the house main switched off, which statement is true?',o:['Everything in the box is safe to touch','The service-entrance conductors entering the box are still live','Only the neutral is live','The box is fully de-energized after 30 seconds'],a:1,e:'The SE conductors are always live, and several miswiring conditions can keep other parts energized. Always verify with a voltage detector.'},
 ]},
{id:'l5',kind:'Lesson 5',label:'Grounding & Bonding',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 5 · §7.5 System Grounding</span><h1>The wires that do nothing — until they save a life</h1>
 <p class=\"lead\">Grounding and bonding confuse almost everyone, because they involve wires that normally carry no current at all. Get three distinctions straight and the mystery disappears: the two grounding systems, grounding versus the grounded neutral, and grounding versus bonding.</p>
 <h2>Two different grounding systems</h2>
 <p>The <b>equipment grounding system</b> is the network of bare wires running through the house alongside the branch-circuit wiring. It normally does nothing. Its job is to be a ready <b>emergency path</b>: if electricity gets somewhere it shouldn't — say a hot wire contacts a metal appliance case — the bare ground gives that current an easy route back, which trips the breaker or blows the fuse and keeps the charge off of <em>you</em>. This system connects to the neutral at the service box and rides the neutral service conductor back out to the transformer at the street.</p>
 <p>The <b>earth grounding system</b> is a separate idea: a single conductor — the <b>grounding electrode conductor</b> — running from the service box out to the earth, by way of electrodes like a driven rod or a metal water pipe. It stabilizes the system voltage relative to the ground you stand on.</p>
 <h2>Grounding vs. the grounded neutral — don't mix them up</h2>
 <p>The <b>white neutral (grounded) wire</b> carries current every day. It's the normal return path: power flows out a hot, through the load, and back on the neutral to the bus bar, to the service box, and out to the transformer. That's electricity doing its job. The <b>bare grounding wire</b> is the opposite — it sits idle, carrying nothing, available only for a fault. One is a working road; the other is an emergency shoulder.</p>
 <div class=\"field brass\"><div class=\"ic\">${sv(ic.bolt)}</div><div><div class=\"t\">The single most testable fact about grounding</div><p>The neutral and the ground are tied together at <b>exactly one place — the service box.</b> Nowhere else. In a downstream subpanel they must be kept <b>separate</b>. A neutral and ground bonded together in a subpanel is a real defect, because it puts normal return current onto the bare grounding wires and the metal they touch.</p></div></div>
 <h2>The electrodes — how the system reaches earth</h2>
 ${conds('Where the grounding electrode conductor terminates', [['Metal underground water pipe','A classic electrode — but a jumper must bridge around the water meter, because a plumber can remove the meter and break the ground.'],['Driven ground rod','A rod at least 8 feet long. Since the late 1980s a single rod usually must be supplemented by a second rod unless it can be proven to have low enough resistance — so two rods is common.'],['Concrete-encased electrode (UFER)','Rebar or wire encased in the foundation concrete — an excellent, modern electrode.']])}
 <h2>Bonding — and the gas-piping trap</h2>
 <p><b>Bonding</b> is simply joining two conductors so they sit at the same electrical potential — two wires, a wire and a pipe, even two boxes. By itself bonding protects nothing. It earns its keep when one of the bonded parts is grounded: then a stray charge has somewhere to go instead of building up. Tie the gas line, the ductwork, and the metal boxes to the same system and no piece can quietly go live relative to another.</p>
 <p>Gas piping is where people get it backwards. You are <b>not allowed to use gas piping to ground</b> the electrical system — much of the underground gas line is plastic, so it can't be relied on to reach earth. But the gas piping <b>must be bonded</b> to the electrical grounding system in most areas, so it can't develop a charge that arcs to something nearby — a spark next to gas vapor is an explosion. Bonding the gas line usually bonds the furnace and ductwork too, since the piping touches them. It's often done with a wire clamped to the water supply pipe near the water heater. Sort the actions below to lock the distinction in:</p>
 ${W('sort','groundbond')}
 ${conds('Conditions you\'ll report', [['No grounding / no earth ground','An ungrounded system or a missing electrode connection — recommend evaluation and correction.'],['Undersized grounding conductor','Too small for the service it protects.'],['Loose or corroded ground connections','At the rod, the pipe clamp, or the box — corrosion defeats the path.'],['Missing jumper at the water meter','Breaks the ground the moment the meter is pulled.'],['Gas piping not bonded','A genuine explosion-risk finding in most jurisdictions.'],['Grounding and neutral bonded in a subpanel','Return current ends up on the grounding wires and the metal they touch.']])}`,
 quiz:[
  {q:'The equipment grounding system (the bare wires) normally:',o:['Carries the everyday return current','Carries nothing — it\'s an emergency path that lets breakers trip and fuses blow','Powers the lights','Replaces the neutral'],a:1,e:'The bare ground sits idle until a fault, then gives current an easy path back so the overcurrent device opens — keeping the charge off people.'},
  {q:'Neutral and ground are bonded together at how many places?',o:['At every receptacle','At every subpanel','At exactly one place — the service box','Never'],a:2,e:'Only at the service box. In subpanels they must be separated, or normal current ends up on the grounding wires.'},
  {q:'Regarding the gas piping, the rule is:',o:['Use it to ground the electrical system','Bond it to the grounding system, but never use it to ground the system','Leave it completely isolated','Connect it only to the neutral'],a:1,e:'Gas piping must be bonded (so it can\'t develop a charge and spark), but it can\'t be used as the grounding electrode — underground gas line is often plastic.'},
  {q:'A driven ground rod must be at least how long?',o:['4 feet','6 feet','8 feet','12 feet'],a:2,e:'8 feet — and since the late 1980s a single rod usually has to be supplemented by a second unless its resistance is proven low enough.'},
  {q:'Why must a jumper bridge around the water meter?',o:['To improve water pressure','So removing the meter doesn\'t break the ground path','To bond the gas line','To meter electrical usage'],a:1,e:'If the meter is the ground path and a plumber pulls it, the ground is lost. The jumper keeps the path intact.'},
 ]},
{id:'l6',kind:'Lesson 6',label:'Distribution Panels',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 6 · §7.6 Distribution Panels</span><h1>Where the house circuits begin</h1>
 <p class=\"lead\">The distribution panel is where the two incoming hot legs get split into the dozens of branch circuits that feed the house, each protected by its own fuse or breaker. In a combination panel it shares an enclosure with the main disconnect; in older homes it may be a separate box fed from the service box.</p>
 <h2>120 volts, 240 volts, and how to tell</h2>
 <p>Residential power arrives as two 120-volt hot legs plus a neutral. How a circuit taps them sets its voltage:</p>
 ${conds('Reading a circuit by its conductors', [['One hot + neutral = 120 V','Lights, general receptacles, most small loads.'],['Two hots = 240 V','Straight 240-volt loads — water heater, baseboard heat, central air.'],['Two hots + neutral = 120/240 V','Ranges and dryers, which run heating elements at 240 V and clocks, lights, and controls at 120 V.']])}
 <h2>The wire-to-breaker pairing is the whole game</h2>
 <p>Each branch breaker must match the wire it protects, because the breaker exists to shut off before that wire overheats. This is the table you'll use more than any other in the field. Drill it until it's automatic:</p>
 <table class=\"tbl\"><tr><th>Copper wire</th><th>Max breaker / fuse</th><th>Typical use</th></tr><tr><td>14 AWG</td><td>15 A</td><td>Lighting, general outlets</td></tr><tr><td>12 AWG</td><td>20 A</td><td>Kitchen, laundry, garage</td></tr><tr><td>10 AWG</td><td>30 A</td><td>Water heater, dryer</td></tr><tr><td>8 AWG</td><td>40 A</td><td>Range, sub-feeds</td></tr><tr><td>6 AWG</td><td>60 A</td><td>Large appliances, subpanels</td></tr></table>
 ${W('match','wirebrk')}
 <p>A breaker <b>larger</b> than its wire allows is <b>overfusing</b> — the dangerous direction, because the wire can overheat before the breaker ever trips. A breaker <b>smaller</b> than the wire is merely conservative and trips early. Direction matters.</p>
 <h2>Subpanels — where neutral and ground must part ways</h2>
 <p>A subpanel is a distribution panel fed from the main. The rule from Lesson 5 comes home here: in a subpanel the neutral and the grounding conductors must land on <b>separate, isolated buses</b> — they are only bonded back at the service box. The tells of a correct subpanel feed are a <b>four-wire feeder</b> (two hots, an insulated neutral, and a separate ground) and a neutral bus that is isolated from the enclosure. A subpanel with neutral and ground sharing one bus, or a bonding screw left in, is a defect.</p>
 ${story('Inspector in the House', 'A homeowner once told me, half-joking, that dinner is always late on holidays — the oven, the microwave, and a space heater on the same kitchen run keep tripping the breaker. That\'s not a hazard; it\'s the breaker doing its job on an overloaded or undersized circuit. I explained the difference: a tripping breaker is protection working, not a fire waiting to happen. The fix is load management or another circuit — not a bigger breaker on the same wire.')}`,
 quiz:[
  {q:'A circuit with two hot conductors and a neutral is typically:',o:['120 V only','240 V only','120/240 V — like a range or dryer','Low-voltage'],a:2,e:'Two hots give 240 V for the heating element; the neutral allows 120 V for clocks, lights, and controls — classic range/dryer wiring.'},
  {q:'12-gauge copper wire should be protected by a breaker no larger than:',o:['15 A','20 A','30 A','40 A'],a:1,e:'12 AWG → 20 A. The ladder: 14→15, 12→20, 10→30, 8→40, 6→60.'},
  {q:'Overfusing means:',o:['A breaker smaller than the wire allows','A breaker larger than the wire allows — the dangerous direction','Two breakers on one circuit','A blown fuse'],a:1,e:'A breaker too big for its wire won\'t trip before the wire overheats. A breaker smaller than the wire just trips early — conservative, not dangerous.'},
  {q:'In a subpanel, the neutral and grounding conductors should be:',o:['Bonded together on one bus','On separate, isolated buses — bonded only back at the service box','Connected to the gas line','Left disconnected'],a:1,e:'They\'re bonded at exactly one place, the service box. In a subpanel they must be separated, which is why a proper feed is four wires.'},
  {q:'A breaker that keeps tripping when several appliances run at once indicates:',o:['A fire hazard requiring a larger breaker','The overcurrent device doing its job on an overloaded/undersized circuit','A grounding fault','A bonding error'],a:1,e:'Tripping is protection working. The remedy is managing the load or adding a circuit — never a bigger breaker on the same wire.'},
 ]},
{id:'l7',kind:'Lesson 7',label:'Conditions in Panels',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 7 · §7.7 Conditions Found in Panels</span><h1>The hunt — what's actually wrong in this panel</h1>
 <p class=\"lead\">This is where the job gets real. With the dead-front off, you're scanning a crowded box for a long list of specific conditions. They group into six families: things that apply to any panel, things specific to subpanels, to fuses, to breakers, and to the wires inside. Learn the families and the hunt gets organized instead of overwhelming.</p>
 <p>Start with the scene below — open the panel and find every condition before you read the lists. This is the exact visual scan you'll run on site.</p>
 ${W('spot','panel')}
 <h2>Conditions in any panel</h2>
 ${conds('Applies to all panels', [['Loose mounting','The panel should be firmly fixed; movement stresses every connection.'],['Rust or water','Moisture corrodes terminals and is a shock hazard; trace the source.'],['Damaged components','Cracked breakers, broken buses, burned insulation.'],['Overheating','Discoloration, melted plastic, or a hot-plastic smell — act on it immediately.'],['Unprotected openings','Missing dead-front, missing knockout fillers, open breaker slots.'],['Double-tapped terminals','Two conductors under one lug not listed for two — a loose, overheating joint. Pigtail to fix.'],['Improper or loose wire connections','Stray strands, under-torqued lugs, wrong terminals.'],['Abandoned wires in the panel','You can\'t tell if they\'re live — they should be removed.'],['Too many conductors / panel overfilled','More circuits crammed in than the panel is designed for.']])}
 <h2>Subpanel-specific, fuse-specific, breaker-specific</h2>
 ${conds('Subpanels', [['Neutral and ground bonded in the subpanel','Should be separated; bonding belongs at the service box only.'],['Bonding screw left in','Ties the neutral bus to the enclosure where it shouldn\'t be.'],['No equipment ground run to the subpanel','A three-wire feed where four is needed.']])}
 ${conds('Fuses', [['Oversized / wrong-rated fuse','Overfusing — the wire overheats before the fuse blows.'],['Bridged or defeated fuse','A coin behind a fuse, or a bypass — extremely dangerous, removes all protection.'],['Corroded or loose fuse contacts','Overheating at the holder.']])}
 ${conds('Breakers', [['Wrong-brand breaker in the panel','A breaker not listed for that panel may not seat or trip correctly.'],['Double-tapped breaker','Two wires on a breaker built for one.'],['Oversized breaker','Larger than the conductor allows — overfusing.'],['Loose or unsecured breaker','Not properly clipped to the bus.']])}
 <h2>And the panel wires themselves</h2>
 ${conds('Panel conductors', [['Overheated or discolored','Often at a loose lug.'],['Undersized for the breaker','The wrong end of the wire-to-breaker pairing.'],['Damaged insulation','Nicks at terminations or where pulled over edges.'],['Sheathing run too far in, or stripped too far back','Cable jacket should enter the box a short, correct distance.'],['Conductors not secured / cable not clamped','Strain transfers to the terminals.']])}
 <p>One more field skill: <b>reading fuse color at a glance</b>. The cartridge and plug-fuse colors map to amperage, and knowing them saves you squinting at fine print. Pair them up:</p>
 ${W('match','fuse')}`,
 quiz:[
  {q:'A coin found behind a blown fuse is:',o:['A clever temporary fix','Extremely dangerous — it defeats all overcurrent protection on that circuit','Acceptable if the coin is copper','Only a problem on 240 V circuits'],a:1,e:'Bridging a fuse removes its protection entirely; the circuit can overheat with nothing to stop it. Report it as a serious hazard.'},
  {q:'A neutral and a grounding conductor bonded together inside a subpanel is:',o:['Correct and required','A defect — bonding belongs only at the service box','Required only outdoors','Harmless'],a:1,e:'Bonding happens at exactly one place, the service box. In a subpanel they must be on separate isolated buses.'},
  {q:'A double-tapped breaker is:',o:['Two breakers stacked together','Two conductors under one breaker terminal built for a single wire','A breaker rated for 240 V','A GFCI breaker'],a:1,e:'Two wires under a single-rated lug make a loose, overheating connection. The fix is to pigtail or use a breaker listed for two.'},
  {q:'Installing a breaker of a different brand than the panel is a concern because:',o:['It voids the paint warranty','It may not seat or trip correctly in that panel','It\'s always a 30 A breaker','It changes the service size'],a:1,e:'Breakers are listed for specific panels; a mismatched breaker may not make proper contact or trip as designed.'},
  {q:'Abandoned wires left in a panel should be:',o:['Taped and left in place','Removed — you can\'t verify whether they\'re live','Connected to the nearest breaker','Bonded to the neutral'],a:1,e:'An abandoned conductor of unknown status is a hazard; it should be removed from the panel.'},
 ]},
{id:'l8',kind:'Lesson 8',label:'Branch-Circuit Wiring',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 8 · §7.8 Branch-Circuit Wiring</span><h1>The wiring that fans out through the house</h1>
 <p class=\"lead\">Branch circuits are the conductors running from the panel out to every light, outlet, and appliance. Most of what you'll see is cable — grouped conductors in a single sheath — and the first skill is recognizing the type and roughly when it was installed, because age tells you what problems to expect.</p>
 <h2>Cable types you'll identify</h2>
 ${conds('Know these on sight', [['NM cable (\"Romex\")','Plastic-sheathed cable for dry, protected interior locations — the modern standard. Hot, neutral, and a ground inside a flat or round plastic jacket.'],['UF cable','Underground feeder — a tougher sheath rated for damp and direct burial.'],['Armored cable (BX / AC)','Flexible spiral-metal jacket over the conductors; common in older homes and where mechanical protection is needed.'],['Conduit','Conductors pulled through metal or plastic tube — used where wiring is exposed or extra protection is required.']])}
 <p>The era of the wiring is itself a finding. Tap through the timeline — it tells you at a glance whether to expect no ground, cloth insulation, aluminum, or modern copper:</p>
 ${W('era','wire')}
 <h2>Now trace it</h2>
 <p>Follow a run through an unfinished basement and click the problems. Damaged sheath, unsupported cable, open splices, missing connectors — this is the scan.</p>
 ${W('spot','branch')}
 <h2>The conditions — fifteen of them</h2>
 ${conds('Branch-wiring conditions and why they matter', [['Undersized conductor for the breaker','The wire can overheat before the breaker trips.'],['Overfused circuit','The same problem from the breaker\'s side — protection too large for the wire.'],['Damaged insulation','Nicks, cracks, rodent damage, or heat damage expose conductors.'],['Open splices outside a box','Every connection must be inside an accessible junction box, never buried in a wall or ceiling.'],['Splices made improperly','Loose twists, no connectors, or taped-only joints.'],['Cable not secured / not stapled','Cable should be stapled near boxes and supported along its run so strain stays off terminations.'],['Run through framing without protection','Where cable passes through studs near the face, a nail plate must guard it from screws and nails.'],['Too close to heat or plumbing','Contact with flues, hot pipes, or sharp metal degrades the cable.'],['Missing connectors at boxes','Cable entering a box without a clamp chafes on the metal edge.'],['Conductors exposed in living space','Branch wiring run on the surface where it can be damaged should be protected.'],['Wrong cable type for the location','NM used where moisture or burial demands UF, for example.'],['Abandoned cable left energized','Dead-ended runs of unknown status.']])}
 ${story('Inspector in the House', 'In one finished basement the receptacles barely ran a phone charger and a lamp dimmed when the furnace kicked on. Behind the cover plate the \"branch wiring\" turned out to be light-gauge bell-and-telephone wire someone had pressed into service for 120-volt outlets. It looked like wiring and worked just enough to fool a buyer. The lesson: don\'t assume the conductor is what it should be — when outlets behave oddly, look at what\'s actually feeding them, and report undersized or improvised wiring plainly.')}`,
 quiz:[
  {q:'NM cable (\"Romex\") is intended for:',o:['Direct burial in soil','Dry, protected interior locations','Submerged use','High-temperature flue penetrations'],a:1,e:'NM is the plastic-sheathed cable for dry interior runs. Damp or buried locations call for UF; mechanical protection may call for armored cable or conduit.'},
  {q:'Electrical splices must be:',o:['Buried in the wall for a clean look','Made inside an accessible junction box','Wrapped in tape and left in the ceiling','Soldered only'],a:1,e:'Every splice must be in an accessible box — open splices hidden in walls or ceilings are a defect and a fire risk.'},
  {q:'Where cable passes through a stud close to the face, you should find:',o:['Nothing extra is needed','A nail plate protecting it from screws and nails','The cable doubled','A fuse'],a:1,e:'A metal nail plate guards the cable where a future fastener could pierce it.'},
  {q:'Outlets that barely power small loads and cause lights to dim suggest:',o:['A perfectly normal circuit','Possibly undersized or improvised conductors feeding them — investigate','A 240 V circuit','Too many GFIs'],a:1,e:'Odd outlet behavior is a cue to look at what\'s actually feeding them; improvised or undersized wire is a real and reportable finding.'},
  {q:'A cable entering a metal box without a connector or clamp is a problem because:',o:['It looks untidy','The sheath and conductors chafe on the sharp box edge and strain isn\'t relieved','It changes the voltage','Connectors are only decorative'],a:1,e:'The clamp protects the cable from the metal edge and keeps strain off the terminations.'},
 ]},
{id:'l9',kind:'Lesson 9',label:'Knob-and-Tube & Aluminum',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 9 · §7.8 Older Wiring Systems</span><h1>Two legacy systems that need a careful eye</h1>
 <p class=\"lead\">Two wiring types deserve their own lesson because they're widely misunderstood and easy to mishandle in a report — one from the early 20th century, one from a specific window in the 1960s and 70s. Neither is automatically a disaster, and overstating them is as much a mistake as missing them.</p>
 <h2>Knob-and-tube</h2>
 <p>Installed roughly <b>1920–1950</b>, knob-and-tube runs the hot and neutral as <b>two separate conductors</b>, held off the framing by porcelain <b>knobs</b> and passed through joists in porcelain <b>tubes</b>. Spacing the conductors apart and away from wood was the safety design — and there is <b>no equipment ground</b>, so it predates modern grounding entirely. Undisturbed and intact, it can still function; the trouble is almost always what has happened to it since.</p>
 ${conds('Knob-and-tube conditions', [['Buried in thermal insulation','The original design relied on open air to shed heat. Pack insulation around it and heat can build — the central controversy with K&T. Note it and recommend evaluation.'],['Amateur modifications and extensions','Decades of splices and add-ons, often ungrounded and improperly joined.'],['Brittle or deteriorated insulation','The conductor insulation ages, cracks, and falls away, exposing bare wire.'],['Compromised connections','Loose or corroded original splices.']])}
 <div class=\"field\"><div class=\"ic\">${sv(ic.flag)}</div><div><div class=\"t\">How to report K&T without overstating</div><p>Don\'t declare it unsafe on sight. Report that the home has knob-and-tube, that it lacks an equipment ground, and that any portions <b>buried in insulation, modified, or deteriorated</b> warrant evaluation by an electrician. Insurers often have their own position — let the client know it may affect coverage.</p></div></div>
 <h2>Aluminum branch wiring</h2>
 <p>For a window of roughly <b>1965–1973</b>, single-strand <b>aluminum</b> was widely used for ordinary 15- and 20-amp branch circuits. The aluminum itself isn't the hazard — the <b>terminations</b> are. Aluminum expands and contracts more than copper, can <b>creep</b> out from under a screw over years of heating and cooling, and oxidizes into a resistive film; at devices not designed for it, the connection loosens and overheats. The receptacle is the worst spot.</p>
 ${conds('Aluminum branch-wiring conditions', [['Terminated on devices not rated for aluminum','Standard devices loosen and overheat. Devices must be marked CO/ALR (receptacles/switches) or the connection corrected.'],['Signs of overheating at terminations','Discoloration, warmth, or the smell of hot plastic at outlets and switches.'],['Improper \"repairs\"','Aluminum pigtailed to copper with ordinary wire nuts not listed for the joint — itself a failure point. The accepted fixes are listed connectors (such as COPALUM or AlumiConn) or CO/ALR devices.']])}
 <p>One key distinction so you don't over-call it: aluminum is perfectly normal and acceptable for <b>service-entrance conductors and large 240-volt feeders</b> (those are multi-strand). The concern is specifically <b>single-strand aluminum on small branch circuits.</b> Match aluminum gauges to their devices — note they run one size larger than copper for the same job:</p>
 ${W('match','alwire')}`,
 quiz:[
  {q:'Knob-and-tube wiring is best characterized by:',o:['A modern equipment ground','Two separate conductors on porcelain supports, with no equipment ground','Aluminum conductors','A plastic outer sheath'],a:1,e:'K&T spaces a separate hot and neutral on knobs and through tubes, and has no ground — it predates modern grounding.'},
  {q:'The central concern with knob-and-tube buried in insulation is:',o:['It looks dated','The design relied on open air to dissipate heat, so buried runs can overheat','Insulation causes short circuits','The porcelain melts'],a:1,e:'K&T was designed to shed heat into open air; packing insulation around it can let heat build up. Report it for evaluation.'},
  {q:'With aluminum branch wiring, the actual hazard is at:',o:['The middle of the wire runs','The terminations, which loosen and overheat over time','The panel bus only','The neutral bar'],a:1,e:'Aluminum creeps and oxidizes at connections; on devices not rated for it, the joint loosens and overheats. Receptacles are the worst spot.'},
  {q:'A receptacle suitable for direct connection to aluminum branch wire is marked:',o:['GFCI','CO/ALR','NM','UFER'],a:1,e:'CO/ALR-marked devices are listed for aluminum. Otherwise the accepted fixes are listed connectors like COPALUM or AlumiConn.'},
  {q:'Single-strand aluminum branch wiring was most common during which window?',o:['1920–1950','Roughly 1965–1973','1990s','Today'],a:1,e:'Roughly 1965–1973. Note that multi-strand aluminum remains fine for service-entrance conductors and large 240 V feeders.'},
 ]},
{id:'l10',kind:'Lesson 10',label:'Devices & Smoke Detectors',type:'lesson',
 body:()=>`<span class=\"eyebrow\">Lesson 10 · §7.9–7.10 Devices &amp; Detectors</span><h1>The parts your client actually touches</h1>
 <p class=\"lead\">Lights, receptacles, switches, junction boxes, GFIs, and smoke detectors — the visible end of the system, and the part homeowners interact with daily. Two big ideas anchor this lesson: how a GFI actually protects people, and what the Standards ask of you on smoke detectors.</p>
 <p>Begin with the scan — a kitchen wall with several device problems above the counter. Click each one.</p>
 ${W('spot','recep')}
 <h2>The conditions, by device</h2>
 ${conds('Lights', [['Missing or damaged fixtures','Open lampholders, broken lenses, hanging fixtures.'],['Open boxes / missing covers','Live connections exposed.'],['Improper closet fixtures','Too close to combustible storage — clearance matters.'],['Recessed cans in insulation without an IC rating','A non-IC can buried in insulation is a fire risk.'],['Inoperative on test','Report fixtures that don\'t respond.']])}
 ${conds('Receptacles', [['Open ground','No equipment ground present at a three-prong outlet — a false sense of safety.'],['Reversed polarity','Hot and neutral swapped — energizes parts that should be neutral.'],['No GFI where required','Missing protection near water or grade (see below).'],['Wrong type for the circuit','A 20-amp receptacle on a 15-amp circuit, for instance — check the wire gauge.'],['Loose, damaged, or painted-over','Worn contacts, broken faces, painted slots.'],['Open or missing box','Connections must be enclosed.']])}
 ${conds('Switches & junction boxes', [['Inoperative or no cover plate','Exposed terminals.'],['Overheating switch','Discoloration or warmth.'],['Open splices outside a box','Every joint belongs in an accessible box.'],['Overfilled or buried junction box','Boxes must stay accessible and not overcrowded.']])}
 <h2>How a GFI actually works — and why it isn't a breaker</h2>
 <p>A <b>GFI</b> is a receptacle with ground-fault protection; a <b>GFCI</b> is the breaker-mounted version that protects the whole circuit. It works by comparing the current going out the hot to the current coming back on the neutral. In a healthy circuit those are equal. If even a small amount — about <b>5 milliamps</b> — leaks off somewhere else (say, through a person to ground), the GFI senses the imbalance and cuts power in milliseconds. Run the simulator and introduce a fault to see it:</p>
 ${W('gfi')}
 <div class=\"field brass\"><div class=\"ic\">${sv(ic.alert)}</div><div><div class=\"t\">A GFI doesn\'t replace a fuse — they catch different things</div><p>A fuse or breaker watches the <b>total</b> current and shuts off on an <b>overload or short</b>. A GFI watches the <b>balance</b> and shuts off on a <b>leak</b> too small to ever trip a breaker. You need both. One useful consequence: because a GFI senses imbalance rather than needing a ground, it can legitimately protect an <b>ungrounded</b> receptacle — labeled \"GFCI protected, no equipment ground.\"</p></div></div>
 <p><b>Where GFI protection is required:</b> close to grade or water — outdoors, bathrooms, kitchen counters, garages, unfinished basements, crawl spaces, and around pools and whirlpool baths.</p>
 ${story('Inspector in the House', 'A seller swore the garage outlets were \"dead\" and had written off the wiring. Before condemning anything I checked the bathroom and found a tripped GFI receptacle — the garage and exterior outlets were wired downstream of it. One reset button and everything came back to life. The lesson for clients: a single GFI often protects several outlets down the line, so a \"dead\" receptacle is frequently just a tripped GFI somewhere upstream, not a wiring failure.')}
 <h2>Smoke detectors</h2>
 <p>The Standards ask you to <b>report the absence</b> of smoke detectors; they don't require you to test them — and you should make clear to your client whether or not you did. Beyond the bare requirement, the sound advice to give: detectors on <b>every floor level</b> and <b>near all sleeping areas</b>, one near the kitchen, with <b>interconnection</b> being ideal (so one alarm sounds them all) though costly to retrofit. Stress that testing and maintenance of these devices is the homeowner's ongoing job.</p>`,
 quiz:[
  {q:'A GFI protects people by:',o:['Watching total current and tripping on an overload','Comparing current out vs. back and tripping on a small imbalance (a leak)','Grounding the neutral','Boosting the voltage'],a:1,e:'It senses a ~5 mA imbalance between hot and neutral — current leaking off elsewhere — and cuts power in milliseconds. That\'s a different job than a breaker.'},
  {q:'Why do you still need fuses or breakers on a GFCI-protected circuit?',o:['You don\'t — the GFCI replaces them','GFIs catch leaks but not overloads or shorts; breakers handle those','To make the GFI reset','For 240 V only'],a:1,e:'A GFI watches balance and catches leaks; a breaker watches total current and catches overloads and shorts. They protect against different failures.'},
  {q:'A GFI can legitimately be used on an ungrounded receptacle because:',o:['It creates a ground','It senses imbalance and doesn\'t require a ground to function','It lowers the amperage','Ungrounded outlets are illegal'],a:1,e:'Because it works on imbalance rather than a ground path, a GFI can protect an ungrounded outlet — labeled \"GFCI protected, no equipment ground.\"'},
  {q:'A client reports several \"dead\" garage and exterior outlets. A likely first check is:',o:['Replace the whole circuit','Look for a tripped GFI upstream (e.g., in a bathroom) protecting those outlets','Add a larger breaker','Bond the gas line'],a:1,e:'One GFI often protects several downstream outlets; a tripped GFI elsewhere commonly explains a string of \"dead\" receptacles.'},
  {q:'Regarding smoke detectors, the Standards require you to:',o:['Test every detector','Report the absence of smoke detectors','Replace missing detectors','Certify the alarm system'],a:1,e:'You must report their absence, not test them — and you should tell the client whether you tested. Best-practice advice: one per floor, near sleeping areas, interconnected if possible.'},
 ]},
