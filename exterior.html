<!-- ATI · Module I · Exterior & Site — full interactive section -->
<title>ATI · Module I — Exterior &amp; Site</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

/* ================= ENGINE ================= */
const KEY='ati_exterior_ix_v1';
let S={done:{},quiz:{},assessBest:0,cur:0};
async function load(){try{const r=await window.storage.get(KEY,false);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}S.done=S.done||{};S.quiz=S.quiz||{};}
async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>window.__previewAll||i===0||stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}
function rail(){document.getElementById('rail').innerHTML=STEPS.map((s,i)=>{const d=stepDone(i),u=unlocked(i),a=i===S.cur;return `<button class="step ${d?'done':''} ${a?'active':''} ${u?'':'locked'}" ${u?`onclick="goStep(${i})"`:''}><span class="dot">${d?sv(ic.check,3):(i+1)}</span><span class="lbl">${s.label}<span class="kind">${s.kind}</span></span></button>`;}).join('');}
function goStep(i){if(!unlocked(i))return;S.cur=i;save();render();window.scrollTo({top:0,behavior:'smooth'});}
function markDoneAndNext(){S.done[STEPS[S.cur].id]=true;save();updTop();rail();if(S.cur<STEPS.length-1)goStep(S.cur+1);else render();}
function render(){updTop();rail();const s=STEPS[S.cur];({lesson:renderLesson,scenario:renderScenarios,assess:renderAssess,glossary:renderGlossary,source:renderSource}[s.type])(s);}
function navFoot(label,gated){const last=S.cur===STEPS.length-1;return `<div class="foot">${S.cur>0?`<button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button>`:''}<div class="sp"></div><button class="btn brass" id="nextBtn" ${gated?'disabled':''} onclick="markDoneAndNext()">${label||(last?'Finish section':'Mark complete & continue')} ${sv(ic.arrow)}</button></div>`;}

function renderLesson(s){
  let h=(typeof s.body==='function'?s.body():s.body);
  if(s.quiz&&s.quiz.length){
    h+=`<div class="quiz"><div class="qh">${sv(ic.brain)} Check your understanding</div><div class="qt">${s.label}</div><div class="qsub">${s.quiz.length} questions covering the lesson — answer each to see the reasoning.</div><div class="qbody">${
      s.quiz.map((q,qi)=>`<div class="qblock"><div class="qnum">Question ${qi+1} of ${s.quiz.length}</div><div class="q">${q.q}</div><div class="opts" data-qi="${qi}">${q.o.map((o,k)=>`<button class="opt" onclick="qAns(${qi},${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="qexp" data-qi="${qi}"></div></div>`).join('')
    }</div><div class="qscore" style="display:none"></div></div>`;
  }
  const gated=!window.__previewAll&&!!(s.quiz&&s.quiz.length&&!S.quiz[s.id]);
  view.innerHTML=h+navFoot(null,gated);
  wireWidgets(view);
  window._ql={answered:{},total:s.quiz?s.quiz.length:0};
}
function qAns(qi,k){const s=STEPS[S.cur],q=s.quiz[qi];if(window._ql.answered[qi]!==undefined)return;window._ql.answered[qi]=k;
  const opts=view.querySelector('.opts[data-qi="'+qi+'"]');opts.querySelectorAll('.opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});
  view.querySelector('.qexp[data-qi="'+qi+'"]').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;
  if(Object.keys(window._ql.answered).length===window._ql.total){
    const right=s.quiz.filter((q,i)=>window._ql.answered[i]===q.a).length,sc=view.querySelector('.qscore');sc.style.display='flex';
    sc.innerHTML=`${sv(ic.check,2.4)}<span>You scored <b style="color:${right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)'}">${right}/${s.quiz.length}</b> on this lesson.</span>`;
    sc.querySelector('svg').style.color=right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)';
    S.quiz[s.id]=true;save();const b=document.getElementById('nextBtn');if(b)b.disabled=false;}
}

function asAns(k){if(AS.answers[AS.i]!==undefined)return;AS.answers[AS.i]=k;const q=ASSESS[AS.i];view.querySelectorAll('.opts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.asexp').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;const last=AS.i===ASSESS.length-1;view.querySelector('.asnext').innerHTML=`<button class="btn brass" onclick="${last?'asFinish()':'asNext()'}">${last?'See results':'Next'} ${sv(ic.arrow)}</button>`;}

function asFinish(){const correct=AS.answers.filter((a,i)=>a===ASSESS[i].a).length,p=Math.round(correct/ASSESS.length*100),pass=p>=80;S.assessBest=Math.max(S.assessBest||0,p);AS.done=true;if(pass)S.done['assess']=true;save();updTop();rail();const circ=2*Math.PI*62;
  view.innerHTML=`<span class="eyebrow">Assessment · Result</span><h1 style="margin-bottom:18px">${pass?'Section mastered':'Not quite there'}</h1><div class="panelcard"><div class="ring"><svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="62" fill="none" stroke="var(--surf-3)" stroke-width="11"/><circle cx="75" cy="75" r="62" fill="none" stroke="${pass?'var(--pass)':'var(--fail)'}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"><animate attributeName="stroke-dashoffset" from="${circ}" to="${circ-circ*p/100}" dur=".8s" fill="freeze" calcMode="spline" keySplines=".2 .7 .2 1"/></circle></svg><div class="rv"><div><div class="n" style="color:${pass?'var(--pass)':'var(--fail)'}">${p}%</div><div class="p">${correct}/${ASSESS.length} correct</div></div></div></div><span class="verdict ${pass?'pass':'fail'}">${pass?'Passed':'Below 80%'}</span><p>${pass?'You\'ve mastered Exterior &amp; Site — that read of cladding, water management, and walking-surface safety is the first thing you size up on every property you inspect.':'You need 80% to pass. Revisit the lessons and explanations, then retake — your best score counts.'}</p><div style="display:flex;gap:12px;justify-content:center"><button class="btn ghost" onclick="asStart()">${sv(ic.retake)} Retake</button>${pass?`<button class="btn brass" onclick="goStep(${STEPS.length-1})">Continue ${sv(ic.arrow)}</button>`:`<button class="btn brass" onclick="goStep(1)">Review lessons ${sv(ic.arrow)}</button>`}</div></div><div style="height:30px"></div>`;}

function renderGlossary(){view.innerHTML=`<span class="eyebrow">Reference</span><h1>Exterior &amp; Site glossary</h1><p class="lead">Every key term in one place — quick reference for a real inspection.</p><div class="gloss" style="margin-top:20px">${GLOSSARY.map(([w,d])=>`<div class="term"><div class="tw">${w}</div><div class="td">${d}</div></div>`).join('')}</div>${navFoot('Continue')}`;}
function renderSource(){view.innerHTML=`<span class="eyebrow">Reference · wrap-up</span><h1>Reference &amp; summary</h1><p class="lead">Everything required is taught in the lessons above. This is the one-screen recap to carry into the field — the way water moves around a building, the cladding read, and the walking-surface safety calls.</p><div class="srcnote">${sv(ic.book,2)} Built on the Exterior &amp; Site chapters of the TREC Standards of Practice and <i>Principles of Home Inspection: Systems and Standards</i>. There's no separate PDF for this system — the interactive lessons are the complete reference.</div><div class="gloss" style="margin-top:18px"><div class="term"><div class="tw">1 · Cladding &amp; trim — keep the wall dry</div><div class="td">Every system manages water differently. Brick/stone veneer needs weep holes and lintels; fiber-cement and wood need gaps and caulked joints; EIFS needs drainage and intact sealant. Report damage, missing weeps, and trapped moisture.</div></div><div class="term"><div class="tw">2 · Doors &amp; windows — flash, seal, operate</div><div class="td">Check operation, glazing, weatherstripping, and head flashing. Confirm bedroom egress sizing. Report unflashed openings, failed seals (fogged panes), and sticking or non-latching units.</div></div><div class="term"><div class="tw">3 · Grade &amp; drainage — move water away</div><div class="td">Positive slope away from the foundation (about 6 in over the first 10 ft), swales to redirect runoff, and downspouts that discharge well clear of the wall. Negative grade is the root cause of most foundation and basement complaints.</div></div><div class="term"><div class="tw">4 · Walking surfaces — find the safety defects</div><div class="td">Decks, porches, balconies, and stairs are where life-safety lives: unflashed or under-attached ledgers, missing or loose guardrails, balusters more than 4 inches apart, bad rise/run, and missing graspable handrails.</div></div><div class="term"><div class="tw">Flag, don't engineer</div><div class="td">You report deficiencies and their implications — you don't design the fix or specify the lag bolts. Call the unflashed ledger or the negative grade; recommend evaluation and correction by a qualified contractor.</div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><a class="btn slate" href="index.html" style="text-decoration:none;margin-right:10px">${sv(ic.back)} Module I</a><button class="btn brass" onclick="finishAll()">${sv(ic.check)} Complete section</button></div>`;}
function finishAll(){S.done['source']=true;save();updTop();rail();toast('Exterior & Site section complete');}

/* ================= DATA: scenarios / assessment / glossary ================= */
const SCEN=[
 {t:'Walking the walls',n:'Brick with no escape',s:'A brick-veneer home has crisp mortar joints, but along the entire bottom course — just above the foundation — there is not a single open head joint. You probe and the cavity behind feels damp.',ask:'What do you write up?',o:['Nothing — solid mortar is a sign of quality work','Missing weep holes: the drainage cavity behind brick veneer has no way to drain or breathe. Recommend evaluation and weeps installed at the base course.','Recommend repointing the whole wall','Recommend painting the brick to seal it'],a:1,e:'Brick veneer is a drainage wall, not a watertight one. Water gets behind it and must escape through weep holes (open head joints, every ~24–33 in) at the base and over openings. No weeps means trapped water, efflorescence, and eventual deterioration. You report the missing weeps and the damp cavity.'},
 {t:'Walking the walls',n:'The synthetic-stucco question',s:'A 1990s home is clad in stucco that sounds hollow when you tap it and has no visible weep screed at the base. Caulk at the windows is cracked, and the siding meets the grade with no clearance. A moisture meter spikes below several windows.',ask:'Your call?',o:['Cosmetic caulk repair and move on','Likely barrier EIFS (synthetic stucco). With failed sealant and no drainage, it is prone to hidden moisture intrusion and rot — recommend evaluation by an EIFS specialist with moisture testing.','Recommend a fresh coat of stucco over the top','It is real three-coat stucco — note hairline cracks only'],a:1,e:'Hollow sound and no weep screed point to EIFS over foam. Barrier (non-drainable) EIFS traps any water that gets past the cladding — typically at unsealed windows and penetrations — causing concealed rot you cannot see from outside. This is a known high-liability defect: flag it and refer to a specialist for invasive moisture testing.'},
 {t:'At the foundation',n:'Which way does it run?',s:'After a rain, you notice the soil along the back wall is darker and slightly sunken, and a downspout dumps right at the corner of the house onto that low spot. There is standing water against the foundation.',ask:'The primary recommendation?',o:['Add gutters to the front of the house','Negative grade plus a downspout discharging at the foundation is driving water against the wall. Recommend re-grading to a positive slope away from the house and extending the downspout to discharge well clear.','Seal the foundation crack from inside','Nothing — soil settles, that is normal'],a:1,e:'Water against a foundation is the number-one cause of basement leaks, crawlspace moisture, and differential settlement. The fix is to manage water at the surface: positive grade (roughly 6 in of fall over the first 10 ft) and downspouts extended to discharge several feet from the wall. Always the first, highest-value recommendation.'},
 {t:'On the deck',n:'Nailed to the house',s:'A second-story deck is fastened to the rim of the house with a neat row of nails through the ledger. There is no Z-flashing where the ledger meets the siding, and you see dark staining on the band joist below.',ask:'What is the concern?',o:['None — the nails look new and tight','A nailed, unflashed ledger is a top deck-collapse hazard: nails pull out under load and the unflashed joint rots the band joist. Recommend evaluation — proper lag/through-bolts and flashing.','Recommend more nails','Recommend painting the ledger'],a:1,e:'Ledger failure is the single most common cause of catastrophic deck collapses, and it is a life-safety defect. Ledgers must be lag-screwed or through-bolted to the structure (not nailed) and flashed so water cannot get behind them and rot the band joist. Nails plus no flashing plus staining is a clear, serious write-up.'},
 {t:'On the deck',n:'A gap you can pass a ball through',s:'A raised porch about 40 inches above grade has a guardrail, but the vertical balusters are spaced so a 4-inch ball passes between them easily, and when you push on the rail it flexes noticeably.',ask:'Your write-up?',o:['Fine — there is a guardrail present','Two defects: balusters spaced more than 4 inches apart (a child can pass through) and a loose, under-secured guardrail. Both are life-safety items — recommend correction.','Only note the loose rail; spacing is cosmetic','Recommend a higher rail and ignore the spacing'],a:1,e:'A guardrail is required where a walking surface is more than ~30 in above grade, must resist roughly 200 lb of lateral force, and must not allow a 4-inch sphere to pass between balusters (so a child cannot slip through or get a head stuck). Wide spacing and a loose rail are both reportable safety defects.'},
 {t:'On the stairs',n:'Uneven and nothing to hold',s:'Exterior stairs to a porch have risers that vary visibly in height — one is noticeably taller than the rest — and the only handrail is a flat 2×6 laid on top of the posts that you cannot wrap your hand around.',ask:'The call?',o:['Acceptable — there is a rail and steps','Inconsistent riser heights are a trip hazard and the flat-top rail is not graspable. Recommend uniform rise/run and a graspable handrail.','Only the rail matters; risers are fine','Recommend a ramp instead'],a:1,e:'Stairs need uniform rise and run (the variation between risers should be small — about 3/8 in max) because the foot expects the next step to match the last; an odd riser is a classic fall. A handrail must be graspable — a rounded profile or graspable shape — not a flat 2×6 you cannot close your hand around.'},
 {t:'At the lot',n:'The tree at the corner',s:'A large tree is growing about two feet from the foundation, its limbs rest on the roof, and one surface root has lifted the adjacent walkway into a raised lip you nearly trip on.',ask:'What do you note?',o:['Nothing — trees are landscaping, not your scope','Vegetation too close to the structure: limbs on the roof abrade shingles and trap moisture, roots threaten the foundation and have heaved the walkway into a trip hazard. Recommend trimming and evaluation.','Recommend removing the tree immediately','Only note the walkway; the tree is fine'],a:1,e:'Trees and shrubs against a building are within the exterior inspection: overhanging limbs damage roofing and hold moisture against the wall, and roots can damage foundations, walks, and drains. The heaved walkway is also a trip hazard. You report the conditions and recommend trimming back and professional evaluation — you do not decide whether the tree must come down.'},
];
const ASSESS=[
 {q:'The home inspector\'s job on the exterior and site is to:',o:['Certify the cladding meets the building code','Observe accessible conditions, recognize deficiencies, and report the implications','Repair the damaged siding and re-grade the lot','Calculate the property\'s drainage capacity'],a:1,e:'You observe and report — water management, cladding condition, and walking-surface safety — you don\'t certify, repair, or engineer.'},
 {q:'Weep holes in a brick-veneer wall exist to:',o:['Ventilate the attic','Let water that gets into the drainage cavity drain back out at the base and over openings','Hold the brick to the framing','Reduce the brick\'s weight'],a:1,e:'Brick veneer is a drainage wall: water passes the brick, runs down the back of the cavity, and must escape through weep holes (open head joints) at the base course and above lintels. Missing weeps trap water.'},
 {q:'A lintel above a brick-veneer window or door is:',o:['A decorative trim band','The steel or masonry beam that carries the brick over the opening','The caulk joint at the sill','The weep hole spacing'],a:1,e:'The lintel spans the opening and supports the brick above it. Inspect for rust, sagging, and the flashing/weeps that should sit above it.'},
 {q:'The biggest inspection concern specific to EIFS (synthetic stucco) is:',o:['It fades in sunlight','Barrier (non-drainable) systems can trap water behind them, causing hidden rot — especially at unsealed windows and penetrations','It is too heavy for wood framing','It cannot be painted'],a:1,e:'Barrier EIFS has no drainage path, so any water that gets past failed sealant or flashing is trapped against the sheathing and framing, rotting them out of sight. It is a known high-liability defect — recommend specialist moisture testing.'},
 {q:'Fiber-cement siding (e.g., HardiePlank) should be inspected for:',o:['Rust spots and galvanic corrosion','Cracked or chipped boards, missing paint, tight butt joints, and contact with the grade','Loose mortar joints','Open weep holes'],a:1,e:'Fiber-cement is durable but brittle: look for cracks/chips, failed paint (it must stay sealed), butt joints that need gaps/caulk or flashing, and ground contact that wicks moisture.'},
 {q:'Proper grading slopes the soil:',o:['Toward the foundation to feed the footing drains','Away from the foundation — about 6 inches of fall over the first 10 feet','Level, so water sits evenly','Whichever way the lot already runs'],a:1,e:'Positive slope away from the house — roughly 6 in over the first 10 ft — sheds surface water before it reaches the foundation. This single item prevents most basement and crawlspace moisture complaints.'},
 {q:'A swale is:',o:['A type of downspout','A shallow drainage channel shaped into the grade to redirect surface water','A flashing detail at the deck ledger','A crack-monitoring gauge'],a:1,e:'A swale is a graded low channel that carries runoff around or away from the structure — a key site-drainage feature where the lot slopes toward the house.'},
 {q:'A downspout that discharges right at the foundation should be reported because:',o:['It looks unattractive','It concentrates roof water against the foundation — recommend extensions to discharge well clear','It will freeze in winter','It wastes rainwater'],a:1,e:'Roof water dumped at the base saturates the soil against the foundation, driving leaks and settlement. Downspouts should discharge through extensions several feet from the wall, onto positive grade.'},
 {q:'The most common cause of catastrophic deck collapse is:',o:['Rotten decking boards','Failure of the ledger connection — nailed or under-attached and unflashed','Undersized handrails','Too many people on the deck'],a:1,e:'The ledger ties the deck to the house. Nailed (rather than lag/through-bolted) and unflashed ledgers pull free and rot the band joist — the leading deck-collapse defect and a clear life-safety call.'},
 {q:'A deck ledger should be:',o:['Nailed and caulked','Lag-screwed or through-bolted to the structure and flashed to keep water out','Set in mortar','Attached with construction adhesive'],a:1,e:'Ledgers must be mechanically fastened with lags or bolts (not nails) and flashed so water can\'t get behind them and rot the band joist.'},
 {q:'Joist hangers and post-to-beam connectors on a deck are checked for:',o:['Color match with the deck','Presence, correct/approved hardware, proper fasteners, and corrosion','The brand name','Whether they are painted'],a:1,e:'Positive metal connections (hangers, post caps, hold-downs) and approved fasteners carry the load. Missing connectors, wrong/toenailed fasteners, and corrosion are reportable.'},
 {q:'A guardrail is generally required where a walking surface is more than about:',o:['12 inches above grade','30 inches above the surface below','6 feet above grade','It is never required outdoors'],a:1,e:'Guards are required where a walking surface is roughly 30 in or more above the adjacent grade or floor, to prevent falls.'},
 {q:'Guardrail balusters must be spaced so that:',o:['A 6-inch sphere cannot pass between them','A 4-inch sphere cannot pass between them','They are exactly 6 inches apart','Spacing does not matter'],a:1,e:'The 4-inch sphere rule: openings in a guard must not allow a 4-inch ball to pass, so a small child cannot slip through or get a head trapped.'},
 {q:'Exterior stairs are reported as a hazard when:',o:['They have a landing','Riser heights or tread depths vary noticeably (uneven rise/run)','They are made of wood','They have more than three steps'],a:1,e:'The foot expects each step to match the last; uneven rise/run is a classic trip-and-fall hazard. Variation should be small (about 3/8 in max between risers).'},
 {q:'A graspable handrail means:',o:['Any rail at least 30 inches tall','A rounded or graspable profile your hand can close around — not a flat-topped 2×6','A rail painted a bright color','A rail with balusters below it'],a:1,e:'A handrail must be graspable (a rounded or otherwise hand-fitting shape) and continuous so a person can hold on while descending. A flat board you can\'t wrap your hand around is not graspable.'},
 {q:'A bedroom window must meet egress requirements, meaning it:',o:['Must be double-glazed','Must be openable to provide an emergency escape and rescue opening of adequate size and reachable height','Must have a screen','Must face the street'],a:1,e:'Sleeping rooms need an egress opening large enough and low enough to climb out (or for a firefighter to enter). A bedroom window that is painted shut, too small, or too high is a reportable life-safety concern.'},
 {q:'Vegetation and trees growing against the structure are reported because:',o:['They are outside the inspector\'s scope','Limbs abrade roofing and trap moisture, and roots can damage foundations, walks, and drains','They lower the property value','They block the view'],a:1,e:'Plantings touching the building hold moisture against cladding and roofing and invite pests; roots threaten foundations and heave walkways. Recommend trimming back and evaluation — the inspector doesn\'t decide removal.'},
];
const GLOSSARY=[
 ['Cladding','The exterior wall covering — brick or stone veneer, fiber-cement, wood/hardboard, vinyl, stucco, or EIFS — that sheds water and protects the structure.'],
 ['Brick / stone veneer','A single, non-structural masonry skin over a framed wall, separated by a drainage cavity; relies on weep holes, flashing, and lintels to manage water.'],
 ['Weep hole','An open head joint (or insert) at the base of veneer and above openings that drains the cavity behind the masonry; missing weeps trap water.'],
 ['Lintel','The steel angle or masonry beam carrying brick/stone over a window or door opening; inspect for rust, sag, and the flashing/weeps above it.'],
 ['Fiber-cement siding','Durable but brittle cement-and-fiber board (e.g., HardiePlank); inspect for cracks, chips, failed paint, joint sealing, and ground contact.'],
 ['Wood / hardboard siding','Solid wood, plywood, or pressed hardboard cladding; prone to rot, swelling, and paint failure where water sits — check bottoms, joints, and ground clearance.'],
 ['Vinyl siding','Interlocking plastic panels hung loosely to expand; inspect for cracks, melting near grills, loose courses, and the moisture barrier behind.'],
 ['Stucco (three-coat)','Traditional cement plaster over lath; hard and water-shedding. Inspect for cracks, delamination, staining, and a proper weep screed at the base.'],
 ['EIFS / synthetic stucco','An exterior insulation and finish system: foam board with a thin synthetic coat. Barrier (non-drainable) versions can trap water and rot the wall — a high-liability defect.'],
 ['Weep screed','A metal flashing at the base of stucco/EIFS that lets trapped water drain out above grade; absence is a red flag for hidden moisture.'],
 ['Soffit','The underside of the roof overhang/eave; inspect for rot, staining, pest entry, and (where present) ventilation openings.'],
 ['Fascia','The vertical trim board at the eave that the gutters attach to; check for rot, peeling paint, and loose sections.'],
 ['Flashing','Sheet material that directs water away from a joint — at deck ledgers, window/door heads, and roof-to-wall transitions; missing flashing is a leak path.'],
 ['Weatherstripping','The seal around an operable door or window that blocks air and water; check for missing, torn, or compressed material.'],
 ['Egress window','An openable bedroom window sized and positioned for emergency escape and rescue; must not be painted shut, too small, or too high.'],
 ['Caulk / sealant','Flexible joint filler at penetrations, trim, and openings; cracked or missing sealant lets water into the wall.'],
 ['Grading','The slope of the soil around the building; positive grade falls away from the foundation (about 6 in over the first 10 ft).'],
 ['Negative grade','Soil sloping toward the foundation, driving surface water against the wall — the root cause of most basement and crawlspace moisture.'],
 ['Swale','A shallow graded channel that redirects surface runoff around or away from the structure.'],
 ['Downspout extension','A pipe or splash block that carries roof water from the downspout several feet clear of the foundation.'],
 ['Deck ledger','The board fastening a deck to the house; must be lag-screwed or through-bolted (not nailed) and flashed — its failure is the top deck-collapse defect.'],
 ['Joist hanger','A metal bracket that supports a joist at the ledger or beam; inspect for presence, approved hardware, proper fasteners, and corrosion.'],
 ['Guardrail (guard)','A barrier at the open side of a raised walking surface (about 30 in or more high above grade) that prevents falls.'],
 ['Baluster','A vertical guardrail infill member; openings must reject a 4-inch sphere so a child cannot pass through.'],
 ['4-inch sphere rule','The guard-spacing standard: a 4-inch ball must not pass between balusters or below the rail.'],
 ['Handrail','A graspable rail along stairs your hand can close around; required and must be continuous and graspable — not a flat-top board.'],
 ['Rise / run','The height of each stair riser and the depth of each tread; must be uniform (about 3/8 in max variation) to be safe.'],
 ['Retaining wall','A structure that holds back a soil bank; inspect for leaning, bulging, cracking, and the presence of drainage (weeps) behind it.'],
 ['Trip hazard','An abrupt vertical change in a walkway, driveway, or patio (heave, settlement, lifted slab) that can cause a fall.'],
 ['Settlement','Downward movement of a slab, walk, or footing as soil consolidates; differential settlement cracks and tilts walking surfaces.'],
];
