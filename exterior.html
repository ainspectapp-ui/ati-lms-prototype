/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'The exterior read',type:'lesson',
 body:()=>`<span class="eyebrow">Exterior &amp; Site · Orientation</span><h1>The first thing you read on a house is the outside of it.</h1>
 <p class="lead">The exterior and site are where two stories meet: how the building <b>sheds water</b>, and where the most common <b>safety defects</b> hide — on decks, porches, and stairs. Your job isn't to certify the cladding or re-grade the lot. It's to <b>observe what's accessible, recognize what's deficient, and report the implication</b> so your client can decide.</p>
 <p>Almost everything out here comes back to one of two themes, and every finding in this section is really about one of them:</p>
 <ul class="num"><li><b>Water</b> — kept out of the wall by <em>cladding, flashing, and sealant</em>, and moved off the lot by <em>grade and drainage</em>.</li><li><b>Safety</b> — guardrails, baluster spacing, stair rise/run, handrails, and the deck connections that hold a structure together.</li></ul>
 <p>Keep those two jobs in mind and the whole exterior reads cleanly: a cracked caulk joint and a negative grade are both "water in the wrong place," while a loose guardrail and an unflashed ledger are both "someone could get hurt."</p>
 <p>Every component runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>What you'll inspect</h2>
 <ul class="clean"><li><b>Wall cladding</b> — brick/stone veneer, fiber-cement, wood, vinyl, stucco and EIFS</li><li><b>Trim, soffits &amp; fascia</b> — the edges where water and rot start</li><li><b>Doors &amp; windows</b> — flashing, operation, glazing, weatherstripping, egress</li><li><b>Grading &amp; drainage</b> — slope, swales, and downspout discharge</li><li><b>Walks, drives &amp; patios</b> — trip hazards and settlement</li><li><b>Decks, porches, balconies &amp; stairs</b> — the life-safety connections</li><li><b>Retaining walls &amp; vegetation</b> — site features that affect the structure</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Safety &amp; scope</div><p>The exterior is where you'll find the inspection's most serious <b>life-safety defects</b> — an unflashed deck ledger, a missing guardrail, balusters a child can slip through. You report what's <em>visible and accessible</em>, name the deficiency and its implication, and recommend evaluation — you don't design the repair or specify the hardware.</p></div></div>`,
 quiz:[
  {q:'The inspector\'s role on the exterior and site is to:',o:['Certify the cladding and the grading to code','Observe accessible conditions, recognize deficiencies, and report the implications','Repair damaged siding and re-grade the lot','Engineer the deck connections'],a:1,e:'Observe and report — water management and walking-surface safety. You don\'t certify, repair, or engineer.'},
  {q:'Most exterior findings come down to:',o:['Cosmetics and curb appeal','Two themes: keeping water out of the wall and off the lot, and walking-surface safety','Energy efficiency only','The age of the house'],a:1,e:'Water management (cladding, flashing, grade, drainage) and safety (decks, stairs, guards) organize nearly every exterior finding.'},
  {q:'Where do the most serious life-safety defects on a typical exterior tend to be?',o:['In the brick mortar joints','On decks, porches, balconies, and stairs — connections, guards, and rise/run','In the soffit vents','In the window glazing'],a:1,e:'Deck ledgers, guardrails, baluster spacing, and stair rise/run are the exterior\'s life-safety items — and the most consequential write-ups.'},
  {q:'When you find a serious defect like an unflashed deck ledger, you:',o:['Specify the exact bolts and flashing to install','Report the deficiency and its implication and recommend evaluation/correction by a qualified contractor','Repair it before leaving','Ignore it if the deck feels solid'],a:1,e:'You name the deficiency and the implication and refer it out. You don\'t design the fix or guarantee the structure.'},
 ]},

/* ===== L1 CLADDING OVERVIEW & MASONRY VENEER ===== */
{id:'l1',kind:'Lesson 1',label:'Cladding & Masonry Veneer',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · Reading the wall</span><h1>Cladding doesn't seal the wall — it drains it.</h1>
 <p class="lead">Here's the idea that organizes every cladding type: an exterior wall is not a watertight box. Water <em>will</em> get behind the covering, so the system has to <b>drain it back out</b>. Brick and stone veneer make that idea visible.</p>
 <h2>Brick &amp; stone veneer — a drainage wall</h2>
 <p>A brick "wall" on a modern house is usually a single, non-structural <b>veneer</b>: one wythe of masonry standing off the framing with an air gap behind it. Water that passes the brick runs down the back of that cavity and must escape — through <b>weep holes</b> (open head joints) at the <b>base course</b> and above every opening. Above each window and door, a <b>lintel</b> carries the brick, with flashing and weeps just above it.</p>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <!-- framing -->
     <rect x="120" y="30" width="60" height="190"/>${_mono(150,24,10,'framing','#3c5870')}
     <!-- air gap -->
     <line x1="190" y1="30" x2="190" y2="220" stroke-width="1" stroke-dasharray="4 3"/>${_mono(206,40,9,'cavity','#3c5870','start')}
     <!-- brick veneer -->
     <rect x="210" y="30" width="40" height="190"/>
     <g stroke-width="1">${Array.from({length:9},(_,i)=>`<line x1="210" y1="${50+i*20}" x2="250" y2="${50+i*20}"/>`).join('')}</g>
     ${_mono(230,24,10,'brick','#7f520a')}
     <!-- weep at base -->
     <rect x="222" y="206" width="6" height="10" fill="#fff" stroke="#3d7d50"/>${_mono(300,214,10,'weep hole — water escapes','#3d7d50','start')}
     <!-- flashing at base -->
     <path d="M180 206 L250 206" stroke="#7f520a" stroke-width="2.4"/>${_mono(300,200,9,'base flashing','#7f520a','start')}
   </g>
   <!-- water path down the cavity -->
   <path d="M200 50 Q 196 130 222 206" stroke="#5a7b97" stroke-width="2.2" fill="none"/><path d="M222 200 l4 7 l-8 1" fill="none" stroke="#5a7b97" stroke-width="2.2"/>
   ${_mono(420,120,10,'water drains down the cavity and out the weep','#5a7b97','start')}
 </svg><div class="cap">Brick veneer is a drainage wall: water gets behind the brick, runs down the cavity, and weeps out at the flashed base course.</div></div>
 <h2>What you write up on masonry veneer</h2>
 ${conds('',[['Missing weep holes','No open head joints at the base or over openings — the cavity can\'t drain. Expect efflorescence, spalling, and trapped moisture.'],['Lintel problems','Rusting, sagging, or unflashed steel lintels over windows and doors. Rust expands and lifts the brick.'],['Cracked / spalled / displaced brick','Stair-step cracks can signal foundation movement; spalling signals freeze-thaw or moisture. Note location and pattern.'],['Mortar deterioration','Crumbling or missing mortar (needs repointing) lets water in and weakens the wall.']])}
 ${W('match','clad')}
 ${story('Inspector in the house',`A buyer loved the "solid brick" on a 1970s ranch and was sure it was bulletproof. But the entire base course was tooled tight — not one weep — and the bottom of the wall was streaked with white efflorescence. **That tight mortar wasn't quality; it was a trap.** You don't repoint it on the spot — you report the missing weeps, the salt staining, and the implication: trapped water in the cavity.`)}`,
 quiz:[
  {q:'A modern brick wall on a framed house is usually:',o:['Structural — it holds up the house','A non-structural veneer with a drainage cavity behind it','Solid through-wall masonry','Decorative foam'],a:1,e:'It\'s a single masonry skin standing off the framing. The cavity behind it drains water — which is why weep holes matter.'},
  {q:'Weep holes belong:',o:['At the top of the wall only','At the base course and above openings, to drain the cavity','Only behind the framing','Nowhere — brick is watertight'],a:1,e:'Open head joints at the base and over lintels let cavity water escape. Missing weeps trap water.'},
  {q:'A rusting steel lintel over a brick window opening matters because:',o:['It only looks bad','Rust expands, lifting and cracking the masonry above','Lintels don\'t carry load','It improves drainage'],a:1,e:'The lintel carries the brick over the opening. Corrosion expands the steel, jacks the masonry, and needs evaluation.'},
  {q:'White, powdery staining at the base of a brick wall (efflorescence) indicates:',o:['Normal new brick','Water is moving through the masonry, leaving mineral salts behind','A paint failure','Insect activity'],a:1,e:'Efflorescence is mineral salt left by water passing through the wall — a sign of moisture, often paired with missing weeps or poor drainage.'},
 ]},

/* ===== L2 SIDING SYSTEMS ===== */
{id:'l2',kind:'Lesson 2',label:'Siding: Fiber-Cement, Wood & Vinyl',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · The lighter claddings</span><h1>Each siding fails its own way — learn the signatures.</h1>
 <p class="lead">Beyond masonry, you'll see fiber-cement, wood and hardboard, and vinyl. You won't specify any of them, but you have to recognize what's there, judge whether it's installed and holding up, and call the defect that's specific to that material.</p>
 <h2>The families you'll see</h2>
 ${conds('',[['Fiber-cement (e.g., HardiePlank)','Durable cement-and-fiber board — but brittle. Inspect for cracked or chipped boards, failed paint (it must stay sealed), butt joints needing gaps/caulk or flashing, and contact with the grade.'],['Wood &amp; hardboard','Solid wood lap, plywood (T1-11), or pressed hardboard (Masonite). Prone to rot, swelling, and paint failure where water sits — check the board bottoms, joints, and ground clearance.'],['Vinyl','Interlocking plastic panels hung loosely so they can expand and contract. Inspect for cracks, warping/melting near grills and lights, loose courses, and the water-resistive barrier behind it.'],['Aluminum','Older lightweight metal lap. Dents, chalks, and can carry a fault if not bonded — note condition and any electrical bonding concerns.']])}
 <div class="pills"><span class="pill">Fiber-cement — <b>cracks &amp; paint</b></span><span class="pill">Wood — <b>rot at the bottoms</b></span><span class="pill">Vinyl — <b>loose &amp; brittle</b></span><span class="pill">All — <b>ground clearance</b></span></div>
 <h2>The detail every siding shares: clearance &amp; joints</h2>
 <p>Two findings cross all siding types. First, <b>ground clearance</b>: siding that contacts soil or mulch wicks moisture and invites rot and termites — most products want a few inches of gap above grade. Second, <b>joints and terminations</b>: butt joints, inside/outside corners, and the tops of openings need flashing, sealant, or a designed gap so water sheds rather than soaks in.</p>
 ${W('era','clad')}
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Two things to confirm on any siding</div><p><b>Ground clearance</b> — siding shouldn't touch soil or mulch; it wicks water and hides termite entry. <b>Sealed terminations</b> — joints, corners, and tops of openings need flashing or caulk. Where you see neither, expect moisture damage behind the cladding.</p></div></div>
 ${story('Inspector in the house',`A fresh-painted Cape looked perfect until you crouched at a corner: the hardboard siding ran straight into the flower bed, and the bottom inch crumbled when you pressed it. **Paint hides a lot, but it can't hold up wet hardboard buried in mulch.** Your report calls the ground contact and the rot — not the color.`)}`,
 quiz:[
  {q:'Fiber-cement siding is best described as:',o:['Soft and flexible','Durable but brittle — watch for cracks, chips, and failed paint','Maintenance-free metal','A type of vinyl'],a:1,e:'Fiber-cement is tough but brittle. Cracks/chips, paint failure, and unsealed joints are the findings.'},
  {q:'Wood and hardboard siding most often fails by:',o:['Melting','Rot and swelling where water sits — especially at the bottoms and joints','Rusting','Fading only'],a:1,e:'Water sitting at board bottoms, joints, and ground contact rots and swells wood/hardboard. Check clearance and terminations.'},
  {q:'Vinyl siding warping or melting near a grill or light is:',o:['Normal expansion','Heat damage — note it as a cladding defect','A paint issue','A weep-hole problem'],a:1,e:'Vinyl deforms with heat. Warping near heat sources is reportable, along with cracks and loose courses.'},
  {q:'Siding in direct contact with soil or mulch is a problem because:',o:['It looks untidy','It wicks moisture and hides termite entry — most siding needs ground clearance','It blocks drainage from the roof','It is required for support'],a:1,e:'Ground contact wicks water into the cladding and conceals pest entry. Most products want a few inches of clearance above grade.'},
 ]},

/* ===== L3 STUCCO & EIFS ===== */
{id:'l3',kind:'Lesson 3',label:'Stucco & EIFS',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · The plaster claddings</span><h1>One looks like the other — and one can rot the house.</h1>
 <p class="lead">Traditional stucco and synthetic stucco (EIFS) look nearly identical from the curb, but they behave completely differently when water gets behind them. Telling them apart — and knowing the EIFS moisture story — is one of the highest-stakes reads on the exterior.</p>
 <h2>Traditional three-coat stucco</h2>
 <p>Real stucco is portland-cement plaster applied in coats over lath and a water-resistive barrier. It's hard, water-shedding, and drains at a <b>weep screed</b> along the base, above grade. Inspect for cracks (hairline is common; wide or stair-step cracks signal movement), delamination, staining, missing weep screed, and inadequate clearance to the grade.</p>
 <h2>EIFS — synthetic stucco, and the moisture problem</h2>
 <p>EIFS is an <b>Exterior Insulation and Finish System</b>: foam board glued to the sheathing with a thin synthetic-and-mesh coat troweled over it. It taps hollow and feels soft. The danger is in the older <b>barrier (non-drainable)</b> type: it has <em>no drainage path</em>, so any water that gets past the surface — almost always at unsealed windows, penetrations, or missing flashing — is <b>trapped against the sheathing and framing and rots them out of sight</b>. You can't see the damage from outside.</p>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <!-- sheathing/framing -->
     <rect x="160" y="30" width="40" height="190"/>${_mono(180,24,10,'sheathing','#3c5870')}
     <!-- foam -->
     <rect x="200" y="30" width="40" height="190" fill="#cdbf9a" opacity="0.3" stroke="#6a6557"/>${_mono(220,24,9,'foam','#7f520a')}
     <!-- thin coat -->
     <rect x="240" y="30" width="10" height="190" stroke="#6a6557"/>${_mono(266,40,9,'thin coat','#6a6557','start')}
     <!-- window with failed seal -->
     <rect x="240" y="90" width="6" height="40" fill="#b85436" opacity="0.5" stroke="#b85436"/>${_mono(300,96,9,'unsealed window','#b85436','start')}
   </g>
   <!-- water trapped (no drainage) -->
   <path d="M246 110 Q 210 150 200 210" stroke="#b85436" stroke-width="2.2" fill="none"/>
   <ellipse cx="200" cy="214" rx="22" ry="6" fill="#b85436" opacity="0.4" stroke="none"/>
   ${_mono(330,150,10,'water gets in at the window…','#b85436','start')}
   ${_mono(330,170,10,'…and is trapped — no way out. Hidden rot.','#b85436','start')}
 </svg><div class="cap">Barrier EIFS: water enters at an unsealed window and is trapped against the sheathing — concealed rot you can\'t see from outside.</div></div>
 <p>Newer <b>drainable EIFS</b> adds a drainage plane behind the foam, but you can't always tell which is installed. The safe inspector move: when you see EIFS — hollow sound, no weep screed, soft surface — flag it, note any failed sealant or high moisture readings, and recommend evaluation by an <b>EIFS specialist with invasive moisture testing</b>.</p>
 ${W('spot','wall')}
 ${story('Inspector in the house',`A gorgeous "stucco" estate tapped hollow at every wall and had not one weep screed. The windows' caulk was cracked and the meter lit up below two of them. **This is the write-up that has ended careers when skipped.** You don't guess whether it's barrier or drainable — you flag the EIFS, document the moisture, and send it to a specialist for testing.`)}`,
 quiz:[
  {q:'EIFS stands for:',o:['Engineered Insulated Foundation System','Exterior Insulation and Finish System (synthetic stucco)','Even Interior Flashing Standard','Exterior Impact Framing System'],a:1,e:'EIFS is foam board with a thin synthetic finish coat — "synthetic stucco." It looks like stucco but behaves very differently.'},
  {q:'The defining inspection concern with barrier (non-drainable) EIFS is:',o:['It fades quickly','It traps water behind it, causing hidden rot — especially at unsealed windows and penetrations','It is too heavy for framing','It cannot be cleaned'],a:1,e:'With no drainage path, any water past the surface is trapped against the sheathing and framing, rotting them out of sight. A high-liability defect.'},
  {q:'A weep screed at the base of stucco/EIFS is there to:',o:['Hold the foam in place','Let trapped water drain out above grade','Add insulation','Carry the lintel load'],a:1,e:'The weep screed drains water that gets behind the cladding. Its absence is a red flag for hidden moisture.'},
  {q:'When you identify EIFS with failed sealant and high moisture readings, you should:',o:['Repair the caulk and clear it','Flag it and recommend evaluation by an EIFS specialist with invasive moisture testing','Assume it\'s drainable and move on','Remove a section to look behind it'],a:1,e:'You document the EIFS and the moisture and refer it out for specialist testing — you don\'t open the wall or guarantee it\'s fine.'},
 ]},

/* ===== L4 TRIM, SOFFITS & FASCIA ===== */
{id:'l4',kind:'Lesson 4',label:'Trim, Soffits & Fascia',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · The edges</span><h1>Rot starts at the edges — so that's where you look.</h1>
 <p class="lead">Trim, soffits, and fascia finish the building where the wall meets the roof and openings. They're also the first place water finds wood, so they're an early-warning system for the whole exterior.</p>
 <h2>The pieces and what they do</h2>
 ${conds('',[['Fascia','The vertical board at the eave that the gutters hang on. Check for rot (especially behind the gutter), peeling paint, and loose or sagging sections.'],['Soffit','The underside of the roof overhang. Check for rot and staining (a sign of roof or gutter leaks above), pest entry, and — where the attic vents through it — that the vent openings are clear.'],['Trim &amp; corner boards','The boards around windows, doors, corners, and the roofline. Check that joints are caulked and the wood isn\'t splitting, rotting, or pulling away.'],['Frieze &amp; rake boards','Trim along the gable edge and where the wall meets the soffit. Same read: rot, paint, and open joints that admit water.']])}
 <h2>The story the edges tell</h2>
 <p>Stained or rotted soffits and fascia rarely fail on their own — they're usually telling you about <b>water coming from above</b>: a roof leak, an overflowing or back-pitched gutter, or ice. So when you write up rotted fascia, look up: the cause is often a gutter or roof issue, and your report should point there. Trim damage at openings, by contrast, usually means failed caulk or flashing letting water into the wall.</p>
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- roof slope -->
     <path d="M120 60 L460 150"/>${_mono(220,70,9,'roof','#3c5870','start')}
     <!-- overhang -->
     <path d="M460 150 L560 150"/>
     <!-- fascia -->
     <line x1="560" y1="150" x2="560" y2="186" stroke="#7f520a" stroke-width="2.4"/>${_mono(588,166,9,'fascia','#7f520a','start')}
     <!-- soffit underside -->
     <line x1="470" y1="186" x2="560" y2="186" stroke="#7f520a" stroke-width="2.4"/>${_mono(500,206,9,'soffit','#7f520a')}
     <!-- gutter -->
     <path d="M556 150 q14 6 4 22 q-12 6 -16 -6 z" stroke="#3c5870" stroke-width="1.4" fill="none"/>${_mono(600,150,9,'gutter','#3c5870','start')}
     <!-- wall -->
     <line x1="470" y1="150" x2="470" y2="210"/>
   </g>
   <!-- water overflow staining the fascia -->
   <path d="M560 174 q-6 14 -10 30" stroke="#5a7b97" stroke-width="2.2" fill="none"/>${_mono(420,196,9,'overflow stains fascia/soffit','#5a7b97','start')}
 </svg><div class="cap">Soffit and fascia sit under the gutter — so their rot and staining usually point up to a roof or gutter problem.</div></div>
 ${W('match','edge')}
 ${story('Inspector in the house',`A row of dark, soft fascia behind the gutters looked like a painting job — until the buyer's agent assumed that's all it was. You traced it up to a gutter that had pulled loose and overflowed for years. **The fascia was the symptom; the gutter was the cause.** The report names both, so the repair fixes the source, not just the stain.`)}`,
 quiz:[
  {q:'The fascia is:',o:['The underside of the roof overhang','The vertical board at the eave that carries the gutters','The trim around a window','The base flashing of stucco'],a:1,e:'Fascia is the eave board the gutters attach to. Check for rot behind the gutter, paint failure, and loose sections.'},
  {q:'The soffit is:',o:['The peak of the roof','The underside of the roof overhang','The corner trim board','The deck ledger'],a:1,e:'The soffit is the overhang\'s underside — inspect for rot, staining, pest entry, and clear vent openings where present.'},
  {q:'Rotted or stained soffit and fascia most often indicate:',o:['Normal aging only','Water coming from above — a roof leak, overflowing gutter, or ice','A foundation problem','A grading problem'],a:1,e:'Soffit/fascia sit under the gutter and eave. Their damage usually points up to a roof or gutter issue — report the cause, not just the stain.'},
  {q:'Damaged trim and open joints around a window usually mean:',o:['The window is the wrong size','Failed caulk or flashing letting water into the wall','The lintel is missing','The grade is negative'],a:1,e:'At openings, trim and caulk are the water seal. Open or rotted joints admit water into the wall — recommend sealing and checking for hidden damage.'},
 ]},

/* ===== L5 DOORS & WINDOWS ===== */
{id:'l5',kind:'Lesson 5',label:'Exterior Doors & Windows',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · The openings</span><h1>Every opening is a planned hole — it has to keep water and people safe.</h1>
 <p class="lead">Doors and windows are deliberate gaps in the wall, so the inspection is about two things: do they <b>keep weather out</b> (flashing, glazing, weatherstripping), and do they <b>operate safely</b> — including the bedroom egress that can save a life.</p>
 <h2>What you check on every opening</h2>
 ${conds('',[['Operation','Open, close, and latch each accessible door and window. Note units that stick, won\'t latch, are painted shut, or have failed hardware.'],['Glazing','The glass and its seal. Fogged or moisture-stained double panes mean a failed insulated-glass seal; cracked or missing glass is reportable.'],['Weatherstripping &amp; sealing','The seals around the operable parts, and caulk where the frame meets the cladding — missing or torn seals let in air and water.'],['Flashing','Head flashing above the opening sheds water over the frame. Unflashed heads are a hidden but serious leak path into the wall.']])}
 <h2>Egress — the life-safety call at the window</h2>
 <p>Every <b>sleeping room</b> needs an <b>emergency escape and rescue opening</b>: a window (or door) large enough and low enough that an occupant can climb out and a firefighter can climb in. The practical inspection version: a bedroom window that is <b>painted or nailed shut, too small, or mounted too high</b> is a reportable life-safety concern. You're not measuring to the fraction — you're catching the obvious failures.</p>
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- wall -->
     <rect x="120" y="30" width="480" height="170"/>
     <!-- window opening -->
     <rect x="300" y="60" width="120" height="110"/>
     <line x1="360" y1="60" x2="360" y2="170" stroke-width="1"/><line x1="300" y1="115" x2="420" y2="115" stroke-width="1"/>
     <!-- head flashing -->
     <path d="M294 60 L426 60 L420 52 L300 52 Z" fill="#7f520a" opacity="0.5" stroke="#7f520a"/>${_mono(360,44,9,'head flashing — sheds water','#7f520a')}
     ${_mono(360,190,9,'egress: openable, big enough, reachable','#3d7d50')}
   </g>
   <!-- water shed over the head -->
   <g stroke="#5a7b97" stroke-width="2" fill="none" stroke-linecap="round"><path d="M300 50 q-12 14 -16 30"/><path d="M420 50 q12 14 16 30"/></g>
 </svg><div class="cap">Head flashing sheds water over the opening; a bedroom window must also meet egress — openable, large enough, and reachable.</div></div>
 ${W('sort','water')}
 ${story('Inspector in the house',`A finished basement bedroom had a charming little window up near the ceiling joists — far too small and too high to climb out of in a fire. The sellers called the room a "4th bedroom." **A room you sleep in but can't escape from isn't a bedroom; it's a hazard.** The report flags the egress deficiency plainly, so the buyer knows what they're really getting.`)}`,
 quiz:[
  {q:'A fogged or moisture-stained double-pane window indicates:',o:['Condensation that will clear','A failed insulated-glass seal','A cracked lintel','Normal aging of glass'],a:1,e:'Moisture between the panes means the IGU seal has failed. The unit\'s insulating value is gone — report it.'},
  {q:'Head flashing above a door or window:',o:['Is decorative trim','Sheds water out over the opening so it doesn\'t enter the wall','Holds the window in place','Is only used on brick'],a:1,e:'Head flashing directs water over the frame. An unflashed head is a hidden leak path into the wall.'},
  {q:'An emergency escape and rescue (egress) opening is required in:',o:['Every room','Every sleeping room','Only the basement','Only the kitchen'],a:1,e:'Sleeping rooms need an egress opening — large enough and low enough to escape through or be rescued through.'},
  {q:'A bedroom window painted shut, too small, or mounted too high is:',o:['Acceptable if it has a screen','A reportable life-safety (egress) concern','Only an energy issue','Fine if there is another window'],a:1,e:'It defeats emergency escape and rescue. Flag it as a life-safety deficiency.'},
 ]},

/* ===== L6 CAULKING, SEALANTS & PENETRATIONS ===== */
{id:'l6',kind:'Lesson 6',label:'Caulking, Sealants & Penetrations',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · Closing the gaps</span><h1>Every hose bib, vent, and wire is a hole you have to check.</h1>
 <p class="lead">A wall is full of intentional penetrations — faucets, dryer and exhaust vents, electrical and gas service entries, light fixtures, AC line sets. Each one is a place water can get into the wall, and caulk or sealant is what closes the gap. This is a small lesson with a big payoff: it's where a lot of water actually enters.</p>
 <h2>Penetrations to find and check</h2>
 ${conds('',[['Plumbing','Hose bibs (exterior faucets) and any pipe penetrations — sealed at the wall, and ideally frost-proof in cold climates.'],['Mechanical vents','Dryer vents, range-hood and bath-fan caps, and combustion/intake vents — sealed at the wall and terminating outside with a proper hood.'],['Electrical &amp; AC','Service entry, light fixtures, outlets, and the refrigerant line set passing through the wall — each needs a sealed, weather-tight penetration.'],['Trim &amp; transitions','Where two cladding materials meet, at corners, and where the cladding meets a deck ledger, roof, or foundation — all need sealing or flashing.']])}
 <h2>How to read caulk</h2>
 <p>Good sealant is continuous, flexible, and bonded to both surfaces. You're looking for <b>cracked, missing, hardened, or pulled-away caulk</b> — the joint has opened and water can enter. Note that caulk is <em>maintenance</em>, not a permanent fix: failed sealant is a common, easily corrected finding, but where you see staining or soft material below a failed joint, the water has already been getting in.</p>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Sealant vs. flashing</div><p>Caulk is a backup, not a substitute for <b>flashing</b>. At a deck ledger, a window head, or a roof-to-wall joint, the water has to be shed by flashing; relying on caulk alone there is a defect, because caulk eventually fails and the trapped water rots the wall.</p></div></div>
 ${W('sort','penetration')}
 ${story('Inspector in the house',`A buyer waved off a row of cracked, chalky caulk lines as "cosmetic." But under the worst one — where the trim met the brick beside a hose bib — the wood was soft and dark. **Cosmetic caulk doesn't rot the trim behind it; failed caulk does.** The report calls the open joints and the moisture damage they've already let in.`)}`,
 quiz:[
  {q:'Exterior penetrations matter to the inspection because:',o:['They look untidy','Each is a hole where water can enter the wall — sealant or flashing has to close it','They reduce energy efficiency only','They are not part of the inspection'],a:1,e:'Faucets, vents, wires, and line sets all pierce the wall. Each needs a sealed, weather-tight termination, or water gets in.'},
  {q:'Cracked, missing, or pulled-away caulk at a joint is:',o:['Always cosmetic','An open water-entry path — report it, and check for damage below','A structural defect in the framing','A sign of good ventilation'],a:1,e:'Failed sealant opens the joint to water. It\'s an easy fix, but where it\'s failed, look for staining and rot below.'},
  {q:'At a deck ledger or window head, relying on caulk alone is:',o:['Acceptable best practice','A defect — those joints need flashing, because caulk eventually fails','Better than flashing','Only an issue on stucco'],a:1,e:'Flashing sheds water at critical joints; caulk is a backup. Caulk-only at a ledger or window head traps water when it fails — rot follows.'},
  {q:'A dryer or bath-fan vent through the wall should:',o:['Terminate inside the wall cavity','Terminate outside with a proper hood and be sealed at the wall','Be left open for airflow','Discharge into the soffit'],a:1,e:'Mechanical vents must exhaust outside through a proper cap and be sealed where they pierce the cladding.'},
 ]},

/* ===== L7 GRADING & DRAINAGE ===== */
{id:'l7',kind:'Lesson 7',label:'Grading & Drainage',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Moving water off the lot</span><h1>Where the water goes decides how the foundation performs.</h1>
 <p class="lead">This is the single most consequential site item you inspect. Most foundation, basement, and crawlspace complaints don't start with the foundation — they start with water that wasn't kept away from it. Read the lot as a water-management system.</p>
 <h2>Positive grade — the first rule</h2>
 <p>The soil around the building should slope <b>away from the foundation</b>: as a rule of thumb, about <b>6 inches of fall over the first 10 feet</b>. That positive slope sheds surface water before it reaches the wall. <b>Negative grade</b> — soil sloping <em>toward</em> the house, or a patio/walk that pitches back at it — drives water straight to the foundation. It's the root cause behind the majority of wet basements and crawlspaces.</p>
 <div class="dgm"><svg viewBox="0 0 720 240">
   <g ${_gs}>
     <!-- foundation -->
     <rect x="120" y="40" width="60" height="160"/>${_mono(150,32,10,'foundation','#3c5870')}
     <!-- GOOD: positive grade away (right) -->
     <path d="M180 120 L520 168" stroke="#3d7d50" stroke-width="2.2"/>${_mono(360,150,10,'positive grade — water sheds away','#3d7d50','start')}
     <g stroke="#3d7d50" stroke-width="2" fill="none" stroke-linecap="round"><path d="M260 132 l28 4"/><path d="M282 130 l8 6 l-8 4"/></g>
     <!-- discharge clear -->
     ${_mono(520,184,9,'6 in fall / 10 ft','#3d7d50','end')}
   </g>
   <!-- water arrow -->
   <path d="M520 168 q14 10 4 26" stroke="#5a7b97" stroke-width="2.2" fill="none"/>
 </svg><div class="cap">Positive grade: the soil falls away from the foundation (about 6 in over 10 ft), so surface water sheds away from the wall.</div></div>
 <h2>Swales, downspouts &amp; discharge</h2>
 <ul class="clean"><li><b>Swales</b> — a shallow graded channel that redirects runoff around or away from the house where the lot slopes toward it.</li><li><b>Downspout discharge</b> — gutters concentrate a roof's worth of water; the downspout must discharge <em>well clear</em> of the foundation, not at the base.</li><li><b>Extensions &amp; splash blocks</b> — carry that discharge several feet out onto positive grade.</li><li><b>Window wells &amp; area drains</b> — must drain, not fill; a wet window well dumps water at the foundation.</li></ul>
 <p>Tie it all together: <b>roof water → gutters → downspouts → extensions → positive grade → away.</b> Break any link and water ends up against the foundation. When you find foundation moisture inside, this chain is the first place you look — and the first thing you recommend correcting, because it's the cheapest, highest-value fix.</p>
 ${W('match','site')}
 ${story('Inspector in the house',`A buyer was alarmed by a hairline crack and a damp basement corner, expecting a structural disaster. Outside, the answer was obvious: the back grade sloped <em>toward</em> the house and a downspout emptied right into that corner. **The crack wasn't the problem — the water was.** The report leads with grade and downspout corrections before anyone talks about underpinning.`)}`,
 quiz:[
  {q:'Proper grading slopes the soil:',o:['Toward the foundation','Away from the foundation — about 6 inches of fall over the first 10 feet','Perfectly level','Any direction the lot already runs'],a:1,e:'Positive slope away from the house sheds surface water before it reaches the foundation — the highest-value site fix.'},
  {q:'Negative grade is significant because:',o:['It only affects landscaping','It drives surface water against the foundation — the root cause of most wet basements and crawlspaces','It improves drainage','It is required on sloped lots'],a:1,e:'Soil pitched toward the house feeds water to the foundation, causing leaks, crawlspace moisture, and settlement.'},
  {q:'A downspout should discharge:',o:['Right at the foundation','Well clear of the foundation, onto positive grade — often via an extension','Into the crawlspace','Under the slab'],a:1,e:'Gutters concentrate roof water; dumping it at the base saturates the foundation soil. Extensions carry it several feet clear.'},
  {q:'A swale is:',o:['A downspout fitting','A shallow graded channel that redirects surface runoff away from the structure','A foundation crack gauge','A type of window well'],a:1,e:'A swale is a low graded channel that carries runoff around or away from the house — key where the lot slopes toward it.'},
 ]},

/* ===== L8 WALKS, DRIVES & PATIOS ===== */
{id:'l8',kind:'Lesson 8',label:'Walks, Drives, Patios & Retaining Walls',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · Flatwork &amp; site walls</span><h1>Flatwork fails two ways: it trips people, and it dumps water.</h1>
 <p class="lead">Walkways, driveways, patios, and retaining walls are the hardscape. Read them for two things: <b>walking-surface safety</b> (trip hazards from heave and settlement) and their effect on <b>water</b> (slabs that pitch back toward the house).</p>
 <h2>Walks, driveways &amp; patios</h2>
 ${conds('',[['Trip hazards','Lifted, heaved, or settled sections create abrupt vertical changes that catch a toe. A raised lip — often from a tree root or frost heave — is a classic, reportable fall hazard.'],['Settlement','Slabs sinking as soil consolidates, tilting walks and patios. Differential settlement also cracks and separates sections.'],['Negative pitch','A patio, walk, or driveway that slopes back toward the house steers water to the foundation — the grading rule applies to flatwork too.'],['Surface condition','Cracking, spalling, and crumbling — note significant deterioration, especially where it creates a hazard or a drainage problem.']])}
 <h2>Retaining walls</h2>
 <p>A retaining wall holds back a bank of soil — and the water in it. Inspect for <b>leaning, bulging, or rotating</b> (the wall losing the fight against the soil), <b>cracking</b>, and whether it has <b>drainage</b>: weep holes or a drain behind it to relieve water pressure. A retaining wall with no drainage builds up hydrostatic pressure and eventually fails. Where a failing retaining wall is above the house, note that it can put soil and water against the structure.</p>
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- retaining wall -->
     <line x1="300" y1="40" x2="300" y2="190"/><line x1="320" y1="40" x2="320" y2="190"/>
     <line x1="300" y1="190" x2="320" y2="190"/>
     ${_mono(310,32,9,'retaining wall','#3c5870')}
     <!-- soil bank behind -->
     <path d="M320 60 L520 40 L520 190 L320 190 Z" fill="#cdbf9a" opacity="0.3" stroke="none"/>${_mono(440,90,9,'retained soil','#7f520a','start')}
     <!-- weep at base (good) -->
     <rect x="300" y="170" width="8" height="8" fill="#fff" stroke="#3d7d50"/>${_mono(250,176,9,'weep — relieves pressure','#3d7d50','end')}
     <!-- lean indication (bad) -->
     <path d="M300 40 l-22 0" stroke="#b85436" stroke-width="1.4"/>${_mono(250,44,9,'leaning?','#b85436','end')}
   </g>
   <!-- water pressure arrows -->
   <g stroke="#5a7b97" stroke-width="2" fill="none" stroke-linecap="round"><path d="M360 90 l-24 0"/><path d="M340 84 l-8 6 l8 4"/><path d="M360 130 l-24 0"/><path d="M340 124 l-8 6 l8 4"/></g>
 </svg><div class="cap">A retaining wall fights soil and water pressure; without drainage (weeps), pressure builds and the wall leans, bulges, or fails.</div></div>
 ${W('match','hardscape')}
 ${story('Inspector in the house',`A pretty paver patio wrapped the back of a house and pitched, ever so slightly, back toward the door — and the threshold below it was rotting. A root had also heaved one walkway slab into a lip the buyers kept catching. **Hardscape isn't just landscaping; it's drainage and safety.** The report calls the negative pitch and the trip hazard, not the pattern of the pavers.`)}`,
 quiz:[
  {q:'A lifted or heaved section of walkway is reported because:',o:['It is unattractive','It is a trip-and-fall hazard — an abrupt vertical change catches the foot','It blocks drainage from the roof','It is structural support'],a:1,e:'Heave and settlement create abrupt lips that cause falls. A raised walkway edge — often a tree root or frost heave — is a classic reportable hazard.'},
  {q:'A patio that pitches back toward the house is a problem because:',o:['It looks sloppy','It steers surface water to the foundation — the grading rule applies to flatwork too','It cracks faster','It is too slippery'],a:1,e:'Negative pitch on flatwork dumps water at the foundation, just like negative grade. Recommend correction.'},
  {q:'A retaining wall is checked for leaning, bulging, cracking, and:',o:['Its color','Whether it has drainage (weeps) to relieve water pressure behind it','The plants on top of it','Its height only'],a:1,e:'Without drainage, water builds hydrostatic pressure behind the wall and pushes it over. Leaning/bulging plus no weeps is a clear write-up.'},
  {q:'Differential settlement of a slab or walk means:',o:['The whole slab sank evenly','Parts sank more than others, tilting and cracking the surface','The slab heaved upward','The slab is new'],a:1,e:'Uneven settling tilts and separates the surface — a trip hazard and a sign of soil consolidation under part of the flatwork.'},
 ]},

/* ===== L9 DECKS, PORCHES, BALCONIES & STAIRS ===== */
{id:'l9',kind:'Lesson 9',label:'Decks, Porches, Balconies & Stairs',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 9 · The life-safety lesson</span><h1>This is where the inspection saves a life.</h1>
 <p class="lead">Decks, porches, balconies, and exterior stairs concentrate the most serious safety defects on the whole property. A failed deck connection or a missing guardrail isn't an energy or maintenance issue — it's a fall or a collapse. Slow down here.</p>
 <h2>The ledger — the top deck defect</h2>
 <p>The <b>ledger board</b> ties the deck to the house, and its failure is the <b>leading cause of catastrophic deck collapse</b>. Two things must be right: it must be <b>lag-screwed or through-bolted</b> to the structure — <em>never nailed</em> — and it must be <b>flashed</b> so water can't run behind it and rot the band joist. A nailed ledger pulls out under load; an unflashed one rots the very wood it's bolted to. Nails plus no flashing is a serious, clear write-up.</p>
 <div class="dgm"><svg viewBox="0 0 720 240">
   <g ${_gs}>
     <!-- house wall -->
     <rect x="80" y="30" width="50" height="190"/>${_mono(105,24,9,'house','#3c5870')}
     <!-- band joist -->
     <rect x="130" y="90" width="14" height="20" fill="#cdbf9a" opacity="0.4" stroke="#6a6557"/>${_mono(110,130,8,'band joist','#7f520a','start')}
     <!-- ledger -->
     <rect x="144" y="90" width="16" height="20" fill="#9c6b3a" opacity="0.4" stroke="#6a6557"/>
     <!-- bolts (GOOD) -->
     <circle cx="152" cy="95" r="2.4" fill="#3d7d50"/><circle cx="152" cy="105" r="2.4" fill="#3d7d50"/>${_mono(180,80,9,'lag/through-bolt — not nails','#3d7d50','start')}
     <!-- flashing (GOOD) -->
     <path d="M144 90 L144 84 L168 84" stroke="#7f520a" stroke-width="2.4" fill="none"/>${_mono(200,72,9,'Z-flashing over the ledger','#7f520a','start')}
     <!-- deck joist -->
     <line x1="160" y1="100" x2="420" y2="100"/><line x1="160" y1="100" x2="420" y2="100"/>
     <!-- joist hanger -->
     <path d="M160 100 l0 12 l8 0" stroke="#3d7d50" stroke-width="1.6"/>${_mono(170,128,8,'joist hanger','#3d7d50','start')}
     <!-- beam + post + cap -->
     <line x1="380" y1="110" x2="440" y2="110"/><line x1="410" y1="110" x2="410" y2="190"/><path d="M404 110 l0 -6 l12 0 l0 6" stroke="#3d7d50" stroke-width="1.6"/>${_mono(410,206,8,'post cap','#3d7d50')}
   </g>
 </svg><div class="cap">A correct deck: ledger bolted (not nailed) and flashed, joists in hangers, beam to post with a connector.</div></div>
 <h2>Connections, guards, and stairs</h2>
 ${conds('',[['Joist hangers &amp; connectors','Joists belong in approved metal hangers; posts to beams need post caps; the structure needs lateral connectors and hold-downs. Toenailed joists and beams just resting on posts are defects.'],['Guardrails','Required where a walking surface is roughly <b>30 in or more</b> above grade. Must be solid (resist ~200 lb of lateral force) and not loose. A missing or wobbly guard is a fall hazard.'],['Baluster spacing — the 4-inch rule','Openings in a guard must reject a <b>4-inch sphere</b>, so a child can\'t pass through or get a head trapped. Wider spacing is a reportable life-safety defect.'],['Stairs — rise/run &amp; handrails','Risers and treads must be <b>uniform</b> (about 3/8 in max variation), and stairs need a <b>graspable handrail</b> your hand can close around — not a flat-top board.']])}
 ${W('spot','deck')}
 ${W('sort','surface')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The exterior's most important write-ups</div><p>If you remember four things from this section, make them these: <b>ledgers bolted and flashed</b>, <b>guards present and solid</b>, <b>balusters under 4 inches</b>, and <b>uniform rise/run with a graspable handrail</b>. These are the defects that hurt people — name them clearly and recommend correction.</p></div></div>
 ${story('Inspector in the house',`A cedar deck looked beautiful from the yard — until you ducked underneath and saw the ledger fastened with a row of bright nails and not a scrap of flashing, the band joist already dark with rot. **From above it felt solid; from below it was a collapse waiting for a party.** The report leads with the ledger as a life-safety defect and recommends a contractor evaluation before the deck is loaded.`)}`,
 quiz:[
  {q:'The leading cause of catastrophic deck collapse is:',o:['Rotten deck boards','Failure of the ledger connection — nailed or under-attached and unflashed','Too small a handrail','Overloading with furniture'],a:1,e:'The ledger ties the deck to the house. Nailed and unflashed ledgers pull free and rot the band joist — the top deck-collapse defect.'},
  {q:'A deck ledger must be:',o:['Nailed and caulked','Lag-screwed or through-bolted to the structure and flashed','Set in concrete','Glued'],a:1,e:'Mechanically fastened with lags or bolts (never nails) and flashed so water can\'t rot the band joist behind it.'},
  {q:'Guardrail balusters must be spaced so that:',o:['A 6-inch sphere cannot pass','A 4-inch sphere cannot pass between them','They are exactly 5 inches apart','Spacing is unregulated outdoors'],a:1,e:'The 4-inch sphere rule keeps a small child from passing through or getting a head trapped.'},
  {q:'A guardrail is generally required where a walking surface is more than about:',o:['12 inches above grade','30 inches above the surface below','5 feet above grade','Never outdoors'],a:1,e:'Guards are required where a walking surface is roughly 30 in or more above the adjacent grade or floor.'},
  {q:'A graspable handrail is:',o:['Any rail 30 inches tall','A rounded or graspable profile your hand can close around — not a flat 2×6','A brightly painted rail','A rail with balusters'],a:1,e:'A handrail must be graspable and continuous so a person can hold on while descending. A flat board you can\'t grip is not graspable.'},
 ]},
