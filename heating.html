/* ===== L1 GAS COMBUSTION & BURNERS ===== */
{id:'l1',kind:'Lesson 1',label:'Gas Furnace: Combustion & Burners',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · Ch.8 Gas</span><h1>Lighting the fire, safely</h1>
 <p class="lead">A gas forced-air furnace starts with a controlled flame. Three things have to line up — fuel, ignition, and air — and each has a component and a failure mode you'll learn to read.</p>
 <h2>The burner assembly</h2>
 <p>When the thermostat calls for heat, the <b>gas valve</b> opens and admits gas to the <b>burners</b>, where it mixes with air and ignites. Older furnaces light from a standing <b>pilot</b>; a <b>thermocouple</b> sits in the pilot flame and generates a tiny voltage that holds the gas valve open — if the pilot goes out, the thermocouple cools, the voltage drops, and the gas shuts off. Newer furnaces use <b>electronic ignition</b> (intermittent pilot or hot-surface igniter), which saves the gas a standing pilot wastes.</p>
 <h2>Reading the flame</h2>
 <p>A healthy gas flame is mostly <b>blue and steady</b>. Lazy yellow flames, or flames that lift off the burner, signal a combustion problem — wrong air mix, dirt, or a draft issue. You'll use the flame again in the next lesson as a <b>diagnostic</b>: how it behaves when the blower starts can reveal a cracked heat exchanger.</p>
 <h2>Combustion air</h2>
 <p>Fire needs air. A furnace in a tight closet or a space crowded with stored goods can be <b>starved of combustion air</b>, which causes incomplete burning, soot, and — the dangerous part — a tendency to <b>backdraft</b>. Note furnaces installed in confined spaces without adequate combustion-air provisions.</p>
 ${story('Inspector in the house',`You open a furnace closet and find it packed with paint cans, a vacuum, and stacked boxes right against the cabinet. The furnace runs — but it's breathing the same crowded air it needs for combustion, and the stored solvents are a fire risk beside a flame. You don't have to prove it's starved; you note that the appliance lacks clear combustion-air space and recommend the closet be kept clear and evaluated.`)}`,
 quiz:[
  {q:'When the thermostat calls for heat, the component that admits gas to the burners is the:',o:['Thermocouple','Gas valve','Blower','Limit switch'],a:1,e:'The gas valve opens to feed the burners; the thermostat is just the trigger.'},
  {q:'The thermocouple\'s job is to:',o:['Ignite the burners','Sense that the pilot is lit and hold the gas valve open (shutting gas if the pilot fails)','Move air through the ducts','Regulate draft'],a:1,e:'The thermocouple proves flame: pilot out → it cools → gas shuts off. A basic safety interlock.'},
  {q:'A healthy gas burner flame is generally:',o:['Lazy and yellow','Mostly blue and steady','Orange and flickering','Invisible'],a:1,e:'Blue and steady indicates good combustion; yellow/lazy or lifting flames signal a problem.'},
  {q:'A furnace starved of combustion air tends to:',o:['Run more efficiently','Burn incompletely, soot, and backdraft','Heat the water faster','Trip the circulator'],a:1,e:'Inadequate combustion air causes incomplete burning, soot, and a dangerous tendency to backdraft.'},
  {q:'Newer furnaces replace the standing pilot with:',o:['A larger gas valve','Electronic ignition (intermittent pilot or hot-surface igniter)','A second thermocouple','A barometric damper'],a:1,e:'Electronic ignition lights on demand instead of burning gas continuously at a pilot.'},
 ]},

/* ===== L2 HEAT EXCHANGER & CRACKS ===== */
{id:'l2',kind:'Lesson 2',label:'The Heat Exchanger & Cracks',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · Ch.8 Gas — the critical item</span><h1>The wall between the fire and your air</h1>
 <p class="lead">This is the most important lesson in the chapter. The heat exchanger is the metal barrier that lets the furnace heat your house air <em>without</em> letting combustion gases mix into it. When that barrier fails, carbon monoxide can enter the home.</p>
 <h2>What it does</h2>
 <p>Combustion happens <b>inside</b> the heat exchanger; the burners fire into it and the exhaust travels through it to the flue. House air blows <b>across the outside</b> of it, picking up heat, and goes to the ducts. The two air streams — dirty exhaust and clean house air — must never meet. The heat exchanger is the only thing keeping them apart.</p>
 <h2>The crack — life safety</h2>
 <p>Metal that heats and cools for years eventually <b>cracks</b>. A cracked or holed heat exchanger lets products of combustion — including carbon monoxide — leak into the heated air delivered to the rooms. The implications are stark: a <b>life-safety hazard</b>, and a furnace that <b>usually must be replaced</b> (you don't patch a heat exchanger).</p>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The flame-distortion test</div><p>Cracks are often hidden. So you use the flame: with the burners lit, <b>watch the flame as the blower kicks on</b>. If the flame pattern shifts — distorts, changes color, or is blown — when the house fan starts, that air pressure is reaching the combustion side through a breach, strongly suggesting a crack. Write it up as a <b>possible cracked heat exchanger</b> and recommend further investigation. (A little flame movement from fan vibration is normal; and cracks above the flame won't move the flame but are still defects — which is why you also recommend a specialist's evaluation.)</p></div></div>
 <h2>The other two conditions</h2>
 <p><b>Soot</b> on the exchanger means incomplete combustion fouling the metal. <b>Rust</b> and corrosion thin the metal and lead to holes — often driven by condensation from spillage or by a chronically over-cooled return. Both shorten its life and point toward eventual failure.</p>
 ${W('spot','heatexchanger')}`,
 quiz:[
  {q:'The heat exchanger\'s essential function is to:',o:['Pump water through the system','Separate combustion gases from the house air while transferring heat','Ignite the burners','Filter the return air'],a:1,e:'It transfers heat from the fire to the house air while keeping the two air streams apart.'},
  {q:'A cracked heat exchanger is so serious because it can:',o:['Lower efficiency only','Allow carbon monoxide into the heated house air — a life-safety hazard','Make the blower noisy','Raise the gas bill slightly'],a:1,e:'A breach lets combustion products including CO into the air delivered to the rooms.'},
  {q:'A cracked heat exchanger is typically:',o:['Patched with high-temp sealant','Cause to replace the furnace','Repaired by replacing the gas valve','Ignored if the flame looks fine'],a:1,e:'Heat exchangers aren\'t patched; a cracked one usually means furnace replacement.'},
  {q:'In the flame-distortion test, a sign of a possible crack is:',o:['The flame is steady before and after the blower starts','The flame pattern changes when the blower kicks on','The pilot is blue','The thermostat clicks'],a:1,e:'If fan air reaches the flame through a breach, the flame shifts when the blower starts — flag it.'},
  {q:'A limitation of the flame test is that:',o:['It only works on oil furnaces','Cracks above the flame level may not move the flame but are still defects','It requires removing the heat exchanger','It detects only soot'],a:1,e:'Some cracks won\'t disturb the flame, so you still recommend a specialist\'s evaluation.'},
 ]},

/* ===== L3 VENTING, FLUE & BACKDRAFT ===== */
{id:'l3',kind:'Lesson 3',label:'Venting, Flue & Backdraft',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · Ch.8 Gas — venting</span><h1>Getting the exhaust outside</h1>
 <p class="lead">Combustion gases have to leave the building. On a conventional gas appliance they rise on their own (hot air rises) up a vent connector to the chimney. When that path fails, exhaust spills back into the house — the backdraft hazard.</p>
 <h2>Draft hood and vent connector</h2>
 <p>Above a conventional furnace or water heater sits a <b>draft hood</b> — an open collar that lets the appliance vent freely and draws in a little room air to dilute the exhaust. From there the <b>vent connector</b> carries gases to the chimney. It must <b>rise continuously</b> toward the chimney (about ¼ inch per foot), be properly sized, and keep clearance from combustibles — single-wall connector wants about 6 inches from wood on a gas appliance.</p>
 <h2>Backdraft and spillage — the test</h2>
 <p><b>Backdrafting</b> is ongoing spillage: exhaust coming <em>down</em> out of the draft hood into the room instead of going up the flue. With the burner running, hold a hand (or use a smoke source) near the draft hood: you should feel <b>cool room air drawn in</b>. If you feel <b>hot, wet exhaust pushing down</b>, spillage is happening. Brief spillage just at start-up can be normal; <b>ongoing</b> spillage is the problem.</p>
 <p>A quieter clue is <b>condensation and rust around the draft hood</b> — water is a product of combustion, and exhaust spilling and cooling in the room leaves moisture and corrosion behind. Treat backdrafting as a <b>flag-now</b>, CO-risk finding.</p>
 ${W('spot','flue')}
 <h2>High-efficiency and condensing furnaces</h2>
 <p>Modern <b>high-efficiency (condensing)</b> furnaces work differently: an <b>induced-draft</b> fan pushes the exhaust, they extract so much heat that the flue gas <b>condenses</b>, and they vent through <b>plastic (PVC) pipe</b> out a sidewall rather than up a chimney — plus a <b>condensate drain</b>. New things to check: the condensate line (clogs and leaks), the plastic vent's slope and termination, and the induced-draft motor. Same principle, different hardware — the exhaust still has to get out.</p>`,
 quiz:[
  {q:'The vent connector on a conventional gas appliance should:',o:['Slope downward toward the appliance','Rise continuously toward the chimney','Run perfectly level','Terminate in the attic'],a:1,e:'It must rise (about ¼ in/ft) so hot gases flow up and out; a downward slope traps exhaust.'},
  {q:'Backdrafting (ongoing spillage) means:',o:['The blower is too strong','Exhaust is coming down out of the draft hood into the room','The pilot is out','The filter is dirty'],a:1,e:'Combustion gases spilling into the room instead of venting up — a carbon-monoxide hazard.'},
  {q:'When you test at the draft hood with the burner running, a GOOD result is:',o:['Hot wet air pushing down onto your hand','Cool room air being drawn in','No air movement at all','The flame going out'],a:1,e:'Cool room air drawn in means the appliance is venting; hot exhaust pushing down means spillage.'},
  {q:'Rust and condensation around a draft hood suggest:',o:['Normal operation','Spilling exhaust depositing moisture (a sign of backdraft)','A cracked circulator','Low water pressure'],a:1,e:'Water is a combustion product; spillage cooling in the room leaves moisture and rust.'},
  {q:'A high-efficiency condensing furnace typically vents through:',o:['A masonry chimney only','Plastic (PVC) pipe with a condensate drain','No vent at all','The return ducts'],a:1,e:'Condensing furnaces use an induced-draft fan and plastic sidewall venting, plus a condensate drain to check.'},
 ]},

/* ===== L4 BLOWER, FILTER & CONTROLS ===== */
{id:'l4',kind:'Lesson 4',label:'Blower, Filter & Controls',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Ch.8 Gas — air side</span><h1>Moving the heat and keeping it safe</h1>
 <p class="lead">The combustion side makes the heat; the air side moves it and watches over the furnace. Three controls keep the whole thing safe and comfortable.</p>
 <h2>Blower and filter</h2>
 <p>The <b>blower</b> (the house fan) pushes heated air across the heat exchanger and out to the ducts. Ahead of it sits the <b>air filter</b>, and the filter matters more than it looks: a <b>clogged filter starves airflow</b>, which lets the heat exchanger run hot (back to Lesson 2's scorching and cracking) and overworks the blower. A dirty or missing filter is the most common — and most consequential — maintenance finding on the air side.</p>
 <h2>The three fan/limit controls</h2>
 <p>A combined <b>fan/limit switch</b> does two jobs with three settings. The <b>fan-on</b> setting starts the blower once the exchanger is warm (so you don't blow cold air). The <b>fan-off</b> setting stops it after the burner shuts down (wringing out the last heat). The <b>limit</b> setting is the safety: if the furnace overheats — usually from restricted airflow — it <b>shuts the burner off</b> before the exchanger is damaged. The <b>thermostat</b> sits upstream of all of it, calling for heat in the first place.</p>
 ${W('match','controls')}
 <h2>What you check</h2>
 <p>Confirm the blower runs and the filter is present and reasonably clean; listen for bearing noise; verify the furnace cycles on the thermostat and shuts down normally. A blower that won't start, a limit that short-cycles the burner, or a filter packed solid all get written up — the first two as operational defects, the filter as maintenance.</p>`,
 quiz:[
  {q:'A clogged air filter is consequential because it:',o:['Improves efficiency','Restricts airflow, overheating the heat exchanger and overworking the blower','Cools the burners','Has no real effect'],a:1,e:'Restricted airflow overheats the exchanger (scorching/cracking) and strains the blower.'},
  {q:'The LIMIT setting of the fan/limit switch:',o:['Starts the blower when the exchanger is warm','Shuts the burner off if the furnace overheats','Opens the gas valve','Regulates draft'],a:1,e:'The limit is the safety cutout — it stops the burner on overheat before the exchanger is damaged.'},
  {q:'The fan-ON setting exists so that:',o:['The blower runs constantly','The blower waits until the exchanger is warm before pushing air','The burner never shuts off','The filter cleans itself'],a:1,e:'It delays the blower until there\'s heat to deliver, so you don\'t get a blast of cold air.'},
  {q:'The blower (house fan) moves air:',o:['Through the combustion chamber','Across the outside of the heat exchanger and out to the ducts','Up the flue','Into the gas valve'],a:1,e:'House air passes across the exchanger\'s exterior, picks up heat, and goes to the ducts.'},
  {q:'The component that first calls for heat is the:',o:['Limit switch','Thermostat','Blower','Thermocouple'],a:1,e:'The thermostat triggers the sequence; the gas valve, ignition, and blower follow.'},
 ]},

/* ===== L5 OIL BURNERS ===== */
{id:'l5',kind:'Lesson 5',label:'Oil Burners',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · Ch.9 Oil</span><h1>Burning a liquid instead of a gas</h1>
 <p class="lead">Oil heat works on the same make-heat / move-heat / vent-it logic as gas — the heat exchanger, blower, and venting concepts carry straight over. What's different is the burner, because you have to atomize and ignite a liquid fuel.</p>
 <h2>The gun burner</h2>
 <p>A modern oil burner is a <b>gun burner</b>: a pump pushes oil through a fine <b>nozzle</b> that sprays it as a fine mist into the <b>combustion chamber</b>, while a fan supplies air and an <b>ignition transformer</b> throws a high-voltage spark across electrodes to light it. The nozzle's spray pattern and size are matched to the appliance — a worn or wrong nozzle is a common cause of poor combustion and soot.</p>
 <h2>The barometric damper</h2>
 <p>Oil flues use a <b>barometric damper</b> — a hinged, counter-weighted flap in the vent connector that swings to <b>regulate draft</b>, admitting room air when chimney draft is strong and closing down when it's weak. It keeps combustion stable. Missing, stuck, or wrongly set, draft goes uncontrolled — hurting combustion and inviting spillage. (This is the oil counterpart to the gas draft hood.)</p>
 <h2>Soot and smoke — the oil tell</h2>
 <p>Oil's signature problem is <b>soot</b>. A fouled nozzle, wrong air setting, or poor draft produces soot and smoke that coat the chamber and heat exchanger, cutting efficiency and accelerating wear. Heavy sooting, smoke odor, or staining around the burner are findings to write up and refer for service. There's also typically an <b>oil filter</b> on the supply line to keep the nozzle clean.</p>
 ${story('Inspector in the house',`An oil furnace runs, but the basement carries a faint smoky smell and there's dark staining around the burner door. You're not going to tune the burner — but soot and a smoke odor tell you combustion isn't clean. You note it plainly: "Evidence of sooting / incomplete combustion at the oil burner; recommend service by a heating contractor," and move on. The annual oil-service habit exists for exactly this reason.`)}`,
 quiz:[
  {q:'In a gun-type oil burner, the nozzle\'s job is to:',o:['Ignite the oil','Atomize the oil into a fine mist for combustion','Regulate draft','Pump water'],a:1,e:'The nozzle sprays oil as a fine mist sized and patterned for the appliance; spark from the transformer lights it.'},
  {q:'The ignition transformer in an oil burner:',o:['Heats the oil tank','Produces a high-voltage spark to light the oil mist','Filters the oil','Vents the exhaust'],a:1,e:'It throws a spark across electrodes to ignite the atomized oil.'},
  {q:'A barometric damper:',o:['Filters combustion air','Regulates draft in the oil flue by swinging open or closed','Stores oil','Replaces the heat exchanger'],a:1,e:'The counter-weighted flap admits or restricts room air to keep draft stable — the oil counterpart to a gas draft hood.'},
  {q:'The signature combustion problem on oil systems is:',o:['Low water pressure','Soot and smoke from incomplete combustion','A cracked circulator','A waterlogged expansion tank'],a:1,e:'Soot/smoke from a fouled nozzle, wrong air, or poor draft coats the chamber and exchanger.'},
  {q:'Heavy sooting and a smoke odor at an oil burner should be:',o:['Ignored if the unit runs','Written up with a recommendation for service by a heating contractor','Cleaned by the inspector','Fixed by replacing the thermostat'],a:1,e:'You report incomplete combustion and refer it for service — you don\'t tune the burner yourself.'},
 ]},

/* ===== L6 OIL TANKS & STORAGE ===== */
{id:'l6',kind:'Lesson 6',label:'Oil Tanks & Storage',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · Ch.9 Oil — storage</span><h1>Where the fuel lives</h1>
 <p class="lead">Oil heat brings something gas doesn't: a tank of liquid fuel on the property. Tanks come above ground (basement or outside) or buried, and each carries its own conditions — some functional, one environmental.</p>
 <h2>Location and protection</h2>
 <p>An oil tank should <b>not sit within 5 feet of any burner</b> — a fire-safety clearance. Tanks in garages or outdoors should be <b>protected from vehicle damage</b> (bollards or posts). Check the tank's <b>legs and supports</b>; a heavy full tank on corroded or undersized legs is a collapse risk.</p>
 <h2>Fill and vent pipes</h2>
 <p>Two pipes run to the outside: the <b>fill pipe</b> (where the truck pumps oil in) and the <b>vent pipe</b> (which lets air out as the tank fills and signals "full" with a whistle). Common findings: damaged, leaking, or improperly terminated fill/vent pipes. A telltale: a <b>strong oil odor right after a delivery</b> often means spillage or a fill-pipe leak.</p>
 <h2>Leaks — functional and environmental</h2>
 <p>A leak shows as <b>staining and odor</b> at the tank, fittings, fill, or vent. On an <b>above-ground</b> tank that's a functional problem you can see. On a <b>buried</b> tank it's far more serious: a leak from an underground tank is an <b>environmental hazard</b> with real cleanup liability, and you usually can't see the tank at all — so note the presence of any buried tank, look for surface staining and odor, and recommend evaluation.</p>
 ${W('spot','oilburner')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Buried tanks are a liability flag</div><p>An abandoned or active <b>underground oil tank</b> can be a significant financial and environmental issue for a buyer. If there's any indication of one — a fill/vent pipe leading into the ground with no visible tank — call it out clearly and recommend specialist evaluation. This is one your client genuinely needs to know before closing.</p></div></div>`,
 quiz:[
  {q:'An oil tank should not be located within:',o:['1 foot of a window','5 feet of any burner','10 feet of the chimney','20 feet of the house'],a:1,e:'A 5-foot clearance from any burner is a fire-safety requirement for oil tanks.'},
  {q:'The vent pipe on an oil tank:',o:['Delivers oil to the burner','Lets air out as the tank fills and signals when it\'s full','Drains condensate','Regulates draft'],a:1,e:'The vent lets displaced air escape during filling (often with a whistle that stops when full).'},
  {q:'A strong oil odor right after a delivery usually indicates:',o:['Normal operation','Spillage or a fill-pipe leak','A cracked heat exchanger','Low draft'],a:1,e:'Post-fill odor commonly points to spillage at the fill or a leaking fill pipe.'},
  {q:'A leak from a BURIED oil tank is especially serious because it is:',o:['Only a cosmetic issue','An environmental hazard with cleanup liability, often unseen','Easy to repair from inside','Not the buyer\'s concern'],a:1,e:'Underground tank leaks are environmental/financial liabilities and the tank is usually hidden — flag and refer.'},
  {q:'An oil tank in a garage or outdoors should be:',o:['Painted black','Protected from vehicle damage','Buried for safety','Mounted on the ceiling'],a:1,e:'Tanks exposed to vehicles need protection (posts/bollards) against impact.'},
 ]},

/* ===== L7 BOILERS & HYDRONIC ===== */
{id:'l7',kind:'Lesson 7',label:'Boilers & Hydronic Heat',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Ch.10 Boilers</span><h1>Heating with water instead of air</h1>
 <p class="lead">A boiler heats water and a pump sends it around a loop to radiators or baseboard, which release the heat into the rooms; cooled water returns to be reheated. No ducts, no blower — but the combustion side (burner, heat exchanger, flue) works just like a furnace, so everything you learned about cracks and venting still applies.</p>
 <h2>The loop</h2>
 <p>Hot water leaves the boiler on the <b>supply</b> side, travels to the emitters, gives up its heat, and comes back on the <b>return</b> side, cooler, to be reheated — a closed, pressurized loop. A <b>circulator</b> (pump) keeps it moving. Because it's a sealed system, the same water circulates for years; you're not constantly adding fresh water (and if the system <em>is</em> taking on make-up water, that points to a leak).</p>
 <div class="dgm"><svg viewBox="0 0 700 220"><g fill="none" stroke="#3c5870" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
   <rect x="60" y="90" width="90" height="100" rx="8"/><text x="105" y="205" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#2c4153">BOILER</text>
   <path d="M150 110 H 560" stroke="#b85436"/><text x="350" y="100" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#b85436">supply (hot)</text>
   <rect x="300" y="110" width="60" height="30" rx="3"/><text x="330" y="130" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#2c4153">radiator</text>
   <rect x="480" y="110" width="60" height="30" rx="3"/><text x="510" y="130" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#2c4153">baseboard</text>
   <path d="M560 110 V 170 H 150" stroke="#5a7b97"/><text x="350" y="188" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#5a7b97">return (cooler)</text>
   <circle cx="185" cy="170" r="11"/><text x="185" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#2c4153">circulator</text>
 </g></svg><div class="cap">A closed loop: boiler heats water → circulator pumps it to the emitters → cooled water returns</div></div>
 <h2>Water vs steam, and the gauge</h2>
 <p>Most boilers are <b>hot-water (hydronic)</b>. Older <b>steam</b> systems boil the water and let steam rise to the radiators on its own (you'll spot a sight glass and different controls — covered next lesson). On a hot-water boiler, the <b>pressure/temperature gauge</b> is your quick read: a cold system typically sits around <b>12 psi</b>, and running pressure climbs with temperature but should stay <b>under 30 psi</b>. A reading far off — near zero, or pinned high — points to a fill, expansion-tank, or relief-valve issue you'll chase in the next lesson.</p>
 ${W('match','heatsys')}`,
 quiz:[
  {q:'In a hydronic system, the circulator:',o:['Heats the water','Pumps heated water around the supply-and-return loop','Vents the exhaust','Filters the air'],a:1,e:'The circulator (pump) moves water from the boiler to the emitters and back.'},
  {q:'The combustion side of a boiler (burner, heat exchanger, flue):',o:['Doesn\'t exist on boilers','Works essentially like a furnace, so crack/venting concerns still apply','Uses no fuel','Is always electric'],a:1,e:'A fuel-fired boiler burns and vents like a furnace — heat-exchanger and backdraft concerns carry over.'},
  {q:'If a sealed hydronic system keeps needing make-up water, it suggests:',o:['Normal operation','A leak in the loop','Too much circulation','A dirty filter'],a:1,e:'A closed loop shouldn\'t consume water; ongoing make-up water points to a leak.'},
  {q:'On a hot-water boiler, a cold-system pressure of about 12 psi and running pressure under 30 psi is:',o:['A sign of failure','Normal','Impossibly low','Only true for steam'],a:1,e:'~12 psi cold, climbing but staying under 30 psi running, is the normal hydronic range.'},
  {q:'A steam system differs from a hot-water system in that it:',o:['Uses a circulator pump for steam','Boils the water and lets steam rise to the radiators','Has no boiler','Needs no venting'],a:1,e:'Steam systems boil water and the steam rises to the radiators; they use different controls (and a sight glass).'},
 ]},

/* ===== L8 BOILER SAFETIES & CIRCULATION ===== */
{id:'l8',kind:'Lesson 8',label:'Boiler Safeties & Circulation',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · Ch.10 Boilers — the safety set</span><h1>Keeping a vessel of hot water under control</h1>
 <p class="lead">A boiler is a sealed vessel of heated water under pressure. Three devices keep that from becoming dangerous, and a couple more keep it circulating. Learn this set and you can read any boiler room.</p>
 <h2>The pressure-relief valve — the critical safety</h2>
 <p>The <b>pressure-relief valve</b> prevents system pressure from building past about <b>30 psi</b>. That number matters: excessive pressure can flash water to steam and cause a <b>steam explosion</b>. The valve is set to relieve at 30 psi, sits at or near the top of the boiler, and — like a water heater's TPR — its <b>discharge must be piped down near the floor</b>. As an inspector you generally <b>don't test it</b> (it can fail to reseat), but you confirm it's present, correctly sized, and properly piped. Missing relief protection or a discharge open at height is a flag-now finding.</p>
 <h2>The high-temperature limit (aquastat)</h2>
 <p>The <b>aquastat</b> is the high-temperature limit: it watches water temperature and shuts the burner down before the water gets too hot, working alongside the relief valve as a second line of defense.</p>
 <h2>The expansion tank</h2>
 <p>Water expands as it heats. The <b>expansion tank</b> gives it somewhere to go — a cushion of air that compresses to absorb the expansion. The classic failure is a <b>waterlogged</b> tank: it loses its air cushion, so heating the water spikes the pressure and makes the relief valve weep. A waterlogged or failed expansion tank is one of the most common hydronic faults you'll find.</p>
 <h2>Circulator and zone valves</h2>
 <p>The <b>circulator pump</b> drives the loop; corrosion or seepage at its seal is a wear finding. <b>Zone valves</b> let one boiler serve several independently controlled zones, opening and closing to direct hot water where the thermostats are calling. A stuck zone valve shows up as a zone that won't heat (or won't stop).</p>
 ${W('spot','boiler')}`,
 quiz:[
  {q:'The boiler pressure-relief valve is set to relieve at about:',o:['12 psi','30 psi','60 psi','150 psi'],a:1,e:'It caps pressure near 30 psi to prevent a steam explosion.'},
  {q:'Excessive boiler pressure is dangerous because it can:',o:['Cool the water too fast','Flash water to steam and cause an explosion','Stop the circulator','Clog the filter'],a:1,e:'Past the relief setting, superheated water can flash to steam — the relief valve exists to prevent this.'},
  {q:'A waterlogged expansion tank causes:',o:['Low gas pressure','Pressure spikes on heating and a weeping relief valve','A cracked heat exchanger','Soot at the burner'],a:1,e:'Losing its air cushion, the tank can no longer absorb expansion, so pressure spikes and the relief valve weeps.'},
  {q:'Inspectors generally do NOT operate the boiler relief valve because:',o:['It is illegal','It may fail to reseat and then leak','It has no test lever','It is electric'],a:1,e:'Testing risks the valve not reseating; you confirm presence, sizing, and proper discharge instead.'},
  {q:'A zone valve\'s job is to:',o:['Relieve pressure','Direct hot water to the zone whose thermostat is calling','Filter the water','Ignite the burner'],a:1,e:'Zone valves open/close to send heated water to the zones calling for heat; stuck ones cause heating complaints.'},
 ]},

/* ===== L9 RADIATORS, BASEBOARD & STEAM ===== */
{id:'l9',kind:'Lesson 9',label:'Radiators, Baseboard & Steam',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 9 · Ch.10 Boilers — emitters</span><h1>Where the water gives up its heat</h1>
 <p class="lead">The emitters are the business end of a hydronic system — the radiators, baseboard, and convectors that actually warm the rooms. They're simple, but they have their own handful of conditions.</p>
 <h2>The emitter types</h2>
 <p><b>Cast-iron radiators</b> — the tall, old standbys — hold a lot of water and radiate steadily. <b>Baseboard convectors</b> — finned tubes along the wall — heat air that rises off the fins. <b>Convectors</b> in cabinets work the same way. All of them depend on water (or steam) actually reaching them and on air being able to get out of the way.</p>
 <h2>Common conditions</h2>
 <p><b>Trapped air</b> is the usual complaint: air collects at the high points and blocks circulation, so a radiator runs cold at the top or a baseboard won't heat. The cure is <b>bleeding</b> the air at the valves — a maintenance item you can note. <b>Leaks</b> at valves and connections leave staining. <b>Balancing</b> — some rooms too hot, others too cold — is common in older systems. And emitters or piping that are <b>painted over, damaged, or disconnected</b> are straightforward findings.</p>
 <h2>Steam specifics</h2>
 <p>On a <b>steam</b> system, each radiator has an <b>air vent</b> that hisses as steam pushes air out, then closes — a stuck-open or stuck-closed vent is a common steam fault. The boiler carries a <b>sight glass</b> showing water level, which must stay in range. Steam radiators must <b>slope slightly back toward the return</b> so condensate drains; a radiator pitched the wrong way bangs and spits (water hammer). You won't service these, but you should recognize a steam system and its telltales.</p>
 ${story('Inspector in the house',`A homeowner complains the upstairs bedroom radiator "never gets hot at the top." You feel it — hot at the bottom, cold up high. That's textbook <b>trapped air</b>, not a dead radiator: the system needs bleeding. You note it as a maintenance item, not a defect, and explain the difference — which is exactly the kind of plain, useful call that builds trust on an inspection.`)}`,
 quiz:[
  {q:'A hydronic radiator that is hot at the bottom but cold at the top usually has:',o:['A cracked heat exchanger','Trapped air that needs bleeding','Too much pressure','A bad thermostat'],a:1,e:'Air collects at the high point and blocks circulation; bleeding the air restores it. A maintenance item.'},
  {q:'Baseboard convectors heat a room by:',o:['Radiating from a large water mass only','Warming air that rises off finned tubes','Blowing air with a fan','Burning gas at the baseboard'],a:1,e:'Finned tubes warm passing air, which rises and circulates — convection.'},
  {q:'On a steam radiator, the air vent:',o:['Supplies gas','Lets air out as steam enters, then closes; stuck vents are a common fault','Pumps water','Regulates draft'],a:1,e:'The vent releases air ahead of the steam and closes; stuck open/closed is a typical steam problem.'},
  {q:'A steam boiler\'s sight glass shows:',o:['Flue temperature','The boiler water level, which must stay in range','Gas pressure','Outdoor temperature'],a:1,e:'The sight glass indicates water level — a key steam-system check.'},
  {q:'A steam radiator pitched the wrong way (away from the return) tends to:',o:['Heat more evenly','Bang and spit (water hammer) because condensate can\'t drain','Use less fuel','Vent better'],a:1,e:'Improper slope traps condensate, causing water hammer and spitting.'},
 ]},

/* ===== L10 DUCTWORK & DISTRIBUTION ===== */
{id:'l10',kind:'Lesson 10',label:'Ductwork & Air Distribution',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 10 · Ch.11 Distribution</span><h1>The delivery network for forced air</h1>
 <p class="lead">On a forced-air system, the furnace or heat pump is only half the story — the duct network decides whether that heat actually reaches the rooms evenly. Ducts are mostly hidden, but the parts you can see tell you a lot.</p>
 <h2>Supply and return</h2>
 <p>Two halves: <b>supply</b> ducts carry conditioned air from the furnace to the <b>registers</b> in each room, and <b>return</b> ducts (through <b>return grilles</b>) bring room air back to be reheated and recirculated. A system needs adequate return as well as supply — rooms with supply but no return path tend to stay pressurized and underheated. <b>Registers and grilles</b> should be present, open, and unobstructed by furniture or rugs.</p>
 <h2>Common conditions</h2>
 <p><b>Leakage</b> at duct joints — especially in unconditioned spaces like attics and crawlspaces — wastes heat and money; look for disconnected or poorly sealed sections. <b>Damaged, crushed, or disconnected</b> ducts cut delivery to whole rooms. <b>Poor support</b> lets flex duct sag and kink. <b>Balance</b> problems — some rooms much warmer than others — often trace back to the ductwork. And in older homes, watch for <b>asbestos</b> used as duct insulation or tape on heating ducts: don't disturb it, note it, and recommend specialist evaluation.</p>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Old duct insulation — leave it alone</div><p>Crumbling white/gray insulation or tape wrapped on old heating ducts and the furnace plenum can contain <b>asbestos</b>. Don't probe or disturb it. Note its presence and recommend evaluation by a qualified specialist — the hazard comes from disturbing it, not from reporting it.</p></div></div>
 <p>What you do: confirm registers and returns are present and open, feel for airflow at the registers with the system running, and look at accessible ductwork for disconnections, sagging, leakage, and suspect insulation.</p>`,
 quiz:[
  {q:'Supply registers and return grilles, respectively:',o:['Both bring air back to the furnace','Deliver conditioned air to rooms / bring room air back to be reheated','Both deliver air to rooms','Have no distinct roles'],a:1,e:'Supply delivers conditioned air; returns bring room air back for reconditioning.'},
  {q:'Duct leakage is most wasteful when it occurs in:',o:['Conditioned living space','Unconditioned spaces like attics and crawlspaces','The thermostat','The flue'],a:1,e:'Leaks in unconditioned spaces dump heated air where it does no good, wasting energy.'},
  {q:'A room with a supply register but no adequate return tends to:',o:['Overheat the rest of the house','Stay pressurized and underheated','Backdraft the furnace','Trip the limit switch'],a:1,e:'Without a return path, the room pressurizes and doesn\'t get good airflow/heating.'},
  {q:'Crumbling insulation or tape on old heating ducts may contain asbestos, so you should:',o:['Remove it for the client','Disturb it to confirm','Leave it undisturbed, note it, and recommend specialist evaluation','Paint over it'],a:2,e:'The hazard is in disturbing it; report its presence and refer it, don\'t probe it.'},
  {q:'Registers and grilles blocked by furniture or rugs will:',o:['Improve balance','Impair airflow and even heating','Have no effect','Protect the ducts'],a:1,e:'Blocked registers/returns choke airflow and worsen room-to-room balance.'},
 ]},

/* ===== L11 ELECTRIC HEAT & HEAT PUMPS ===== */
{id:'l11',kind:'Lesson 11',label:'Electric Heat & Heat Pumps',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 11 · Ch.11 Other</span><h1>Heat without a flame</h1>
 <p class="lead">Not all heat is burned. Electric systems make heat with no combustion — which means no flue, no carbon monoxide, and a very different set of things to check. Two kinds matter: simple resistance heat, and the heat pump.</p>
 <h2>Electric resistance heat</h2>
 <p><b>Electric resistance</b> heat — baseboard heaters, electric furnaces, wall units — works like a giant toaster: current through a resistance element makes heat. It's <b>100% efficient at the appliance</b> (all the electricity becomes heat) but electricity is expensive, so operating cost is high. There's no combustion to worry about; you're checking that units operate, aren't damaged, and aren't blocked by furniture or drapes (a fire concern with baseboard). Electric furnaces still use a blower and ducts, so the air-side checks from Lesson 4 apply.</p>
 <h2>Heat pumps in heating mode</h2>
 <p>A <b>heat pump</b> is an air conditioner that can run backward. In summer it moves heat out of the house; in winter a <b>reversing valve</b> flips the refrigerant cycle so it <b>moves heat from the outdoor air into the house</b> — even cold air has heat to extract. It's efficient because it <em>moves</em> heat rather than making it. Two heating-mode specifics: as outdoor temperatures drop, capacity falls, so heat pumps have <b>supplemental (backup) heat</b> — usually electric resistance strips — that kick in on the coldest days; and the outdoor coil ices up, so the unit runs a periodic <b>defrost</b> cycle (you may see steam off the outdoor unit, which is normal).</p>
 <p>What you check carries over from the cooling section: the outdoor unit is level and clear, the coil isn't crushed or blocked, the refrigerant lines are insulated, and the unit produces warm air at the registers in heating mode. A heat pump blowing cool-ish air with the backup constantly running points to a refrigerant or system problem.</p>
 ${story('Inspector in the house',`It's a mild day and the heat pump is putting out air that feels barely warm — cooler than a furnace would. A new inspector might call it broken. But heat-pump supply air is <b>normally cooler</b> than furnace air; it heats by volume over time, not by blasting hot air. You confirm it's warmer than room temperature and the backup isn't stuck on, and you explain the difference to the client rather than writing up a non-defect.`)}`,
 quiz:[
  {q:'Electric resistance heat differs from gas/oil heat in that it:',o:['Is cheaper to run','Has no combustion, so no flue and no carbon monoxide','Needs no electricity','Is less efficient at the appliance'],a:1,e:'No flame means no flue or CO; it\'s ~100% efficient at the unit, but electricity is costly to run.'},
  {q:'In heating mode, a heat pump:',o:['Burns gas','Uses a reversing valve to move heat from outdoor air into the house','Makes heat with a flame','Has no outdoor unit'],a:1,e:'The reversing valve flips the refrigerant cycle so it extracts heat from outside air, even when cold.'},
  {q:'Heat pumps include supplemental (backup) heat because:',o:['The reversing valve fails often','Capacity drops as outdoor temperature falls, so backup covers the coldest days','It improves cooling','Code forbids heat pumps alone'],a:1,e:'As it gets colder there\'s less heat to extract, so resistance backup supplements on the coldest days.'},
  {q:'Steam rising off the outdoor unit of a heat pump in winter is:',o:['A refrigerant leak','Normal — the defrost cycle melting coil frost','A sign of fire','Always a defect'],a:1,e:'Heat pumps periodically defrost the iced outdoor coil; visible steam during defrost is normal.'},
  {q:'Heat-pump supply air feels cooler than furnace air because it:',o:['Is broken','Heats by moving a larger volume of mildly warm air over time, not by blasting hot air','Is actually cooling','Has no blower'],a:1,e:'Cooler-than-furnace supply air is normal for heat pumps; confirm it\'s above room temp and backup isn\'t stuck on.'},
 ]},

/* ===== L12 SOLID FUEL & SAFETY SYNTHESIS ===== */
{id:'l12',kind:'Lesson 12',label:'Wood, Fireplaces & Safety',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 12 · Ch.11 Solid fuel</span><h1>Open flames in the living room — and the wrap-up</h1>
 <p class="lead">Wood stoves, fireplaces, inserts, and portable space heaters put combustion right in the living space. They're lower-tech but higher-stakes for clearances and fire, so you check the obvious safety items — then we pull the whole heating chapter together by triage.</p>
 <h2>Fireplaces and the parts that matter</h2>
 <p>A masonry fireplace has a <b>firebox</b> (where the fire burns), a <b>hearth</b> and a <b>hearth extension</b> (the non-combustible floor in front that catches sparks and embers), a <b>damper</b>, and a <b>flue liner</b> in the chimney. The hearth extension exists for a reason — combustible flooring right up to the firebox is a fire hazard, so the non-combustible extension must be present and adequately sized. <b>Flue liners</b> may be clay tile, firebrick, metal, or (in old chimneys) asbestos cement; a cracked, missing, or deteriorated liner lets heat and combustion gases reach the masonry and framing.</p>
 <h2>Wood stoves, inserts, and clearances</h2>
 <p>The recurring theme is <b>clearance to combustibles</b>: a wood stove or insert too close to walls, framing, or furniture is a fire hazard, and the connector pipe passing through a wall or ceiling needs proper <b>fire-stopping</b> and a <b>thimble</b> (a non-combustible pass-through). <b>Creosote</b> — the tarry, combustible residue from burning wood — builds up in flues and is the classic chimney-fire fuel, which is why solid-fuel flues need regular cleaning. Note inadequate clearances, missing fire-stopping, and any sign of past chimney fire or heavy creosote.</p>
 <h2>Space heaters</h2>
 <p><b>Portable space heaters</b> are a common finding — fine in principle, dangerous in practice when placed near combustibles or run on overloaded cords. Unvented fuel-burning space heaters add a CO concern indoors. Note their use and the obvious hazards.</p>
 <h2>Pulling the chapter together</h2>
 <p>You've now read every heating family through one loop: gas and oil combustion, the heat exchanger and venting, boilers and their safeties, distribution, electric/heat-pump, and solid fuel. The sort below is the synthesis — every heating finding lands in one of two buckets. <b>Flag now</b> anything that can release combustion gas, scald, explode, or start a fire; <b>note and monitor</b> the wear and maintenance. Then prove it on the scenarios and the mastery check.</p>
 ${W('sort','heattriage')}`,
 quiz:[
  {q:'The hearth extension in front of a fireplace exists to:',o:['Improve draft','Provide a non-combustible surface that catches sparks and embers','Store wood','Hold the damper'],a:1,e:'It protects combustible flooring near the firebox from sparks/embers — a fire-safety feature.'},
  {q:'A cracked or missing flue liner is a problem because it:',o:['Improves efficiency','Lets heat and combustion gases reach the masonry and framing','Has no effect','Only matters for gas'],a:1,e:'The liner contains heat and gases; a failed liner exposes the chimney structure and framing.'},
  {q:'Creosote is:',o:['A type of flue liner','Tarry combustible residue from burning wood that fuels chimney fires','A boiler control','A duct sealant'],a:1,e:'Creosote builds up in solid-fuel flues and is the classic chimney-fire fuel — hence regular cleaning.'},
  {q:'Where a wood-stove connector passes through a wall or ceiling, it needs:',o:['Extra creosote','Proper fire-stopping and a non-combustible thimble','A barometric damper','A circulator'],a:1,e:'A thimble and fire-stopping safely isolate the hot connector from combustible framing.'},
  {q:'In the heating safety triage, which belongs in FLAG NOW?',o:['A dirty furnace filter','A backdrafting flue spilling exhaust','An older but working furnace','A slightly noisy blower'],a:1,e:'Backdrafting releases combustion gas/CO into the home — a flag-now safety item; the others are maintenance.'},
 ]},
