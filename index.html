<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closer Capital — Referral Tracker</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface-2: #1a1a1a;
    --red: #dc2626;
    --red-dark: #991b1b;
    --red-glow: rgba(220,38,38,0.15);
    --green: #22c55e;
    --blue: #3b82f6;
    --yellow: #f59e0b;
    --text: #fff;
    --text-2: #aaa;
    --text-3: #666;
    --text-4: #444;
    --border: rgba(255,255,255,0.06);
    --border-2: rgba(255,255,255,0.1);
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'DM Mono', 'SF Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  #root { min-height: 100vh; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─── DATABASE ────────────────────────────────────────────────────
const DB = {
  _key: 'cc_referral_data_v1',
  load() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : { referrals: [], settings: { defaultRate: 25, defaultTerm: 36 } };
    } catch { return { referrals: [], settings: { defaultRate: 25, defaultTerm: 36 } }; }
  },
  save(data) {
    try { localStorage.setItem(this._key, JSON.stringify(data)); return true; }
    catch { return false; }
  },
  export() {
    const data = this.load();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `cc-referrals-${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
  },
  import(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.referrals) { this.save(data); resolve(data); }
          else reject('Invalid file format');
        } catch { reject('Invalid JSON'); }
      };
      reader.onerror = () => reject('Read error');
      reader.readAsText(file);
    });
  }
};

// ─── CONSTANTS ───────────────────────────────────────────────────
const SOURCES = [
  "Facebook Group", "Reddit", "Direct Network",
  "Landing Page - Roofing", "Landing Page - Window Cleaning",
  "Landing Page - Home Inspectors", "Landing Page - Fix & Flip",
  "Landing Page - Business Buyers", "Landing Page - General",
  "Dashboard Link", "Other"
];
const STATUSES = ["Lead", "Submitted", "In Review", "Funded", "Declined", "Lost"];
const STATUS_META = {
  Lead:        { bg: "rgba(255,255,255,0.04)", text: "#888", dot: "#555" },
  Submitted:   { bg: "rgba(59,130,246,0.06)", text: "#60a5fa", dot: "#3b82f6" },
  "In Review": { bg: "rgba(251,191,36,0.06)", text: "#fbbf24", dot: "#f59e0b" },
  Funded:      { bg: "rgba(34,197,94,0.06)", text: "#4ade80", dot: "#22c55e" },
  Declined:    { bg: "rgba(239,68,68,0.06)", text: "#f87171", dot: "#ef4444" },
  Lost:        { bg: "rgba(255,255,255,0.02)", text: "#555", dot: "#333" },
};
const LOAN_TYPES = [
  "Line of Credit", "Term Loan", "SBA Loan", "Equipment Financing",
  "Real Estate", "Fix & Flip", "Business Acquisition", "Working Capital", "Other"
];

// ─── UTILS ───────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2,6);
const fmt = (n) => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmt2 = (n) => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
function calcInterest(p, apr, months) {
  if (!p || !apr || !months) return 0;
  const r = apr / 100 / 12;
  if (r === 0) return 0;
  const pmt = p * (r * Math.pow(1+r, months)) / (Math.pow(1+r, months) - 1);
  return (pmt * months) - p;
}

// ─── STYLES ──────────────────────────────────────────────────────
const S = {
  input: {
    width: '100%', padding: '10px 12px', background: 'rgba(255,255,255,0.06)',
    border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', color: '#fff',
    fontSize: '14px', outline: 'none', boxSizing: 'border-box', fontFamily: 'var(--font)'
  },
  label: {
    display: 'block', fontSize: '11px', textTransform: 'uppercase',
    letterSpacing: '1px', color: '#666', marginBottom: '6px', fontWeight: 600
  },
  btn: (bg='var(--red)', color='#fff') => ({
    padding: '10px 20px', background: bg, border: 'none', borderRadius: '8px',
    color, fontSize: '13px', fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font)'
  }),
  ghost: {
    padding: '10px 20px', background: 'rgba(255,255,255,0.06)',
    border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px',
    color: '#aaa', fontSize: '13px', cursor: 'pointer', fontFamily: 'var(--font)'
  }
};

// ─── MODAL ───────────────────────────────────────────────────────
function Modal({ open, onClose, children }) {
  if (!open) return null;
  return React.createElement('div', {
    style: { position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',
      alignItems:'center',justifyContent:'center',zIndex:1000,padding:'20px' },
    onClick: onClose
  },
    React.createElement('div', {
      style: { background:'#111',borderRadius:'16px',padding:'32px',width:'100%',
        maxWidth:'500px',maxHeight:'90vh',overflowY:'auto',border:'1px solid rgba(255,255,255,0.08)' },
      onClick: e => e.stopPropagation()
    }, children)
  );
}

// ─── REFERRAL FORM ───────────────────────────────────────────────
function ReferralForm({ initial, onSave, onDelete, onClose }) {
  const [f, setF] = useState(initial || {
    name:'', business:'', email:'', phone:'', loanType: LOAN_TYPES[0],
    amount:'', source: SOURCES[0], status:'Lead', notes:'', bonus: false,
    apr: 25, term: 36, dateAdded: new Date().toISOString().split('T')[0]
  });
  const upd = (k,v) => setF(p => ({...p,[k]:v}));
  const field = (label, key, type='text', placeholder='') =>
    React.createElement('div', { style: { marginBottom: '14px' } },
      React.createElement('label', { style: S.label }, label),
      React.createElement('input', {
        style: S.input, type, placeholder, value: f[key] || '',
        onChange: e => upd(key, e.target.value)
      })
    );
  const select = (label, key, opts) =>
    React.createElement('div', { style: { marginBottom: '14px' } },
      React.createElement('label', { style: S.label }, label),
      React.createElement('select', {
        style: {...S.input, appearance:'auto'}, value: f[key],
        onChange: e => upd(key, e.target.value)
      }, opts.map(o => React.createElement('option', { key:o, value:o }, o)))
    );

  return React.createElement('div', null,
    React.createElement('h2', { style: { margin:'0 0 24px', fontSize:'18px', fontWeight:700 } },
      initial ? 'Edit Referral' : 'New Referral'),
    React.createElement('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 14px' } },
      field('Contact Name', 'name', 'text', 'John Smith'),
      field('Business', 'business', 'text', 'Smith Roofing LLC'),
      field('Email', 'email', 'email', 'john@company.com'),
      field('Phone', 'phone', 'tel', '(555) 123-4567'),
    ),
    React.createElement('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 14px' } },
      select('Loan Type', 'loanType', LOAN_TYPES),
      field('Amount', 'amount', 'number', '150000'),
    ),
    React.createElement('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 14px' } },
      select('Source', 'source', SOURCES),
      select('Status', 'status', STATUSES),
    ),
    React.createElement('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'0 14px' } },
      field('Date', 'dateAdded', 'date'),
      field('APR %', 'apr', 'number', '25'),
      field('Term (mo)', 'term', 'number', '36'),
    ),
    React.createElement('div', { style: { marginBottom:'14px' } },
      React.createElement('label', { style: S.label }, 'Notes'),
      React.createElement('textarea', {
        style: {...S.input, minHeight:'60px', resize:'vertical'},
        value: f.notes||'', onChange: e => upd('notes', e.target.value),
        placeholder: 'Additional context...'
      })
    ),
    React.createElement('label', {
      style: { display:'flex', alignItems:'center', gap:'10px', cursor:'pointer',
        fontSize:'14px', marginBottom:'24px' }
    },
      React.createElement('input', {
        type:'checkbox', checked: f.bonus||false,
        onChange: e => upd('bonus', e.target.checked),
        style: { accentColor:'var(--red)', width:'16px', height:'16px' }
      }),
      '15% Bonus Period'
    ),
    React.createElement('div', { style: { display:'flex', justifyContent:'space-between' } },
      React.createElement('div', null,
        initial && React.createElement('button', {
          style: { ...S.ghost, color:'#f87171', borderColor:'rgba(239,68,68,0.2)',
            background:'rgba(239,68,68,0.08)' },
          onClick: () => { onDelete(initial.id); onClose(); }
        }, 'Delete')
      ),
      React.createElement('div', { style: { display:'flex', gap:'12px' } },
        React.createElement('button', { style: S.ghost, onClick: onClose }, 'Cancel'),
        React.createElement('button', {
          style: S.btn(),
          onClick: () => { onSave({...f, id: initial?.id || uid(), amount: parseFloat(f.amount)||0, apr: parseFloat(f.apr)||25, term: parseInt(f.term)||36}); onClose(); }
        }, 'Save')
      )
    )
  );
}

// ─── STAT CARD ───────────────────────────────────────────────────
function Stat({ label, value, sub, highlight }) {
  return React.createElement('div', {
    style: { padding:'20px 24px', background: highlight ? 'rgba(220,38,38,0.05)' : 'var(--bg)' }
  },
    React.createElement('p', { style: { margin:0, fontSize:'11px', color:'#555', letterSpacing:'1px', fontWeight:600, fontFamily:'var(--mono)', textTransform:'uppercase' } }, label),
    React.createElement('p', { style: { margin:'6px 0 2px', fontSize:'24px', fontWeight:700, color: highlight?'#ef4444':'#fff', fontFamily:'var(--mono)' } }, value),
    sub && React.createElement('p', { style: { margin:0, fontSize:'12px', color:'#444' } }, sub)
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => DB.load());
  const [view, setView] = useState('pipeline');
  const [modal, setModal] = useState(null); // null | 'new' | referral object
  const [calcAmt, setCalcAmt] = useState(150000);
  const [calcRate, setCalcRate] = useState(25);
  const [calcTerm, setCalcTerm] = useState(36);
  const [importMsg, setImportMsg] = useState('');
  const [search, setSearch] = useState('');

  const refs = data.referrals || [];

  const persist = useCallback((newRefs) => {
    const next = { ...data, referrals: newRefs };
    setData(next);
    DB.save(next);
  }, [data]);

  const saveRef = (ref) => {
    const exists = refs.find(r => r.id === ref.id);
    persist(exists ? refs.map(r => r.id === ref.id ? ref : r) : [...refs, ref]);
  };
  const deleteRef = (id) => persist(refs.filter(r => r.id !== id));

  const filtered = useMemo(() => {
    if (!search.trim()) return refs;
    const q = search.toLowerCase();
    return refs.filter(r =>
      (r.name||'').toLowerCase().includes(q) ||
      (r.business||'').toLowerCase().includes(q) ||
      (r.source||'').toLowerCase().includes(q) ||
      (r.loanType||'').toLowerCase().includes(q)
    );
  }, [refs, search]);

  // Stats
  const funded = refs.filter(r => r.status === 'Funded');
  const totalFunded = funded.reduce((s,r) => s + r.amount, 0);
  const totalInterest = funded.reduce((s,r) => s + calcInterest(r.amount, r.apr||25, r.term||36), 0);
  const totalComm = funded.reduce((s,r) => {
    const int = calcInterest(r.amount, r.apr||25, r.term||36);
    return s + int * (r.bonus ? 0.15 : 0.10);
  }, 0);
  const pipeline = refs.filter(r => !['Funded','Declined','Lost'].includes(r.status));
  const pipelineVal = pipeline.reduce((s,r) => s + r.amount, 0);

  const sourceData = useMemo(() =>
    SOURCES.map(src => ({
      source: src,
      total: refs.filter(r => r.source === src).length,
      funded: refs.filter(r => r.source === src && r.status === 'Funded').length,
      value: refs.filter(r => r.source === src && r.status === 'Funded').reduce((s,r) => s + r.amount, 0),
      comm: refs.filter(r => r.source === src && r.status === 'Funded').reduce((s,r) => {
        const int = calcInterest(r.amount, r.apr||25, r.term||36);
        return s + int * (r.bonus ? 0.15 : 0.10);
      }, 0)
    })).filter(s => s.total > 0).sort((a,b) => b.comm - a.comm),
  [refs]);

  const cInt = calcInterest(calcAmt, calcRate, calcTerm);

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    DB.import(file).then(d => { setData(d); setImportMsg('Imported!'); setTimeout(()=>setImportMsg(''),2000); })
      .catch(err => { setImportMsg('Error: ' + err); setTimeout(()=>setImportMsg(''),3000); });
    e.target.value = '';
  };

  // Nav tab
  const Tab = ({ id, label }) =>
    React.createElement('button', {
      onClick: () => setView(id),
      style: {
        padding:'12px 24px', background:'none', border:'none',
        borderBottom: view===id ? '2px solid var(--red)' : '2px solid transparent',
        color: view===id ? '#fff' : '#555', fontSize:'12px', fontWeight:600,
        cursor:'pointer', textTransform:'uppercase', letterSpacing:'1px', fontFamily:'var(--font)'
      }
    }, label);

  return React.createElement('div', null,
    // Header
    React.createElement('div', {
      style: { background:'linear-gradient(135deg,#0a0a0a,#1a0a0a)',
        borderBottom:'1px solid var(--border)', padding:'20px 28px',
        display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'14px' }
    },
      React.createElement('div', { style: { display:'flex', alignItems:'center', gap:'14px' } },
        React.createElement('div', {
          style: { width:'40px',height:'40px',borderRadius:'10px',
            background:'linear-gradient(135deg,#dc2626,#991b1b)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:'16px',fontWeight:700,fontFamily:'var(--mono)' }
        }, 'CC'),
        React.createElement('div', null,
          React.createElement('h1', { style: { margin:0,fontSize:'18px',fontWeight:700,letterSpacing:'-0.5px' } }, 'Closer Capital'),
          React.createElement('p', { style: { margin:0,fontSize:'11px',color:'#555',fontFamily:'var(--mono)' } }, 'REFERRAL TRACKER')
        )
      ),
      React.createElement('div', { style: { display:'flex', gap:'10px', alignItems:'center', flexWrap:'wrap' } },
        React.createElement('input', {
          style: { ...S.input, width:'200px', fontSize:'13px' },
          placeholder: 'Search referrals...',
          value: search, onChange: e => setSearch(e.target.value)
        }),
        React.createElement('button', { style: S.btn(), onClick: () => setModal('new') }, '+ New Referral')
      )
    ),

    // Nav
    React.createElement('div', {
      style: { display:'flex', gap:0, borderBottom:'1px solid var(--border)',
        background:'rgba(255,255,255,0.02)', flexWrap:'wrap' }
    },
      React.createElement(Tab, { id:'pipeline', label:'Pipeline' }),
      React.createElement(Tab, { id:'calculator', label:'Calculator' }),
      React.createElement(Tab, { id:'sources', label:'Sources' }),
      React.createElement(Tab, { id:'settings', label:'Settings' }),
    ),

    // Stats bar
    React.createElement('div', {
      style: { display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',
        gap:'1px', background:'var(--border)', margin:'24px 28px', borderRadius:'12px', overflow:'hidden' }
    },
      React.createElement(Stat, { label:'Pipeline', value: fmt(pipelineVal), sub:`${pipeline.length} active` }),
      React.createElement(Stat, { label:'Total Funded', value: fmt(totalFunded), sub:`${funded.length} deals` }),
      React.createElement(Stat, { label:'Est. Interest', value: fmt(totalInterest), sub:'on funded deals' }),
      React.createElement(Stat, { label:'Commission', value: fmt2(totalComm), sub:'earned to date', highlight:true }),
    ),

    // Content
    React.createElement('div', { style: { padding:'0 28px 60px' } },

      // ── PIPELINE ──
      view === 'pipeline' && React.createElement('div', null,
        filtered.length === 0
          ? React.createElement('div', { style: { textAlign:'center', padding:'60px 20px', color:'#444' } },
              React.createElement('p', { style: { fontSize:'48px', margin:'0 0 16px' } }, '📋'),
              React.createElement('p', { style: { fontSize:'16px', fontWeight:600, color:'#555' } },
                search ? 'No matching referrals' : 'No referrals yet'),
              !search && React.createElement('p', { style: { fontSize:'13px' } }, 'Add your first referral to start tracking commissions')
            )
          : STATUSES.map(status => {
              const items = filtered.filter(r => r.status === status);
              if (!items.length) return null;
              const m = STATUS_META[status];
              return React.createElement('div', { key: status },
                React.createElement('div', {
                  style: { display:'flex', alignItems:'center', gap:'8px', margin:'20px 0 8px' }
                },
                  React.createElement('div', { style: { width:'8px',height:'8px',borderRadius:'50%',background:m.dot } }),
                  React.createElement('span', { style: { fontSize:'12px',fontWeight:600,color:m.text,textTransform:'uppercase',letterSpacing:'1px' } }, status),
                  React.createElement('span', { style: { fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } }, `(${items.length})`)
                ),
                items.map(r => {
                  const interest = calcInterest(r.amount, r.apr||25, r.term||36);
                  const comm = interest * (r.bonus ? 0.15 : 0.10);
                  return React.createElement('div', {
                    key: r.id,
                    style: { background:m.bg, border:'1px solid rgba(255,255,255,0.04)',
                      borderRadius:'10px', padding:'14px 18px', marginBottom:'6px',
                      display:'grid', gridTemplateColumns:'1fr auto', alignItems:'center', gap:'12px',
                      cursor:'pointer', transition:'border-color 0.2s' },
                    onClick: () => setModal(r),
                    onMouseEnter: e => e.currentTarget.style.borderColor='rgba(255,255,255,0.12)',
                    onMouseLeave: e => e.currentTarget.style.borderColor='rgba(255,255,255,0.04)'
                  },
                    React.createElement('div', null,
                      React.createElement('div', { style: { display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap' } },
                        React.createElement('span', { style: { fontWeight:600,fontSize:'15px' } }, r.name || 'Unnamed'),
                        r.business && React.createElement('span', { style: { fontSize:'12px',color:'#555' } }, `— ${r.business}`),
                        r.bonus && React.createElement('span', {
                          style: { fontSize:'10px',background:'rgba(220,38,38,0.15)',color:'#f87171',
                            padding:'2px 8px',borderRadius:'4px',fontWeight:600 }
                        }, '15%')
                      ),
                      React.createElement('div', { style: { display:'flex',gap:'14px',marginTop:'5px',flexWrap:'wrap' } },
                        React.createElement('span', { style: { fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } }, r.loanType),
                        React.createElement('span', { style: { fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } }, r.source),
                        React.createElement('span', { style: { fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } }, r.dateAdded),
                        r.email && React.createElement('span', { style: { fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } }, r.email)
                      )
                    ),
                    React.createElement('div', { style: { textAlign:'right' } },
                      React.createElement('p', { style: { margin:0,fontSize:'18px',fontWeight:700,fontFamily:'var(--mono)',color:m.text } }, fmt(r.amount)),
                      r.status === 'Funded' && React.createElement('p', {
                        style: { margin:'2px 0 0',fontSize:'11px',color:'#22c55e',fontFamily:'var(--mono)' }
                      }, `+${fmt2(comm)} comm.`)
                    )
                  );
                })
              );
            })
      ),

      // ── CALCULATOR ──
      view === 'calculator' && React.createElement('div', { style: { maxWidth:'600px' } },
        React.createElement('h2', { style: { fontSize:'16px',fontWeight:700,marginBottom:'24px',color:'#ccc' } }, 'Commission Calculator'),
        [
          { label:'LOAN AMOUNT', val:calcAmt, set:setCalcAmt, min:25000, max:5000000, step:5000, fmt: fmt },
          { label:'EST. APR (%)', val:calcRate, set:setCalcRate, min:8, max:40, step:0.5, fmt: v=>v.toFixed(1)+'%' },
          { label:'TERM (MONTHS)', val:calcTerm, set:setCalcTerm, min:6, max:60, step:1, fmt: v=>v+' mo' },
        ].map(s =>
          React.createElement('div', { key:s.label, style: { marginBottom:'24px' } },
            React.createElement('div', { style: { display:'flex',justifyContent:'space-between',marginBottom:'8px' } },
              React.createElement('span', { style: { fontSize:'11px',color:'#555',letterSpacing:'1px',fontWeight:600,fontFamily:'var(--mono)',textTransform:'uppercase' } }, s.label),
              React.createElement('span', { style: { fontSize:'20px',fontWeight:700,fontFamily:'var(--mono)' } }, s.fmt(s.val))
            ),
            React.createElement('input', { type:'range', min:s.min, max:s.max, step:s.step, value:s.val,
              onChange: e => s.set(parseFloat(e.target.value)),
              style: { width:'100%', accentColor:'var(--red)' }
            }),
            React.createElement('div', { style: { display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#444',fontFamily:'var(--mono)' } },
              React.createElement('span', null, s.fmt(s.min)),
              React.createElement('span', null, s.fmt(s.max))
            )
          )
        ),
        React.createElement('div', { style: { background:'rgba(255,255,255,0.03)',borderRadius:'12px',padding:'20px 24px',marginTop:'32px' } },
          [
            { l:'Total Interest on Loan', v: fmt(cInt) },
            { l:'Your Commission @ 10%', v: fmt2(cInt*0.10), c:'#fff' },
            { l:'Your Commission @ 15% (Bonus)', v: fmt2(cInt*0.15), c:'#ef4444' },
          ].map((row,i) =>
            React.createElement('div', { key:i, style: { display:'flex',justifyContent:'space-between',padding:'10px 0',
              borderBottom: i<2 ? '1px solid rgba(255,255,255,0.06)':'none' } },
              React.createElement('span', { style: { fontSize:'13px',color:'#777' } }, row.l),
              React.createElement('span', { style: { fontSize:'18px',fontWeight:700,fontFamily:'var(--mono)',color:row.c||'#aaa' } }, row.v)
            )
          )
        ),
        React.createElement('div', { style: { background:'rgba(220,38,38,0.05)',borderRadius:'12px',padding:'20px 24px',marginTop:'16px',border:'1px solid rgba(220,38,38,0.12)' } },
          React.createElement('p', { style: { margin:'0 0 12px',fontSize:'11px',color:'#dc2626',letterSpacing:'1px',fontWeight:600,fontFamily:'var(--mono)',textTransform:'uppercase' } }, 'ANNUAL PROJECTION'),
          [5,10,20,50].map(n => {
            const annual = cInt * 0.10 * n;
            return React.createElement('div', { key:n, style: { display:'flex',justifyContent:'space-between',padding:'6px 0' } },
              React.createElement('span', { style: { fontSize:'13px',color:'#777' } }, `${n} deals/year`),
              React.createElement('span', { style: { fontSize:'16px',fontWeight:700,fontFamily:'var(--mono)',color:annual>50000?'#22c55e':'#fff' } }, fmt(annual))
            );
          })
        )
      ),

      // ── SOURCES ──
      view === 'sources' && React.createElement('div', null,
        React.createElement('h2', { style: { fontSize:'16px',fontWeight:700,marginBottom:'24px',color:'#ccc' } }, 'Channel Performance'),
        sourceData.length === 0
          ? React.createElement('p', { style: { color:'#444',fontSize:'14px' } }, 'Add referrals with source attribution to track channel performance.')
          : sourceData.map(s =>
              React.createElement('div', { key:s.source, style: {
                background:'rgba(255,255,255,0.03)',borderRadius:'10px',padding:'16px 20px',
                marginBottom:'8px',display:'grid',gridTemplateColumns:'1fr auto',alignItems:'center'
              } },
                React.createElement('div', null,
                  React.createElement('p', { style: { margin:0,fontWeight:600,fontSize:'14px' } }, s.source),
                  React.createElement('p', { style: { margin:'4px 0 0',fontSize:'12px',color:'#444',fontFamily:'var(--mono)' } },
                    `${s.total} referrals · ${s.funded} funded · ${s.total>0?Math.round(s.funded/s.total*100):0}% conversion`)
                ),
                React.createElement('div', { style: { textAlign:'right' } },
                  React.createElement('p', { style: { margin:0,fontSize:'18px',fontWeight:700,fontFamily:'var(--mono)',color:s.comm>0?'#22c55e':'#444' } }, fmt2(s.comm)),
                  React.createElement('p', { style: { margin:'2px 0 0',fontSize:'11px',color:'#555' } }, 'commission')
                )
              )
            )
      ),

      // ── SETTINGS ──
      view === 'settings' && React.createElement('div', { style: { maxWidth:'500px' } },
        React.createElement('h2', { style: { fontSize:'16px',fontWeight:700,marginBottom:'24px',color:'#ccc' } }, 'Data Management'),
        React.createElement('div', { style: { display:'flex',flexDirection:'column',gap:'12px' } },
          React.createElement('button', { style: S.ghost, onClick: () => DB.export() }, 'Export Data (JSON)'),
          React.createElement('label', { style: { ...S.ghost, display:'inline-block', textAlign:'center' } },
            'Import Data (JSON)',
            React.createElement('input', { type:'file', accept:'.json', onChange: handleImport,
              style: { display:'none' } })
          ),
          importMsg && React.createElement('p', { style: { fontSize:'13px', color: importMsg.startsWith('Error') ? '#f87171' : '#4ade80' } }, importMsg),
          React.createElement('div', { style: { marginTop:'24px',padding:'20px',background:'rgba(255,255,255,0.03)',borderRadius:'10px' } },
            React.createElement('p', { style: { fontSize:'13px',color:'#666',lineHeight:1.6 } },
              `Database: localStorage (browser) · ${refs.length} referrals · ${funded.length} funded · Data persists across sessions. Export regularly for backup.`)
          ),
          React.createElement('button', {
            style: { ...S.ghost, color:'#f87171', borderColor:'rgba(239,68,68,0.2)', marginTop:'12px' },
            onClick: () => { if (confirm('Delete ALL referral data? This cannot be undone.')) { persist([]); } }
          }, 'Clear All Data')
        )
      )
    ),

    // Modal
    React.createElement(Modal, { open: modal !== null, onClose: () => setModal(null) },
      modal && React.createElement(ReferralForm, {
        initial: modal === 'new' ? null : modal,
        onSave: saveRef,
        onDelete: deleteRef,
        onClose: () => setModal(null)
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
