n <h3>Subpanels</h3><ul class=\"clean\"><li><b>Neutral and ground bonded in the subpanel</b> \u2014 Should be separated; bonding belongs at the service box only.</li><li><b>Bonding screw left in</b> \u2014 Ties the neutral bus to the enclosure where it shouldn't be.</li><li><b>No equipment ground run to the subpanel</b> \u2014 A three-wire feed where four is needed.</li></ul>\n <h3>Fuses</h3><ul class=\"clean\"><li><b>Oversized / wrong-rated fuse</b> \u2014 Overfusing \u2014 the wire overheats before the fuse blows.</li><li><b>Bridged or defeated fuse</b> \u2014 A coin behind a fuse, or a bypass \u2014 extremely dangerous, removes all protection.</li><li><b>Corroded or loose fuse contacts</b> \u2014 Overheating at the holder.</li></ul>\n <h3>Breakers</h3><ul class=\"clean\"><li><b>Wrong-brand breaker in the panel</b> \u2014 A breaker not listed for that panel may not seat or trip correctly.</li><li><b>Double-tapped breaker</b> \u2014 Two wires on a breaker built for one.</li><li><b>Oversized breaker</b> \u2014 Larger than the conductor allows \u2014 overfusing.</li><li><b>Loose or unsecured breaker</b> \u2014 Not properly clipped to the bus.</li></ul>\n <h2>And the panel wires themselves</h2>\n <h3>Panel conductors</h3><ul class=\"clean\"><li><b>Overheated or discolored</b> \u2014 Often at a loose lug.</li><li><b>Undersized for the breaker</b> \u2014 The wrong end of the wire-to-breaker pairing.</li><li><b>Damaged insulation</b> \u2014 Nicks at terminations or where pulled over edges.</li><li><b>Sheathing run too far in, or stripped too far back</b> \u2014 Cable jacket should enter the box a short, correct distance.</li><li><b>Conductors not secured / cable not clamped</b> \u2014 Strain transfers to the terminals.</li></ul>\n <p>One more field skill: <b>reading fuse color at a glance</b>. The cartridge and plug-fuse colors map to amperage, and knowing them saves you squinting at fine print. Pair them up:</p>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"fuse\"></div></div>",res:[]},
      {id:"e_l8",t:"Branch-Circuit Wiring",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 8 \u00b7 \u00a77.8 Branch-Circuit Wiring</span><h1>The wiring that fans out through the house</h1>\n <p class=\"lead\">Branch circuits are the conductors running from the panel out to every light, outlet, and appliance. Most of what you'll see is cable \u2014 grouped conductors in a single sheath \u2014 and the first skill is recognizing the type and roughly when it was installed, because age tells you what problems to expect.</p>\n <h2>Cable types you'll identify</h2>\n <h3>Know these on sight</h3><ul class=\"clean\"><li><b>NM cable (\"Romex\")</b> \u2014 Plastic-sheathed cable for dry, protected interior locations \u2014 the modern standard. Hot, neutral, and a ground inside a flat or round plastic jacket.</li><li><b>UF cable</b> \u2014 Underground feeder \u2014 a tougher sheath rated for damp and direct burial.</li><li><b>Armored cable (BX / AC)</b> \u2014 Flexible spiral-metal jacket over the conductors; common in older homes and where mechanical protection is needed.</li><li><b>Conduit</b> \u2014 Conductors pulled through metal or plastic tube \u2014 used where wiring is exposed or extra protection is required.</li></ul>\n <p>The era of the wiring is itself a finding. Tap through the timeline \u2014 it tells you at a glance whether to expect no ground, cloth insulation, aluminum, or modern copper:</p>\n <div class=\"widget wmount\" data-w=\"era\" data-k=\"wire\"></div>\n <h2>Now trace it</h2>\n <p>Follow a run through an unfinished basement and click the problems. Damaged sheath, unsupported cable, open splices, missing connectors \u2014 this is the scan.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"branch\"></div>\n <h2>The conditions \u2014 fifteen of them</h2>\n <h3>Branch-wiring conditions and why they matter</h3><ul class=\"clean\"><li><b>Undersized conductor for the breaker</b> \u2014 The wire can overheat before the breaker trips.</li><li><b>Overfused circuit</b> \u2014 The same problem from the breaker's side \u2014 protection too large for the wire.</li><li><b>Damaged insulation</b> \u2014 Nicks, cracks, rodent damage, or heat damage expose conductors.</li><li><b>Open splices outside a box</b> \u2014 Every connection must be inside an accessible junction box, never buried in a wall or ceiling.</li><li><b>Splices made improperly</b> \u2014 Loose twists, no connectors, or taped-only joints.</li><li><b>Cable not secured / not stapled</b> \u2014 Cable should be stapled near boxes and supported along its run so strain stays off terminations.</li><li><b>Run through framing without protection</b> \u2014 Where cable passes through studs near the face, a nail plate must guard it from screws and nails.</li><li><b>Too close to heat or plumbing</b> \u2014 Contact with flues, hot pipes, or sharp metal degrades the cable.</li><li><b>Missing connectors at boxes</b> \u2014 Cable entering a box without a clamp chafes on the metal edge.</li><li><b>Conductors exposed in living space</b> \u2014 Branch wiring run on the surface where it can be damaged should be protected.</li><li><b>Wrong cable type for the location</b> \u2014 NM used where moisture or burial demands UF, for example.</li><li><b>Abandoned cable left energized</b> \u2014 Dead-ended runs of unknown status.</li></ul>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>In one finished basement the receptacles barely ran a phone charger and a lamp dimmed when the furnace kicked on. Behind the cover plate the \"branch wiring\" turned out to be light-gauge bell-and-telephone wire someone had pressed into service for 120-volt outlets. It looked like wiring and worked just enough to fool a buyer. The lesson: don't assume the conductor is what it should be \u2014 when outlets behave oddly, look at what's actually feeding them, and report undersized or improvised wiring plainly.</p></div></div>",res:[]},
      {id:"e_l9",t:"Knob-and-Tube &amp; Aluminum",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 9 \u00b7 \u00a77.8 Older Wiring Systems</span><h1>Two legacy systems that need a careful eye</h1>\n <p class=\"lead\">Two wiring types deserve their own lesson because they're widely misunderstood and easy to mishandle in a report \u2014 one from the early 20th century, one from a specific window in the 1960s and 70s. Neither is automatically a disaster, and overstating them is as much a mistake as missing them.</p>\n <h2>Knob-and-tube</h2>\n <p>Installed roughly <b>1920\u20131950</b>, knob-and-tube runs the hot and neutral as <b>two separate conductors</b>, held off the framing by porcelain <b>knobs</b> and passed through joists in porcelain <b>tubes</b>. Spacing the conductors apart and away from wood was the safety design \u2014 and there is <b>no equipment ground</b>, so it predates modern grounding entirely. Undisturbed and intact, it can still function; the trouble is almost always what has happened to it since.</p>\n <h3>Knob-and-tube conditions</h3><ul class=\"clean\"><li><b>Buried in thermal insulation</b> \u2014 The original design relied on open air to shed heat. Pack insulation around it and heat can build \u2014 the central controversy with K&T. Note it and recommend evaluation.</li><li><b>Amateur modifications and extensions</b> \u2014 Decades of splices and add-ons, often ungrounded and improperly joined.</li><li><b>Brittle or deteriorated insulation</b> \u2014 The conductor insulation ages, cracks, and falls away, exposing bare wire.</li><li><b>Compromised connections</b> \u2014 Loose or corroded original splices.</li></ul>\n <div class=\"field\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z\"/><line x1=\"4\" y1=\"22\" x2=\"4\" y2=\"15\"/></svg></div><div><div class=\"t\">How to report K&T without overstating</div><p>Don't declare it unsafe on sight. Report that the home has knob-and-tube, that it lacks an equipment ground, and that any portions <b>buried in insulation, modified, or deteriorated</b> warrant evaluation by an electrician. Insurers often have their own position \u2014 let the client know it may affect coverage.</p></div></div>\n <h2>Aluminum branch wiring</h2>\n <p>For a window of roughly <b>1965\u20131973</b>, single-strand <b>aluminum</b> was widely used for ordinary 15- and 20-amp branch circuits. The aluminum itself isn't the hazard \u2014 the <b>terminations</b> are. Aluminum expands and contracts more than copper, can <b>creep</b> out from under a screw over years of heating and cooling, and oxidizes into a resistive film; at devices not designed for it, the connection loosens and overheats. The receptacle is the worst spot.</p>\n <h3>Aluminum branch-wiring conditions</h3><ul class=\"clean\"><li><b>Terminated on devices not rated for aluminum</b> \u2014 Standard devices loosen and overheat. Devices must be marked CO/ALR (receptacles/switches) or the connection corrected.</li><li><b>Signs of overheating at terminations</b> \u2014 Discoloration, warmth, or the smell of hot plastic at outlets and switches.</li><li><b>Improper \"repairs\"</b> \u2014 Aluminum pigtailed to copper with ordinary wire nuts not listed for the joint \u2014 itself a failure point. The accepted fixes are listed connectors (such as COPALUM or AlumiConn) or CO/ALR devices.</li></ul>\n <p>One key distinction so you don't over-call it: aluminum is perfectly normal and acceptable for <b>service-entrance conductors and large 240-volt feeders</b> (those are multi-strand). The concern is specifically <b>single-strand aluminum on small branch circuits.</b> Match aluminum gauges to their devices \u2014 note they run one size larger than copper for the same job:</p>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"alwire\"></div></div>",res:[]},
      {id:"e_l10",t:"Devices &amp; Smoke Detectors",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 10 \u00b7 \u00a77.9\u20137.10 Devices &amp; Detectors</span><h1>The parts your client actually touches</h1>\n <p class=\"lead\">Lights, receptacles, switches, junction boxes, GFIs, and smoke detectors \u2014 the visible end of the system, and the part homeowners interact with daily. Two big ideas anchor this lesson: how a GFI actually protects people, and what the Standards ask of you on smoke detectors.</p>\n <p>Begin with the scan \u2014 a kitchen wall with several device problems above the counter. Click each one.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"recep\"></div>\n <h2>The conditions, by device</h2>\n <h3>Lights</h3><ul class=\"clean\"><li><b>Missing or damaged fixtures</b> \u2014 Open lampholders, broken lenses, hanging fixtures.</li><li><b>Open boxes / missing covers</b> \u2014 Live connections exposed.</li><li><b>Improper closet fixtures</b> \u2014 Too close to combustible storage \u2014 clearance matters.</li><li><b>Recessed cans in insulation without an IC rating</b> \u2014 A non-IC can buried in insulation is a fire risk.</li><li><b>Inoperative on test</b> \u2014 Report fixtures that don't respond.</li></ul>\n <h3>Receptacles</h3><ul class=\"clean\"><li><b>Open ground</b> \u2014 No equipment ground present at a three-prong outlet \u2014 a false sense of safety.</li><li><b>Reversed polarity</b> \u2014 Hot and neutral swapped \u2014 energizes parts that should be neutral.</li><li><b>No GFI where required</b> \u2014 Missing protection near water or grade (see below).</li><li><b>Wrong type for the circuit</b> \u2014 A 20-amp receptacle on a 15-amp circuit, for instance \u2014 check the wire gauge.</li><li><b>Loose, damaged, or painted-over</b> \u2014 Worn contacts, broken faces, painted slots.</li><li><b>Open or missing box</b> \u2014 Connections must be enclosed.</li></ul>\n <h3>Switches & junction boxes</h3><ul class=\"clean\"><li><b>Inoperative or no cover plate</b> \u2014 Exposed terminals.</li><li><b>Overheating switch</b> \u2014 Discoloration or warmth.</li><li><b>Open splices outside a box</b> \u2014 Every joint belongs in an accessible box.</li><li><b>Overfilled or buried junction box</b> \u2014 Boxes must stay accessible and not overcrowded.</li></ul>\n <h2>How a GFI actually works \u2014 and why it isn't a breaker</h2>\n <p>A <b>GFI</b> is a receptacle with ground-fault protection; a <b>GFCI</b> is the breaker-mounted version that protects the whole circuit. It works by comparing the current going out the hot to the current coming back on the neutral. In a healthy circuit those are equal. If even a small amount \u2014 about <b>5 milliamps</b> \u2014 leaks off somewhere else (say, through a person to ground), the GFI senses the imbalance and cuts power in milliseconds. Run the simulator and introduce a fault to see it:</p>\n <div class=\"widget wmount\" data-w=\"gfi\" data-k=\"\"></div>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">A GFI doesn't replace a fuse \u2014 they catch different things</div><p>A fuse or breaker watches the <b>total</b> current and shuts off on an <b>overload or short</b>. A GFI watches the <b>balance</b> and shuts off on a <b>leak</b> too small to ever trip a breaker. You need both. One useful consequence: because a GFI senses imbalance rather than needing a ground, it can legitimately protect an <b>ungrounded</b> receptacle \u2014 labeled \"GFCI protected, no equipment ground.\"</p></div></div>\n <p><b>Where GFI protection is required:</b> close to grade or water \u2014 outdoors, bathrooms, kitchen counters, garages, unfinished basements, crawl spaces, and around pools and whirlpool baths.</p>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>A seller swore the garage outlets were \"dead\" and had written off the wiring. Before condemning anything I checked the bathroom and found a tripped GFI receptacle \u2014 the garage and exterior outlets were wired downstream of it. One reset button and everything came back to life. The lesson for clients: a single GFI often protects several outlets down the line, so a \"dead\" receptacle is frequently just a tripped GFI somewhere upstream, not a wiring failure.</p></div>\n <h2>Smoke detectors</h2>\n <p>The Standards ask you to <b>report the absence</b> of smoke detectors; they don't require you to test them \u2014 and you should make clear to your client whether or not you did. Beyond the bare requirement, the sound advice to give: detectors on <b>every floor level</b> and <b>near all sleeping areas</b>, one near the kitchen, with <b>interconnection</b> being ideal (so one alarm sounds them all) though costly to retrofit. Stress that testing and maintenance of these devices is the homeowner's ongoing job.</p></div>",res:[]},
      {id:'q4',t:'Module Check — Electrical',d:'10 questions',type:'quiz'},
    ]},
        {id:'m5',name:'Heating, Cooling &amp; Plumbing',sop:'SOP §2.5–2.7',lessons:[
      {id:"c_intro",t:"How cooling works",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Cooling &amp; Heat Pumps \u00b7 Orientation</span><h1>Air conditioning doesn't make cold. It moves heat.</h1>\n <p class=\"lead\">That one idea unlocks the whole system. A cooling system never creates coldness \u2014 it picks up heat from the air inside your house and carries it outside, then comes back for more. Everything you'll inspect is just hardware in service of that heat-moving loop. This section covers the entire air-conditioning and heat-pump chapter, with the reading broken up by things to do.</p>\n <p>The carrier is a <b>refrigerant</b> \u2014 a fluid that boils and condenses at convenient temperatures. By changing its pressure, the system makes it cold enough to soak up heat indoors and hot enough to dump that heat outdoors. Four components do the work, and you'll meet them in the animation below.</p>\n <div class=\"widget wmount\" data-w=\"cycle\" data-k=\"\"></div>\n <p>Same five-step loop as always \u2014 for every component you'll ask: what is it, what does it do, what goes wrong, why does that matter, and how do you report it.</p>\n <div class=\"loop\"><div class=\"seg on\"><div class=\"n\">01</div><div class=\"w\">Component</div></div><div class=\"seg\"><div class=\"n\">02</div><div class=\"w\">Function</div></div><div class=\"seg\"><div class=\"n\">03</div><div class=\"w\">Common defect</div></div><div class=\"seg\"><div class=\"n\">04</div><div class=\"w\">Implication</div></div><div class=\"seg\"><div class=\"n\">05</div><div class=\"w\">How you report</div></div></div>\n <p>Pin the four components to their one job before you go further:</p>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"components\"></div>\n <div class=\"field\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">What the Standards ask \u2014 and a hard safety rule</div><p>You operate the system at the thermostat and inspect what's accessible; opening the sealed condenser cabinet or touching the refrigerant is <b>beyond the Standards</b>. And never run the compressor when it's <b>below 65\u00b0F outside</b> \u2014 you can destroy it (you'll see why in the compressor lesson).</p></div></div></div>",res:[]},
      {id:"c_l2",t:"Capacity &amp; Sizing",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 2 \u00b7 \u00a712.1 Capacity</span><h1>Is it the right size for the house?</h1>\n <p class=\"lead\">Clients ask this constantly, and although a formal load calculation is beyond the Standards, you're expected to give a sensible read. The surprising headline: when AC is the wrong size, <b>bigger is the worse mistake.</b></p>\n <h2>What drives the cooling load</h2>\n <p>The heat a house gains \u2014 and therefore the cooling it needs \u2014 depends on a long list of factors: outdoor temperature and humidity, the level of insulation, the amount of air leakage, the area of south/east/west glass and whether it's low-e or gas-filled, whether curtains and blinds are used, shading from trees, overhangs, awnings, or neighboring buildings, and the heat thrown off by people and equipment inside. No inspector weighs all that on site \u2014 so we use rules of thumb.</p>\n <p>The working guideline is floor area per <b>ton</b> of cooling (one ton = 12,000 BTU/hr): in the <b>southern US, 450\u2013700 sq ft per ton</b>; in the <b>northern US, 700\u20131,000 sq ft per ton</b> (assuming 8-foot ceilings). Find the local range from installers and other inspectors. Try it:</p>\n <div class=\"widget wmount\" data-w=\"sizer\" data-k=\"\"></div>\n <h2>Capacity is only half the story \u2014 the ducts matter too</h2>\n <p>A correctly sized compressor still under-performs if the duct system can't move the air. This bites hardest when AC was <b>added to a furnace system</b>: the evaporator coil is an extra obstruction, and cooling-season air (around 55\u00b0F) is <b>denser and harder to push</b> than the 140\u00b0F air of heating season. You also have to move <b>more</b> of it \u2014 the temperature difference between conditioned and room air is only about 15\u201320\u00b0F in cooling versus 60\u201370\u00b0F in heating. As a number: cooling needs roughly <b>400\u2013450 CFM per ton</b>, about double a heating system. Ducts sized for heat are frequently undersized for cooling.</p>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7l1-8z\"/></svg></div><div><div class=\"t\">The temperature split \u2014 a real field check</div><p>Let the system run at least <b>15 minutes</b>, then compare the air entering the return to the air leaving a supply register near the coil. A healthy system shows roughly a <b>15\u201320\u00b0F drop</b>. Measuring it is beyond the Standards, but many inspectors do \u2014 too small a split hints at low airflow or low refrigerant; too large can mean too little airflow.</p></div></div>\n <h2>Undersized vs. oversized</h2>\n <p>An <b>undersized</b> system runs continuously and still can't hold the setpoint on the hottest days \u2014 an inconvenience, not a hazard. An <b>oversized</b> system is the trickier problem: it cools the air fast and shuts off before it has pulled much humidity out, so it <b>short cycles</b> and leaves the house cool but <b>clammy</b>. Short cycling also means frequent start-ups \u2014 and compressors suffer the most wear on start-up \u2014 so an oversized unit dies younger. Some utilities accept up to ~25% oversize; surveys have found a third to half of systems are oversized. The pros' advice: when in doubt, slightly undersize. Sort the symptoms:</p>\n <div class=\"widget wmount\" data-w=\"sort\" data-k=\"sizesymptom\"></div></div>",res:[]},
      {id:"c_l3",t:"The Condensing Unit",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 3 \u00b7 \u00a712.2\u201312.3, 12.8, 12.12 Outdoor Unit</span><h1>The compressor, condenser coil &amp; fan</h1>\n <p class=\"lead\">The outdoor unit holds three of the four components \u2014 the compressor, the condenser coil, and the condenser fan \u2014 and it's the part most exposed to abuse. It's also home to the single most expensive thing on the system: the compressor.</p>\n <h2>The compressor \u2014 the heart of it all</h2>\n <p>The compressor is the pump that drives refrigerant around the loop. On a split system it lives in the condenser cabinet outdoors (sometimes in the attic) as a large, black, hermetically sealed cylinder, running in a refrigerant-filled bath of oil. You don't open the cabinet \u2014 that's beyond the Standards. But you do need to understand two things that protect it:</p>\n <p>First, the <b>65\u00b0F rule.</b> Below about 65\u00b0F outdoors, refrigerant can condense and mix into the oil at the base of the compressor. That mix doesn't lubricate, and starting the compressor on it can seize it. Many systems carry a <b>crankcase (sump) heater</b> that keeps the oil warm enough to boil the refrigerant back out \u2014 which is exactly why, after a long shutoff, you can't just flip it on and expect it to be ready.</p>\n <p>Second, the <b>wait-before-restart rule.</b> Low-torque compressors (those using a capillary tube) expect equal pressure on both sides at start-up. When the unit shuts off it has high pressure on the discharge side; the capillary tube needs a little time \u2014 about <b>five minutes</b> \u2014 to bleed that down. Restart it immediately and it's trying to start against high head pressure, which it can't do. Cycle a unit off and back on too fast and you can damage it.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"outdoor\"></div>\n <h2>Conditions \u2014 outdoor unit</h2>\n <h3>Eight common compressor problems</h3><ul class=\"clean\"><li><b>Won't start</b> \u2014 No power, failed capacitor/contactor/relay, or a locked rotor. Check the breaker and thermostat first.</li><li><b>Short cycling</b> \u2014 On and off rapidly \u2014 points to oversizing, a control fault, or low refrigerant; hard on the compressor.</li><li><b>Runs continuously</b> \u2014 Can't satisfy the thermostat \u2014 undersizing, low charge, a dirty coil, or poor airflow.</li><li><b>Noisy or vibrating</b> \u2014 Worn bearings, loose mounts, or failing internals.</li><li><b>Run below 65\u00b0F</b> \u2014 Tested in the cold without a crankcase heater \u2014 risks seizing.</li><li><b>Electrical faults</b> \u2014 Bad start/run capacitor, pitted contactor, or failed relay.</li><li><b>Unstable or non-level base</b> \u2014 Stresses lines and disturbs oil return.</li><li><b>Near end of life</b> \u2014 Compressors run about 10\u201315 years; flag a unit near the end of its expectancy.</li></ul>\n <h3>Four common condenser-fan problems</h3><ul class=\"clean\"><li><b>Inoperative / seized motor</b> \u2014 No airflow over the coil means the system can't reject heat and pressures climb.</li><li><b>Noisy or vibrating</b> \u2014 Worn motor bearings or an unbalanced blade.</li><li><b>Dirty or bent blades</b> \u2014 Reduces airflow and strains the motor.</li><li><b>Obstructed airflow / wrong rotation</b> \u2014 Blocked coil, debris, or a miswired motor moving air the wrong way.</li></ul>\n <h3>Condenser coil</h3><ul class=\"clean\"><li><b>Dirty or blocked fins</b> \u2014 Leaves, grass clippings, and cottonwood choke the coil; cleaning restores capacity.</li><li><b>Bent or damaged fins</b> \u2014 Reduce the airflow area.</li><li><b>Inadequate clearance</b> \u2014 The unit needs open air on all sides to dump heat.</li></ul>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"6\"/><path d=\"M15.5 12.9 17 22l-5-3-5 3 1.5-9.1\"/></svg></div><div><div class=\"t\">Reading the age \u2014 and watching for a swapped compressor</div><p>Get the unit's age from the <b>condenser data plate</b> (Preston's Guide decodes the serial). The compressor is by far the costliest part to replace, so on any unit more than five years old, the inspector who goes the extra mile checks whether the compressor itself has been replaced. Report a unit near the end of its life so the buyer can budget for it.</p></div></div>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>A buyer asked me to \"just turn the AC on\" during a cold-snap inspection \u2014 50\u00b0F outside. I didn't. I explained that starting the compressor that cold, with refrigerant pooled in the oil, can seize it, and that I'd note the system as not tested due to low temperature and recommend a return visit in season. Protecting the equipment you're inspecting is part of doing the job right \u2014 and it's a far better outcome than killing a compressor to satisfy curiosity.</p></div></div>",res:[]},
      {id:"c_l4",t:"The Indoor Unit",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 4 \u00b7 \u00a712.4, 12.6, 12.9 Indoor Unit</span><h1>The evaporator, blower &amp; condensate</h1>\n <p class=\"lead\">Inside the house sit the evaporator coil, the blower that pushes air across it, and \u2014 because cold coils pull water out of the air \u2014 a condensate system to carry that water away. Two failure stories dominate here: a frozen coil and an overflowing drain.</p>\n <h2>The evaporator coil and the frozen-coil trap</h2>\n <p>The evaporator is the cold coil (often an A-shape) in the plenum just above or beside the furnace/air handler. Warm house air blows across it, gives up its heat, and the refrigerant boils. The counter-intuitive failure: <b>too little airflow makes the coil freeze.</b> A dirty filter, a weak blower, or a blocked return starves the coil of warm air, its temperature drops below freezing, and the moisture on it turns to ice \u2014 which blocks airflow further, a runaway that ends in a solid block of ice and no cooling. Low refrigerant charge does the same. If you find a frozen coil, the move is to stop the unit, let it thaw, and recommend evaluation.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"indoor\"></div>\n <h2>The blower (evaporator fan)</h2>\n <h3>Seven common evaporator-fan problems</h3><ul class=\"clean\"><li><b>Inoperative</b> \u2014 No air movement \u2014 cooling stops and the coil can freeze.</li><li><b>Dirty blower wheel</b> \u2014 Caked blades move far less air over time.</li><li><b>Noisy or vibrating</b> \u2014 Worn bearings or an unbalanced wheel.</li><li><b>Wrong speed setting</b> \u2014 Many blowers are multi-speed; the wrong tap starves or over-drives airflow.</li><li><b>Slipping or worn belt</b> \u2014 On older belt-drive blowers, a loose belt cuts airflow.</li><li><b>Insufficient airflow</b> \u2014 From a dirty filter, closed returns, or undersized ducts \u2014 the classic coil-freezing cause.</li><li><b>Dirty air filter starving the coil</b> \u2014 The single most common and most preventable airflow problem.</li></ul>\n <h2>Condensate \u2014 where the water goes</h2>\n <p>A cooling coil can pull gallons of water a day out of humid air. That water drips into a <b>drain pan</b> and leaves through a <b>primary drain line</b> to an approved point \u2014 a floor drain, a laundry standpipe, or outside (never just onto the ground next to the foundation, and not into a place that's a problem). Because a clog floods whatever is below, good installations add a <b>secondary line, a backup pan, or a float switch</b> that shuts the unit off if water backs up. Where gravity won't carry it, a <b>condensate pump</b> lifts it \u2014 and pumps fail.</p>\n <h3>Condensate-system problems</h3><ul class=\"clean\"><li><b>Clogged or slow primary drain</b> \u2014 Standing water, a rusty pan, algae \u2014 the water has nowhere to go.</li><li><b>No secondary protection</b> \u2014 No backup pan, secondary drain, or float switch under equipment over finished space.</li><li><b>Improper discharge point</b> \u2014 Draining where it causes damage, or back into an unsafe location.</li><li><b>Condensate pump not working</b> \u2014 A failed pump on a basement or attic unit overflows.</li><li><b>Uninsulated cold lines/pan sweating</b> \u2014 Cold surfaces drip onto ceilings and framing.</li></ul></div>",res:[]},
      {id:"c_l5",t:"Lines &amp; Expansion Device",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 5 \u00b7 \u00a712.5, 12.7 Lines &amp; Metering</span><h1>The refrigerant lines and the expansion device</h1>\n <p class=\"lead\">Two copper lines connect the outdoor and indoor units, and a small metering device sits between them. You won't open the sealed circuit, but you can read a lot from the outside \u2014 and one clue, an oily smudge, is the classic sign of trouble.</p>\n <h2>Reading the two lines</h2>\n <p>The <b>large line is the suction line</b> \u2014 it carries cold, low-pressure gas back to the compressor and <b>must be insulated</b>; left bare it sweats, drips, and wastes efficiency. The <b>small line is the liquid line</b> \u2014 warm, high-pressure liquid heading to the evaporator, and it runs bare. So at a glance: big-and-insulated is the cold return; small-and-bare is the warm feed. (On a heat pump, you'll find <b>both</b> lines insulated \u2014 a key tell you'll use in the heat-pump lesson.)</p>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"lines\"></div>\n <h2>The expansion (metering) device</h2>\n <p>Between the liquid line and the evaporator sits the <b>expansion device</b> \u2014 a capillary tube or a thermostatic expansion valve (TXV). Its job is to drop the pressure suddenly so the refrigerant flashes cold before it enters the evaporator, and to meter how much flows. It's inside the sealed circuit, so you're not servicing it \u2014 but knowing it's there explains why a capillary-tube system is \"low-torque\" and needs that five-minute restart pause from Lesson 3.</p>\n <h2>Conditions \u2014 lines and charge</h2>\n <h3>Refrigerant-line problems</h3><ul class=\"clean\"><li><b>Missing suction-line insulation</b> \u2014 Sweating, dripping, and lost efficiency. Recommend insulating.</li><li><b>Damaged or compressed lines</b> \u2014 Kinks restrict flow; crushed insulation lets the line sweat.</li><li><b>Oily residue at a fitting or joint</b> \u2014 Refrigerant carries oil \u2014 an oily film is the visual signature of a leak. Recommend evaluation by a technician.</li><li><b>Lines run unprotected or unsupported</b> \u2014 Vibration and abrasion lead to failures.</li><li><b>Lines too long / improperly routed</b> \u2014 Affects performance; beyond what you correct, but note obvious issues.</li></ul>\n <div class=\"field\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">Charging refrigerant is beyond the Standards</div><p>You don't add, recover, or measure refrigerant \u2014 that's licensed work. What you <b>do</b> is observe and report: bare suction lines, oily leak signs, ice on the lines, and performance clues like a weak temperature split. Then point the client to a technician.</p></div></div></div>",res:[]},
      {id:"c_l6",t:"Ducts &amp; Distribution",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 6 \u00b7 \u00a712.10 Duct System</span><h1>Getting the cool air to the rooms</h1>\n <p class=\"lead\">The best-sized compressor is wasted if the ducts can't deliver the air. Distribution problems are a leading reason systems under-perform \u2014 especially when cooling was bolted onto a duct system that was only ever designed for heat.</p>\n <h2>Why cooling is harder on ducts</h2>\n <p>Recall the airflow math from Lesson 2: cooling moves roughly <b>twice the air</b> of heating (about 400\u2013450 CFM per ton), the conditioned air is cooler and denser, and the room-to-supply temperature difference is much smaller. A duct system sized for a furnace is frequently <b>undersized for cooling</b>, so the rooms farthest from the air handler starve. Add the evaporator coil as a new obstruction and airflow drops further.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"duct\"></div>\n <h2>Conditions \u2014 duct system</h2>\n <h3>Eight common duct problems</h3><ul class=\"clean\"><li><b>Undersized for cooling</b> \u2014 Especially heating ducts pressed into AC service \u2014 poor airflow to far rooms.</li><li><b>Leaky or disconnected joints</b> \u2014 Conditioned air spills into attics, crawlspaces, and chases instead of rooms.</li><li><b>Unsealed seams</b> \u2014 Seams should be sealed with mastic or proper tape; bare seams leak surprisingly much.</li><li><b>Uninsulated ducts in unconditioned space</b> \u2014 Ducts in hot attics or crawlspaces must be insulated, or the cooling is lost before it arrives.</li><li><b>Crushed or kinked flex duct</b> \u2014 Pinched runs choke airflow to those rooms.</li><li><b>Poor balance</b> \u2014 Some rooms freeze while others never cool \u2014 registers and dampers need adjusting.</li><li><b>Obstructed registers or returns</b> \u2014 Furniture, rugs, or closed returns strangle the system.</li><li><b>Condensation / sweating ducts</b> \u2014 Cold ducts in humid, unconditioned space drip and can damage framing or grow mold.</li></ul>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7l1-8z\"/></svg></div><div><div class=\"t\">A practical tell</div><p>When a client complains that one end of the house never cools, suspect <b>distribution</b> before capacity. Check for closed or blocked returns, crushed flex, disconnected runs in the attic, and whether AC was added to heat-only ducts. The compressor may be perfectly healthy.</p></div></div></div>",res:[]},
      {id:"c_l7",t:"Thermostats &amp; Controls",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 7 \u00b7 \u00a712.11 Thermostats</span><h1>The control \u2014 and how to test the system without harming it</h1>\n <p class=\"lead\">The thermostat is how you operate the system, and it's the first place a \"no cooling\" complaint sends you. Most thermostat issues are simple \u2014 but you have to test in a way that doesn't damage the compressor.</p>\n <h2>Testing the system at the thermostat</h2>\n <p>To call for cooling, set the mode to cool and lower the setpoint below room temperature. If nothing happens, work the simple causes first: confirm power (breaker on), the mode and setpoint, and dead batteries on an electronic stat. Then remember the lesson from the compressor: many systems have a <b>built-in restart delay</b>, and low-torque compressors need that five-minute pressure-equalization window \u2014 so a unit that doesn't fire instantly may simply be in its delay. Don't rapidly cycle it trying to force a start.</p>\n <div class=\"widget wmount\" data-w=\"sort\" data-k=\"tstat\"></div>\n <h2>Conditions \u2014 thermostats</h2>\n <h3>Seven common thermostat problems</h3><ul class=\"clean\"><li><b>Inoperative</b> \u2014 No response to a call for cooling \u2014 could be the stat or anything downstream.</li><li><b>Not level (mercury type)</b> \u2014 An old mercury-bulb stat reads wrong if it isn't mounted level.</li><li><b>Poor location</b> \u2014 Mounted over a supply register, near a lamp or sunny window, or in a draft \u2014 it senses the wrong temperature and mis-cycles the system.</li><li><b>Dirty contacts</b> \u2014 Dust on the contacts causes erratic operation.</li><li><b>Loose mounting or wiring</b> \u2014 Intermittent operation.</li><li><b>Dead batteries / lost programming</b> \u2014 Common on electronic stats \u2014 simple to fix.</li><li><b>Anticipator misadjusted</b> \u2014 On older stats, affects cycle length and comfort.</li></ul>\n <div class=\"field\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">Don't mistake a safety for a failure</div><p>If the system won't run, the cause may be a tripped <b>safety</b> doing its job \u2014 a float switch that opened on a full condensate pan, a breaker that tripped, or a high-pressure cutout \u2014 not the thermostat. Diagnose in order: thermostat basics, then power, then safeties, then the equipment.</p></div></div></div>",res:[]},
      {id:"c_l8",t:"Heat Pumps",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 8 \u00b7 \u00a712.13\u201312.14 Heat Pumps</span><h1>An air conditioner that runs in reverse</h1>\n <p class=\"lead\">A heat pump is the same refrigeration loop you already understand \u2014 with one extra part that lets it run backwards. In summer it cools like any AC; in winter it reverses, pulling heat out of the cold outdoor air and pumping it inside. Everything you've learned applies, plus a handful of heat-pump-only features and failures.</p>\n <h2>The reversing valve and what changes in winter</h2>\n <p>The added component is the <b>reversing valve</b>. Flip it and the refrigerant flow reverses: the outdoor coil becomes the evaporator (absorbing heat from cold outside air \u2014 yes, even cold air holds heat) and the indoor coil becomes the condenser (releasing that heat into the house). Because the outdoor coil runs cold and frosts up, the heat pump periodically runs a <b>defrost cycle</b> \u2014 briefly switching to cooling mode to warm and de-ice the outdoor coil, which looks like the unit steaming outside in winter. That's normal, not a malfunction.</p>\n <h2>Auxiliary and emergency heat</h2>\n <p>On cold days a heat pump can't pull enough heat from frigid air, so it's backed by <b>auxiliary (supplementary) heat</b> \u2014 usually electric resistance strips in the air handler \u2014 that kicks in to help. The thermostat also has an <b>emergency heat</b> setting that runs the backup heat alone with the compressor off, for when the heat pump itself fails. Knowing these exist is half of identifying a heat pump.</p>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"hpid\"></div>\n <h2>Nine ways to spot a heat pump</h2>\n <h3>Tells that it's a heat pump, not a plain AC</h3><ul class=\"clean\"><li><b>Outdoor unit runs in heating season</b> \u2014 A straight AC sits idle in winter; a heat pump runs.</li><li><b>Both refrigerant lines insulated</b> \u2014 An AC insulates only the suction line.</li><li><b>A reversing valve in the cabinet</b> \u2014 The signature component.</li><li><b>Two expansion devices with bypasses</b> \u2014 Needed to meter flow in both directions.</li><li><b>\"Emergency heat\" on the thermostat</b> \u2014 Only heat pumps have it.</li><li><b>Electric heat strips in the air handler</b> \u2014 The auxiliary backup heat.</li><li><b>A defrost cycle in winter</b> \u2014 Periodic steaming/ice-melt at the outdoor unit.</li><li><b>No fossil-fuel furnace present</b> \u2014 Heat with no gas/oil appliance suggests a heat pump.</li><li><b>The data plate says so</b> \u2014 \"Heat pump\" or \"HP\" on the label.</li></ul>\n <h2>Conditions \u2014 heat pumps</h2>\n <h3>Seven common heat-pump problems</h3><ul class=\"clean\"><li><b>Oversized for cooling / undersized for heating</b> \u2014 Northern heat pumps are almost always undersized for the heating load \u2014 describe sizing as suspect and recommend evaluation rather than calling it over- or undersized.</li><li><b>Reversing valve stuck or failed</b> \u2014 Stuck in one mode \u2014 heats but won't cool, or vice-versa.</li><li><b>Defrost control failure</b> \u2014 The outdoor coil ices up because the unit never defrosts.</li><li><b>Outdoor coil iced up</b> \u2014 From a failed defrost, poor condensate drainage at the unit, or a unit set below snow-drift depth \u2014 poor or no heat results.</li><li><b>Airflow problems in the house</b> \u2014 Same distribution issues as any forced-air system.</li><li><b>Auxiliary heat inoperative</b> \u2014 No backup on the coldest days, or, if stuck on, sky-high electric bills.</li><li><b>Short cycling</b> \u2014 Hard on the compressor, as with any system.</li></ul>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>On a frosty morning a seller was sure the heat pump was failing \u2014 it was \"blowing cold and steaming outside.\" It was simply in a defrost cycle: the unit had reversed for a few minutes to melt ice off the outdoor coil, so the indoor air went briefly cool while the outdoor unit gave off vapor. I explained that defrost is normal heat-pump behavior, showed them the emergency-heat setting for true failures, and noted the system operated as designed. Recognizing normal defrost saves a needless service call \u2014 and a needless alarm in the report.</p></div></div>",res:[]},

erheat before the device trips \u2014 the single most common problem."}, {"q": "The two hot legs of a multi-wire (or 240 V) circuit must be:", "o": ["On the same bus bar", "On opposite bus bars, and linked", "On a twin breaker", "Sharing one handle only"], "a": 1, "e": "Opposite buses keep the shared neutral from overloading; the devices must also be linked. Twin breakers sit on one pole \u2014 don't use them."}, {"q": "Do inspectors normally shut off house power to inspect the panel?", "o": ["Yes, always", "No \u2014 usually impractical when occupied; test with a voltage detector and report limitations", "Yes, and pull the main fuses", "Only for aluminum"], "a": 1, "e": "You don't kill power in an occupied home; use a voltage detector, ask the occupant, document limitations."}, {"q": "Knob-and-tube wiring is identified by:", "o": ["Bare aluminum conductors", "Two separate conductors on ceramic knobs and through ceramic tubes, no ground", "Three-conductor plastic cable", "A T-shaped receptacle slot"], "a": 1, "e": "Separate hot and neutral on porcelain knobs/tubes, no equipment ground \u2014 ~1920\u20131950."}]},

is roughly:", "o": ["3\u20135 years", "10\u201315 years", "25 years", "40 years"], "a": 1, "e": "About 10\u201315 years; flag units near the end of their expectancy."}, {"q": "A frozen evaporator coil is usually caused by:", "o": ["Too much airflow", "Too little airflow or low refrigerant", "High outdoor humidity", "An oversized condenser"], "a": 1, "e": "Starved airflow (dirty filter, weak blower) or low charge drops the coil below freezing; ice then blocks airflow further."}, {"q": "A condensate float switch is there to:", "o": ["Speed the drain", "Shut the unit off if water backs up, preventing overflow", "Cool the refrigerant", "Increase airflow"], "a": 1, "e": "It's backup protection against a clogged primary drain flooding the space below."}]},

const KEY='ati_lms_state_v1';
let S={done:{},quiz:{},lastLesson:'l1'};
const allLessonIds = COURSE.modules.flatMap(m=>m.lessons.map(l=>l.id));
const totalLessons = allLessonIds.length;

async function load(){
  try{const r=await window.storage.get(KEY,false); if(r&&r.value){S=JSON.parse(r.value);}}catch(e){}
  S.done=S.done||{}; S.quiz=S.quiz||{}; S.lastLesson=S.lastLesson||'l1';
}
async function save(){ try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){} }

/* progress helpers */
const lessonDone=id=>!!S.done[id];
const doneCount=()=>allLessonIds.filter(lessonDone).length;
const coursePct=()=>Math.round(doneCount()/totalLessons*100);
function modPct(m){const ids=m.lessons.map(l=>l.id);const d=ids.filter(lessonDone).length;return Math.round(d/ids.length*100);}
function modDone(m){return modPct(m)===100;}
function readiness(){
  // weighted: 65% content progress + 35% avg quiz score
  const prog=doneCount()/totalLessons;
  const scores=Object.values(S.quiz).map(x=>x.best); 
  const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length/100:0;
  return Math.round((prog*0.65+avg*0.35)*100);
}
function flatLessons(){return COURSE.modules.flatMap(m=>m.lessons.map(l=>({...l,mod:m})));}
function lessonById(id){return flatLessons().find(l=>l.id===id);}
function moduleUnlocked(idx){ if(idx===0)return true; return modDone(COURSE.modules[idx-1]); }
function lessonUnlocked(id){
  for(let i=0;i<COURSE.modules.length;i++){
    if(COURSE.modules[i].lessons.some(l=>l.id===id)) return moduleUnlocked(i);
  }
  return false;
}

/* gauge svg (signature element) */
function gaugeSVG(pct){
  const start=Math.PI, end=0, ang=start+(end-start)*(pct/100);
  const cx=105,cy=112,r=86;
  const x=cx+r*Math.cos(ang), y=cy+r*Math.sin(ang);
  const x0=cx-r, y0=cy, x1=cx+r;
  // ticks
  let ticks='';
  for(let i=0;i<=10;i++){const a=Math.PI - Math.PI*(i/10);const tx0=cx+(r+6)*Math.cos(a),ty0=cy+(r+6)*Math.sin(a);const tx1=cx+(r-6)*Math.cos(a),ty1=cy+(r-6)*Math.sin(a);
    ticks+=`<line x1="${tx0}" y1="${ty0}" x2="${tx1}" y2="${ty1}" stroke="rgba(255,255,255,.18)" stroke-width="${i%5===0?2:1}"/>`;}
  return `<svg viewBox="0 0 210 128">
    <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#e0a53a"/><stop offset="1" stop-color="#c2841c"/></linearGradient></defs>
    ${ticks}
    <path d="M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y0}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="11" stroke-linecap="round"/>
    <path d="M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x} ${y}" fill="none" stroke="url(#gg)" stroke-width="11" stroke-linecap="round"/>
    <circle cx="${x}" cy="${y}" r="6" fill="#fff"/>
    <text class="gv" x="105" y="100" text-anchor="middle">${pct}<tspan font-size="18" dy="-14">%</tspan></text>
  </svg>`;
}

function answer(k){
  const {data,i}=QS; const q=data.q[i];
  if(QS.answers[i]!==undefined) return;
  QS.answers[i]=k;
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((el,idx)=>{el.classList.add('locked');
    if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=svg(I.check,2.6);}
    else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=svg(I.x,2.6);}});
  document.getElementById('exp').innerHTML=`<div class="explain"><b>${k===q.a?'Correct.':'Not quite.'}</b> ${q.e}</div>`;
  document.querySelector('.quiz-foot .hint').textContent = k===q.a?'Nice — that\'s right':'Review the explanation';
  const last=i===data.q.length-1;
  document.getElementById('qnext').innerHTML=`<button class="btn ${last?'brass':'dark'}" onclick="${last?'finishQuiz()':'nextQ()'}">${last?'See results':'Next question'} ${svg(I.arrow)}</button>`;
}

  const {data,answers,id}=QS;
  const correct=answers.filter((a,i)=>a===data.q[i].a).length;

  S.quiz[id]={best:Math.max(prior.best,pct),attempts:prior.attempts+1};
  if(pass) S.done[id]=true;

function toast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ===== nav wiring ===== */
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();go(a.dataset.view);}));

/* boot */
(async()=>{await load();go('dashboard');})();
</script>
