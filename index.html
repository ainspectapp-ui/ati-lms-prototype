<!-- ATI Training LMS — Student Experience Prototype -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#15191f; --ink-2:#1c2127; --ink-3:#242b33;
    --paper:#f3f2ec; --paper-2:#fbfbf8; --card:#ffffff;
    --line:#e4e1d8; --line-2:#edeae1; --line-dark:rgba(255,255,255,.09);
    --brass:#c2841c; --brass-2:#e0a53a; --brass-deep:#9c6810;
    --slate:#43607a; --slate-2:#5a7b97;
    --pass:#3f7d52; --pass-soft:#e7f0e8;
    --fail:#b4533e; --fail-soft:#f6e7e3;
    --text:#1a1e24; --text-2:#565c64; --text-3:#8a8f96;
    --text-inv:#f3f2ec; --muted-inv:#9aa1ab;
    --r:14px; --r-sm:9px;
    --display:'Archivo',sans-serif; --body:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
    --sb:248px;
    --sh-1:0 1px 2px rgba(21,25,31,.05),0 1px 1px rgba(21,25,31,.04);
    --sh-2:0 6px 22px rgba(21,25,31,.08),0 2px 6px rgba(21,25,31,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--paper);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
  ::selection{background:var(--brass);color:#fff}

  /* ---------- App shell ---------- */
  .app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh}

  .sidebar{
    background:var(--ink);color:var(--text-inv);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
    border-right:1px solid var(--ink-3);
  }
  .brand{display:flex;align-items:center;gap:11px;padding:22px 22px 20px}
  .brand .mark{
    width:38px;height:38px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));
    box-shadow:0 2px 8px rgba(194,132,28,.4);position:relative;overflow:hidden;
  }
  .brand .mark svg{width:21px;height:21px;color:#1c1304}
  .brand .word{font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:.04em}
  .brand .word b{color:var(--brass-2)}
  .brand .sub{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--muted-inv);text-transform:uppercase;display:block;margin-top:-2px}

  .nav{padding:6px 12px;flex:1;overflow-y:auto}
  .nav .label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);padding:16px 10px 7px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--muted-inv);font-size:13.5px;font-weight:500;text-decoration:none;transition:.14s;position:relative}
  .nav a svg{width:17px;height:17px;flex:none}
  .nav a:hover{background:var(--ink-2);color:var(--text-inv)}
  .nav a.active{background:var(--ink-3);color:#fff}
  .nav a.active::before{content:"";position:absolute;left:-12px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--brass-2)}
  .nav a .pill{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--brass);color:#1c1304;padding:1px 6px;border-radius:20px;font-weight:600}

  .me{margin:12px;padding:13px;border-radius:11px;background:var(--ink-2);display:flex;align-items:center;gap:11px}
  .me .av{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--slate-2),var(--slate));display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:14px;color:#fff;flex:none}
  .me .nm{font-size:13px;font-weight:600;color:var(--text-inv)}
  .me .rl{font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:.04em}

  /* ---------- Main ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(243,242,236,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:13px 30px;display:flex;align-items:center;gap:18px;
  }
  .crumb{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--text-3);display:flex;align-items:center;gap:7px}
  .crumb b{color:var(--text);font-weight:600}
  .crumb .sep{color:var(--line)}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 12px;width:240px;color:var(--text-3)}
  .search input{border:none;outline:none;background:none;font-family:var(--body);font-size:13px;width:100%;color:var(--text)}
  .search svg{width:15px;height:15px;flex:none}
  .ready-chip{display:flex;align-items:center;gap:9px;background:var(--ink);color:var(--text-inv);padding:7px 13px;border-radius:9px}
  .ready-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--brass-2);box-shadow:0 0 0 3px rgba(224,165,58,.2)}
  .ready-chip .v{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--brass-2)}
  .ready-chip .l{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-inv)}

  .scroll{overflow-y:auto;flex:1}
  .view{padding:30px 30px 60px;max-width:1080px;margin:0 auto;width:100%;animation:rise .32s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.01em;line-height:1.1}
  h2{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.005em}
  .lead{color:var(--text-2);font-size:15px;max-width:54ch}

  /* ---------- Hero / dashboard ---------- */
  .hero{
    background:var(--ink);color:var(--text-inv);border-radius:var(--r);padding:26px 28px;position:relative;overflow:hidden;
    box-shadow:var(--sh-2);
  }
  .hero::before{content:"";position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:26px 26px;mask-image:radial-gradient(120% 120% at 80% 0%,#000 30%,transparent 75%)}
  .hero .row{display:flex;gap:30px;align-items:center;position:relative;z-index:1;flex-wrap:wrap}
  .hero .lft{flex:1;min-width:260px}
  .hero .eyebrow{color:var(--brass-2)}
  .hero h1{color:#fff;margin:9px 0 7px;font-size:27px}
  .hero p{color:var(--muted-inv);font-size:14px;max-width:46ch}
  .hero .cta{display:inline-flex;align-items:center;gap:9px;margin-top:17px;background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#1c1304;font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;transition:.16s;box-shadow:0 4px 14px rgba(194,132,28,.32)}
  .hero .cta:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(194,132,28,.42)}
  .hero .cta svg{width:16px;height:16px}

  /* the signature: readiness gauge */
  .gauge{flex:none;width:210px;text-align:center}
  .gauge svg{width:210px;height:128px;display:block}
  .gauge .gv{font-family:var(--mono);font-weight:600;font-size:34px;fill:#fff}
  .gauge .gl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;fill:var(--muted-inv);text-transform:uppercase}
  .gauge .cap{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-inv);margin-top:2px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh-1)}
  .stat .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--paper);color:var(--slate);margin-bottom:11px}
  .stat .ic svg{width:17px;height:17px}
  .stat .v{font-family:var(--mono);font-weight:600;font-size:25px;letter-spacing:-.02em}
  .stat .v small{font-size:14px;color:var(--text-3)}
  .stat .k{font-size:12px;color:var(--text-2);margin-top:1px}

  .sect-head{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 14px}
  .sect-head .link{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;letter-spacing:.04em;text-decoration:none}
  .sect-head .link:hover{text-decoration:underline}

  /* continue card */
  .continue{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:6px;display:flex;gap:16px;align-items:center;box-shadow:var(--sh-1)}
  .continue .thumb{width:150px;height:96px;border-radius:10px;flex:none;background:var(--ink);position:relative;overflow:hidden;display:grid;place-items:center}
  .continue .thumb::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(224,165,58,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(224,165,58,.13) 1px,transparent 1px);background-size:16px 16px}
  .continue .thumb .pl{width:42px;height:42px;border-radius:50%;background:rgba(243,242,236,.92);display:grid;place-items:center;position:relative;z-index:1}
  .continue .thumb .pl svg{width:18px;height:18px;color:var(--ink);margin-left:2px}
  .continue .body{flex:1;min-width:0;padding:6px 8px}
  .continue .tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
  .continue .ti{font-family:var(--display);font-weight:700;font-size:16px;margin:3px 0 9px}
  .continue .go{flex:none;margin-right:12px}

  /* module grid */
  .mods{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .mod{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;text-align:left;transition:.16s;box-shadow:var(--sh-1);display:block;width:100%}
  .mod:hover{border-color:var(--brass);transform:translateY(-2px);box-shadow:var(--sh-2)}
  .mod .top{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .mod .num{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;background:var(--ink);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}
  .mod.done .num{background:var(--pass)}
  .mod .nm{font-family:var(--display);font-weight:700;font-size:15px;flex:1}
  .mod .badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600}
  .mod .badge.done{background:var(--pass-soft);color:var(--pass)}
  .mod .badge.prog{background:rgba(194,132,28,.14);color:var(--brass-deep)}
  .mod .badge.lock{background:var(--paper);color:var(--text-3)}
  .mod .meta{font-size:12.5px;color:var(--text-2);display:flex;gap:14px;margin-bottom:13px}
  .mod .meta span{display:flex;align-items:center;gap:5px}
  .mod .meta svg{width:13px;height:13px;color:var(--text-3)}
  .bar{height:6px;background:var(--line-2);border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass),var(--brass-2));border-radius:6px;transition:width .5s ease}
  .mod.done .bar i{background:var(--pass)}

  /* ---------- Curriculum ---------- */
  .acc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-1);margin-bottom:14px}
  .acc-head{display:flex;align-items:center;gap:14px;padding:16px 18px;width:100%;text-align:left;transition:.14s}
  .acc-head:hover{background:var(--paper-2)}
  .acc-head .num{font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;background:var(--ink);width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex:none}
  .acc.done .acc-head .num{background:var(--pass)}
  .acc-head .info{flex:1}
  .acc-head .info .t{font-family:var(--display);font-weight:700;font-size:16px}
  .acc-head .info .s{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:2px}
  .acc-head .pct{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--brass-deep)}
  .acc-head .chev{transition:.2s;color:var(--text-3)}
  .acc-head .chev svg{width:18px;height:18px;display:block}
  .acc.open .acc-head .chev{transform:rotate(180deg)}
  .acc-body{display:none;border-top:1px solid var(--line-2)}
  .acc.open .acc-body{display:block}
  .lrow{display:flex;align-items:center;gap:13px;padding:12px 18px 12px 20px;width:100%;text-align:left;border-bottom:1px solid var(--line-2);transition:.12s}
  .lrow:last-child{border-bottom:none}
  .lrow:hover{background:var(--paper-2)}
  .lrow .ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;transition:.16s}
  .lrow.done .ck{background:var(--pass);border-color:var(--pass)}
  .lrow.done .ck svg{width:12px;height:12px;color:#fff}
  .lrow .tp{width:28px;height:28px;border-radius:7px;background:var(--paper);display:grid;place-items:center;color:var(--slate);flex:none}
  .lrow .tp svg{width:15px;height:15px}
  .lrow .tt{flex:1;font-size:14px;font-weight:500}
  .lrow.done .tt{color:var(--text-2)}
  .lrow .du{font-family:var(--mono);font-size:11px;color:var(--text-3)}
  .lrow.locked{opacity:.5;pointer-events:none}

  /* ---------- Lesson ---------- */
  .lesson-grid{display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start}
  .player{background:var(--ink);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-2)}
  .stage{aspect-ratio:16/9;position:relative;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 0%,#222a32,#13171d)}
  .stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(224,165,58,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(224,165,58,.08) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(80% 80% at 50% 40%,#000,transparent)}
  .stage .play{width:66px;height:66px;border-radius:50%;background:rgba(243,242,236,.94);display:grid;place-items:center;position:relative;z-index:1;transition:.18s;box-shadow:0 8px 28px rgba(0,0,0,.4)}
  .stage .play:hover{transform:scale(1.06)}
  .stage .play svg{width:26px;height:26px;color:var(--ink);margin-left:3px}
  .stage .badge{position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-inv);background:rgba(0,0,0,.45);padding:5px 10px;border-radius:6px;z-index:1}
  .ctrl{display:flex;align-items:center;gap:13px;padding:11px 15px;color:var(--muted-inv);border-top:1px solid var(--line-dark)}
  .ctrl svg{width:16px;height:16px}
  .ctrl .track{flex:1;height:4px;background:rgba(255,255,255,.14);border-radius:4px;overflow:hidden}
  .ctrl .track i{display:block;width:34%;height:100%;background:var(--brass-2)}
  .ctrl .tm{font-family:var(--mono);font-size:11px}

  .reader{margin-top:22px}
  .reader h2{margin-bottom:5px}
  .reader .meta{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-bottom:18px;display:flex;gap:14px;flex-wrap:wrap}
  .reader p{font-size:15px;color:#2a2f36;margin-bottom:14px;line-height:1.7}
  .reader h3{font-family:var(--display);font-weight:700;font-size:16px;margin:22px 0 9px}
  .reader ul{margin:0 0 15px 2px;list-style:none}
  .reader li{font-size:14.5px;color:#2a2f36;padding-left:22px;position:relative;margin-bottom:7px;line-height:1.6}
  .reader li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  .callout{background:var(--ink);color:var(--text-inv);border-radius:11px;padding:16px 18px;margin:20px 0;display:flex;gap:13px}
  .callout .ic{flex:none;color:var(--brass-2)}
  .callout .ic svg{width:19px;height:19px}
  .callout .t{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-2);margin-bottom:4px}
  .callout p{color:var(--muted-inv);font-size:13.5px;margin:0;line-height:1.6}

  .lesson-foot{display:flex;align-items:center;gap:12px;margin-top:28px;padding-top:22px;border-top:1px solid var(--line)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:11px 17px;border-radius:10px;transition:.15s}
  .btn svg{width:16px;height:16px}
  .btn.dark{background:var(--ink);color:#fff}
  .btn.dark:hover{background:var(--ink-3)}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#1c1304;box-shadow:0 3px 12px rgba(194,132,28,.3)}
  .btn.brass:hover{transform:translateY(-1px)}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--text)}
  .btn.ghost:hover{border-color:var(--text-3)}
  .btn.pass{background:var(--pass-soft);color:var(--pass);border:1px solid rgba(63,125,82,.25)}
  .lesson-foot .sp{flex:1}

  .aside{position:sticky;top:84px}
  .aside .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--sh-1);margin-bottom:14px}
  .aside .box .h{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-bottom:13px}
  .res{display:flex;align-items:center;gap:11px;padding:9px 0;text-decoration:none;color:var(--text);border-bottom:1px solid var(--line-2)}
  .res:last-child{border:none}
  .res:hover .rn{color:var(--brass-deep)}
  .res .ri{width:30px;height:30px;border-radius:7px;background:var(--paper);display:grid;place-items:center;color:var(--slate);flex:none}
  .res .ri svg{width:15px;height:15px}
  .res .rn{font-size:13px;font-weight:500;transition:.14s}
  .res .rt{font-family:var(--mono);font-size:10px;color:var(--text-3)}
  .upnext{display:flex;align-items:center;gap:11px}
  .upnext .un-ic{width:34px;height:34px;border-radius:8px;background:var(--paper);display:grid;place-items:center;color:var(--slate);flex:none}
  .upnext .un-ic svg{width:16px;height:16px}
  .upnext .ut{font-size:13px;font-weight:600}
  .upnext .uk{font-family:var(--mono);font-size:10px;color:var(--text-3)}

  /* ---------- Quiz ---------- */
  .quiz-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);overflow:hidden}
  .quiz-top{background:var(--ink);color:var(--text-inv);padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
  .quiz-top .qt{font-family:var(--display);font-weight:700;font-size:17px}
  .quiz-top .qm{font-family:var(--mono);font-size:11px;color:var(--muted-inv);letter-spacing:.06em;margin-top:3px}
  .quiz-top .qnum{font-family:var(--mono);font-size:13px;color:var(--brass-2);font-weight:600;text-align:right}
  .qprog{height:4px;background:var(--ink-3)}
  .qprog i{display:block;height:100%;background:var(--brass-2);transition:width .3s}
  .quiz-body{padding:28px 24px}
  .q-text{font-family:var(--display);font-weight:600;font-size:19px;line-height:1.4;margin-bottom:22px}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:11px;transition:.14s;font-size:14.5px;font-weight:500;background:var(--card)}
  .opt:hover:not(.locked){border-color:var(--brass);background:var(--paper-2)}
  .opt .key{font-family:var(--mono);font-weight:600;width:26px;height:26px;border-radius:7px;background:var(--paper);display:grid;place-items:center;font-size:12px;flex:none;color:var(--text-2)}
  .opt.sel{border-color:var(--ink);background:var(--ink);color:#fff}
  .opt.sel .key{background:var(--brass-2);color:#1c1304}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}
  .opt.correct .key{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}
  .opt.wrong .key{background:var(--fail);color:#fff}

  .empty{text-align:center;padding:50px 20px;color:var(--text-2)}
  .empty h2{margin-bottom:6px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:11px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;box-shadow:var(--sh-2);z-index:100;opacity:0;transition:.3s}

  spot(el,k){const c=SPOT[k];let found=new Set();
    el.innerHTML=`<span class="wlabel">Spot the defect</span><div class="wtitle">${c.title}</div><div class="wsub">${c.sub}</div>
     <div class="sd-wrap"><div class="sd-stage"><svg viewBox="${c.vb}" class="hot">${c.svg}<g class="hsg"></g></svg></div>
     <div class="sd-side"><div class="sd-count"><div class="big"><span class="sdn">0</span>/${c.defects.length}</div><div class="lbl">defects found</div></div><div class="sd-found"><div class="sd-empty">Click a defect to log it…</div></div></div></div>`;
    const g=el.querySelector('.hsg'),cnt=el.querySelector('.sdn'),fw=el.querySelector('.sd-found');
    c.defects.forEach((d,i)=>{const gg=document.createElementNS('http://www.w3.org/2000/svg','g');gg.setAttribute('class','hot');gg.innerHTML=`<circle class="zone" cx="${d.x}" cy="${d.y}" r="${d.r}"/>`;gg.style.cursor='pointer';
      gg.addEventListener('click',()=>{if(found.has(i))return;found.add(i);gg.classList.add('found');cnt.textContent=found.size;if(fw.querySelector('.sd-empty'))fw.innerHTML='';
        const card=document.createElement('div');card.className='fcard';card.innerHTML=`<div class="fn">${found.size}. ${d.n}</div><div class="fd">${d.d}</div>`;fw.appendChild(card);
        if(found.size===c.defects.length){const dn=document.createElement('div');dn.className='sd-done';dn.textContent='All found — that\'s the scan. Nicely done.';fw.appendChild(dn);}});
      g.appendChild(gg);});},
  gfi(el){el.innerHTML=`<span class="wlabel">Animated diagram</span><div class="wtitle">Watch the GFI work</div><div class="wsub">Current flows out the hot and back on the neutral — equal. Introduce a leak and see what happens.</div>
    <div class="gfi-stage"><div class="gbox"><div><div class="gt">GFI</div><div class="gs">in vs out</div></div></div><div class="load"><div class="lt">LOAD</div></div><div class="lane hot"><span class="lab">hot — out</span></div><div class="lane neu"><span class="lab">neutral — back</span></div><div class="leak"></div><div class="person">🧍</div><div class="trip"><div class="tw"><div class="b">⚡ GFI TRIPPED</div><div class="s">imbalance &gt; 5 mA — cut in milliseconds</div></div></div></div>
    <div class="gfi-status"><span class="pip"></span><span class="gtxt">Balanced — out equals back. Holding.</span></div>
    <div class="gfi-read">Hot out: <b>15.000 A</b> · Neutral back: <b>15.000 A</b> · Difference: <b>0 mA</b></div>
    <div class="gfi-controls"><button class="btn brass gflt">Introduce a ground fault</button><button class="btn ghost grst">Reset</button></div>`;
    const stage=el.querySelector('.gfi-stage'),st=el.querySelector('.gfi-status'),txt=el.querySelector('.gtxt'),read=el.querySelector('.gfi-read'),trip=el.querySelector('.trip'),fbtn=el.querySelector('.gflt');let f=false,to;
    function dots(){stage.querySelectorAll('.dot').forEach(d=>d.remove());for(let i=0;i<5;i++){const d=document.createElement('span');d.className='dot h';d.style.animationDelay=(-i*0.48)+'s';stage.querySelector('.lane.hot').appendChild(d);}const nc=f?2:5;for(let i=0;i<nc;i++){const d=document.createElement('span');d.className='dot n';d.style.animationDelay=(-i*0.48)+'s';stage.querySelector('.lane.neu').appendChild(d);}}
    function reset(){f=false;clearTimeout(to);el.querySelector('.leak').classList.remove('on');el.querySelector('.person').classList.remove('on');trip.classList.remove('on');st.classList.remove('fault');txt.textContent='Balanced — out equals back. Holding.';read.innerHTML='Hot out: <b>15.000 A</b> · Neutral back: <b>15.000 A</b> · Difference: <b>0 mA</b>';fbtn.textContent='Introduce a ground fault';dots();}
    fbtn.onclick=()=>{f=!f;if(f){el.querySelector('.leak').classList.add('on');el.querySelector('.person').classList.add('on');st.classList.add('fault');txt.textContent='Imbalance — current is leaking to ground.';read.innerHTML='Hot out: <b>15.006 A</b> · Neutral back: <b>15.000 A</b> · Difference: <b style="color:var(--fail)">6 mA</b>';fbtn.textContent='Clear the fault';dots();to=setTimeout(()=>trip.classList.add('on'),650);}else reset();};
    el.querySelector('.grst').onclick=reset;dots();},
  match(el,k){const c=MATCH[k];const sh=a=>a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);let sel=null,locked=0;
    el.innerHTML=`<span class="wlabel">Match drill</span><div class="wtitle">${c.title}</div><div class="wsub">${c.sub}</div><div class="match"><div class="mcol"><div class="ch">${c.left}</div><div class=" L"></div></div><div class="mcol"><div class="ch">${c.right}</div><div class="R"></div></div></div><div class="md"></div>`;
    const L=el.querySelector('.L'),R=el.querySelector('.R'),done=el.querySelector('.md');
    c.pairs.forEach(p=>{const b=document.createElement('button');b.className='chip';b.textContent=p[0];b.dataset.a=p[0];b.dataset.s='L';L.appendChild(b);});
    sh(c.pairs.map(p=>p[1])).forEach(v=>{const b=document.createElement('button');b.className='chip';b.textContent=v;b.dataset.b=v;b.dataset.s='R';R.appendChild(b);});
    el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{if(b.classList.contains('locked'))return;
      if(!sel){sel=b;b.classList.add('sel');return;}if(sel===b){b.classList.remove('sel');sel=null;return;}if(sel.dataset.s===b.dataset.s){sel.classList.remove('sel');sel=b;b.classList.add('sel');return;}
      const left=sel.dataset.s==='L'?sel:b,right=sel.dataset.s==='R'?sel:b,ok=c.pairs.find(p=>p[0]===left.dataset.a)[1]===right.dataset.b;
      if(ok){[left,right].forEach(x=>{x.classList.remove('sel');x.classList.add('locked');});locked++;if(locked===c.pairs.length)done.innerHTML=`<div class="w-done">${c.done}</div>`;}
      else{[left,right].forEach(x=>{x.classList.add('miss');setTimeout(()=>x.classList.remove('miss','sel'),350);});}sel=null;});},
  sort(el,k){const c=SORT[k];let sel=null,placed=0;
    el.innerHTML=`<span class="wlabel">Sort it</span><div class="wtitle">${c.title}</div><div class="wsub">${c.sub}</div><div class="sort"><div class="sort-items">${c.items.map((it,i)=>`<button class="sitem" data-i="${i}">${it.t}</button>`).join('')}</div><div class="bins">${c.bins.map((b,bi)=>`<div class="bin" data-bin="${bi}"><div class="bt">${b}</div><div class="drop">tap an item, then tap here</div></div>`).join('')}</div></div><div class="md"></div>`;
    const items=el.querySelectorAll('.sitem'),bins=el.querySelectorAll('.bin'),done=el.querySelector('.md');
    items.forEach(it=>it.onclick=()=>{if(it.classList.contains('placed'))return;el.querySelectorAll('.sitem').forEach(x=>x.classList.remove('sel'));sel=it;it.classList.add('sel');});
    bins.forEach(bin=>bin.onclick=()=>{if(!sel)return;const i=+sel.dataset.i,bi=+bin.dataset.bin,ok=c.items[i].bin===bi;
      const row=document.createElement('div');row.className='binitem '+(ok?'right':'wrong');row.innerHTML=(ok?sv(ic.check,2.6):sv(ic.x,2.6))+' '+c.items[i].t;bin.querySelector('.drop').remove?bin.querySelector('.drop')&&(bin.querySelector('.drop').style.display='none'):0;bin.appendChild(row);
      sel.classList.add('placed');sel=null;placed++;if(placed===c.items.length)done.innerHTML=`<div class="w-done">${c.done}</div>`;});},
  est(el){el.innerHTML=`<span class="wlabel">Field tool</span><div class="wtitle">Service-size estimator</div><div class="wsub">Set what you'd read on site; it calls the size and flags an unsafe mismatch — your on-site logic.</div>
    <div class="est"><div><label>Service-entrance conductor (copper)</label><select class="sew"><option value="6">#6 AWG</option><option value="4">#4 AWG</option><option value="2" selected>2/0 AWG</option><option value="0">4/0 AWG</option></select></div><div><label>Main breaker rating</label><select class="mbk"><option value="60">60 A</option><option value="100">100 A</option><option value="200" selected>200 A</option><option value="400">400 A</option></select></div><div class="est-out"></div></div>`;
    const WA={'6':60,'4':100,'2':200,'0':400},WL={'6':'#6 AWG','4':'#4 AWG','2':'2/0 AWG','0':'4/0 AWG'},sew=el.querySelector('.sew'),mbk=el.querySelector('.mbk'),out=el.querySelector('.est-out');
    function go(){const w=sew.value,b=+mbk.value,sup=WA[w];if(b>sup){out.className='est-out bad';out.innerHTML=`<div class="ev">⚠ Overfused — unsafe</div><div class="ed">A ${b} A main on ${WL[w]} copper (good for ~${sup} A) won't shut off before the conductor overheats. Report: overcurrent device oversized for the service-entrance conductor.</div>`;}else{const ap=Math.min(b,sup);out.className='est-out ok';out.innerHTML=`<div class="ev">${ap} A service</div><div class="ed">${WL[w]} copper supports ~${sup} A and the main is ${b} A — conductor protected. Report the service size as ${ap} A${b<sup?' (limited by the main breaker)':''}.</div>`;}}
    sew.onchange=go;mbk.onchange=go;go();},
  era(el,k){const c=ERA[k];el.innerHTML=`<span class="wlabel">Explore</span><div class="wtitle">${c.title}</div><div class="wsub">${c.sub}</div><div class="era"><div class="line"></div>${c.rows.map((r,i)=>`<div class="erow" data-i="${i}"><span class="ed"></span><span class="et">${r.d}</span><div><div class="en">${r.n}</div><div class="ex">${r.x}</div></div></div>`).join('')}</div>`;
    el.querySelectorAll('.erow').forEach(r=>r.onclick=()=>r.classList.toggle('open'));}
};
function wireWidgets(root){root.querySelectorAll('.wmount').forEach(el=>{const w=el.dataset.w,k=el.dataset.k;if(WID[w])WID[w](el,k);});}
function W(w,k){return `<div class="widget wmount" data-w="${w}" data-k="${k||''}"></div>`;}

WID.sizer=(el)=>{
  el.innerHTML=`<span class="wlabel">Field tool</span><div class="wtitle">Cooling-load estimator</div><div class="wsub">Inspectors don't do formal load calcs, but you give clients a read. Set the home and climate, then compare the installed size.</div>
   <div class="est"><div><label>Conditioned floor area</label><select class="sf"><option value="1000">1,000 sq ft</option><option value="1500">1,500 sq ft</option><option value="2000" selected>2,000 sq ft</option><option value="2500">2,500 sq ft</option><option value="3000">3,000 sq ft</option></select></div>
   <div><label>Climate</label><select class="rg"><option value="south" selected>Southern US (hot)</option><option value="north">Northern US (mild)</option></select></div>
   <div><label>Installed compressor size</label><select class="ts"><option value="1.5">1.5 tons</option><option value="2">2 tons</option><option value="2.5">2.5 tons</option><option value="3" selected>3 tons</option><option value="4">4 tons</option><option value="5">5 tons</option></select></div>
   <div style="display:flex;align-items:flex-end"><div class="est-out" style="margin:0;width:100%"></div></div></div>`;
  const sf=el.querySelector('.sf'),rg=el.querySelector('.rg'),ts=el.querySelector('.ts'),out=el.querySelector('.est-out');
  function go(){const a=+sf.value,south=rg.value==='south',lo=south?700:1000,hi=south?450:700;
    const minT=a/lo, maxT=a/hi, inst=+ts.value, mid=(minT+maxT)/2;
    let cls,ev,ed;
    if(inst>maxT*1.15){cls='bad';ev='Likely oversized';ed=`At ${a.toLocaleString()} sq ft in this climate, roughly ${minT.toFixed(1)}–${maxT.toFixed(1)} tons fits. ${inst} tons is high — expect short cycling, a clammy house, and shortened compressor life.`;}
    else if(inst<minT*0.85){cls='bad';ev='Likely undersized';ed=`Roughly ${minT.toFixed(1)}–${maxT.toFixed(1)} tons fits here. ${inst} tons is low — it may run nonstop and never catch up on the hottest days.`;}
    else{cls='ok';ev='In the right range';ed=`≈ ${minT.toFixed(1)}–${maxT.toFixed(1)} tons suits ${a.toLocaleString()} sq ft in this climate. ${inst} tons fits. Installers often slightly undersize on purpose — that's fine; oversizing is the bigger problem.`;}
    out.className='est-out '+cls;out.innerHTML=`<div class="ev">${ev}</div><div class="ed">${ed}</div>`;}
  sf.onchange=go;rg.onchange=go;ts.onchange=go;go();
};

const COURSE = {
  title:'Certified Home Inspector — Pre-Licensing',
  modules:[
    {id:'m1',name:'Roofing Systems',sop:'SOP §2.1',lessons:[
      {id:'l1',t:'Roof Covering Materials',d:'14 min',type:'vid',
        body:`<p>The roof covering is a home's first line of defense, and it's where a candidate inspector earns or loses credibility on the first walk. You're not grading the roof — you're reporting what you observe about its materials, installation, and remaining service life.</p>
        <h3>Common covering types</h3>
        <ul><li><b>Asphalt (composition) shingles</b> — the dominant residential covering. Note granule loss, cupping, clawing, and exposed mat.</li>
        <li><b>Wood shakes &amp; shingles</b> — watch for splitting, cupping, and biological growth in shaded areas.</li>
        <li><b>Clay &amp; concrete tile</b> — inspect for cracked or slipped tiles; the underlayment is the actual water barrier.</li>
        <li><b>Metal panel &amp; standing seam</b> — check fastener backout, seam separation, and oil-canning.</li>
        <li><b>Low-slope membrane</b> (EPDM, TPO, modified bitumen) — look for ponding, blistering, and seam integrity.</li></ul>
        <h3>What granules actually do</h3>
        <p>Mineral granules embedded in asphalt shingles shield the asphalt from ultraviolet degradation. Heavy granule loss in gutters and at downspout outlets signals the covering is aging out, even when the roof still sheds water.</p>`,
        callout:{t:'Field note',p:'Report what you see, not what you assume. "Approximately 30% granule loss observed on south-facing slope" is defensible. "Roof has 5 years left" is a prediction you can be sued over.'},
        res:[{n:'Roof Covering Field Guide',t:'PDF · 2.4 MB',i:'pdf'},{n:'Defect Photo Reference',t:'PDF · 6.1 MB',i:'pdf'}]},
      {id:'l2',t:'Flashing &amp; Penetrations',d:'12 min',type:'vid',
        body:`<p>Most roof leaks aren't failures of the field shingles — they happen where the roof plane is interrupted. Flashing manages water at every one of those interruptions.</p>
        <h3>Flashing you must identify</h3>
        <ul><li><b>Step flashing</b> — installed in courses where a roof plane meets a vertical wall.</li>
        <li><b>Counter / cap flashing</b> — laps over step or base flashing to keep water out of the joint.</li>
        <li><b>Valley flashing</b> — open metal or closed-cut, where two roof planes drain together.</li>
        <li><b>Vent boots</b> — the rubber collars at plumbing stacks; the #1 cause of slow ceiling stains.</li>
        <li><b>Chimney cricket</b> — a small peaked structure on the high side of a wide chimney that splits and diverts water around it.</li></ul>`,
        callout:{t:'Why it matters',p:'A cricket is required by most codes on the upslope side of chimneys wider than 30 inches. Its job is to divert water around the chimney rather than letting it dam against the masonry.'},
        res:[{n:'Flashing Detail Diagrams',t:'PDF · 3.0 MB',i:'pdf'}]},
      {id:'l3',t:'Drainage — Gutters &amp; Downspouts',d:'9 min',type:'read',
        body:`<p>Roof drainage doesn't stop at the eave. A correctly performing system carries water clear of the foundation — the single most common moisture-intrusion path you'll document.</p>
        <h3>Inspection points</h3>
        <ul><li>Slope toward downspouts; standing water and rust streaks indicate poor pitch.</li><li>Secure attachment and proper spacing of hangers.</li><li>Downspout extensions discharging at least 4–6 ft from the foundation.</li></ul>`,
        res:[{n:'Drainage Checklist',t:'PDF · 0.8 MB',i:'pdf'}]},
      {id:'l4',t:'Roof Structure &amp; Sheathing',d:'11 min',type:'read',
        body:`<p>From the attic side, the structure tells the truth the covering can hide. You'll evaluate the framing system and the sheathing it supports.</p>
        <h3>What to evaluate</h3>
        <ul><li>Rafter / truss condition — sagging, cracked members, field-cut trusses (a defect).</li><li>Sheathing — delamination, water staining, daylight at penetrations.</li><li>Evidence of past leaks vs. active moisture.</li></ul>`,
        res:[{n:'Framing Terminology Sheet',t:'PDF · 1.2 MB',i:'pdf'}]},

    {id:'m2',name:'Exterior &amp; Site',sop:'SOP §2.2',lessons:[
      {id:'l5',t:'Wall Cladding &amp; Trim',d:'13 min',type:'vid',body:'<p>Siding, masonry veneer, EIFS, and trim — the systems that keep water off the structure. This module covers identification, common failure modes, and the moisture-management details inspectors are expected to verify.</p><h3>Coming up</h3><ul><li>Cladding types and clearances to grade</li><li>Window and door flashing integration</li><li>Decks, balconies, and ledger attachment</li></ul>',res:[{n:'Cladding Reference',t:'PDF · 2.1 MB',i:'pdf'}]},

      {id:'l7',t:'Foundation Types &amp; Movement',d:'15 min',type:'vid',body:'<p>Slab, crawlspace, and full basement foundations — how they\'re built and how they fail. Distinguishing normal settlement cracking from active structural movement is one of the highest-stakes calls an inspector makes.</p>',res:[]},

        {id:'m4',name:'Electrical Systems',sop:'SOP §2.4',lessons:[
      {id:"e_intro",t:"How inspectors read a system",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Electrical Systems \u00b7 Orientation</span><h1>You're not an electrician. You're an inspector.</h1>\n <p class=\"lead\">Your job isn't to fix, certify, or bring anything up to code. It's to <b>observe what's accessible, recognize the conditions that matter, and report them clearly</b> \u2014 with the implication spelled out so your client can decide what to do. This section covers the entire ATI electrical chapter; nothing is skipped, and the reading is broken up with things to <em>do</em>.</p>\n <p>Electricity has its own language. Know the technical terms, but translate for clients \u2014 \"the wires from the street\" lands better than \"service drop,\" and \"breakers or fuses\" beats \"overcurrent protection devices.\" One precise distinction: a <b>wire</b> is a single conductor; a <b>cable</b> is a group of conductors.</p>\n <p>Every component in this chapter runs through the same five-step loop. Learn it once and it works anywhere:</p>\n <div class=\"loop\"><div class=\"seg on\"><div class=\"n\">01</div><div class=\"w\">Component</div></div><div class=\"seg\"><div class=\"n\">02</div><div class=\"w\">Function</div></div><div class=\"seg\"><div class=\"n\">03</div><div class=\"w\">Common defect</div></div><div class=\"seg\"><div class=\"n\">04</div><div class=\"w\">Implication</div></div><div class=\"seg\"><div class=\"n\">05</div><div class=\"w\">How you report</div></div></div>\n <h2>The systems you'll inspect</h2>\n <ul class=\"num\"><li>Service drop &amp; entrance</li><li>The grounding system</li><li>The service box (main disconnect, fuses/breakers)</li><li>Distribution panels</li><li>Branch-circuit wiring</li><li>Lights, outlets, switches, junction boxes (plus smoke detectors)</li></ul>\n <div class=\"field\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">Safety \u2014 non-negotiable</div><p>Checking panels is one of the most dangerous parts of the job. Before you touch anything: <b>(1)</b> wear rubber-soled shoes; <b>(2)</b> don't stand in water or wet areas; <b>(3)</b> use insulated tools to remove covers; <b>(4)</b> keep clients away from an open panel; <b>(5)</b> use a voltage detector to confirm equipment is de-energized. Even with house power off, the service-entrance conductors and a miswired fuse can be live.</p></div></div>\n <p>The complete original chapter is embedded at the end as optional deep-reading \u2014 but everything you need to pass is taught right here.</p></div>",res:[]},
      {id:"e_l1",t:"Service Drop",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 1 \u00b7 \u00a77.1 Service Drop</span><h1>Getting power to the house</h1>\n <p class=\"lead\">Before electricity does anything useful inside a home, it has to cross the gap from the utility to the building \u2014 safely, and out of everyone's way. Get the vocabulary and the geometry right here and the rest of the service makes sense.</p>\n <h2>What it is, and what to call it</h2>\n <p>The <b>service drop</b> is the bundle of overhead conductors running from the utility pole \u2014 usually at the street \u2014 to the point where they connect to the house. Clients call these \"the overhead wires\"; electricians and the utility say \"service drop.\" When the conductors are buried instead, the utility calls them <b>service laterals</b>: they run underground and surface at a meter or head straight inside.</p>\n <p>Wherever the drop ends, it splices to the home's wiring at the <b>service point</b> \u2014 the spot where the utility's responsibility hands off to the homeowner's. On an overhead service, this happens at the <b>drip loop</b>: a deliberate U-shaped sag that does two jobs at once. It gives water a low point to <b>drip off</b> before it can travel into the conduit, and its very presence proves the conductors are <b>secured and relaxed</b> \u2014 a drip loop can only exist if the wires aren't pulled tight. So a missing drip loop is a tension warning, not just a water issue.</p>\n <p>The drip loop sits at the top of the <b>masthead</b> (also called the service cap, entrance cap, pothead, weatherhead, or servicehead \u2014 all the same fitting). From there, the wires down into the box are the <b>service-entrance conductors</b> (Lesson 2). The <b>utility</b> usually owns and maintains the drop; the <b>homeowner</b> owns the entrance \u2014 which is why so many drop defects get referred to the utility, not an electrician.</p>\n <div class=\"dgm\"><svg viewBox=\"0 0 720 240\"><defs><marker id=\"a1\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6\" fill=\"none\" stroke=\"#7f520a\" stroke-width=\"1.4\"/></marker></defs><g fill=\"none\" stroke=\"#3c5870\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n   <line x1=\"70\" y1=\"34\" x2=\"70\" y2=\"200\"/><line x1=\"48\" y1=\"200\" x2=\"92\" y2=\"200\"/><rect x=\"52\" y=\"56\" width=\"36\" height=\"24\" rx=\"2\"/><text x=\"70\" y=\"100\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"#2c4153\">UTILITY POLE</text>\n   <path d=\"M72 62 C 180 70, 250 104, 296 104\" stroke=\"#7f520a\"/><text x=\"180\" y=\"58\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#7f520a\">service drop (overhead)</text>\n   <path d=\"M296 104 c 9 0 9 16 -2 16 c -9 0 -7 -11 2 -11\" stroke=\"#7f520a\"/><text x=\"300\" y=\"138\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#7f520a\">drip loop / service point</text>\n   <line x1=\"360\" y1=\"40\" x2=\"360\" y2=\"120\"/><circle cx=\"360\" cy=\"58\" r=\"7\"/><text x=\"398\" y=\"55\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#2c4153\">masthead</text>\n   <line x1=\"318\" y1=\"108\" x2=\"352\" y2=\"64\" marker-end=\"url(#a1)\" stroke=\"#7f520a\"/>\n   <rect x=\"330\" y=\"120\" width=\"60\" height=\"100\" rx=\"4\"/><text x=\"360\" y=\"172\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#2c4153\" transform=\"rotate(-90 360 172)\">SE conductors</text>\n   <rect x=\"470\" y=\"120\" width=\"70\" height=\"100\" rx=\"5\"/><rect x=\"482\" y=\"132\" width=\"46\" height=\"13\" rx=\"2\"/><text x=\"505\" y=\"142\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"7\" fill=\"#2c4153\">MAIN</text><text x=\"505\" y=\"236\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#2c4153\">SERVICE BOX</text>\n   <line x1=\"392\" y1=\"170\" x2=\"468\" y2=\"170\" marker-end=\"url(#a1)\" stroke=\"#7f520a\"/>\n   <text x=\"630\" y=\"120\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#918c7d\">utility owns \u2192</text><text x=\"628\" y=\"206\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#918c7d\">\u2190 homeowner owns</text>\n </g></svg><div class=\"cap\">Pole \u2192 drop \u2192 drip loop / service point \u2192 masthead \u2192 service-entrance conductors \u2192 service box</div></div>\n <h2>Reading the drop \u2014 and the trap of sizing by it</h2>\n <p>A mistake that catches new inspectors: judging the <b>service size</b> from the thickness of the drop wires. Don't. They hang in open air, shed heat easily, and can be <b>smaller</b> than same-ampacity wires inside the house \u2014 our ampacity tables assume an enclosed conductor. Size the service from the SE conductors or main disconnect (Lesson 3), never the drop.</p>\n <p>What the drop tells you reliably is the <b>configuration</b>, by conductor count: <b>three wires</b> (black, red, white-neutral) = a standard 240-volt single-phase residential service; <b>two wires</b> = a 120-volt service (rare, inadequate today); <b>four wires</b> = three-phase commercial, beyond a home inspection. The neutral is often bare and doubles as the support cable for the two hots.</p>\n <div class=\"dgm\"><svg viewBox=\"0 0 720 230\"><g fill=\"none\" stroke=\"#3c5870\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n   <line x1=\"40\" y1=\"210\" x2=\"700\" y2=\"210\"/><line x1=\"110\" y1=\"210\" x2=\"110\" y2=\"34\"/><text x=\"110\" y=\"26\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"9\" fill=\"#2c4153\">pole</text>\n   <path d=\"M112 54 C 250 62, 360 112, 460 112\" stroke=\"#7f520a\"/>\n   <g stroke=\"#b85436\" stroke-dasharray=\"4 3\"><line x1=\"190\" y1=\"210\" x2=\"190\" y2=\"138\"/><line x1=\"310\" y1=\"210\" x2=\"310\" y2=\"108\"/><line x1=\"450\" y1=\"210\" x2=\"450\" y2=\"80\"/><line x1=\"600\" y1=\"210\" x2=\"600\" y2=\"96\"/></g>\n   <text x=\"190\" y=\"225\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#7f520a\">walking surface</text><text x=\"190\" y=\"133\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"#b85436\">10 ft</text>\n   <text x=\"310\" y=\"225\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#7f520a\">driveway</text><text x=\"310\" y=\"103\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"#b85436\">12 ft</text>\n   <text x=\"450\" y=\"225\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#7f520a\">roadway</text><text x=\"450\" y=\"75\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"#b85436\">18 ft</text>\n   <text x=\"600\" y=\"225\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"8\" fill=\"#7f520a\">pool (any direction)</text><text x=\"600\" y=\"91\" text-anchor=\"middle\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"#b85436\">22.5 ft</text>\n </g></svg><div class=\"cap\">Clearances scale with what's underneath \u2014 keep conductors out of reach of people, vehicles, and ladders</div></div>\n <h2>The seven conditions you'll write up</h2>\n <p>The clearance numbers above cover the first one. Over a <b>roof</b>: 8 ft above a roof / 10 ft over a walk-out deck, just 3 ft where the slope exceeds 4-in-12 (nobody walks there), and 18 in where the wires project only ~4 ft onto the roof. Run each condition through the loop:</p>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">1</span><span class=\"nm\">Overhead wires too low</span></div><p>The clearances are the test; the failure is contact by a person, vehicle, ladder, or equipment.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Shock to people; danger to roofers; snow/ice damage in cold climates.</span><span class=\"lab\">Strategy</span><span class=\"val\">Check heights and apply the common-sense reach test. The utility is the authority.</span></div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">2</span><span class=\"nm\">Damaged or frayed wires</span></div><p>Sun, abrasion, and age break down the covering \u2014 usually the utility's responsibility.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Short circuit, loss of service, shock if a wire falls.</span><span class=\"lab\">Strategy</span><span class=\"val\">Examine from the ground, ideally with binoculars.</span></div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">3</span><span class=\"nm\">Trees or vines interfering</span></div><p>Anything rubbing the drop causes trouble two ways.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Mechanical abrasion plus reduced heat dissipation where foliage wraps the wire.</span><span class=\"lab\">Strategy</span><span class=\"val\">Inform the client; the utility often clears it.</span></div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">4</span><span class=\"nm\">Wires too close to doors or windows</span></div><p>Modern practice wants ~3 ft from the sides/bottoms of windows, doors, and fire escapes \u2014 some jurisdictions even for fixed windows (they may be replaced with operable ones).</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Contact/shock wherever a wire is reachable from an opening.</span><span class=\"lab\">Strategy</span><span class=\"val\">Note it; the utility may have accepted it \u2014 point out the common-sense issue.</span></div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">5</span><span class=\"nm\">Wires not well secured to the house</span></div><p>The neutral usually carries the mechanical load. Confirm a sound connection.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Loose wires can fall \u2014 cutting power and dropping live conductors.</span><span class=\"lab\">Strategy</span><span class=\"val\">Look for movement, excess sag, or \u2014 the key tell \u2014 an absent drip loop (wires under tension).</span></div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">6</span><span class=\"nm\">Poor connection between drop and entrance</span></div><p>The splice belongs at the drip loop, not its low point (where water collects).</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Loss of power and a hazard if wires fall.</span><span class=\"lab\">Strategy</span><span class=\"val\"><b>Electrical tape on the splice signals amateur work</b> \u2014 utilities use heat-shrink.</span></div><div class=\"rep\"><b>Report:</b> \"Service-drop splice shows strain / amateur repair. Recommend evaluation by the utility.\"</div></div>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">7</span><span class=\"nm\">Inadequate clearance from the roof</span></div><p>The roof figures above are the standard.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Mechanical damage and shock during roof repair/maintenance.</span><span class=\"lab\">Strategy</span><span class=\"val\">Know what your utility accepts and advise the client of the risk.</span></div></div>\n <div class=\"widget wmount\" data-w=\"sort\" data-k=\"whofixes\"></div>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the house</div><p>A drop sagged low across the back yard, well under the 10 feet a walking surface calls for \u2014 but the homeowner insisted \"the power company put it there, so it's fine.\" Maybe so. <b>The utility is the authority</b>, and you won't win that argument. The move isn't to cite code chapter and verse; it's to write the plain truth \u2014 \"these wires are within reach of people; this should be checked by the utility and may need to be moved\" \u2014 and let the experts settle it.</p></div></div>",res:[]},
      {id:"e_l2",t:"Service Entrance Wires",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 2 \u00b7 \u00a77.2 Service Entrance Wires</span><h1>From the drop down to the equipment</h1>\n <p class=\"lead\">The service-entrance (SE) wires pick up where the drop ends and run down to the service equipment, with the meter usually partway along. This is the homeowner's hardware \u2014 and a magnet for water, which is the theme running through nearly every defect here.</p>\n <p>The SE conductors include a black and red (hot) and a white (neutral). Many jurisdictions require them to extend at least <b>30 inches</b> out of the service cap so the utility can make connections and form a drip loop. They may run in a <b>conduit</b> or be a self-protected <b>SE cable</b> \u2014 both are permitted. Where SE cable is used without a masthead, the cable is bent into a <b>gooseneck</b> (like a candy cane) to keep water out.</p>\n <p>Where the drop arrives above the roofline, a <b>service mast</b> is required: it extends through the roof, supports the drop, and must be flashed where it penetrates. Good practice attaches the drop within ~12 in of the top, keeps wires ~2 ft above the roof (so the mast usually rises \u2265 3 ft), and adds <b>guy wires</b> on masts taller than 5 ft. For support: secure cable every 30 in\u20135 ft, conduit every 5\u20136 ft.</p>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">The through-line: keep water out</div><p>Almost every SE defect is really a <b>water-entry</b> problem. The four spots to scrutinize: <b>conduit joints, the service cap, the roof flashing, and the meter base.</b> Water in the system can shut it down, shock someone, or start a fire.</p></div></div>\n <h2>The eleven service-entrance conditions</h2>\n <div class=\"defect\"><div class=\"dh\"><span class=\"n\">1</span><span class=\"nm\">No drip loop</span></div><p>The slack low point at the splice that sheds water and relieves tension is missing.</p><div class=\"meta\"><span class=\"lab\">Implication</span><span class=\"val\">Water entry and mechanical stress on wires/splices.</span></div></div>\n <h3>Conditions 2\u201311 (run the loop on each)</h3><ul class=\"clean\"><li><b>No masthead / service cap</b> \u2014 Water into the system. Wires should enter the underside of a weather-tight cap.</li><li><b>Masthead not weather-tight</b> \u2014 Cap loose or wrong angle \u2014 water in.</li><li><b>SE wires too close to the roof</b> \u2014 Mechanical damage and shock during roof work.</li><li><b>Mast or conduit bent</b> \u2014 Sagging/falling wires, lost clearance, lost weather-tightness. Masts > 5 ft need guy wires; check the flashing.</li><li><b>Mast or conduit rusted</b> \u2014 Mechanical failure and water entry \u2014 worst at horizontal surfaces and cut threads.</li><li><b>Mast rotted (wood)</b> \u2014 Loss of strength and collapse; wood masts are banned on new work in many areas.</li><li><b>Not well secured to the building</b> \u2014 Cable every 30 in\u20135 ft, conduit every 5\u20136 ft. Look for movement, not numbers.</li><li><b>Not weather-tight</b> \u2014 The four water-entry points: conduit joints, service cap, roof flashing, meter base.</li><li><b>Not sealed at the wall penetration</b> \u2014 Water into the system (shock), into the basement (nuisance), and rusting equipment. If below grade, check from inside.</li><li><b>SE cable frayed, damaged, or covered by siding</b> \u2014 Touching it can shock; live cable against metal siding can energize the whole building skin. Cable must stay accessible \u2014 never buried (conduit behind brick is sometimes allowed).</li></ul>\n <div class=\"widget wmount\" data-w=\"sort\" data-k=\"whofixes\"></div>\n <p class=\"lead\" style=\"font-size:14px;margin-top:6px\">Notice how the same routing logic from Lesson 1 still holds \u2014 the overhead drop is the utility's, the entrance hardware is the homeowner's/electrician's.</p></div>",res:[]},
      {id:"e_l3",t:"Service Size",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 3 \u00b7 \u00a77.3 Service Size</span><h1>How much current the house can carry</h1>\n <p class=\"lead\">Two numbers define a service: voltage and amperage. For ~999 of 1,000 homes the voltage is 240 V, so the real question is ampacity \u2014 and the single most important idea in this lesson is which size problems are dangerous and which are merely annoying.</p>\n <p>Common sizes: <b>60 A</b> (obsolete, not allowed on new work), <b>100 A</b> (typical average home), <b>125/150 A</b> (small homes with electric heat or larger ones without), <b>200 A</b> (electric heat or large homes), and rarely <b>400 A</b> (the largest single-phase service, ~6,000+ sq ft). Inspectors don't do load calculations \u2014 we use general rules and explain that lifestyle drives demand.</p>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">The distinction that's on the exam \u2014 and the job</div><p>An <b>undersized service is NOT a safety hazard</b> \u2014 it's an inconvenience. Run too much at once and the main simply trips or blows. The problem only appears with simultaneous use. <b>Overfusing</b> (a device too large for the wire) <b>is</b> the hazard, because it won't shut off before the conductor overheats.</p></div></div>\n <h2>Wire gauge runs backwards</h2>\n <p>In <b>AWG</b>, a smaller number is a bigger wire. The sizes used: 14, 12, 10, 8, 6, 4, 3, 2, 1, 0 \u2014 then 1/0, 2/0, 3/0, and 4/0 (the largest you'll see in homes, used for aluminum 200 A service entrances).</p>\n <table class=\"tbl\"><tr><th>Service</th><th>Min. copper</th><th>Min. aluminum</th></tr><tr><td>60 A</td><td>#6</td><td>#4</td></tr><tr><td>100 A</td><td>#4</td><td>#2</td></tr><tr><td>200 A</td><td>2/0</td><td>4/0</td></tr></table>\n <h2>Determining the size \u2014 in order of reliability</h2>\n <ul class=\"clean\">\n  <li><b>Best: the SE conductor size.</b> Read it at the cap or where it enters the box. Aluminum is marked <b>AL / ALUM / ALUMINUM</b>. Don't judge by bare-wire diameter or cable OD. Size the <b>red and black</b>, never the neutral.</li>\n  <li><b>Next: the main disconnect.</b> If fused, two fuses (one per hot) \u2014 a 100 A service = two 100 A fuses; <b>never add them</b>. If breakered, a <b>double-pole</b> breaker (200 A service = 200 A double-pole). Both fuses must match. Read breaker size off the handle without removing the cover.</li>\n  <li><b>The box and panel rating</b> must be \u2265 the service size.</li>\n  <li><b>No single main?</b> Up to <b>six throws</b> can kill all power; don't add the disconnects \u2014 use the SE conductors.</li>\n </ul>\n <p>If you can only read the device, write \"<b>apparent</b> 100-amp service.\" Never remove main fuses or shut house power to read them. Slightly oversized devices can be fine (200 A breakers on 180 A wire, since no 180 A breaker exists). Try the estimator below \u2014 change the conductor and the breaker and watch the logic:</p>\n <div class=\"widget wmount\" data-w=\"est\" data-k=\"\"></div>\n <h2>Advising your client</h2>\n <ul class=\"clean\">\n  <li><b>Adequate:</b> report the size; say it suits a typical home of this size (don't promise it fits their lifestyle).</li>\n  <li><b>Undersized:</b> report and recommend increasing it \u2014 the drop/laterals, SE conductors, box, grounding conductor, and usually the panel.</li>\n  <li><b>Marginal:</b> report and suggest a trial basis; it's a convenience improvement, not a necessity. Breakers trip (both); fuses blow (one or both \u2014 one blown fuse leaves half the house dead and no 240 V appliances working). Never tell a client to change main fuses.</li>\n </ul>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"wirebrk\"></div></div>",res:[]},
      {id:"e_l4",t:"Service Box",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 4 \u00b7 \u00a77.4 Service Box</span><h1>The one place that shuts it all off</h1>\n <p class=\"lead\">The service box \u2014 also called the service equipment or service panel \u2014 is where the incoming power first lands inside the house and where it can be switched off entirely. It is the most safety-critical thing you will open all day, and several of its defects can kill someone who doesn't understand them. Read this one slowly.</p>\n <p>Most homes have a metal service box holding a <b>main disconnect</b> and the main overcurrent protection. It may be a stand-alone box, or a <b>combination panel</b> that builds the main disconnect together with the distribution panel and all its branch breakers or fuses. The rule you're checking against: there should be one clear way to kill all the power. Where there's no single main, up to <b>six throws</b> (switches or fuse pulls) are allowed to shut everything off \u2014 but if it takes more than six, or there's no organized disconnect at all, recommend a proper service box with a single main.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"box\"></div>\n <h2>Location, access, and the gas-meter rule</h2>\n <p>Service boxes live indoors, outdoors, or in garages. An exterior box must be <b>weather-tight</b>. You'll sometimes find exterior boxes <b>locked</b> for security \u2014 which is a problem, because you can't shut the power off fast in an emergency; if that's common in your area, learn the utility's position (they may want the lock removed or a key staged). A <b>distribution panel should never be locked.</b> Keep one more number in your head: electrical equipment should sit at least <b>three feet from indoor gas meters and outdoor gas relief vents</b> \u2014 you don't want an electrical spark next to a gas leak. And there should be clear working space in front of the box; a panel buried behind storage or boxed into a finished closet is a defect worth noting.</p>\n <h2>The four conditions that are genuinely dangerous</h2>\n <p>Most service-box problems imply shock or fire. But four of them are special \u2014 they leave equipment <b>live when it looks dead</b>, which is how people get hurt. Understand the mechanism, not just the name:</p>\n <h3>Memorize these \u2014 they defeat the off switch</h3><ul class=\"clean\"><li><b>Fused neutral</b> \u2014 A fuse or switch placed in the neutral. If that fuse opens, the circuit goes dead \u2014 but the equipment downstream can stay energized through the hot, so it looks off and isn't. The neutral must never be fused or switched.</li><li><b>Fuses upstream of the disconnect</b> \u2014 Fuses ahead of the main switch stay energized even with the main off. You cannot make the box safe to work in, because killing the main doesn't kill those fuses.</li><li><b>Neutral bypasses the service box</b> \u2014 The neutral has to land in the box \u2014 that's the single point where neutral and ground are bonded. A neutral routed around the box defeats the whole grounding scheme.</li><li><b>Improper taps</b> \u2014 Unauthorized connections made ahead of the main are unprotected \u2014 no breaker or fuse stands between them and the incoming power.</li></ul>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><circle cx=\"12\" cy=\"12\" r=\"9\"/></svg></div><div><div class=\"t\">Why \"the power is off\" can be a lie</div><p>Even with the house main switched off, the <b>service-entrance conductors</b> entering the box are still live, and any of the four conditions above can keep parts energized. This is exactly why you confirm de-energization with a voltage detector and never assume. \"Off\" is something you verify, not something you trust.</p></div></div>\n <h2>The rest of the service-box checklist</h2>\n <h3>The full list of 16 conditions</h3><ul class=\"clean\"><li><b>Poor access or location</b> \u2014 Blocked, too high, behind finished walls, or locked. Note it; recommend safe access.</li><li><b>Loose</b> \u2014 The box should be firmly mounted. Movement stresses conductors and connections.</li><li><b>Rust or water in the box</b> \u2014 Moisture corrodes connections and is a shock hazard. Find the source; recommend evaluation.</li><li><b>Unprotected openings</b> \u2014 Missing cover, missing knockouts, or open slots let fingers and rodents reach live parts. Install fillers.</li><li><b>Damaged parts</b> \u2014 Cracked fuse holders, broken switches, damaged enclosure.</li><li><b>Overheating</b> \u2014 Discoloration, melted insulation, or the smell of hot plastic \u2014 an immediate, serious problem.</li><li><b>Incorrect fuse/breaker size; box rating too small</b> \u2014 The box and its overcurrent devices must be rated at or above the service size.</li><li><b>Service-entrance wires exposed in the house</b> \u2014 SE conductors have no overcurrent device ahead of them, so they must be enclosed and kept as short as possible inside.</li><li><b>Poor connections</b> \u2014 Loose lugs and corroded terminals overheat. A frequent finding.</li><li><b>Obsolete box</b> \u2014 Certain older panels with known failure histories, or any switch not enclosed in a box, should be treated as obsolete.</li><li><b>Exterior box not weather-tight</b> \u2014 Outdoor boxes must keep water out.</li></ul>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>On an older home I found the fuses mounted facing the back of the box, labels turned away \u2014 unreadable without pulling them, which you never do. The right move isn't to force it. I reported that the service size could not be confirmed from accessible information and recommended evaluation. \"I couldn't safely verify it\" is a complete, professional finding.</p></div></div>",res:[]},
      {id:"e_l5",t:"Grounding &amp; Bonding",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 5 \u00b7 \u00a77.5 System Grounding</span><h1>The wires that do nothing \u2014 until they save a life</h1>\n <p class=\"lead\">Grounding and bonding confuse almost everyone, because they involve wires that normally carry no current at all. Get three distinctions straight and the mystery disappears: the two grounding systems, grounding versus the grounded neutral, and grounding versus bonding.</p>\n <h2>Two different grounding systems</h2>\n <p>The <b>equipment grounding system</b> is the network of bare wires running through the house alongside the branch-circuit wiring. It normally does nothing. Its job is to be a ready <b>emergency path</b>: if electricity gets somewhere it shouldn't \u2014 say a hot wire contacts a metal appliance case \u2014 the bare ground gives that current an easy route back, which trips the breaker or blows the fuse and keeps the charge off of <em>you</em>. This system connects to the neutral at the service box and rides the neutral service conductor back out to the transformer at the street.</p>\n <p>The <b>earth grounding system</b> is a separate idea: a single conductor \u2014 the <b>grounding electrode conductor</b> \u2014 running from the service box out to the earth, by way of electrodes like a driven rod or a metal water pipe. It stabilizes the system voltage relative to the ground you stand on.</p>\n <h2>Grounding vs. the grounded neutral \u2014 don't mix them up</h2>\n <p>The <b>white neutral (grounded) wire</b> carries current every day. It's the normal return path: power flows out a hot, through the load, and back on the neutral to the bus bar, to the service box, and out to the transformer. That's electricity doing its job. The <b>bare grounding wire</b> is the opposite \u2014 it sits idle, carrying nothing, available only for a fault. One is a working road; the other is an emergency shoulder.</p>\n <div class=\"field brass\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7l1-8z\"/></svg></div><div><div class=\"t\">The single most testable fact about grounding</div><p>The neutral and the ground are tied together at <b>exactly one place \u2014 the service box.</b> Nowhere else. In a downstream subpanel they must be kept <b>separate</b>. A neutral and ground bonded together in a subpanel is a real defect, because it puts normal return current onto the bare grounding wires and the metal they touch.</p></div></div>\n <h2>The electrodes \u2014 how the system reaches earth</h2>\n <h3>Where the grounding electrode conductor terminates</h3><ul class=\"clean\"><li><b>Metal underground water pipe</b> \u2014 A classic electrode \u2014 but a jumper must bridge around the water meter, because a plumber can remove the meter and break the ground.</li><li><b>Driven ground rod</b> \u2014 A rod at least 8 feet long. Since the late 1980s a single rod usually must be supplemented by a second rod unless it can be proven to have low enough resistance \u2014 so two rods is common.</li><li><b>Concrete-encased electrode (UFER)</b> \u2014 Rebar or wire encased in the foundation concrete \u2014 an excellent, modern electrode.</li></ul>\n <h2>Bonding \u2014 and the gas-piping trap</h2>\n <p><b>Bonding</b> is simply joining two conductors so they sit at the same electrical potential \u2014 two wires, a wire and a pipe, even two boxes. By itself bonding protects nothing. It earns its keep when one of the bonded parts is grounded: then a stray charge has somewhere to go instead of building up. Tie the gas line, the ductwork, and the metal boxes to the same system and no piece can quietly go live relative to another.</p>\n <p>Gas piping is where people get it backwards. You are <b>not allowed to use gas piping to ground</b> the electrical system \u2014 much of the underground gas line is plastic, so it can't be relied on to reach earth. But the gas piping <b>must be bonded</b> to the electrical grounding system in most areas, so it can't develop a charge that arcs to something nearby \u2014 a spark next to gas vapor is an explosion. Bonding the gas line usually bonds the furnace and ductwork too, since the piping touches them. It's often done with a wire clamped to the water supply pipe near the water heater. Sort the actions below to lock the distinction in:</p>\n <div class=\"widget wmount\" data-w=\"sort\" data-k=\"groundbond\"></div>\n <h3>Conditions you'll report</h3><ul class=\"clean\"><li><b>No grounding / no earth ground</b> \u2014 An ungrounded system or a missing electrode connection \u2014 recommend evaluation and correction.</li><li><b>Undersized grounding conductor</b> \u2014 Too small for the service it protects.</li><li><b>Loose or corroded ground connections</b> \u2014 At the rod, the pipe clamp, or the box \u2014 corrosion defeats the path.</li><li><b>Missing jumper at the water meter</b> \u2014 Breaks the ground the moment the meter is pulled.</li><li><b>Gas piping not bonded</b> \u2014 A genuine explosion-risk finding in most jurisdictions.</li><li><b>Grounding and neutral bonded in a subpanel</b> \u2014 Return current ends up on the grounding wires and the metal they touch.</li></ul></div>",res:[]},
      {id:"e_l6",t:"Distribution Panels",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 6 \u00b7 \u00a77.6 Distribution Panels</span><h1>Where the house circuits begin</h1>\n <p class=\"lead\">The distribution panel is where the two incoming hot legs get split into the dozens of branch circuits that feed the house, each protected by its own fuse or breaker. In a combination panel it shares an enclosure with the main disconnect; in older homes it may be a separate box fed from the service box.</p>\n <h2>120 volts, 240 volts, and how to tell</h2>\n <p>Residential power arrives as two 120-volt hot legs plus a neutral. How a circuit taps them sets its voltage:</p>\n <h3>Reading a circuit by its conductors</h3><ul class=\"clean\"><li><b>One hot + neutral = 120 V</b> \u2014 Lights, general receptacles, most small loads.</li><li><b>Two hots = 240 V</b> \u2014 Straight 240-volt loads \u2014 water heater, baseboard heat, central air.</li><li><b>Two hots + neutral = 120/240 V</b> \u2014 Ranges and dryers, which run heating elements at 240 V and clocks, lights, and controls at 120 V.</li></ul>\n <h2>The wire-to-breaker pairing is the whole game</h2>\n <p>Each branch breaker must match the wire it protects, because the breaker exists to shut off before that wire overheats. This is the table you'll use more than any other in the field. Drill it until it's automatic:</p>\n <table class=\"tbl\"><tr><th>Copper wire</th><th>Max breaker / fuse</th><th>Typical use</th></tr><tr><td>14 AWG</td><td>15 A</td><td>Lighting, general outlets</td></tr><tr><td>12 AWG</td><td>20 A</td><td>Kitchen, laundry, garage</td></tr><tr><td>10 AWG</td><td>30 A</td><td>Water heater, dryer</td></tr><tr><td>8 AWG</td><td>40 A</td><td>Range, sub-feeds</td></tr><tr><td>6 AWG</td><td>60 A</td><td>Large appliances, subpanels</td></tr></table>\n <div class=\"widget wmount\" data-w=\"match\" data-k=\"wirebrk\"></div>\n <p>A breaker <b>larger</b> than its wire allows is <b>overfusing</b> \u2014 the dangerous direction, because the wire can overheat before the breaker ever trips. A breaker <b>smaller</b> than the wire is merely conservative and trips early. Direction matters.</p>\n <h2>Subpanels \u2014 where neutral and ground must part ways</h2>\n <p>A subpanel is a distribution panel fed from the main. The rule from Lesson 5 comes home here: in a subpanel the neutral and the grounding conductors must land on <b>separate, isolated buses</b> \u2014 they are only bonded back at the service box. The tells of a correct subpanel feed are a <b>four-wire feeder</b> (two hots, an insulated neutral, and a separate ground) and a neutral bus that is isolated from the enclosure. A subpanel with neutral and ground sharing one bus, or a bonding screw left in, is a defect.</p>\n <div class=\"story\"><div class=\"st\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 8h1a4 4 0 1 1 0 8h-1\"/><path d=\"M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z\"/><line x1=\"6\" y1=\"2\" x2=\"6\" y2=\"5\"/><line x1=\"10\" y1=\"2\" x2=\"10\" y2=\"5\"/><line x1=\"14\" y1=\"2\" x2=\"14\" y2=\"5\"/></svg> Inspector in the House</div><p>A homeowner once told me, half-joking, that dinner is always late on holidays \u2014 the oven, the microwave, and a space heater on the same kitchen run keep tripping the breaker. That's not a hazard; it's the breaker doing its job on an overloaded or undersized circuit. I explained the difference: a tripping breaker is protection working, not a fire waiting to happen. The fix is load management or another circuit \u2014 not a bigger breaker on the same wire.</p></div></div>",res:[]},
      {id:"e_l7",t:"Conditions in Panels",d:"7 min",type:'deep',body:"<div class=\"deep\"><span class=\"eyebrow\">Lesson 7 \u00b7 \u00a77.7 Conditions Found in Panels</span><h1>The hunt \u2014 what's actually wrong in this panel</h1>\n <p class=\"lead\">This is where the job gets real. With the dead-front off, you're scanning a crowded box for a long list of specific conditions. They group into six families: things that apply to any panel, things specific to subpanels, to fuses, to breakers, and to the wires inside. Learn the families and the hunt gets organized instead of overwhelming.</p>\n <p>Start with the scene below \u2014 open the panel and find every condition before you read the lists. This is the exact visual scan you'll run on site.</p>\n <div class=\"widget wmount\" data-w=\"spot\" data-k=\"panel\"></div>\n <h2>Conditions in any panel</h2>\n <h3>Applies to all panels</h3><ul class=\"clean\"><li><b>Loose mounting</b> \u2014 The panel should be firmly fixed; movement stresses every connection.</li><li><b>Rust or water</b> \u2014 Moisture corrodes terminals and is a shock hazard; trace the source.</li><li><b>Damaged components</b> \u2014 Cracked breakers, broken buses, burned insulation.</li><li><b>Overheating</b> \u2014 Discoloration, melted plastic, or a hot-plastic smell \u2014 act on it immediately.</li><li><b>Unprotected openings</b> \u2014 Missing dead-front, missing knockout fillers, open breaker slots.</li><li><b>Double-tapped terminals</b> \u2014 Two conductors under one lug not listed for two \u2014 a loose, overheating joint. Pigtail to fix.</li><li><b>Improper or loose wire connections</b> \u2014 Stray strands, under-torqued lugs, wrong terminals.</li><li><b>Abandoned wires in the panel</b> \u2014 You can't tell if they're live \u2014 they should be removed.</li><li><b>Too many conductors / panel overfilled</b> \u2014 More circuits crammed in than the panel is designed for.</li></ul>\n <h2>Subpanel-specific, fuse-specific, breaker-specific</h2>\
