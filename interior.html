/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'Inside the house',type:'lesson',
 body:()=>`<span class="eyebrow">Interior &amp; Components · Orientation</span><h1>Walk the rooms the way a careful occupant never has to.</h1>
 <p class="lead">The interior is where your client will actually live — and where the most direct <b>life-safety</b> findings hide in plain sight. Your job isn't to repair anything or to certify the house to code. It's to <b>observe a representative sample of accessible components, recognize what's deficient, and report it</b> — with extra weight on the things that hurt people.</p>
 <p>Almost everything inside falls into one of two buckets, and you read them differently:</p>
 <ul class="num"><li><b>Performance &amp; condition</b> — finishes, cracks, stains, doors and windows that work, cabinets and counters.</li><li><b>Life safety</b> — stairs, handrails and guards, fireplaces, the garage fire separation, and smoke/CO alarms.</li></ul>
 <p>A cracked cabinet door is a note. A missing guard, a painted-shut bedroom window, or a breached garage separation is a <em>finding you never let slide</em>. Keeping the two buckets straight is what makes an interior inspection professional rather than a list of cosmetics.</p>
 <p>Every component runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>What you'll inspect</h2>
 <ul class="clean"><li><b>Walls, ceilings &amp; floors</b> — finishes, cracks, water stains, level and plumb</li><li><b>Doors &amp; windows</b> — operation, glazing, safety glass, bedroom egress</li><li><b>Stairways, handrails &amp; guards</b> — rise/run, graspability, height, baluster spacing</li><li><b>Cabinets &amp; countertops</b> — mounting, operation, condition</li><li><b>Fireplaces &amp; chimneys</b> — firebox, damper, hearth, clearances, cap</li><li><b>Garages</b> — the vehicle-area-to-living-space fire separation</li><li><b>Safety devices</b> — smoke and carbon-monoxide alarms</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Scope &amp; the TREC standard</div><p>You inspect what's <b>visible and accessible</b> and operate a <b>representative number</b> of like items — not every window or outlet. You report deficiencies; you don't move furniture, open sealed areas, or guarantee future performance. Under the TREC Standards of Practice, the interior, stairways, fireplaces, garages, and safety devices are explicitly within scope.</p></div></div>`,
 quiz:[
  {q:'The inspector\'s role with interior components is to:',o:['Repair the deficiencies that are found','Observe accessible components, recognize deficiencies, and report them — especially safety items','Certify the home to the building code','Refinish damaged surfaces'],a:1,e:'Observe and report a representative sample, with extra weight on life-safety items. You don\'t repair or certify.'},
  {q:'Which finding belongs in the "never let it slide" life-safety bucket?',o:['A scratched cabinet door','A missing guard at an open stair','A faded paint color','A squeaky hinge'],a:1,e:'Missing guards, egress problems, breached garage separations, and missing alarms are life-safety findings; cosmetics are minor notes.'},
  {q:'"Representative number" means you:',o:['Inspect every single window and outlet','Operate/observe a sample of like items rather than all of them','Skip the interior entirely','Only check the rooms the owner points out'],a:1,e:'The standard is a representative sample of like components — enough to characterize the home without testing every unit.'},
  {q:'A painted-shut bedroom window is significant mainly because it:',o:['Looks bad','May defeat the required emergency egress for a sleeping room','Wastes energy','Is hard to clean'],a:1,e:'A sleeping room needs an operable egress opening. A painted-shut window is both an operation defect and a possible egress (life-safety) deficiency.'},
 ]},

/* ===== L1 WALLS, CEILINGS & FLOORS ===== */
{id:'l1',kind:'Lesson 1',label:'Walls, Ceilings & Floors',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · Reading the surfaces</span><h1>The finishes are a diary of everything behind them.</h1>
 <p class="lead">Walls, ceilings, and floors don't just look a certain way — they record movement, moisture, and framing problems. You're reading the surface to infer what you can't see.</p>
 <h2>Cracks: cosmetic or structural?</h2>
 ${conds('',[['Cosmetic cracks','Hairline cracks at drywall seams, corners of doors and windows, and from normal settling. No displacement, no offset — note them and move on.'],['Movement cracks','Wider, stair-step, or offset cracks; doors that won\'t latch; floors out of level. These suggest framing or foundation movement — describe and recommend evaluation.'],['Nail pops &amp; bows','Fasteners backing out and bowed surfaces — usually minor, but a bowed wall or sagging ceiling can mean overloaded or failing framing.']])}
 <h2>Water stains — active vs. old</h2>
 <p>The single most useful interior skill is telling a <b>live leak</b> from a <b>healed scar</b>. An <b>active</b> stain is soft, damp, often expanding, and reads wet on a moisture meter. An <b>old</b> stain is dry, has a hard, well-defined edge, and reads the same as the wall around it. When you can't be sure, you describe what you see and recommend monitoring — you don't guarantee a stain is dead.</p>
 <div class="dgm"><svg viewBox="0 0 720 240">
   <g ${_gs}>
     <rect x="60" y="40" width="280" height="170"/>${_mono(200,30,11,'ACTIVE stain','#b85436')}
     <rect x="380" y="40" width="280" height="170"/>${_mono(520,30,11,'OLD stain','#3c5870')}
   </g>
   <path d="M150 70 q60 30 30 90 q-50 40 -90 -10 q-20 -60 60 -80 z" fill="#b85436" opacity="0.28" stroke="#b85436" stroke-width="1.4" stroke-dasharray="4 3"/>
   ${_mono(200,150,10,'soft · damp · growing','#b85436')}
   <path d="M470 70 q60 30 30 90 q-50 40 -90 -10 q-20 -60 60 -80 z" fill="#caa46a" opacity="0.3" stroke="#7f520a" stroke-width="2"/>
   ${_mono(520,150,10,'dry · hard edge · stable','#7f520a')}
 </svg><div class="cap">Active stains are soft, damp, and spreading; old stains are dry with a crisp, hardened border and a normal meter reading.</div></div>
 ${W('sort','activeold')}
 <h2>Floors — level, slope, and soft spots</h2>
 <p>Walk the floors. <b>Out-of-level</b> floors and a noticeable <b>slope</b> can indicate settlement, framing deflection, or past repairs. <b>Soft or spongy</b> spots — especially near tubs, toilets, and exterior doors — suggest subfloor moisture damage. <b>Squeaks</b> alone are minor (subfloor moving against fasteners), but a squeak <em>plus</em> slope or sponginess deserves a closer look and a recommendation to evaluate the structure.</p>
 ${story('Inspector in the house',`A flawless repaint hid a tell: the ceiling under the upstairs bath had one stain the painter missed in the closet. It was dry and hard-edged — an old, fixed leak — but the floor by the tub above was spongy. **The dry scar was history; the soft floor was the present.** The report separated the two: monitor the stain, evaluate the floor.`)}`,
 quiz:[
  {q:'A water stain that is dry, hard-edged, and reads normal on a meter is best reported as:',o:['A active leak needing urgent repair','Consistent with a past, likely-repaired event — describe and recommend monitoring','Not worth noting','Proof the roof failed'],a:1,e:'Dry, crisp-edged, stable stains usually reflect an old, resolved leak. Describe what you observe and recommend monitoring rather than declaring it active.'},
  {q:'Which is the strongest sign of an ACTIVE leak?',o:['A faint yellow ring','Soft, damp material that reads wet and is spreading','A painted-over stain','A hairline crack'],a:1,e:'Soft, damp, growing stains with elevated moisture readings indicate ongoing water entry.'},
  {q:'A stair-step crack with offset and a door that won\'t latch suggests:',o:['Normal cosmetic settling','Possible framing or foundation movement — recommend evaluation','A painting defect','Nothing structural'],a:1,e:'Offset, stair-step cracking plus binding doors points to movement. Describe it and recommend further evaluation.'},
  {q:'A squeaky floor board by itself is:',o:['A major structural defect','Generally minor — subfloor moving against fasteners','Always a moisture problem','A reason to replace the floor'],a:1,e:'Squeaks alone are minor. They matter more when paired with slope or soft spots that suggest a structural or moisture issue.'},
  {q:'A spongy spot in the floor near a tub most likely indicates:',o:['Normal flooring','Possible subfloor moisture/rot — recommend evaluation and a moisture check','A squeak only','A code violation in the framing size'],a:1,e:'Sponginess near wet areas suggests hidden subfloor damage. Note it and recommend evaluation rather than guessing the cause.'},
 ]},

/* ===== L2 DOORS & WINDOWS ===== */
{id:'l2',kind:'Lesson 2',label:'Doors & Windows',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · Operation &amp; safety</span><h1>Open it, close it, and ask one safety question.</h1>
 <p class="lead">You operate a representative sample of interior doors and windows and report what doesn't work — but the findings that matter most are about <b>safety glass</b> and <b>bedroom egress</b>.</p>
 <h2>What you check on operation</h2>
 ${conds('',[['Doors','Open, close, and latch; binding, dragging, or won\'t-latch hint at framing movement. Note damaged, missing, or hollow-core where solid is needed.'],['Windows','Operate a sample: do they open, stay open, and lock? Report painted-shut, inoperable, or broken sash hardware, and failed (fogged) thermal seals.'],['Glazing','Look for cracked, broken, or missing glass — and for missing safety glazing where it\'s required.']])}
 <h2>Safety glazing at hazardous locations</h2>
 <p>Ordinary glass breaks into knife-like shards; <b>safety glazing</b> (tempered or laminated) breaks safely. It's required at <b>hazardous locations</b>: in and right next to doors, large panes close to the floor or walking surfaces, and glazing at tubs, showers, and stair landings. A tempered pane carries an etched mark in a corner. <b>Missing safety glass at these spots is a reportable hazard.</b></p>
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="40" y1="210" x2="680" y2="210"/>${_mono(60,204,9,'floor','#918c7d','start')}
     <rect x="90" y="70" width="70" height="140"/><line x1="125" y1="70" x2="125" y2="210" stroke-width="1"/>${_mono(125,62,9,'door','#3d7d50')}
     <rect x="175" y="90" width="55" height="120" fill="#dbe7ee" opacity="0.5"/>${_mono(202,84,8,'sidelite','#b85436')}
     <rect x="300" y="120" width="90" height="90" fill="#dbe7ee" opacity="0.5"/>${_mono(345,114,8,'low glazing','#b85436')}
     <rect x="470" y="150" width="120" height="60" fill="#dbe7ee" opacity="0.5"/>${_mono(530,144,8,'tub / shower glass','#b85436')}
   </g>
   <g>${_mono(125,150,9,'SG','#3d7d50')}${_mono(202,150,9,'SG','#3d7d50')}${_mono(345,170,9,'SG','#3d7d50')}${_mono(530,184,9,'SG','#3d7d50')}</g>
 </svg><div class="cap">Hazardous locations needing safety glazing (SG): in/next to doors, low glazing near floors, and at tubs, showers, and stairs.</div></div>
 <h2>Bedroom egress — the life-safety question</h2>
 <p>Every <b>sleeping room</b> needs an operable <b>emergency escape and rescue opening</b> — a window (or door) sized so an occupant can climb out and a firefighter can climb in. The rules of thumb: roughly a <b>minimum clear opening</b>, a low enough <b>sill height</b> to reach, and it must <b>open without tools or keys</b>. A painted-shut window, a sash that opens only a few inches, security bars without a release, or a basement bedroom with no egress are all <b>egress deficiencies</b> you flag.</p>
 ${W('match','dims')}
 ${story('Inspector in the house',`A finished basement had a charming "guest bedroom" with one small, high window painted shut. Pretty room — no way out. **A bedroom you can\'t escape from isn\'t a bedroom.** The report named it: sleeping room lacks a compliant emergency egress opening; recommend evaluation and correction before it\'s used as a bedroom.`)}`,
 quiz:[
  {q:'Safety glazing (tempered/laminated) is required at:',o:['Only skylights','Doors, glazing next to doors, low glazing near floors, and tubs/showers/stairs','Only commercial buildings','Wherever the owner wants it'],a:1,e:'Hazardous locations — in and next to doors, near floors and walking surfaces, and at wet/fall areas — require safety glazing.'},
  {q:'A sleeping room must have:',o:['Two exterior doors','At least one operable emergency egress opening','A skylight','A second closet'],a:1,e:'Each bedroom needs an operable escape-and-rescue opening sized and located for escape and rescue.'},
  {q:'A bedroom window painted shut is reported as:',o:['Cosmetic only','An inoperable window AND a possible egress (life-safety) deficiency','A glazing problem','Nothing — one window is enough'],a:1,e:'It\'s both an operation defect and a possible egress deficiency for a sleeping room.'},
  {q:'You inspect interior windows by:',o:['Operating every window in the house','Operating a representative sample and reporting inoperable or damaged units','Removing the sashes','Measuring each pane'],a:1,e:'Operate a representative number and report painted-shut, inoperable, failed-seal, or broken units.'},
  {q:'A fogged, hazy double-pane window indicates:',o:['Dirty glass to wipe off','A failed insulating-glass (thermal) seal','Missing safety glazing','A structural crack'],a:1,e:'Condensation between the panes means the sealed insulating-glass unit has failed — report it.'},
 ]},

/* ===== L3 STAIRWAYS, HANDRAILS & GUARDS ===== */
{id:'l3',kind:'Lesson 3',label:'Stairs, Handrails & Guards',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · Don\'t fall</span><h1>Stairs are where the house tries hardest to hurt someone.</h1>
 <p class="lead">Falls on stairs are among the most common serious home injuries, so this is prime life-safety territory. Four things drive almost every finding: <b>consistent steps, a graspable handrail, an adequate guard, and tight infill.</b></p>
 <h2>Rise, run, and consistency</h2>
 <p>Each step has a <b>rise</b> (height) and a <b>run</b> (tread depth). The exact numbers vary, but the rule that matters on inspection is <b>consistency</b>: risers and treads within a flight should be uniform. A single odd step — one riser noticeably taller or shorter — is a recognized <b>trip hazard</b> because the foot expects the previous rhythm. Note it.</p>
 <h2>Handrails — graspable and continuous</h2>
 <p>A <b>handrail</b> is generally required on a flight of <b>four or more risers</b>. It has to be <b>graspable</b> — roughly <b>1¼–2 in round</b>, or an equivalent shape your hand can encircle — and continuous along the flight at a usable height. A flat 2×6 on brackets is sturdy but <em>not</em> graspable; a rail that stops part-way down leaves you with nothing where you need it. <b>Loose</b> rails that move under load can\'t arrest a fall.</p>
 <h2>Guards and the 4-inch sphere</h2>
 <p>A <b>guard</b> protects the open side of a raised walking surface — a landing, balcony, or the open side of a stair. Two tests, and you need both:</p>
 <ul class="clean"><li><b>Height</b> — generally about <b>36 in</b> at walking surfaces (a bit less is allowed for a stair handrail).</li><li><b>Infill</b> — the openings must <b>reject a 4-inch sphere</b>. If a 4-inch ball passes between the balusters, that\'s a child-fall and entrapment hazard, regardless of how tall the guard is.</li></ul>
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <line x1="60" y1="190" x2="660" y2="190"/>${_mono(80,184,9,'walking surface','#918c7d','start')}
     <line x1="120" y1="190" x2="120" y2="70"/><line x1="540" y1="190" x2="540" y2="70"/><line x1="120" y1="70" x2="540" y2="70" stroke-width="2"/>
     <g stroke-width="1.6"><line x1="170" y1="70" x2="170" y2="190"/><line x1="210" y1="70" x2="210" y2="190"/><line x1="250" y1="70" x2="250" y2="190"/><line x1="290" y1="70" x2="290" y2="190"/></g>
     <g stroke-width="1.6"><line x1="400" y1="70" x2="400" y2="190"/><line x1="470" y1="70" x2="470" y2="190"/></g>
     <line x1="120" y1="70" x2="120" y2="40" stroke="#3d7d50"/><line x1="540" y1="70" x2="540" y2="40" stroke="#3d7d50"/>${_mono(330,52,9,'~36 in high','#3d7d50')}
   </g>
   <circle cx="435" cy="130" r="16" fill="#b85436" opacity="0.5" stroke="#b85436" stroke-width="1.6"/>${_mono(435,108,8,'4-in ball passes','#b85436')}
   <circle cx="230" cy="130" r="16" fill="none" stroke="#3d7d50" stroke-width="1.6" stroke-dasharray="3 2"/>${_mono(230,108,8,'ball rejected','#3d7d50')}
 </svg><div class="cap">Left: tight balusters reject the 4-inch sphere. Right: wide spacing lets it pass — a reportable fall hazard even at full height.</div></div>
 ${W('spot','stairs')}
 <h2>The conditions you'll write up</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Missing or non-graspable handrail</span></div><p>No rail on a flight of four-plus risers, a flat slab you can\'t grip, or a rail that stops short.</p><div class="meta"><span class="lab">Implication</span><span class="val">No way to catch a fall — a direct injury hazard.</span><span class="lab">Report</span><span class="val">Recommend a continuous, graspable handrail the full length of the flight.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Missing or low guard</span></div><p>An open raised edge with no guard, or one below typical height.</p><div class="meta"><span class="lab">Implication</span><span class="val">Fall to the level below.</span><span class="lab">Report</span><span class="val">Recommend a guard at the open side at adequate height.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Improper baluster spacing</span></div><p>Guard openings that pass a 4-inch sphere.</p><div class="meta"><span class="lab">Implication</span><span class="val">Child-fall and entrapment hazard.</span><span class="lab">Report</span><span class="val">Recommend reducing the spacing so a 4-inch sphere can\'t pass.</span></div></div>
 ${story('Inspector in the house',`A renovated loft had a gorgeous open stair — and a guard with balusters a hand\'s-width apart. The owner loved the "airy" look. Your 4-inch ball dropped right through. **Beautiful and dangerous aren\'t mutually exclusive.** The report flagged the spacing as a child-safety hazard, height notwithstanding.`)}`,
 quiz:[
  {q:'A graspable handrail is generally required on a flight of:',o:['Any number of steps','Four or more risers','Ten or more risers','Exterior stairs only'],a:1,e:'Flights of four or more risers generally require a graspable handrail.'},
  {q:'A handrail is "graspable" when it is:',o:['A flat 2×6 you can\'t encircle','About 1¼–2 in round (or an equivalent shape a hand can wrap around)','At least 6 in wide','Any rail screwed to the wall'],a:1,e:'Graspable means the hand can encircle it — roughly 1¼–2 in round or an equivalent profile.'},
  {q:'Guard infill openings must reject a:',o:['2-inch sphere','4-inch sphere','6-inch sphere','Closed fist'],a:1,e:'A 4-inch sphere must not pass through a required guard\'s openings.'},
  {q:'A guard at a raised walking surface is typically about:',o:['24 in high','30 in high','36 in high','48 in high'],a:2,e:'Guards at walking surfaces are generally around 36 in; both height and 4-inch-sphere infill must be satisfied.'},
  {q:'One step in a flight is noticeably taller than the rest. That is:',o:['Acceptable if it\'s only one','A recognized trip hazard from inconsistent rise — report it','Only a problem on exterior stairs','A cosmetic issue'],a:1,e:'Inconsistent rise/run within a flight is a trip hazard because the foot expects the established rhythm.'},
 ]},

/* ===== L4 CABINETS & COUNTERTOPS ===== */
{id:'l4',kind:'Lesson 4',label:'Cabinets & Countertops',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Built-ins</span><h1>The quick stop between the big-ticket systems.</h1>
 <p class="lead">Cabinets and countertops are mostly a condition-and-operation check — but a few findings here overlap with safety and water, so they earn a real look, not a glance.</p>
 <h2>What you operate and observe</h2>
 ${conds('',[['Mounting &amp; security','Wall cabinets must be securely fastened to framing — a loose upper cabinet full of dishes is a real hazard. Push and check for movement.'],['Doors &amp; drawers','Open and close a representative number; note broken hinges, missing hardware, and drawers off their slides.'],['Countertops','Look for loose, cracked, or delaminating tops and unsealed seams — especially around the sink, where water gets in.'],['Water &amp; the sink base','The cabinet under the sink is a moisture detector: stains, swelling, or soft particleboard means a current or past leak — coordinate with your plumbing findings.']])}
 <p>None of this is glamorous, but a loose wall cabinet over a counter, or a sink base quietly rotting from a slow supply leak, are exactly the kinds of things a buyer is glad you caught. Report condition and operation deficiencies plainly, and flag any moisture damage as a possible active leak to investigate.</p>
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Where built-ins meet safety</div><p>Two crossovers to watch: a <b>loose upper cabinet</b> that could pull off the wall, and <b>moisture damage in a sink base</b> that signals a plumbing leak. Both are more than cosmetic — call them out and tie the water finding to your plumbing notes.</p></div></div>
 ${story('Inspector in the house',`A kitchen looked move-in perfect until a wall cabinet shifted a half-inch when nudged — installed into drywall, not studs. **Full of dishes, that\'s a falling hazard over a work area.** The countertop story was under the sink, where a swollen, dark cabinet floor gave away a slow trap leak the gleaming surfaces hid.`)}`,
 quiz:[
  {q:'A wall cabinet that moves when pushed should be:',o:['Ignored if the doors work','Reported — it may not be secured to framing and is a falling hazard','Re-stained','Filled with lighter items'],a:1,e:'Cabinets must be securely fastened to framing. A loose, loaded upper cabinet is a real hazard worth reporting.'},
  {q:'A swollen, dark, soft cabinet floor under the sink most likely means:',o:['Normal wear','Moisture damage from a current or past leak — investigate and coordinate with plumbing','A finish defect','Heavy use only'],a:1,e:'The sink base is a moisture detector; swelling and softness point to a leak to investigate.'},
  {q:'Countertops are checked for:',o:['Brand and price','Loose, cracked, or delaminating tops and unsealed seams, especially at the sink','R-value','Fire rating'],a:1,e:'Look for damage and unsealed seams where water can enter — the sink area is the usual trouble spot.'},
  {q:'For cabinet doors and drawers you:',o:['Operate every one','Operate a representative number and note broken or missing hardware','Remove them to inspect','Leave them closed'],a:1,e:'Operate a representative sample and report broken hinges, missing hardware, and off-track drawers.'},
 ]},

/* ===== L5 FIREPLACES & CHIMNEYS ===== */
{id:'l5',kind:'Lesson 5',label:'Fireplaces & Chimneys',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · Fire in the house, on purpose</span><h1>A fireplace is a controlled fire — your job is the word "controlled."</h1>
 <p class="lead">Fireplaces and chimneys combine fire, combustibles, and a path to the roof, so the findings are squarely life-safety. You inspect what\'s readily visible and accessible — you don\'t light fires or take the chimney apart.</p>
 <h2>From the firebox up</h2>
 ${conds('',[['Firebox','The combustion chamber. Look for cracked or missing firebrick, gaps, and deteriorated mortar joints — paths for heat to reach framing.'],['Damper','The plate that opens for use and closes to stop drafts. Check that it opens, closes, and isn\'t rusted shut or missing.'],['Hearth extension','The noncombustible floor area in front of the opening (typically 16–20 in out, more for large openings). It catches rolling embers — a short or combustible hearth is a fire hazard.'],['Clearances to combustibles','Mantels, trim, and framing need clearance from the opening. A combustible mantel set too close (commonly needs ~6 in, more if it projects) can ignite.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="60" y1="210" x2="660" y2="210"/>${_mono(80,204,9,'floor','#918c7d','start')}
     <rect x="220" y="90" width="180" height="120"/>${_mono(310,84,9,'firebox','#3d7d50')}
     <rect x="200" y="60" width="220" height="14" fill="#caa46a" opacity="0.45" stroke="#7f520a"/>${_mono(310,52,8,'mantel — needs clearance','#b85436')}
     <rect x="400" y="200" width="150" height="10" fill="#bdb8a8" stroke="#7f520a"/>${_mono(470,224,8,'hearth extension 16–20 in','#7f520a')}
     <line x1="400" y1="200" x2="400" y2="190" stroke="#3c5870"/><line x1="550" y1="200" x2="550" y2="190" stroke="#3c5870"/>
   </g>
 </svg><div class="cap">The combustibles around the fire: a mantel needing clearance above the opening and a noncombustible hearth extending in front of it.</div></div>
 <h2>Gas logs and the chimney top</h2>
 <p>For <b>gas logs</b>, confirm there\'s an <b>accessible, operable shut-off valve</b> and that the installation looks proper; note unvented sets and any gas odor. Up top, the <b>chimney cap</b> (with a <b>spark arrestor</b> screen) and the <b>crown</b> (the concrete wash) keep out water, animals, and debris and stop embers from landing on the roof. A <b>missing cap</b>, a <b>cracked crown</b>, or no spark arrestor are common reportable findings.</p>
 <h2>Creosote</h2>
 <p><b>Creosote</b> is the flammable, tar-like residue wood smoke leaves in a flue. Heavy, glazed buildup is a chimney-fire hazard. You note visible heavy creosote and recommend cleaning and a Level 2 evaluation by a qualified chimney specialist.</p>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Cracked firebox / deteriorated mortar</span></div><p>Cracks or missing firebrick and crumbling joints.</p><div class="meta"><span class="lab">Implication</span><span class="val">Heat path toward framing — fire risk.</span><span class="lab">Report</span><span class="val">Recommend evaluation/repair by a qualified chimney specialist.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Short or combustible hearth extension</span></div><p>Hearth too shallow, or combustible flooring at the opening.</p><div class="meta"><span class="lab">Implication</span><span class="val">Rolling embers reach combustibles — burn/fire hazard.</span><span class="lab">Report</span><span class="val">Recommend a proper noncombustible hearth extension.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Missing cap / cracked crown / no arrestor</span></div><p>Open flue top, spalling crown, or no spark screen.</p><div class="meta"><span class="lab">Implication</span><span class="val">Water and animal entry; escaping embers on the roof.</span><span class="lab">Report</span><span class="val">Recommend a proper cap with spark arrestor and crown repair.</span></div></div>
 ${story('Inspector in the house',`A handsome stone fireplace had a reclaimed-timber mantel set two inches over the opening and scorch marks creeping past a 10-inch hearth. **The look was the hazard.** The report named both: combustible mantel clearance and short hearth extension, with the scorch marks as the evidence — evaluate and correct before use.`)}`,
 quiz:[
  {q:'The hearth extension is there to:',o:['Look decorative','Provide a noncombustible area in front of the opening to catch embers','Support the mantel','Improve draft'],a:1,e:'It\'s the noncombustible floor (typically 16–20 in out) that protects against rolling embers; short or combustible hearths are hazards.'},
  {q:'A combustible wood mantel set too close to the firebox opening is:',o:['Fine if it\'s solid','A clearance-to-combustibles hazard that can ignite — report it','Required for the look','Only a concern with gas logs'],a:1,e:'Combustible trim needs clearance from the opening; too close is an ignition hazard.'},
  {q:'The chimney cap with a spark arrestor:',o:['Holds up the crown','Keeps out water/animals/debris and stops escaping embers','Increases creosote','Is purely decorative'],a:1,e:'The cap and arrestor keep the flue clear and prevent embers from landing on the roof; a missing cap is reportable.'},
  {q:'Heavy, glazed creosote in a flue is:',o:['Normal and harmless','A flammable buildup and chimney-fire hazard — recommend cleaning/evaluation','A sign of a good fire','Only a smell problem'],a:1,e:'Creosote is flammable; heavy buildup is a fire hazard warranting cleaning and a qualified evaluation.'},
  {q:'For a gas-log set, the inspector confirms:',o:['The exact BTU output','An accessible, operable shut-off valve and a proper-looking installation','The brand of logs','The color temperature'],a:1,e:'Check for an accessible, operable gas shut-off valve and a proper installation; note unvented sets and any gas odor.'},
 ]},

/* ===== L6 GARAGES & THE FIRE SEPARATION ===== */
{id:'l6',kind:'Lesson 6',label:'Garages & Fire Separation',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · The wall between the car and the kids</span><h1>An attached garage is a small fire and fume problem next to the bedrooms.</h1>
 <p class="lead">A garage holds a hot engine, fuel, paint, and pooling fumes — right against the living space. The whole inspection of an attached garage is really one idea: <b>is the separation between the vehicle area and the living space intact?</b></p>
 <h2>The fire separation</h2>
 <p>The common <b>walls and ceiling</b> between the garage and the house form a fire-resistant <b>separation</b>. It only works if it\'s <b>continuous</b> — every breach is a hole the fire and fumes can use.</p>
 ${conds('',[['The house door','The passage door from garage to living space must be <b>solid or 20-minute fire-rated</b>, <b>self-closing</b>, and have <b>no louvers or openings</b>. And it must <b>never open into a sleeping room</b>.'],['Penetrations','Holes for wiring, pipes, and ducts through the separation must be <b>sealed/fire-stopped</b>. Open ceiling penetrations into the attic are a classic breach.'],['Wall &amp; ceiling integrity','The separation surfaces should be intact — gaps at the base of the common wall, missing drywall, or unsealed joints defeat it.'],['Ducts &amp; openings','No HVAC return air or duct openings should communicate between the garage and the house.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <rect x="60" y="50" width="600" height="170"/><line x1="430" y1="50" x2="430" y2="220" stroke-width="2"/>
     ${_mono(200,44,9,'GARAGE','#918c7d')}${_mono(560,44,9,'LIVING SPACE','#918c7d')}
     <line x1="60" y1="90" x2="430" y2="90" stroke-width="1"/>${_mono(120,84,8,'rated ceiling','#3d7d50','start')}
     <rect x="430" y="130" width="10" height="90" stroke="#3d7d50"/>${_mono(470,124,8,'self-closing rated door','#3d7d50','start')}
     <path d="M425 175 a18 18 0 0 1 18 -18" stroke="#3d7d50" stroke-width="1.4"/>
   </g>
 </svg><div class="cap">An intact separation: rated walls and ceiling, and a self-closing, fire-rated door that does not open into a sleeping room.</div></div>
 <h2>Ignition sources and fumes</h2>
 <p>Gasoline and many garage chemicals give off <b>heavier-than-air</b> vapors that pool near the floor. That\'s why a gas-fired <b>water heater or furnace</b> in a garage traditionally has its <b>ignition source elevated</b> (commonly ~18 in above the floor) — unless it\'s a newer flammable-vapor-ignition-resistant (FVIR) unit. An appliance with an open flame at floor level is a finding to note for evaluation.</p>
 ${W('spot','garage')}
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Breached fire separation</span></div><p>Non-rated/hollow-core or louvered house door, missing self-closer, or unsealed penetrations.</p><div class="meta"><span class="lab">Implication</span><span class="val">Fire and fumes can pass into the living space.</span><span class="lab">Report</span><span class="val">Recommend a self-closing 20-minute fire-rated door and sealing all penetrations.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Door opens into a sleeping room</span></div><p>The garage passage door connects directly to a bedroom.</p><div class="meta"><span class="lab">Implication</span><span class="val">Prohibited — fumes/fire route straight into where people sleep.</span><span class="lab">Report</span><span class="val">Flag as a safety defect; recommend evaluation/correction.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Floor-level ignition source</span></div><p>Gas appliance with an open flame at floor level (non-FVIR).</p><div class="meta"><span class="lab">Implication</span><span class="val">Pooled flammable vapors can ignite.</span><span class="lab">Report</span><span class="val">Recommend evaluation; ignition source typically elevated ~18 in.</span></div></div>
 ${story('Inspector in the house',`The seller had replaced the garage-to-kitchen door with a pretty six-panel — hollow-core, with a cute louver at the bottom "for ventilation," and no closer. **Every upgrade made the separation worse.** The report was blunt: this door is not a rated, self-closing barrier, and the louver is an opening — replace it and add a closer.`)}`,
 quiz:[
  {q:'The garage-to-house passage door must be:',o:['Hollow-core with a louver','Solid or 20-minute fire-rated, self-closing, with no openings — and not into a sleeping room','Any lockable door','Propped open'],a:1,e:'It must be a self-closing, solid/rated door with no louvers, and it must not open into a sleeping room.'},
  {q:'Open penetrations through the garage ceiling into the attic are:',o:['Fine for airflow','A breach of the fire separation — recommend sealing/fire-stopping','Required for venting','Only a cosmetic issue'],a:1,e:'Unsealed penetrations defeat the separation; they must be sealed/fire-stopped.'},
  {q:'A gas water heater\'s ignition source in a garage is traditionally:',o:['At floor level','Elevated (commonly ~18 in) unless the unit is FVIR-listed','Inside a bedroom','Removed'],a:1,e:'Heavier-than-air vapors pool low, so ignition sources are elevated about 18 in (newer FVIR units excepted).'},
  {q:'The garage passage door may NOT open into:',o:['A hallway','A sleeping room','The kitchen','A laundry room'],a:1,e:'It must never open directly into a sleeping room — that routes fumes and fire toward sleepers.'},
  {q:'The unifying idea of garage inspection is:',o:['Door hardware quality','Whether the vehicle-area-to-living-space separation is intact','Floor cleanliness','Storage organization'],a:1,e:'Every finding ties back to maintaining the fire/fume separation between the garage and the living space.'},
 ]},

/* ===== L7 SMOKE & CO ALARMS ===== */
{id:'l7',kind:'Lesson 7',label:'Smoke & CO Alarms',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · The cheapest life-savers in the house</span><h1>The smallest devices carry the biggest safety weight.</h1>
 <p class="lead">Smoke and carbon-monoxide alarms are inexpensive, easy to overlook, and they save lives. You check that they\'re <b>present in the right places</b> — and you report where they\'re missing, because a missing alarm is a direct life-safety finding.</p>
 <h2>Smoke alarms — where they go</h2>
 <p>The locations are the thing to memorize. Smoke alarms belong:</p>
 <ul class="clean"><li><b>In each sleeping room (bedroom)</b></li><li><b>Outside each separate sleeping area</b>, in the immediate vicinity (the hallway serving the bedrooms)</li><li><b>On every level of the home</b>, including basements and habitable attics</li></ul>
 <p>Note alarms that are <b>missing</b>, obviously <b>disabled</b> (hanging, no battery), or clearly <b>past end of life</b> (typically ~10 years). You report presence and location — you\'re not certifying the internal electronics.</p>
 <div class="dgm"><svg viewBox="0 0 720 240">
   <g ${_gs}>
     <rect x="60" y="60" width="600" height="150"/>
     <line x1="240" y1="60" x2="240" y2="210"/><line x1="430" y1="60" x2="430" y2="210"/>
     ${_mono(150,200,9,'bedroom','#918c7d')}${_mono(335,200,9,'hall','#918c7d')}${_mono(545,200,9,'bedroom','#918c7d')}
     <circle cx="150" cy="95" r="9" stroke="#3d7d50"/>${_mono(150,80,8,'smoke','#3d7d50')}
     <circle cx="335" cy="95" r="9" stroke="#3d7d50"/>${_mono(335,80,8,'smoke','#3d7d50')}
     <circle cx="545" cy="95" r="9" stroke="#3d7d50"/>${_mono(545,80,8,'smoke','#3d7d50')}
     <circle cx="335" cy="150" r="9" stroke="#7f520a"/>${_mono(335,168,8,'CO','#7f520a')}
   </g>
 </svg><div class="cap">Smoke alarms in each bedroom, just outside the sleeping area, and on every level; a CO alarm near the sleeping area.</div></div>
 <h2>Carbon-monoxide alarms</h2>
 <p>CO is the colorless, odorless gas combustion produces. <b>CO alarms</b> are needed near the sleeping areas in homes that have a <b>fuel-burning appliance</b> (gas/oil furnace, water heater, fireplace, range) or an <b>attached garage</b> — the sources of CO. An all-electric home with no attached garage may not need them. Report missing CO alarms where the sources are present.</p>
 ${W('match','devices')}
 ${W('sort','safety')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Report it, don\'t shrug it</div><p>It\'s tempting to treat a missing alarm as trivial because it\'s a $20 fix. Don\'t. A bedroom with no smoke alarm, or a house with gas appliances and no CO alarm, is a <b>life-safety deficiency</b> — name the missing locations clearly so your client adds them on day one.</p></div></div>
 ${story('Inspector in the house',`A tidy home had one smoke alarm — in the hallway — and a gas furnace, gas water heater, and attached garage with zero CO alarms. **One hallway alarm isn\'t a system.** The report listed every missing location: a smoke alarm in each of the three bedrooms and on the basement level, and CO alarms near the sleeping areas.`)}`,
 quiz:[
  {q:'Smoke alarms are required:',o:['Only in the kitchen','In each bedroom, outside each sleeping area, and on every level','Only on the top floor','Only where the owner wants them'],a:1,e:'Each sleeping room, just outside the sleeping areas, and every level — including basements.'},
  {q:'CO alarms are needed near sleeping areas when the home has:',o:['Only electric appliances and no garage','A fuel-burning appliance or an attached garage','No fireplace','A finished basement only'],a:1,e:'CO comes from combustion. Homes with fuel-burning equipment or an attached garage need CO alarms near sleeping areas.'},
  {q:'A bedroom with no smoke alarm should be:',o:['Ignored — it\'s a cheap fix','Reported as a life-safety deficiency with the missing locations named','Noted only if the owner asks','Left for the buyer to notice'],a:1,e:'Missing alarms are life-safety findings; identify the missing locations clearly.'},
  {q:'A smoke alarm hanging by its wires with no battery is:',o:['Acceptable','A disabled alarm — report it','Not your concern','Fine if others work'],a:1,e:'A disabled or missing alarm is reportable regardless of others present.'},
  {q:'On smoke/CO alarms, the inspector primarily reports:',o:['The internal circuit health','Presence and correct location, and obvious disabled/expired units','The manufacturer','The exact install date'],a:1,e:'You report presence, location, and obvious problems — you don\'t certify the internal electronics.'},
 ]},

/* ===== L8 PUTTING IT TOGETHER ===== */
{id:'l8',kind:'Lesson 8',label:'Putting It Together',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · The interior walkthrough</span><h1>Two buckets, one disciplined walk through every room.</h1>
 <p class="lead">The interior rewards a routine. You move room to room reading <b>condition</b> on one track and <b>life safety</b> on the other — and you never let a safety item get lost among the cosmetics.</p>
 <h2>The condition track</h2>
 <p>Surfaces for cracks and stains (active vs. old), floors for level and soft spots, doors and windows operating, cabinets secure, counters sound. These are mostly <b>note-and-recommend</b> items — important to the client, rarely emergencies.</p>
 <h2>The life-safety track</h2>
 <p>These are the findings you call out plainly, every time:</p>
 <ul class="clean"><li><b>Egress</b> — every sleeping room has an operable escape opening</li><li><b>Safety glazing</b> — present at hazardous locations</li><li><b>Stairs</b> — graspable handrails, adequate guards, 4-inch-sphere infill</li><li><b>Fireplace</b> — sound firebox, proper hearth and clearances, capped chimney</li><li><b>Garage</b> — intact separation, self-closing rated door, sealed penetrations</li><li><b>Alarms</b> — smoke alarms in/near bedrooms and on every level; CO where there\'s combustion or an attached garage</li></ul>
 <p>Notice how the same idea repeats: <b>keep people from falling, from fire, and from fumes.</b> If you read every room with those three risks in mind, the safety findings practically announce themselves.</p>
