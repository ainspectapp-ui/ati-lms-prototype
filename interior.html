<!-- ATI · Module I — Interior & Components — full interactive section -->
<title>ATI · Module I — Interior &amp; Components</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

  match(el,k){const c=MATCH[k];const sh=a=>a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);let sel=null,locked=0;

/* ================= ENGINE ================= */
const KEY='ati_interior_ix_v1';
let S={done:{},quiz:{},assessBest:0,cur:0};
async function load(){try{const r=await window.storage.get(KEY,false);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}S.done=S.done||{};S.quiz=S.quiz||{};}
async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>i===0?true:stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}
function rail(){document.getElementById('rail').innerHTML=STEPS.map((s,i)=>{const d=stepDone(i),u=unlocked(i),a=i===S.cur;return `<button class="step ${d?'done':''} ${a?'active':''} ${u?'':'locked'}" ${u?`onclick="goStep(${i})"`:''}><span class="dot">${d?sv(ic.check,3):(i+1)}</span><span class="lbl">${s.label}<span class="kind">${s.kind}</span></span></button>`;}).join('');}
function goStep(i){if(!unlocked(i))return;S.cur=i;save();render();window.scrollTo({top:0,behavior:'smooth'});}
function markDoneAndNext(){S.done[STEPS[S.cur].id]=true;save();updTop();rail();if(S.cur<STEPS.length-1)goStep(S.cur+1);else render();}
function render(){updTop();rail();const s=STEPS[S.cur];({lesson:renderLesson,scenario:renderScenarios,assess:renderAssess,glossary:renderGlossary,source:renderSource}[s.type])(s);}
function navFoot(label,gated){const last=S.cur===STEPS.length-1;return `<div class="foot">${S.cur>0?`<button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button>`:''}<div class="sp"></div><button class="btn brass" id="nextBtn" ${gated?'disabled':''} onclick="markDoneAndNext()">${label||(last?'Finish section':'Mark complete & continue')} ${sv(ic.arrow)}</button></div>`;}

function renderLesson(s){
  let h=(typeof s.body==='function'?s.body():s.body);
  if(s.quiz&&s.quiz.length){
    h+=`<div class="quiz"><div class="qh">${sv(ic.brain)} Check your understanding</div><div class="qt">${s.label}</div><div class="qsub">${s.quiz.length} questions covering the lesson — answer each to see the reasoning.</div><div class="qbody">${
      s.quiz.map((q,qi)=>`<div class="qblock"><div class="qnum">Question ${qi+1} of ${s.quiz.length}</div><div class="q">${q.q}</div><div class="opts" data-qi="${qi}">${q.o.map((o,k)=>`<button class="opt" onclick="qAns(${qi},${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="qexp" data-qi="${qi}"></div></div>`).join('')
    }</div><div class="qscore" style="display:none"></div></div>`;
  }
  const gated=!!(s.quiz&&s.quiz.length&&!S.quiz[s.id]);
  view.innerHTML=h+navFoot(null,gated);
  wireWidgets(view);
  window._ql={answered:{},total:s.quiz?s.quiz.length:0};
}
function qAns(qi,k){const s=STEPS[S.cur],q=s.quiz[qi];if(window._ql.answered[qi]!==undefined)return;window._ql.answered[qi]=k;
  const opts=view.querySelector('.opts[data-qi="'+qi+'"]');opts.querySelectorAll('.opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});
  view.querySelector('.qexp[data-qi="'+qi+'"]').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;
  if(Object.keys(window._ql.answered).length===window._ql.total){
    const right=s.quiz.filter((q,i)=>window._ql.answered[i]===q.a).length,sc=view.querySelector('.qscore');sc.style.display='flex';
    sc.innerHTML=`${sv(ic.check,2.4)}<span>You scored <b style="color:${right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)'}">${right}/${s.quiz.length}</b> on this lesson.</span>`;
    sc.querySelector('svg').style.color=right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)';
    S.quiz[s.id]=true;save();const b=document.getElementById('nextBtn');if(b)b.disabled=false;}
}

let SC={i:0,answered:false};

function paintScen(){const sc=SCEN[SC.i];view.innerHTML=`<span class="eyebrow">Apply it · Inspector's Call</span><h1>Make the call</h1><p class="lead">The decisions you'll actually make standing in front of the system. Read it, choose, see the reasoning.</p><div class="scount mono">Scenario ${SC.i+1} of ${SCEN.length}</div><div class="scen"><div class="sh"><div class="t">${sc.t}</div><div class="n">${sc.n}</div></div><div class="body"><div class="situation">${sc.s}</div><div class="ask">${sc.ask}</div><div class="scopts">${sc.o.map((o,k)=>`<button class="opt" onclick="scAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="scexp"></div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><div class="scnext"></div></div>`;}
function scAns(k){if(SC.answered)return;SC.answered=true;const sc=SCEN[SC.i];view.querySelectorAll('.scopts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===sc.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.scexp').innerHTML=`<div class="exp"><b>${k===sc.a?'Right call.':'Here\'s the call:'}</b> ${sc.e}</div>`;const last=SC.i===SCEN.length-1;view.querySelector('.scnext').innerHTML=`<button class="btn brass" onclick="${last?'markDoneAndNext()':'scNext()'}">${last?'Mark complete & continue':'Next scenario'} ${sv(ic.arrow)}</button>`;}
function scNext(){SC.i++;SC.answered=false;paintScen();window.scrollTo({top:0,behavior:'smooth'});}

let AS=null;
function renderAssess(){if(!AS||AS.done)AS={i:0,answers:[],done:false};view.innerHTML=`<span class="eyebrow">Assessment</span><h1>Mastery check — Interior &amp; Components</h1><p class="lead">${ASSESS.length} application questions across the whole chapter. 80% to pass; reasoning shown on every answer.</p><div class="panelcard" style="text-align:left;padding:0;overflow:hidden"><div style="background:linear-gradient(120deg,#1f6f73,#123f43);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-2)">Interior &amp; Components</div><div style="font-family:var(--display);font-weight:700;font-size:17px;margin-top:3px">${ASSESS.length} questions · 80% to pass</div></div><div style="color:var(--brass-2)">${sv(ic.award)}</div></div><div style="padding:26px 22px;text-align:center">${S.assessBest?`<div class="mono" style="font-size:13px;color:var(--ink-2);margin-bottom:16px">Best score: <b style="color:${S.assessBest>=80?'var(--pass)':'var(--fail)'}">${S.assessBest}%</b></div>`:''}<button class="btn brass" style="margin:0 auto" onclick="asStart()">${S.assessBest?'Retake assessment':'Begin assessment'} ${sv(ic.arrow)}</button></div></div>`;}
function asStart(){AS={i:0,answers:[],done:false};asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asPaint(){const q=ASSESS[AS.i];view.innerHTML=`<span class="eyebrow">Assessment · Interior &amp; Components</span><h1 style="font-size:24px">Question ${AS.i+1} <span style="color:var(--ink-3)">/ ${ASSESS.length}</span></h1><div style="margin:14px 0 0"><div style="width:100%;height:6px;background:var(--surf-3);border-radius:6px;overflow:hidden;border:1px solid var(--line)"><i style="display:block;height:100%;width:${AS.i/ASSESS.length*100}%;background:var(--brass)"></i></div></div><div class="quiz" style="border-color:var(--line);margin-top:22px"><div class="q">${q.q}</div><div class="opts">${q.o.map((o,k)=>`<button class="opt" onclick="asAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="asexp"></div></div><div class="foot"><div class="sp"></div><div class="asnext"></div></div>`;}
function asAns(k){if(AS.answers[AS.i]!==undefined)return;AS.answers[AS.i]=k;const q=ASSESS[AS.i];view.querySelectorAll('.opts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.asexp').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;const last=AS.i===ASSESS.length-1;view.querySelector('.asnext').innerHTML=`<button class="btn brass" onclick="${last?'asFinish()':'asNext()'}">${last?'See results':'Next'} ${sv(ic.arrow)}</button>`;}
function asNext(){AS.i++;asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asFinish(){const correct=AS.answers.filter((a,i)=>a===ASSESS[i].a).length,p=Math.round(correct/ASSESS.length*100),pass=p>=80;S.assessBest=Math.max(S.assessBest||0,p);AS.done=true;if(pass)S.done['assess']=true;save();updTop();rail();const circ=2*Math.PI*62;
  view.innerHTML=`<span class="eyebrow">Assessment · Result</span><h1 style="margin-bottom:18px">${pass?'Section mastered':'Not quite there'}</h1><div class="panelcard"><div class="ring"><svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="62" fill="none" stroke="var(--surf-3)" stroke-width="11"/><circle cx="75" cy="75" r="62" fill="none" stroke="${pass?'var(--pass)':'var(--fail)'}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"><animate attributeName="stroke-dashoffset" from="${circ}" to="${circ-circ*p/100}" dur=".8s" fill="freeze" calcMode="spline" keySplines=".2 .7 .2 1"/></circle></svg><div class="rv"><div><div class="n" style="color:${pass?'var(--pass)':'var(--fail)'}">${p}%</div><div class="p">${correct}/${ASSESS.length} correct</div></div></div></div><span class="verdict ${pass?'pass':'fail'}">${pass?'Passed':'Below 80%'}</span><p>${pass?'You\'ve mastered Interior &amp; Components — that read of walls, doors, stairs, fireplaces, garages, and life-safety devices carries into every room you\'ll inspect.':'You need 80% to pass. Revisit the lessons and explanations, then retake — your best score counts.'}</p><div style="display:flex;gap:12px;justify-content:center"><button class="btn ghost" onclick="asStart()">${sv(ic.retake)} Retake</button>${pass?`<button class="btn brass" onclick="goStep(${STEPS.length-1})">Continue ${sv(ic.arrow)}</button>`:`<button class="btn brass" onclick="goStep(1)">Review lessons ${sv(ic.arrow)}</button>`}</div></div><div style="height:30px"></div>`;}

function renderGlossary(){view.innerHTML=`<span class="eyebrow">Reference</span><h1>Interior &amp; Components glossary</h1><p class="lead">Every key term in one place — quick reference for a real inspection.</p><div class="gloss" style="margin-top:20px">${GLOSSARY.map(([w,d])=>`<div class="term"><div class="tw">${w}</div><div class="td">${d}</div></div>`).join('')}</div>${navFoot('Continue')}`;}
function renderSource(){view.innerHTML=`<span class="eyebrow">Reference · wrap-up</span><h1>Reference &amp; summary</h1><p class="lead">Everything required is taught in the lessons above. This is the one-screen recap to carry into the field — what you observe room by room and the life-safety findings you never let slide.</p><div class="srcnote">${sv(ic.book,2)} Built on the Interior &amp; Components portions of the TREC Standards of Practice (§535.228–535.230) and <i>Principles of Home Inspection: Systems and Standards</i>. There's no separate PDF for this system — the interactive lessons are the complete reference.</div><div class="gloss" style="margin-top:18px"><div class="term"><div class="tw">1 · Surfaces — walls, ceilings &amp; floors</div><div class="td">Read finishes for cracks, bows, and stains; separate an active leak (soft, damp, growing) from an old, dry, painted-over one. Note out-of-level floors, soft spots, and squeaks as clues to framing or moisture.</div></div><div class="term"><div class="tw">2 · Doors &amp; windows</div><div class="td">Operate a representative sample. Report painted-shut or inoperable units, failed glazing, missing safety glass at hazardous locations, and any bedroom that lacks an egress-sized opening.</div></div><div class="term"><div class="tw">3 · Stairs, handrails &amp; guards</div><div class="td">Consistent rise/run, a graspable handrail on flights of four or more risers, guards roughly 36 in at walking surfaces, and balusters that won't pass a 4-inch sphere. Report loose or missing rails and guards.</div></div><div class="term"><div class="tw">4 · Fireplaces &amp; chimneys</div><div class="td">Firebox, damper, hearth extension, clearances to combustibles, gas-log valve, and a chimney cap/crown/spark arrestor. Report cracked fireboxes, short hearths, mantels too close, and heavy creosote.</div></div><div class="term"><div class="tw">5 · Garages — the fire separation</div><div class="td">Intact separation between the vehicle area and living space, a self-closing 20-minute fire-rated door (never into a sleeping room), gas-appliance ignition sources raised, and all penetrations sealed.</div></div><div class="term"><div class="tw">6 · Life-safety devices</div><div class="td">Smoke alarms in each bedroom, outside each sleeping area, and on every level; CO alarms outside sleeping areas where there's fuel-burning equipment or an attached garage. Missing or absent alarms are a safety report item.</div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><a class="btn slate" href="index.html" style="text-decoration:none;margin-right:10px">${sv(ic.back)} Module I</a><button class="btn brass" onclick="finishAll()">${sv(ic.check)} Complete section</button></div>`;}
function finishAll(){S.done['source']=true;save();updTop();rail();toast('Interior & Components section complete');}
let tT;function toast(m){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);}

/* ================= DATA: scenarios / assessment / glossary ================= */
const SCEN=[
 {t:'Reading the ceiling',n:'Stain over the dining room',s:'A brown, irregular stain spreads across the dining-room ceiling. It is dry to the touch, has a hard crusty edge, and a moisture meter reads the same as the surrounding drywall. The bath directly above was remodeled two years ago.',ask:'How do you report it?',o:['Active leak — call a plumber immediately','Note a moisture stain that reads dry today with a defined, hardened edge — consistent with a past, repaired event; recommend monitoring and disclosure, and re-check if conditions change.','Cosmetic only — ignore it','Recommend replacing the whole ceiling'],a:1,e:'A dry stain with a crisp, hardened border and a normal meter reading points to an old, resolved leak. You don\'t guarantee it\'s dead — you describe what you observe, note it may be historic, and recommend monitoring. A soft, expanding, damp stain would be reported as active.'},
 {t:'In a bedroom',n:'The window that won\'t budge',s:'A second-floor bedroom has one window that is painted shut and a second that opens but only about eight inches before hitting a stop. There is no other door to the exterior.',ask:'What\'s the priority finding?',o:['Note the paint and move on','Report the inoperable/painted-shut window AND that the room may lack a code-sized emergency egress opening — a life-safety concern for a sleeping room.','Recommend repainting the trim','Nothing — bedrooms only need one working window'],a:1,e:'A sleeping room needs an operable emergency escape and rescue opening (egress). A painted-shut window and a second that opens only 8 in raise a real egress concern. Report the inoperable window and flag the possible egress deficiency for evaluation — that\'s the life-safety call.'},
 {t:'On the stairs',n:'A rail you can\'t grab',s:'A straight run of nine steps to the basement has a 2×6 laid flat on brackets as a "handrail." It is solid, but you can\'t wrap your hand around it, and the open side of the stair has no guard.',ask:'Your write-up?',o:['Acceptable — there is a rail and it\'s sturdy','Report a non-graspable handrail (a flat 2×6 isn\'t a graspable section) and a missing guard at the open side — both are fall-safety deficiencies; recommend a graspable handrail and a guard.','Only note the missing guard','Recommend carpet on the treads'],a:1,e:'A handrail must be graspable — roughly 1¼–2 in round or an equivalent shape your hand can encircle. A flat 2×6 isn\'t. The open side of a raised stair also needs a guard. Report both as fall hazards on a flight of four or more risers.'},
 {t:'At the railing',n:'A ball goes through',s:'A balcony guard is a solid 38 inches tall, but the vertical balusters are spaced so your 4-inch sphere passes between them with room to spare.',ask:'How do you call it?',o:['Fine — the guard is tall enough','Report the baluster spacing: openings that pass a 4-inch sphere are a child-fall/entrapment hazard, even though the guard height is adequate. Recommend reducing the spacing.','Recommend a taller guard','Nothing — spacing is cosmetic'],a:1,e:'Guard height (about 36 in, here 38) is only half the test. Openings in a required guard must not allow a 4-inch sphere to pass. Wide baluster spacing is a recognized child-safety hazard; report it for correction regardless of the guard\'s height.'},
 {t:'At the fireplace',n:'Mantel and hearth',s:'A wood-burning masonry fireplace has a heavy wood mantel set 5 inches above the opening, the brick hearth extends only 10 inches in front of the firebox, and there are scorch marks on the floor just past the hearth.',ask:'What do you flag?',o:['Looks original — no action','Flag the combustible mantel clearance and the short hearth extension — the scorch marks confirm ember/heat exposure beyond the noncombustible area; recommend evaluation and correction.','Recommend a gas insert','Only note the scorch marks'],a:1,e:'Combustible trim above the opening needs clearance (commonly ~6 in, more if it projects), and the hearth extension must reach well past the opening (typically 16–20 in front). A short hearth plus scorch marks is exactly the ember/heat hazard you report — recommend evaluation by a qualified specialist.'},
 {t:'In the garage',n:'The door to the house',s:'The passage door from an attached garage into the kitchen is a hollow-core door with a louvered vent in the bottom panel and no self-closing hardware. The garage ceiling has exposed, unsealed openings into the attic.',ask:'The primary safety findings?',o:['Note the missing weatherstrip only','Report a breached vehicle-area/living-space fire separation: the hollow-core, louvered, non-self-closing door is not a rated barrier, and the unsealed ceiling penetrations defeat the separation; recommend a self-closing 20-minute fire-rated door and sealing the penetrations.','Recommend a deadbolt','Nothing — garages don\'t need rated doors'],a:1,e:'The garage must be separated from living space. The house door must be solid/20-minute fire-rated and self-closing, with no louvers or vents, and never open into a sleeping room. A hollow-core louvered door and open ceiling penetrations breach the separation — report both and recommend correction.'},
 {t:'Listening to the floor',n:'Slope and a soft spot',s:'In an older home a hallway floor slopes noticeably toward one wall, a board near the bathroom feels spongy underfoot, and the floor squeaks along the same line.',ask:'How do you handle it?',o:['Squeaks are normal — ignore everything','Report the observed slope, the soft/spongy area (possible subfloor moisture damage or framing issue), and the squeaks; recommend further evaluation of the floor structure and a moisture check at the bath.','Recommend new flooring only','Tell the client it\'s cosmetic'],a:1,e:'Squeaks alone are minor, but a pronounced slope plus a spongy spot near a wet area suggests possible structural movement or hidden moisture/subfloor damage. Describe what you observe and recommend evaluation rather than guessing the cause.'},
];
const ASSESS=[
 {q:'The home inspector\'s job with interior components is to:',o:['Repair the deficiencies found','Observe accessible interior elements, recognize deficiencies, and report them — especially safety items','Certify the home meets the building code','Re-finish damaged surfaces'],a:1,e:'You observe and report a representative sample of accessible interior elements and call out deficiencies, with extra weight on life-safety items. You don\'t repair or certify.'},
 {q:'A ceiling stain that is dry, has a hardened crusty edge, and reads normal on a moisture meter is best reported as:',o:['An active leak needing immediate repair','A moisture stain consistent with a past event — describe it, recommend monitoring/disclosure','Cosmetic and not worth noting','Proof the roof is failing'],a:1,e:'A dry stain with a defined, hardened border and normal meter reading typically indicates an old, resolved leak. Report what you observe and recommend monitoring; don\'t declare it active without evidence.'},
 {q:'Which sign points to an ACTIVE leak rather than an old one?',o:['A crisp, dry, painted-over ring','A soft, damp, expanding stain with elevated meter readings','A faint yellow tint','A stain that has not changed in years'],a:1,e:'Soft, damp, growing stains with high moisture readings indicate ongoing water entry. Hard-edged, dry, stable stains usually reflect a past, repaired event.'},
 {q:'Interior doors and windows are inspected by:',o:['Operating every single opening in the home','Operating a representative number and reporting inoperable, painted-shut, or damaged units','Removing them to check the frames','Measuring each for code compliance'],a:1,e:'You operate a representative sample and report units that won\'t function, are painted shut, have failed glazing, or are otherwise deficient.'},
 {q:'A sleeping room (bedroom) is generally required to have:',o:['Two exterior doors','At least one operable emergency escape and rescue (egress) opening','A skylight','Bars on the windows'],a:1,e:'Each sleeping room needs an operable egress opening sized and located so an occupant can escape and be rescued. A painted-shut or undersized window can be an egress deficiency.'},
 {q:'Safety glazing (tempered/laminated glass) is required at hazardous locations such as:',o:['Only at skylights','Doors, glazing next to doors, near floors, and at tubs/showers and stair landings','Only in commercial buildings','Wherever the owner prefers'],a:1,e:'Glazing in and adjacent to doors, near walking surfaces and floors, and at wet/fall locations like tubs, showers, and stairs must be safety glazing. Missing safety glass at these spots is a reportable hazard.'},
 {q:'A handrail is considered graspable when it is:',o:['A flat 2×6 laid on edge','Roughly 1¼–2 in round (or an equivalent graspable shape) so a hand can encircle it','At least 6 in wide','Any rail that is firmly attached'],a:1,e:'Graspable means the hand can wrap around it — about 1¼–2 in round or an equivalent profile. A flat, wide board you can\'t encircle is not a graspable handrail.'},
 {q:'A handrail is generally required on a stair flight with:',o:['Any number of steps','Four or more risers','Ten or more risers','Only exterior stairs'],a:1,e:'A graspable handrail is generally required on flights of four or more risers. Report missing or loose handrails as a fall hazard.'},
 {q:'Openings in a required guard must not allow passage of a:',o:['2-inch sphere','4-inch sphere','6-inch sphere','Hand'],a:1,e:'Balusters/infill in a guard must reject a 4-inch sphere to prevent a child from falling or becoming entrapped. Wider spacing is reportable even when the guard height is adequate.'},
 {q:'A guard at an open walking surface, balcony, or landing is typically required to be about:',o:['24 inches high','30 inches high','36 inches high','48 inches high'],a:2,e:'Guards at raised walking surfaces are generally around 36 in high (stairs often allow ~34 in for the handrail). Adequate height plus correct infill spacing are both required.'},
 {q:'Which is a reportable fireplace/chimney deficiency?',o:['A clean firebox with a working damper','A combustible mantel set too close to the opening and a hearth extension that is too short','A chimney cap with a spark arrestor','Gas logs with a working shut-off valve'],a:1,e:'Combustible trim too close to the opening and a short hearth extension are ember/heat hazards. Cracked fireboxes, missing dampers, and heavy creosote are likewise reportable.'},
 {q:'A chimney spark arrestor / cap is there to:',o:['Increase draft only','Keep out rain, animals, and debris and stop sparks/embers from leaving the flue','Hold up the crown','Improve appearance'],a:1,e:'The cap with a spark arrestor screen keeps water, animals, and debris out and prevents embers from escaping onto the roof. A missing cap and a cracked crown are common reportable findings.'},
 {q:'The passage door from an attached garage into living space should be:',o:['Hollow-core with a louvered vent','Solid or 20-minute fire-rated, self-closing, and never opening into a sleeping room','Any lockable door','Propped open for ventilation'],a:1,e:'The garage-to-house door must be a self-closing 20-minute fire-rated (or solid 1⅜-in) door with no louvers/openings, and it must not open into a sleeping room. The whole barrier maintains the fire separation.'},
 {q:'In an attached garage, a gas-fired water heater or furnace with an open flame should have its ignition source:',o:['At floor level','Elevated (commonly ~18 in) above the floor unless listed as flammable-vapor-ignition-resistant','Inside a sleeping area','Removed entirely'],a:1,e:'Heavier-than-air flammable vapors pool low in a garage. Ignition sources are traditionally elevated about 18 in above the floor (newer FVIR units are excepted). Note appliances installed at floor level for evaluation.'},
 {q:'Penetrations through the garage fire separation (for wiring, pipes, or ducts) should be:',o:['Left open for airflow','Sealed/fire-stopped to maintain the separation','Covered with tape','Ignored — they don\'t matter'],a:1,e:'Unsealed holes in the common wall or ceiling defeat the separation between the garage and living space. Report open penetrations and recommend proper sealing.'},
 {q:'Smoke alarms are generally required:',o:['Only in the kitchen','In each sleeping room, outside each sleeping area, and on every level of the home','Only on the top floor','Only where the owner wants them'],a:1,e:'Smoke alarms belong in each bedroom, just outside the sleeping areas, and on every level including basements. Missing or absent alarms are a life-safety report item.'},
 {q:'Carbon monoxide (CO) alarms are generally needed:',o:['In every room of every house','Outside sleeping areas in homes with fuel-burning appliances or an attached garage','Only in all-electric homes','Only in the garage'],a:1,e:'CO alarms are needed near sleeping areas where there is a combustion appliance or an attached garage — the sources of CO. Report missing CO alarms in those homes.'},
];
const GLOSSARY=[
 ['Active vs. old stain','An active stain is soft, damp, expanding, and reads wet; an old stain is dry, hard-edged, stable, and reads normal. You describe what you observe and recommend monitoring when uncertain.'],
 ['Moisture meter','A hand tool that reads relative moisture in a surface — used to help distinguish an active leak from a dry, historic stain.'],
 ['Out-of-level / out-of-plumb','A floor that isn\'t level or a wall/door that isn\'t plumb — a clue to settlement, framing movement, or moisture damage worth noting.'],
 ['Floor squeak','Noise from subfloor or framing moving against fasteners; minor by itself, but worth noting alongside slope or soft spots.'],
 ['Egress opening','The operable emergency escape and rescue window (or door) a sleeping room must have so an occupant can get out and be rescued.'],
 ['Safety glazing','Tempered or laminated glass required at hazardous locations — in/near doors, near floors and walking surfaces, and at tubs, showers, and stairs.'],
 ['Hazardous location (glazing)','A spot where glass is likely to be struck — doors, sidelites, low glazing, wet areas, stair landings — requiring safety glazing.'],
 ['Rise / run','The height of each step (rise) and the depth of each tread (run); they should be consistent throughout a flight to prevent trips.'],
 ['Graspable handrail','A rail your hand can encircle — about 1¼–2 in round or an equivalent profile — required on flights of four or more risers.'],
 ['Guard','A barrier (about 36 in high) at an open walking surface, balcony, or landing that prevents falls to the level below.'],
 ['Baluster spacing','The gap between vertical guard members; openings must reject a 4-inch sphere to prevent a child falling through or being entrapped.'],
 ['4-inch sphere rule','The test for guard infill: a 4-inch ball must not pass through the openings of a required guard.'],
 ['Firebox','The combustion chamber of a fireplace; inspected for cracks, gaps, missing refractory, and damaged mortar.'],
 ['Damper','The movable plate in the throat or cap of a chimney that opens for use and closes to stop drafts; checked for operation.'],
 ['Hearth extension','The noncombustible floor area in front of and beside a fireplace opening (typically 16–20 in front) that catches embers.'],
 ['Clearance to combustibles','The required gap between a fireplace/mantel/appliance and nearby wood or other combustible materials.'],
 ['Gas log / valve','A gas burner set in a firebox with a shut-off valve; checked for an accessible, operable valve and proper installation.'],
 ['Chimney cap / crown / arrestor','The top assembly: a crown (concrete wash), a cap, and a spark-arrestor screen that keep out water/animals and stop escaping embers.'],
 ['Creosote','Flammable tar-like deposit from wood burning that builds up in a flue; heavy buildup is a fire hazard worth reporting.'],
 ['Garage fire separation','The rated barrier (walls and ceiling) between the vehicle area and living space that resists fire spread into the home.'],
 ['20-minute fire-rated door','The self-closing, solid or rated door required between an attached garage and living space; never opens into a sleeping room.'],
 ['Self-closing door','A door fitted with hardware (spring hinge or closer) that returns it to the closed position on its own — required at the garage.'],
 ['Ignition-source elevation','Raising the burner/ignition of a garage gas appliance (commonly ~18 in) above floor level, away from pooling flammable vapors.'],
 ['Penetration sealing (fire-stop)','Closing the holes where wiring, pipes, or ducts pass through the garage separation so the barrier stays intact.'],
 ['Smoke alarm','A life-safety device required in each sleeping room, outside each sleeping area, and on every level of the home.'],
 ['Carbon monoxide (CO) alarm','A device required near sleeping areas in homes with fuel-burning appliances or an attached garage, where CO can be produced.'],
 ['Cabinet / countertop','Built-in casework and work surfaces; checked for secure mounting, operable doors/drawers, and damaged or loose tops.'],
 ['Representative sample','The inspection standard of operating/observing a portion of like items (windows, doors, outlets) rather than every one.'],
 ['Drywall / plaster','The common interior wall and ceiling finishes; read for cracks, bows, nail pops, and water staining.'],
 ['Settlement crack','A wall or ceiling crack from foundation or framing movement — distinguished from minor cosmetic cracking by size, pattern, and trend.'],
];
