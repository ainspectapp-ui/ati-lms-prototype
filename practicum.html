<!-- ATI · Module VII — Texas Practicum — full interactive section -->
<title>ATI · Module VII — Texas Practicum</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

/* ================= ENGINE ================= */
const KEY='ati_practicum_ix_v1';
let S={done:{},quiz:{},assessBest:0,cur:0};
async function load(){try{const r=await window.storage.get(KEY,false);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}S.done=S.done||{};S.quiz=S.quiz||{};}
async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>window.__previewAll||i===0||stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}
function rail(){document.getElementById('rail').innerHTML=STEPS.map((s,i)=>{const d=stepDone(i),u=unlocked(i),a=i===S.cur;return `<button class="step ${d?'done':''} ${a?'active':''} ${u?'':'locked'}" ${u?`onclick="goStep(${i})"`:''}><span class="dot">${d?sv(ic.check,3):(i+1)}</span><span class="lbl">${s.label}<span class="kind">${s.kind}</span></span></button>`;}).join('');}
function goStep(i){if(!unlocked(i))return;S.cur=i;save();render();window.scrollTo({top:0,behavior:'smooth'});}
function markDoneAndNext(){S.done[STEPS[S.cur].id]=true;save();updTop();rail();if(S.cur<STEPS.length-1)goStep(S.cur+1);else render();}
function render(){updTop();rail();const s=STEPS[S.cur];({lesson:renderLesson,scenario:renderScenarios,assess:renderAssess,glossary:renderGlossary,source:renderSource}[s.type])(s);}
function navFoot(label,gated){const last=S.cur===STEPS.length-1;return `<div class="foot">${S.cur>0?`<button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button>`:''}<div class="sp"></div><button class="btn brass" id="nextBtn" ${gated?'disabled':''} onclick="markDoneAndNext()">${label||(last?'Finish section':'Mark complete & continue')} ${sv(ic.arrow)}</button></div>`;}

function renderLesson(s){
  let h=(typeof s.body==='function'?s.body():s.body);
  if(s.quiz&&s.quiz.length){
    h+=`<div class="quiz"><div class="qh">${sv(ic.brain)} Check your understanding</div><div class="qt">${s.label}</div><div class="qsub">${s.quiz.length} questions covering the lesson — answer each to see the reasoning.</div><div class="qbody">${
      s.quiz.map((q,qi)=>`<div class="qblock"><div class="qnum">Question ${qi+1} of ${s.quiz.length}</div><div class="q">${q.q}</div><div class="opts" data-qi="${qi}">${q.o.map((o,k)=>`<button class="opt" onclick="qAns(${qi},${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="qexp" data-qi="${qi}"></div></div>`).join('')
    }</div><div class="qscore" style="display:none"></div></div>`;
  }
  const gated=!window.__previewAll&&!!(s.quiz&&s.quiz.length&&!S.quiz[s.id]);
  view.innerHTML=h+navFoot(null,gated);
  wireWidgets(view);
  window._ql={answered:{},total:s.quiz?s.quiz.length:0};
}
function qAns(qi,k){const s=STEPS[S.cur],q=s.quiz[qi];if(window._ql.answered[qi]!==undefined)return;window._ql.answered[qi]=k;
  const opts=view.querySelector('.opts[data-qi="'+qi+'"]');opts.querySelectorAll('.opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});
  view.querySelector('.qexp[data-qi="'+qi+'"]').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;
  if(Object.keys(window._ql.answered).length===window._ql.total){
    const right=s.quiz.filter((q,i)=>window._ql.answered[i]===q.a).length,sc=view.querySelector('.qscore');sc.style.display='flex';
    sc.innerHTML=`${sv(ic.check,2.4)}<span>You scored <b style="color:${right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)'}">${right}/${s.quiz.length}</b> on this lesson.</span>`;
    sc.querySelector('svg').style.color=right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)';
    S.quiz[s.id]=true;save();const b=document.getElementById('nextBtn');if(b)b.disabled=false;}
}

let SC={i:0,answered:false};
function renderScenarios(){SC={i:0,answered:false};paintScen();}
function paintScen(){const sc=SCEN[SC.i];view.innerHTML=`<span class="eyebrow">Apply it · Inspector's Call</span><h1>Make the call</h1><p class="lead">The decisions you'll actually make standing in front of the system. Read it, choose, see the reasoning.</p><div class="scount mono">Scenario ${SC.i+1} of ${SCEN.length}</div><div class="scen"><div class="sh"><div class="t">${sc.t}</div><div class="n">${sc.n}</div></div><div class="body"><div class="situation">${sc.s}</div><div class="ask">${sc.ask}</div><div class="scopts">${sc.o.map((o,k)=>`<button class="opt" onclick="scAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="scexp"></div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><div class="scnext"></div></div>`;}
function scAns(k){if(SC.answered)return;SC.answered=true;const sc=SCEN[SC.i];view.querySelectorAll('.scopts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===sc.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.scexp').innerHTML=`<div class="exp"><b>${k===sc.a?'Right call.':'Here\'s the call:'}</b> ${sc.e}</div>`;const last=SC.i===SCEN.length-1;view.querySelector('.scnext').innerHTML=`<button class="btn brass" onclick="${last?'markDoneAndNext()':'scNext()'}">${last?'Mark complete & continue':'Next scenario'} ${sv(ic.arrow)}</button>`;}
function scNext(){SC.i++;SC.answered=false;paintScen();window.scrollTo({top:0,behavior:'smooth'});}

let AS=null;
function renderAssess(){if(!AS||AS.done)AS={i:0,answers:[],done:false};view.innerHTML=`<span class="eyebrow">Assessment</span><h1>Mastery check — Texas Practicum</h1><p class="lead">${ASSESS.length} application questions across the whole chapter. 80% to pass; reasoning shown on every answer.</p><div class="panelcard" style="text-align:left;padding:0;overflow:hidden"><div style="background:linear-gradient(120deg,#1f6f73,#123f43);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-2)">Texas Practicum</div><div style="font-family:var(--display);font-weight:700;font-size:17px;margin-top:3px">${ASSESS.length} questions · 80% to pass</div></div><div style="color:var(--brass-2)">${sv(ic.award)}</div></div><div style="padding:26px 22px;text-align:center">${S.assessBest?`<div class="mono" style="font-size:13px;color:var(--ink-2);margin-bottom:16px">Best score: <b style="color:${S.assessBest>=80?'var(--pass)':'var(--fail)'}">${S.assessBest}%</b></div>`:''}<button class="btn brass" style="margin:0 auto" onclick="asStart()">${S.assessBest?'Retake assessment':'Begin assessment'} ${sv(ic.arrow)}</button></div></div>`;}
function asStart(){AS={i:0,answers:[],done:false};asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asPaint(){const q=ASSESS[AS.i];view.innerHTML=`<span class="eyebrow">Assessment · Practicum</span><h1 style="font-size:24px">Question ${AS.i+1} <span style="color:var(--ink-3)">/ ${ASSESS.length}</span></h1><div style="margin:14px 0 0"><div style="width:100%;height:6px;background:var(--surf-3);border-radius:6px;overflow:hidden;border:1px solid var(--line)"><i style="display:block;height:100%;width:${AS.i/ASSESS.length*100}%;background:var(--brass)"></i></div></div><div class="quiz" style="border-color:var(--line);margin-top:22px"><div class="q">${q.q}</div><div class="opts">${q.o.map((o,k)=>`<button class="opt" onclick="asAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="asexp"></div></div><div class="foot"><div class="sp"></div><div class="asnext"></div></div>`;}
function asAns(k){if(AS.answers[AS.i]!==undefined)return;AS.answers[AS.i]=k;const q=ASSESS[AS.i];view.querySelectorAll('.opts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.asexp').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;const last=AS.i===ASSESS.length-1;view.querySelector('.asnext').innerHTML=`<button class="btn brass" onclick="${last?'asFinish()':'asNext()'}">${last?'See results':'Next'} ${sv(ic.arrow)}</button>`;}
function asNext(){AS.i++;asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asFinish(){const correct=AS.answers.filter((a,i)=>a===ASSESS[i].a).length,p=Math.round(correct/ASSESS.length*100),pass=p>=80;S.assessBest=Math.max(S.assessBest||0,p);AS.done=true;if(pass)S.done['assess']=true;save();updTop();rail();const circ=2*Math.PI*62;
  view.innerHTML=`<span class="eyebrow">Assessment · Result</span><h1 style="margin-bottom:18px">${pass?'Section mastered':'Not quite there'}</h1><div class="panelcard"><div class="ring"><svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="62" fill="none" stroke="var(--surf-3)" stroke-width="11"/><circle cx="75" cy="75" r="62" fill="none" stroke="${pass?'var(--pass)':'var(--fail)'}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"><animate attributeName="stroke-dashoffset" from="${circ}" to="${circ-circ*p/100}" dur=".8s" fill="freeze" calcMode="spline" keySplines=".2 .7 .2 1"/></circle></svg><div class="rv"><div><div class="n" style="color:${pass?'var(--pass)':'var(--fail)'}">${p}%</div><div class="p">${correct}/${ASSESS.length} correct</div></div></div></div><span class="verdict ${pass?'pass':'fail'}">${pass?'Passed':'Below 80%'}</span><p>${pass?'You\'re ready to walk onto the practicum prepared — you know the inspection-day workflow, where the real hazards are, and how to stay in scope. Now log the five supervised inspections with your sponsor and earn the sign-off.':'You need 80% to pass. Revisit the lessons and explanations, then retake — your best score counts.'}</p><div style="display:flex;gap:12px;justify-content:center"><button class="btn ghost" onclick="asStart()">${sv(ic.retake)} Retake</button>${pass?`<button class="btn brass" onclick="goStep(${STEPS.length-1})">Continue ${sv(ic.arrow)}</button>`:`<button class="btn brass" onclick="goStep(1)">Review lessons ${sv(ic.arrow)}</button>`}</div></div><div style="height:30px"></div>`;}

function renderGlossary(){view.innerHTML=`<span class="eyebrow">Reference</span><h1>Practicum glossary</h1><p class="lead">Every key term in one place — quick reference for a real inspection.</p><div class="gloss" style="margin-top:20px">${GLOSSARY.map(([w,d])=>`<div class="term"><div class="tw">${w}</div><div class="td">${d}</div></div>`).join('')}</div>${navFoot('Continue')}`;}
function renderSource(){view.innerHTML=`<span class="eyebrow">Reference · wrap-up</span><h1>Reference &amp; summary</h1><p class="lead">Everything required is taught in the lessons above. This is the one-screen recap to carry onto your first supervised inspections — what the practicum is, the workflow, the safety calls, and the limits.</p><div class="srcnote">${sv(ic.book,2)} Built on the TREC requirements for the Professional Inspector practicum (40 field hours / five complete inspections under a sponsoring Professional Inspector), the TREC Standards of Practice (§535.227–.233), and report form <b>REI 7-6</b>. This guide <b>prepares</b> you for the practicum — it does not substitute for the actual supervised field hours your sponsor must observe and sign.</div><div class="gloss" style="margin-top:18px"><div class="term"><div class="tw">1 · What the practicum is</div><div class="td">40 hours of field training, including <b>five complete inspections</b> performed under the <b>direct supervision</b> of your sponsoring Professional Inspector. It bridges classroom hours and a working license — you do the inspection, your sponsor observes, coaches, and signs off.</div></div><div class="term"><div class="tw">2 · The inspection-day workflow</div><div class="td">Arrive early, introduce yourself, set client expectations and scope. Walk the home systematically — <b>exterior first, then interior</b> — and make access decisions for the roof, attic, and crawlspace. Carry the core tools and document as you go.</div></div><div class="term"><div class="tw">3 · Safety comes first, always</div><div class="td">Ladders and roofs (angle, footing, weather), attic footing and old wiring, crawlspace hazards, energized electrical panels, and gas. <b>If it isn't safe, you don't do it</b> — you note it as not inspected and why. No finding is worth an injury.</div></div><div class="term"><div class="tw">4 · The report &amp; professionalism</div><div class="td">Complete the TREC report form <b>REI 7-6</b> in the field — every required item marked I/NI/NP/D, deficiencies described with location and implication. Stay calm and neutral with the client; report what you see, don't editorialize or alarm.</div></div><div class="term"><div class="tw">5 · Scope &amp; the sign-off</div><div class="td">Stay <b>within the SOP</b> on site — you observe and report; you don't repair, quote, move personal property, or perform engineering. Your sponsor evaluates your method, safety judgment, report quality, and professionalism, then signs your completed inspections.</div></div><div class="term"><div class="tw">Prepares, not replaces</div><div class="td">This section gets you ready. The actual 40 hours and five supervised inspections must be performed and signed by your sponsoring Professional Inspector — there is no shortcut around the field hours.</div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><a class="btn slate" href="index.html" style="text-decoration:none;margin-right:10px">${sv(ic.back)} Module VII</a><button class="btn brass" onclick="finishAll()">${sv(ic.check)} Complete section</button></div>`;}
function finishAll(){S.done['source']=true;save();updTop();rail();toast('Texas Practicum section complete');}
let tT;function toast(m){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);}


/* ================= DATA: scenarios / assessment / glossary ================= */
const SCEN=[
 {t:'On arrival',n:'Keys, dog, and a hovering buyer',s:'You arrive ten minutes early for your first supervised inspection. The buyer is already there, eager and chatty; a friendly dog is loose in the yard; the seller is still moving boxes out of the garage. Your sponsor is parking behind you.',ask:'How do you start?',o:['Skip the introductions and start the roof so you don\'t fall behind','Introduce yourself, confirm scope and rough timeline with the client, ask that the dog be secured, and agree where you\'ll begin — then start the systematic walk','Tell the seller they have to leave the property','Start writing the report before you\'ve looked at anything'],a:1,e:'A practicum inspection starts with people, not ladders. Introduce yourself, set expectations (what you do and don\'t cover, how long it takes), handle the safety/logistics issues — a loose dog, an occupied space — and agree a starting point. Your sponsor is watching how you manage the client as much as how you inspect.'},
 {t:'At the ladder',n:'Steep, wet, and second-story',s:'The roof is a 9/12 pitch, two stories up, and there was a light rain an hour ago — the shingles are still damp. You want to walk it to read the field and flashings. Your sponsor says nothing, watching your call.',ask:'What do you do?',o:['Walk it anyway — you need to see the flashings up close','Stay off the wet, steep roof; inspect from the ladder at the eave and the ground with binoculars, and note in the report that the roof was inspected from the ground / eaves due to unsafe conditions','Ask the buyer to hold the ladder and go up','Cancel the whole inspection'],a:1,e:'TREC\'s SOP and basic safety both say you never walk a roof that is unsafe — steep, wet, fragile, or too high. You inspect what you can from the eaves and ground and clearly state the method and limitation. This is exactly the safety judgment your sponsor evaluates: a missed flashing detail is recoverable; a fall is not.'},
 {t:'In the attic',n:'Soft footing and an open splice',s:'You\'re in the attic on the joists. The insulation hides the framing, and you spot a junction box with its cover off and bare conductors twisted together — an open splice — a few feet ahead, past a section where you can\'t see the ceiling drywall below.',ask:'Your move?',o:['Step across the insulation to get a close photo of the splice','Stay on the framing members you can see, photograph the open splice from where you safely stand, and report it — don\'t step where the ceiling below is hidden, and don\'t touch the wiring','Pull the wires apart to see the conductors','Put the cover back on yourself to fix it'],a:1,e:'Two hazards at once: footing (step only on framing you can see — stepping on hidden drywall puts you through the ceiling) and electrical (don\'t handle wiring; you observe and report). You document the open junction box as a deficiency and recommend correction by a qualified electrician. You never repair on site.'},
 {t:'At the panel',n:'The cover screw that fights back',s:'You\'re ready to remove the electrical panel\'s dead-front cover. The panel is in a damp garage corner, there\'s a little rust at the bottom, and you\'re standing on a concrete floor. One screw is seized.',ask:'The right approach?',o:['Force every screw and yank the cover, holding the panel for leverage','Stand to the side on a dry surface if you can, remove the cover carefully without forcing a stuck screw, keep one hand clear, and don\'t touch buses or conductors — if it can\'t be removed safely, note it as not fully inspected','Have the buyer remove the cover','Turn off the main and open everything up to test it'],a:1,e:'Panels are one of the most dangerous things you touch. Position yourself to avoid the panel if something arcs, don\'t force a cover (a slipped screwdriver into a live bus is a flash hazard), never contact energized parts, and if it can\'t be opened safely, report it as not removed and why. Safe-and-limited beats thorough-and-injured.'},
 {t:'In the crawlspace',n:'Tight, dark, and a whiff of gas',s:'The crawlspace access is a small hatch. As you shine your light in before entering, you note standing water in one corner, a strong sewer-and-something smell, and the home is on gas. The space is tight enough that you\'d be on your belly.',ask:'What\'s the right call?',o:['Crawl in fast and get it over with','Do not enter until you\'ve assessed it — a confined, possibly gas/sewer-contaminated space with standing water can be life-threatening; inspect what you can from the access, note conditions, and report it as not fully entered due to unsafe conditions','Light a match to check for gas','Send your sponsor in instead'],a:1,e:'A crawlspace can be a confined space with real atmospheric hazards — gas, sewer gas, low oxygen — on top of water, wiring, and critters. You assess before you enter and you never enter an unsafe one. Inspect from the access opening, document why, and recommend evaluation. Never introduce an ignition source where gas may be present.'},
 {t:'With the client',n:'“So is this a good house?”',s:'Mid-inspection, the buyer follows you around and asks, “Honestly — should I buy it? Is this a good house?” They seem to want your blessing. Your sponsor is within earshot.',ask:'How do you handle it?',o:['Tell them it\'s a great house so they feel good','Stay neutral and professional: explain that your job is to report the home\'s observable condition — the deficiencies and what they mean — not to make the buying decision for them, and you\'ll walk them through the findings','Tell them to walk away from the deal','Refuse to answer and ignore them'],a:1,e:'Professionalism on the practicum means staying in your lane. You report condition; the client decides. You don\'t cheerlead a sale, kill a deal, or give an opinion you can\'t support. Calm, neutral, factual — and you offer to review the findings. Your sponsor is grading exactly this kind of client interaction.'},
 {t:'Filling the form',n:'A non-functional outlet you didn’t test all of',s:'You’re completing the REI 7-6 in the field. You tested a representative sample of outlets and one in the garage read open-ground. A locked bonus room blocked access to part of the house, and the gas was shut off so you could not test the furnace.',ask:'How should the report reflect this?',o:['Mark everything “Inspected” and move on','Mark the open-ground receptacle as a Deficiency with its location; mark the inaccessible room and the un-testable furnace as Not Inspected / Not Present-as-applicable with the reason stated — never report on what you couldn’t see or operate','Leave those items blank','Guess at the furnace condition since it “probably works”'],a:1,e:'The REI 7-6 makes you account for every item: Inspected, Not Inspected, Not Present, or Deficient. You describe deficiencies with location and implication, and you clearly state what you could not access or operate and why — a locked room, shut-off gas. You never report a condition you didn’t actually observe. Honest limits protect the client and you.'},
];

 {q:'The TREC Professional Inspector practicum requires:',o:['One inspection of any kind','40 hours of field training including five complete inspections under the direct supervision of a sponsoring Professional Inspector','A written exam only','Twelve months of unsupervised work'],a:1,e:'The practicum is 40 field hours and five complete inspections, each performed under the direct supervision of your sponsoring Professional Inspector.'},
 {q:'This interactive section’s role relative to the practicum is to:',o:['Replace the supervised field hours','Prepare you for the practicum — it does not substitute for the actual supervised inspections','Certify you as licensed','Count as two of the five inspections'],a:1,e:'It prepares you. The 40 hours and five supervised inspections must still be performed and signed by your sponsor.'},
 {q:'On the practicum, the five complete inspections are performed under:',o:['No supervision — you’re on your own','The direct supervision of your sponsoring Professional Inspector','A TREC examiner who visits the site','Another apprentice'],a:1,e:'“Direct supervision” by your sponsoring Professional Inspector is the defining feature — they observe, coach, and sign off.'},
 {q:'A sound systematic inspection sequence is generally:',o:['Whatever order the client prefers','Exterior to interior in a consistent, repeatable walk so nothing is skipped','Interior only, then leave','Roof, then immediately the report'],a:1,e:'A consistent exterior-to-interior route makes the inspection repeatable and complete — you cover every system the same way every time.'},
 {q:'You should walk a roof only when:',o:['The client asks you to','It is safe — not too steep, wet, fragile, or high; otherwise inspect from the eaves/ground and state the limitation','It looks expensive','You have a tall ladder'],a:1,e:'Roof safety governs the decision. If it isn’t safe to walk, inspect from the ladder/ground/binoculars and document the method and limitation.'},
 {q:'In an attic, you protect yourself from a fall through the ceiling by:',o:['Walking quickly across the insulation','Stepping only on framing members (joists/trusses) you can see, never on the unsupported ceiling','Crawling on the drywall','Removing the insulation first'],a:1,e:'Insulation hides the ceiling. Step only on the framing you can see; stepping between members puts you through the ceiling.'},
 {q:'When you find an open junction box with bare spliced conductors, you:',o:['Reconnect and cover it yourself','Photograph and report it as a deficiency for correction by a qualified electrician — you don’t repair or handle the wiring','Ignore it — it’s minor','Cut the wires to make it safe'],a:1,e:'Inspectors observe and report. Document the hazard and recommend correction; you never repair, energize, or handle live wiring on site.'},
 {q:'Before removing an electrical panel’s dead-front cover, the safest practice is to:',o:['Force any stuck screws for a clean removal','Position to the side on a dry surface, avoid forcing a seized screw, keep clear of buses/conductors — and if it can’t be removed safely, report it as not removed','Have the homeowner do it','Shut off the main and open all breakers'],a:1,e:'Panels carry serious arc-flash and shock risk. Don’t force covers, don’t contact energized parts, and accept a documented limitation over an unsafe removal.'},
 {q:'Approaching a crawlspace with standing water and a strong gas/sewer odor, you should:',o:['Enter quickly to minimize exposure','Treat it as a possible confined space — do not enter; inspect from the access, document conditions, and report it as not fully entered due to unsafe conditions','Use a lighter to check for gas','Pump the water out first'],a:1,e:'A contaminated, confined crawlspace can be lethal. Assess before entering, never enter an unsafe space, and never introduce an ignition source.'},
 {q:'A client asks, “Should I buy this house?” The professional response is to:',o:['Tell them yes so the deal closes','Stay neutral — report the home’s observable condition and let the client make the buying decision','Tell them to walk away','Refuse to speak to the client'],a:1,e:'You report condition; the client decides. Cheerleading or killing a deal is outside your role and your sponsor will mark it down.'},
 {q:'The standardized Texas report form you complete in the field is the:',o:['REI 7-6','HUD-1','TREC 1-4','ACORD 25'],a:0,e:'Texas requires the standardized inspection report form REI 7-6 for one-to-four-family residences.'},
 {q:'On the REI 7-6, each required item must be marked as:',o:['Pass or Fail only','Inspected, Not Inspected, Not Present, and/or Deficient — with deficiencies described','Excellent, Good, or Fair','A numeric score'],a:1,e:'The form forces you to account for every item: I / NI / NP / D, with deficiencies described by location and implication.'},
 {q:'A locked room you could not access should be reported as:',o:['Inspected — assume it’s fine','Not Inspected, with the reason stated — you never report on what you couldn’t observe','Deficient','Left blank'],a:1,e:'You document what limited the inspection (a locked or blocked area) and never report a condition you didn’t actually see.'},
 {q:'“Staying within the Standards of Practice on site” means you do NOT:',o:['Describe deficiencies','Repair, quote prices, perform engineering, or move the owner’s personal property','Use a ladder','Take photographs'],a:1,e:'You observe and report. Repairs, cost estimates, engineering opinions, and moving personal property are all outside the SOP and your role.'},
 {q:'During the practicum, your sponsoring Professional Inspector primarily evaluates and signs off on:',o:['How fast you finish','Your method, safety judgment, report quality, and professionalism across the completed inspections','How many homes you can do in a day','Your marketing skills'],a:1,e:'Your sponsor observes your systematic method, safety calls, accurate SOP-scoped reporting, and client professionalism — then signs your completed inspections.'},

const GLOSSARY=[
 ['Practicum','The TREC Professional Inspector field-training requirement: 40 hours including five complete inspections under direct supervision — the bridge between coursework and a working license.'],
 ['Sponsoring Professional Inspector','The licensed Professional Inspector who supervises your practicum, observes your inspections, coaches you, and signs off on your completed field work.'],
 ['Direct supervision','On-site oversight by your sponsor while you perform the inspection — they are present, watching, and responsible for your training.'],
 ['Professional Inspector','The highest Texas inspector license level; only a Professional Inspector may sponsor an apprentice or real-estate inspector’s practicum.'],
 ['REI 7-6','The standardized TREC inspection report form for one-to-four-family dwellings; every required item is marked Inspected, Not Inspected, Not Present, or Deficient.'],
 ['Standards of Practice (SOP)','TREC’s rules defining what an inspection must include, what is excluded, and how to report — the scope you stay within on site.'],
 ['Scope of inspection','The systems and components you’re required to inspect under the SOP — and, just as important, what you are not required or allowed to do.'],
 ['Deficiency','A condition that is unsafe or not functioning as intended; on the REI 7-6 you describe it with its location and implication.'],
 ['Not Inspected (NI)','A report status for an item you were required to inspect but could not — you state the reason (no access, shut-off utility, unsafe).'],
 ['Not Present (NP)','A report status for a component the home does not have.'],
 ['Inspection-day workflow','The repeatable routine of an inspection: arrival and client intro, a systematic exterior-to-interior walk, access decisions, documentation, and report completion.'],
 ['Systematic walk','Inspecting in a consistent, repeatable order (typically exterior then interior) so no system is skipped.'],
 ['Access decision','The on-site judgment of whether the roof, attic, or crawlspace can be entered/walked safely — and inspecting from outside it when it can’t.'],
 ['Readily accessible','Able to be reached and inspected without removing obstacles, damaging finishes, or taking on undue risk — the threshold for what you must inspect.'],
 ['Dead-front cover','The removable panel cover over an electrical panel’s breakers; removed carefully to inspect, never by forcing a seized screw or contacting live parts.'],
 ['Confined space','A space with limited entry/exit and possible atmospheric hazards — some crawlspaces qualify; assess before entry and never enter an unsafe one.'],
 ['Arc flash','A sudden electrical discharge in a panel; the reason you stand clear, never force a cover, and don’t contact buses or conductors.'],
 ['Backdraft / gas hazard','Risks around fuel-gas appliances; you never introduce an ignition source where gas may be present and report suspected leaks for evaluation.'],
 ['Three points of contact','The ladder rule — keep two hands and a foot (or two feet and a hand) on the ladder, on firm footing, at a safe angle, in safe weather.'],
 ['Sign-off','Your sponsor’s certification that you completed the supervised inspections to standard — evaluating method, safety, report quality, and professionalism.'],
];

{id:'intro',kind:'Start here',label:'What the practicum is',type:'lesson',
 body:()=>`<span class="eyebrow">Texas Practicum &middot; Orientation</span><h1>Five real inspections, watched over your shoulder.</h1>
 <p class="lead">The practicum is where the classroom becomes the field. In Texas, the Professional Inspector practicum is <b>40 hours of field training that includes five complete inspections</b>, each performed under the <b>direct supervision of your sponsoring Professional Inspector</b>. This section <b>prepares</b> you for those hours — it does not replace them.</p>
 <p>Read that carefully, because the structure drives everything that follows:</p>
 <ul class="num"><li><b>40 hours</b> of supervised field training.</li><li><b>Five complete inspections</b> — whole homes, start to finish, not bits and pieces.</li><li><b>Direct supervision</b> by a sponsoring <em>Professional Inspector</em> who observes, coaches, and signs off.</li></ul>
 <p>Your sponsor isn’t just initialing a sheet. They’re watching how you <b>move through a house</b>, the <b>safety calls</b> you make at the ladder, attic, and panel, the <b>quality of your report</b>, and how you <b>handle the client</b>. Get those four right and the sign-off follows.</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Arrive &amp; intro</div></div><div class="seg"><div class="n">02</div><div class="w">Systematic walk</div></div><div class="seg"><div class="n">03</div><div class="w">Access &amp; safety</div></div><div class="seg"><div class="n">04</div><div class="w">Report it (REI 7-6)</div></div><div class="seg"><div class="n">05</div><div class="w">Sponsor signs</div></div></div>
 <h2>Where the practicum sits in the path</h2>
 <p>The practicum is one stage in a longer licensing journey. Education comes first; the supervised field hours come next; then your sponsor’s sign-off and the state exam. Tap through the path to see exactly where you are.</p>
 ${W('era','path')}
 <h2>What this section will get you ready for</h2>
 <ul class="clean"><li><b>The inspection-day workflow</b> — arrival, client intro, and a repeatable walk</li><li><b>Access &amp; safety decisions</b> — roof, attic, crawlspace, panel, gas</li><li><b>The REI 7-6 report</b> — completing the Texas form in the field</li><li><b>Professionalism &amp; SOP scope</b> — observe and report, stay in your lane</li><li><b>The sign-off</b> — what your sponsor evaluates and certifies</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Safety is the whole game</div><p>Roofs, attics, crawlspaces, electrical panels, and gas appliances are where inspectors get hurt. The single rule that runs through this entire section: <b>if it isn’t safe, you don’t do it — you note it as not inspected and why.</b> A missed detail is recoverable; an injury is not. Your sponsor would rather see a smart limitation than a reckless finding.</p></div></div>`,
 quiz:[
  {q:'The Texas Professional Inspector practicum consists of:',o:['A single supervised inspection','40 hours of field training including five complete inspections under direct supervision','An online exam','Unsupervised solo inspections'],a:1,e:'It’s 40 field hours and five complete inspections, each under the direct supervision of your sponsoring Professional Inspector.'},
  {q:'This section’s relationship to the practicum is that it:',o:['Replaces the supervised hours','Prepares you for the practicum but does not substitute for the supervised field hours','Counts as your sign-off','Is optional and unrelated'],a:1,e:'It gets you ready. The actual 40 hours and five supervised inspections must still be performed and signed by your sponsor.'},
  {q:'The five practicum inspections are supervised by:',o:['A TREC examiner on site','Your sponsoring Professional Inspector','A fellow apprentice','No one'],a:1,e:'Direct supervision by your sponsoring Professional Inspector is the defining requirement.'},
  {q:'The single safety rule that runs through the whole practicum is:',o:['Always finish every item no matter what','If it isn’t safe, you don’t do it — note it as not inspected and why','Speed matters more than caution','Let the client decide what’s safe'],a:1,e:'Safe-and-limited always beats thorough-and-injured. Document what you couldn’t safely inspect and why.'},
 ]},

/* ===== L1 INSPECTION-DAY WORKFLOW ===== */
{id:'l1',kind:'Lesson 1',label:'The Inspection-Day Workflow',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 &middot; How a day runs</span><h1>A repeatable walk so nothing gets skipped.</h1>
 <p class="lead">On the practicum your sponsor wants to see a <b>method</b> — the same dependable sequence every time, so no system is missed and the client knows what to expect. It starts with people, moves through the house in order, and ends with a complete report.</p>
 <h2>Arrival and the client intro</h2>
 <p>You arrive early, introduce yourself, and set the frame: what you will and won’t inspect (the SOP scope), roughly how long it takes, and where you’ll begin. You handle logistics — a loose pet secured, occupants out of your work zones — and you keep the tone calm and professional. The first five minutes set the whole inspection.</p>
 <h2>The systematic walk: exterior to interior</h2>
 ${conds('',[['Start outside','Grounds, grading and drainage, the building exterior, then up to the roof and its drainage — reading the shell before you go in.'],['Work into the structure','Attic and roof structure from inside, then down through the living spaces — ceilings, walls, floors, windows, and doors, room by room.'],['Then the systems','Electrical, heating and cooling, plumbing, and the water heater — operating what the SOP requires you to operate.'],['End down low','Crawlspace or basement and the foundation — the wettest, tightest, and often last space you enter.']])}
 <p>The exact route can vary, but the principle doesn’t: a <b>consistent, repeatable order</b> means you cover every required system the same way on every house — which is exactly what makes the five inspections defensible.</p>
 <h2>The inspection-day workflow at a glance</h2>
 <div class="dgm"><svg viewBox="0 0 720 150">
   <g ${_gs}>
     <rect x="20" y="50" width="110" height="50" rx="6"/><rect x="165" y="50" width="110" height="50" rx="6"/><rect x="310" y="50" width="110" height="50" rx="6"/><rect x="455" y="50" width="110" height="50" rx="6"/><rect x="600" y="50" width="100" height="50" rx="6"/>
   </g>
   ${_mono(75,72,10,'Arrive &amp;','#7f520a')}${_mono(75,86,10,'intro','#7f520a')}
   ${_mono(220,72,10,'Exterior','#7f520a')}${_mono(220,86,10,'walk','#7f520a')}
   ${_mono(365,72,10,'Interior &amp;','#7f520a')}${_mono(365,86,10,'systems','#7f520a')}
   ${_mono(510,72,10,'Access calls','#7f520a')}${_mono(510,86,10,'roof/attic/crawl','#7f520a')}
   ${_mono(650,72,10,'Complete','#7f520a')}${_mono(650,86,10,'REI 7-6','#7f520a')}
   <g stroke="#b85436" stroke-width="2.2" fill="none" stroke-linecap="round">
     <path d="M132 75 H 163"/><path d="M158 70 l6 5 l-6 5"/>
     <path d="M277 75 H 308"/><path d="M303 70 l6 5 l-6 5"/>
     <path d="M422 75 H 453"/><path d="M448 70 l6 5 l-6 5"/>
     <path d="M567 75 H 598"/><path d="M593 70 l6 5 l-6 5"/>
   </g>
 </svg><div class="cap">The day in five moves: arrive &amp; introduce, walk the exterior, work the interior and systems, make access decisions, and complete the report.</div></div>
 <h2>The tools you carry</h2>
 <p>You don’t need a truck of gadgets, but you carry a working kit so you can inspect safely and document on the spot: a bright <b>flashlight</b>, a <b>ladder</b> for the roof and attic, a <b>voltage tester</b> and a <b>GFCI/receptacle tester</b>, a <b>moisture meter</b>, a <b>screwdriver/nut-driver</b> for the panel dead-front, a way to <b>screen for gas</b>, and a <b>camera</b> (your phone) for the report.</p>
 ${W('match','tools')}
 ${story('Inspector in the house',`On a trainee’s first ride-along the sponsor said one thing before they got out of the truck: **“Same walk, every house.”** The apprentice who wandered room to room missed the water heater’s missing TPR discharge; the one who ran a fixed route caught it without trying. The method isn’t bureaucracy — it’s how you stop missing things when you’re tired on inspection number five.`)}`,
 quiz:[
  {q:'A practicum inspection should begin with:',o:['Climbing straight onto the roof','Arriving early, introducing yourself, and setting scope and expectations with the client','Filling out the report','Testing every outlet'],a:1,e:'It starts with people and a plan — introduce yourself, frame the scope and timeline, handle logistics — then walk the house.'},
  {q:'The main reason to follow a consistent, repeatable inspection sequence is to:',o:['Look impressive','Cover every required system the same way so nothing is skipped','Finish faster than the SOP allows','Avoid talking to the client'],a:1,e:'A fixed exterior-to-interior route makes the inspection complete and defensible across all five inspections.'},
  {q:'A typical systematic walk runs:',o:['Interior only','Exterior to interior — grounds and shell, then attic, living spaces, systems, and finally the crawl/foundation','Top to bottom of the report form','In whatever order the client wants'],a:1,e:'Read the shell outside, then work inward and downward through the structure, systems, and the crawl/foundation last.'},
  {q:'Which belongs in your basic field kit?',o:['Only a clipboard','A flashlight, ladder, voltage/receptacle testers, moisture meter, screwdriver, gas screen, and a camera','A power drill and replacement parts','Cleaning supplies for the home'],a:1,e:'You carry tools to inspect safely and document — not to repair. The dead-front screwdriver and gas screen are for safe access and screening, not fixing.'},
 ]},

/* ===== L2 FIELD SAFETY ===== */
{id:'l2',kind:'Lesson 2',label:'Field Safety — the Big One',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 &middot; Stay safe, stay licensed</span><h1>The hazards that hurt inspectors — and how you don’t get hurt.</h1>
 <p class="lead">More than any report detail, your sponsor is watching whether you make <b>good safety calls</b>. Inspectors get injured in five places: ladders and roofs, attics, crawlspaces, electrical panels, and around gas. Know each hazard before you reach the space — and accept a documented limitation over a reckless finding.</p>
 <h2>Ladders &amp; roofs</h2>
 <p>Set the ladder at a safe angle on firm, level footing; keep <b>three points of contact</b>; never overreach. Walk a roof <b>only when it’s safe</b> — not steep, wet, frosty, fragile (tile, slate, old wood), or too high. When it isn’t, inspect from the eaves, the ground, or binoculars and <b>state the method and limitation</b> in the report.</p>
 <h2>Attics</h2>
 <p>Step <b>only on framing you can see</b> — joists or truss chords — never on the unsupported ceiling, or you go through it. Watch your head on roofing nails and low chords, mind <b>old or open wiring</b> (knob-and-tube, open junction boxes), and don’t disturb unknown insulation. If footing or air quality is bad, inspect from the hatch and note it.</p>
 <h2>Crawlspaces</h2>
 <p>Assess <b>before you enter</b>. A tight crawl can be a <b>confined space</b> with standing water, sewer or fuel gas, low oxygen, live wiring, and pests. If it’s unsafe, you don’t enter — you inspect from the access opening and report why. Never bring an ignition source where gas may be present.</p>
 <h2>Electrical panels &amp; gas</h2>
 <p>Removing a <b>dead-front cover</b> is one of the most dangerous things you do. Stand to the side on a dry surface, <b>don’t force a seized screw</b>, keep clear of the buses and conductors, and never touch energized parts. If it can’t come off safely, report it as <b>not removed</b>. Around <b>gas</b>, screen for leaks, never create a spark near a suspected leak, and refer anything questionable for evaluation.</p>
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The rule that overrides every other</div><p><b>If it isn’t safe, you don’t do it.</b> Mark the item Not Inspected, state the reason, and move on. No flashing detail, no panel reading, no crawlspace item is worth a fall, a shock, or a confined-space rescue. Your sponsor grades the call, not the bravado.</p></div></div>
 ${W('sort','safe')}
 ${W('spot','day')}
 ${story('Inspector in the house',`A sponsor tells every apprentice the same story: a seasoned inspector forced a stuck dead-front screw, the driver slipped into the bus, and the arc flash put him in the burn unit. **He got the panel open. It cost him three months and a lot of skin.** The lesson stuck: when a cover fights back, you write “not removed — cover seized” and you keep your face.`)}`,
 quiz:[
  {q:'You should walk a roof only when:',o:['The client insists','It is safe — not steep, wet, frosty, fragile, or too high','You brought a ladder','It looks new'],a:1,e:'Roof safety governs. If it isn’t safe to walk, inspect from the eaves/ground and document the limitation.'},
  {q:'In an attic you avoid falling through the ceiling by:',o:['Moving quickly','Stepping only on framing members you can see','Crawling on the insulation','Removing the drywall'],a:1,e:'Insulation hides the ceiling — step only on visible joists/truss chords; between them you go through.'},
  {q:'Before entering a tight crawlspace with water and an odor, you:',o:['Enter fast to limit exposure','Treat it as a possible confined space, don’t enter, inspect from the access, and report why','Light a flame to check for gas','Bail water first'],a:1,e:'It can be a lethal confined space. Assess before entry, never enter an unsafe one, and never bring an ignition source.'},
  {q:'A seized screw on an electrical panel’s dead-front cover means you should:',o:['Force it for a clean removal','Not force it — if the cover can’t come off safely, report it as not removed','Have the client remove it','Cut the cover off'],a:1,e:'Forcing a cover risks a slipped tool into a live bus and an arc flash. Document the limitation instead.'},
  {q:'The overriding safety rule on the practicum is:',o:['Finish every item no matter the risk','If it isn’t safe, you don’t do it — mark it Not Inspected and state why','Let the homeowner decide','Speed over caution'],a:1,e:'Safe-and-limited beats thorough-and-injured. A documented limitation is always the right call when a space is unsafe.'},
 ]},

/* ===== L3 REPORT, PROFESSIONALISM & SCOPE ===== */
{id:'l3',kind:'Lesson 3',label:'Report, Professionalism &amp; Scope',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 &middot; Finish it right</span><h1>Fill the form, stay in your lane, earn the sign-off.</h1>
 <p class="lead">An inspection isn’t done when you put the ladder away — it’s done when the <b>REI 7-6</b> is complete and accurate, you’ve stayed <b>within SOP scope</b>, and you’ve handled the client like a professional. This is the half of the practicum your sponsor signs their name to.</p>
 <h2>Completing the REI 7-6 in the field</h2>
 <p>Texas requires the standardized report form <b>REI 7-6</b> for one-to-four-family homes. You fill it out <b>as you go</b>, not from memory afterward. Every required item gets a status:</p>
 ${conds('',[['Inspected (I)','You inspected the item and it functioned as intended — no deficiency noted.'],['Not Inspected (NI)','You were required to inspect it but couldn’t — no access, a shut-off utility, an unsafe space. <b>State the reason.</b>'],['Not Present (NP)','The home doesn’t have that component.'],['Deficient (D)','The item is unsafe or not functioning as intended — <b>describe it</b> with its location and what it means.']])}
 <p>The golden rule of the form: <b>never report on what you didn’t actually observe.</b> A locked room, a buried cleanout, a gas appliance you couldn’t test — those are Not Inspected with a reason, not a guess.</p>
 <h2>Staying within SOP scope on site</h2>
 <p>The Standards of Practice define a clear, narrow job: <b>observe and report</b>. On site that means you do <em>not</em> repair, quote prices, design or perform engineering, predict remaining life, or move the owner’s personal property to gain access. You note what you couldn’t reach — you don’t force it.</p>
 ${W('sort','scope')}
 ${W('match','access')}
 <h2>Professionalism &amp; the client</h2>
 <p>You’re a guest in someone’s home and a neutral reporter for your client. Stay <b>calm and factual</b>: report condition, don’t editorialize, don’t alarm, and don’t make the buying decision for them. When asked “is this a good house?” the honest answer is that you report what’s there and they decide. Keep clients clear of hazardous tasks, and offer to walk the findings at the end.</p>
 <h2>What your sponsor evaluates and signs</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Method &amp; thoroughness</span></div><p>A consistent, repeatable walk that covers every required system.</p><div class="meta"><span class="lab">They watch</span><span class="val">Do you follow a real sequence, or wander and miss items?</span><span class="lab">Sign-off</span><span class="val">Demonstrated a complete, systematic inspection.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Safety judgment</span></div><p>The calls you make at the ladder, attic, crawl, panel, and gas.</p><div class="meta"><span class="lab">They watch</span><span class="val">Do you stop when it’s unsafe and document it?</span><span class="lab">Sign-off</span><span class="val">Made sound, documented safety decisions.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Report quality &amp; scope</span></div><p>An accurate REI 7-6 that stays inside the SOP.</p><div class="meta"><span class="lab">They watch</span><span class="val">Right statuses, clear deficiencies, honest limitations — nothing out of scope?</span><span class="lab">Sign-off</span><span class="val">Produced a complete, in-scope report.</span></div></div>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Prepares you — doesn’t replace the hours</div><p>Master this and you’ll walk onto the practicum ready. But the <b>40 hours and five supervised inspections are real and required</b> — performed in the field and signed by your sponsoring Professional Inspector. This section is the preparation, not the credit.</p></div></div>
