/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'Why the report matters',type:'lesson',
 body:()=>`<span class="eyebrow">Analysis of Findings &amp; Reporting · Orientation</span><h1>The inspection ends on paper — and the paper is what you're paid for.</h1>
 <p class="lead">You can read a house perfectly and still serve the client badly if the <b>report</b> is vague, opinionated, or out of scope. This section is about the craft that turns what you saw into a clear, defensible record: <b>observe, analyze, and report the implication</b> so the client can decide.</p>
 <p>A home inspection report does four things, and every skill in this section feeds one of them:</p>
 <ul class="num"><li><b>Documents</b> — what was inspected, on the mandatory TREC form.</li><li><b>Analyzes</b> — sorts findings by severity, not by size.</li><li><b>Communicates</b> — clear, factual, defensible deficiency comments.</li><li><b>Protects</b> — stays in scope and manages expectations.</li></ul>
 <p>The most common failures aren't missed defects — they're <em>reporting</em> failures: a finding written as "roof is bad," a dollar estimate that wasn't the inspector's to give, a missing limitation that turns into a lawsuit. Get the report right and the inspection counts.</p>
 <p>Every finding runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Observe</div></div><div class="seg"><div class="n">02</div><div class="w">Analyze</div></div><div class="seg"><div class="n">03</div><div class="w">Classify</div></div><div class="seg"><div class="n">04</div><div class="w">Comment</div></div><div class="seg"><div class="n">05</div><div class="w">Deliver</div></div></div>
 <h2>What you'll practice</h2>
 <ul class="clean"><li><b>The report's purpose</b> — what it is, and what it is not</li><li><b>The TREC form REI 7-6</b> — the mandatory I / NI / NP / D system</li><li><b>The deficiency comment</b> — item, condition, implication, recommendation</li><li><b>Analyzing findings</b> — safety vs. deferred vs. cosmetic</li><li><b>Photos &amp; scope</b> — documenting the right way, staying inside the SOP</li><li><b>Delivery, records &amp; expectations</b> — timeliness, retention, liability</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The line you don't cross</div><p>A home inspector <b>reports observed conditions and their implications</b>. You do <b>not</b> estimate repair costs, cite building code beyond your scope, or guarantee future performance. Crossing that line is where good inspectors create bad liability — most of this section is learning exactly where it sits.</p></div></div>`,
 quiz:[
  {q:'The home inspection report\'s core job is to:',o:['Estimate repair costs for negotiation','Communicate observed conditions and their implications in writing','Certify the home meets all codes','Guarantee the home for the buyer'],a:1,e:'The report communicates what was observed and why it matters — not cost estimates, code certification, or guarantees.'},
  {q:'Most serious reporting problems come from:',o:['Missing a hidden defect','Reporting failures — vague, opinionated, or out-of-scope comments','Using too many photos','Writing too much detail'],a:1,e:'A correctly observed finding still hurts the client (and the inspector) if it\'s written vaguely or steps outside scope.'},
  {q:'Which is OUTSIDE the home inspector\'s reporting role?',o:['Noting an observed deficiency','Explaining the implication of a deficiency','Estimating the dollar cost to repair it','Recommending qualified evaluation'],a:2,e:'Estimating repair cost is outside the inspection scope. You report the condition and implication and refer to a qualified contractor.'},
  {q:'A home inspection report is best described as:',o:['A warranty on the home','A snapshot of accessible conditions on inspection day','A code-compliance certificate','An appraisal of value'],a:1,e:'It documents accessible conditions on one day — not a warranty, certificate, or appraisal.'},
 ]},

/* ===== L1 PURPOSE OF THE REPORT ===== */
{id:'l1',kind:'Lesson 1',label:'Purpose of the Report',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · What the report is for</span><h1>Know what the report is — and just as much, what it isn't.</h1>
 <p class="lead">Half of writing a good report is staying clear about its purpose. The report exists to <b>communicate the inspector's observations of accessible conditions and their implications</b> so the client can make an informed decision. Everything else is a misuse of it.</p>
 <h2>What the report IS</h2>
 ${conds('',[['A record of observations','What you inspected and the conditions you found — visible, accessible, on the day of the inspection.'],['An analysis of implications','Not just "what," but "so what." A finding without its implication is data the client can\'t use.'],['A decision tool','It gives the client the facts to negotiate, repair, walk away, or proceed — their decision, informed by yours.'],['A professional, defensible document','Factual and in-scope enough to stand up if it\'s ever questioned.']])}
 <h2>What the report is NOT</h2>
 <ul class="clean"><li><b>Not a warranty or guarantee</b> — it doesn't promise the home is defect-free or predict future performance.</li><li><b>Not an insurance policy</b> — it doesn't cover what fails after closing.</li><li><b>Not a code-compliance certificate</b> — inspectors report against the SOP, not the building code.</li><li><b>Not a repair-cost estimate or an appraisal</b> — cost and value are other professionals' work.</li><li><b>Not a pass/fail verdict</b> — there's no "good/fair/poor"; you report conditions and deficiencies.</li></ul>
 <div class="field brass"><div class="ic">${sv(ic.book)}</div><div><div class="t">The reportable-condition rule</div><p>You don't grade the house. There is no "Excellent / Good / Fair" on a professional inspection report. You record the <b>observed condition</b> and, where it\'s a problem, mark it <b>Deficient</b> with a written comment. Grades are opinions; conditions are facts.</p></div></div>
 ${story('Inspector in the house',`A buyer once asked, "Just tell me — is it a good house or a bad house?" The honest answer isn't a grade; it's the report. **You don't rate the home; you describe its condition and let the client weigh it.** "Good or bad" is their call to make — your job is to give them the facts to make it well.`)}`,
 quiz:[
  {q:'The fundamental purpose of the inspection report is to:',o:['Grade the home good, fair, or poor','Communicate observed conditions and their implications so the client can decide','List the cheapest repairs first','Certify the home for the lender'],a:1,e:'It communicates conditions and implications to inform the client\'s decision — it does not grade, certify, or estimate.'},
  {q:'A finding with no stated implication is:',o:['Fine — the condition speaks for itself','Incomplete — the client needs to know why it matters','Better, because it\'s shorter','Outside the report'],a:1,e:'"What" without "so what" leaves the client unable to act. The implication is part of the finding.'},
  {q:'Which is the report NOT?',o:['A record of observed conditions','A warranty guaranteeing the home','A decision tool for the client','A professional, defensible document'],a:1,e:'A report is never a warranty or guarantee of future performance.'},
  {q:'Using "Excellent / Good / Fair" ratings on the report is:',o:['Required for clarity','Inappropriate — you report conditions and deficiencies, not grades','Only allowed for the roof','The TREC standard'],a:1,e:'A professional report records observed conditions and marks deficiencies; it does not assign letter or word grades to the home.'},
 ]},

/* ===== L2 THE TREC FORM ===== */
{id:'l2',kind:'Lesson 2',label:'The TREC Form (REI 7-6)',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · The mandatory format</span><h1>In Texas, the form isn't your choice — it's the law.</h1>
 <p class="lead">A TREC-licensed inspector reporting on a real estate transaction must use the standard <b>Property Inspection Report Form REI 7-6</b>. Its structure and the way you respond to each item are mandatory. Learn the four boxes and you've learned the spine of every report you'll write.</p>
 <h2>The four boxes: I / NI / NP / D</h2>
 ${conds('',[['I — Inspected','The component was present and you inspected it. Any deficiency you found on that item gets the D box checked too, with a comment.'],['NI — Not Inspected','The component is present, but you did not inspect it — and the SOP requires you to state why (no access, unsafe, off, etc.).'],['NP — Not Present','The listed component does not exist in this home (no fireplace, no water softener).'],['D — Deficient','In your judgment the condition adversely affects function or is a hazard. Every D box must be accompanied by a written deficiency comment.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <rect x="60" y="40" width="600" height="170"/>
     <line x1="60" y1="78" x2="660" y2="78"/>
     <line x1="430" y1="40" x2="430" y2="210" stroke-width="1"/>
     <line x1="478" y1="40" x2="478" y2="210" stroke-width="1"/><line x1="526" y1="40" x2="526" y2="210" stroke-width="1"/><line x1="574" y1="40" x2="574" y2="210" stroke-width="1"/>
     ${_mono(454,70,11,'I','#3c5870')}${_mono(502,70,11,'NI','#3c5870')}${_mono(550,70,11,'NP','#3c5870')}${_mono(617,70,11,'D','#b85436')}
     ${_mono(76,104,11,'A. Roof Covering Materials','#2c4153','start')}
     ${_mono(76,140,11,'B. Roof Structure & Decking','#2c4153','start')}
     ${_mono(76,176,11,'C. Fireplaces & Chimneys','#2c4153','start')}
   </g>
   <g stroke="#3d7d50" stroke-width="2.4" fill="none" stroke-linecap="round"><path d="M448 100 l5 6 l9 -12"/></g>
   <g stroke="#b85436" stroke-width="2.4" fill="none" stroke-linecap="round"><path d="M606 100 l5 6 l9 -12"/></g>
   <g stroke="#3d7d50" stroke-width="2.4" fill="none" stroke-linecap="round"><path d="M448 136 l5 6 l9 -12"/></g>
   <g stroke="#3c5870" stroke-width="2.4" fill="none" stroke-linecap="round"><path d="M544 172 l5 6 l9 -12"/></g>
   ${_mono(360,236,10,'every line gets a box — the D on line A travels with a written comment','#7f520a')}
 </svg><div class="cap">REI 7-6 in miniature: each line gets I / NI / NP / D. A D (line A) always carries a deficiency comment.</div></div>
 <h2>The rules that trip people up</h2>
 <ul class="clean"><li><b>No line is ever blank</b> — every listed item gets a response.</li><li><b>NI demands a reason</b> — "not inspected" without "why" is a deficiency in your report itself.</li><li><b>NP is absence, NI is inaccessibility</b> — don't confuse "isn't here" with "couldn't reach it."</li><li><b>Every D needs a comment</b> — the checkbox flags it; the words explain it.</li></ul>
 ${W('sort','box')}
 ${story('Inspector in the house',`A reviewer pulled a report where the inspector had left the "Gas Lines" line blank because the home was all-electric. Blank reads as "forgot," not "none." **The right move was NP — Not Present.** On the TREC form, silence is never an answer; there's a box for everything, including nothing.`)}`,
 quiz:[
  {q:'For a Texas real-estate inspection, the report must use:',o:['Any clear format','The TREC Property Inspection Report Form REI 7-6','A custom checklist','The buyer\'s lender form'],a:1,e:'REI 7-6 is the mandatory standard form; its format and responses are required.'},
  {q:'The four TREC response boxes are:',o:['Pass / Fail / N/A / Note','Excellent / Good / Fair / Poor','Inspected / Not Inspected / Not Present / Deficient','Safe / Unsafe / Repair / Replace'],a:2,e:'I / NI / NP / D — there is no grade-style rating on the form.'},
  {q:'A component exists but you couldn\'t safely reach it. You check:',o:['NP','NI, and state why','I','D'],a:1,e:'Present but not inspected is NI — and you must give the reason for the limitation.'},
  {q:'The home has no fireplace. The correct box is:',o:['NI','NP','D','Leave it blank'],a:1,e:'A component that isn\'t in the home is Not Present (NP). Blank is never acceptable.'},
  {q:'Every box checked Deficient (D) must be accompanied by:',o:['A photo only','A written deficiency comment','A repair-cost estimate','A code citation'],a:1,e:'The D box flags the problem; a written comment is required to explain it. No cost or code citation is required or appropriate.'},
 ]},

/* ===== L3 THE DEFICIENCY COMMENT ===== */
{id:'l3',kind:'Lesson 3',label:'Writing the Comment',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · The four-part comment</span><h1>A good comment is a sentence anyone could act on.</h1>
 <p class="lead">The deficiency comment is the heart of the report. A clear, defensible one has four parts — and deliberately leaves two things out. Master this pattern and most of your writing problems disappear.</p>
 <h2>The four parts — every time</h2>
 ${conds('',[['1 · Item &amp; location','Name exactly what and where: "the composition-shingle roof, south slope," "the water heater in the garage." Specific enough to find.'],['2 · Observed condition','State the factual defect you saw: "widespread granule loss and curling." What you observed, not how you feel about it.'],['3 · Implication','Say why it matters: "shortens remaining service life and increases the risk of leaks." This is the analysis that makes it a finding.'],['4 · Recommendation','Point to the next step: "Recommend evaluation by a qualified, licensed roofer." Evaluate, repair, or replace by the right trade.']])}
 ${W('era','comment')}
 <h2>The two things you leave OUT</h2>
 <p>A defensible comment <b>does not estimate repair cost</b> and <b>does not cite building code beyond your scope</b>. Both step outside the inspection and create liability. You describe the condition and recommend a qualified professional — you don't price the fix or play code official.</p>
 <div class="defect"><div class="dh"><span class="n">✗</span><span class="nm">Weak: "Roof is bad, needs work."</span></div><p>A conclusion with no facts — no item detail, no location, no observed condition, no implication, and a useless recommendation. The client can't act on it and you can't defend it.</p><div class="meta"><span class="lab">Why it fails</span><span class="val">It's an opinion. Nothing is observable, verifiable, or specific.</span></div></div>
 <div class="defect" style="border-left:3px solid var(--pass)"><div class="dh"><span class="n" style="background:var(--pass-soft);color:var(--pass)">✓</span><span class="nm">Clear: the same finding, done right</span></div><div class="rep"><b>Item/location:</b> Composition-shingle roof, south slope. <b>Condition:</b> Widespread granule loss and edge curling observed. <b>Implication:</b> Shortened remaining service life; increased risk of leaks. <b>Recommendation:</b> Recommend evaluation and repair/replacement by a qualified, licensed roofer.</div></div>
 ${W('match','comment')}
 ${story('Inspector in the house',`An inspector defended a complaint years later with one clean comment in the file: item, condition, implication, recommendation — no cost, no code. The claim went nowhere. **Vague comments lose; specific, in-scope comments protect you.** Write every D as if you'll have to stand behind it, because someday you might.`)}`,
 quiz:[
  {q:'A defensible deficiency comment includes all of these EXCEPT:',o:['The item and its location','The observed condition','A repair-cost estimate','A recommendation'],a:2,e:'Item, location, observed condition, implication, recommendation — and NOT a cost estimate, which is outside scope.'},
  {q:'"Roof is bad, needs work" fails mainly because:',o:['It\'s too long','It\'s a vague conclusion with no observable facts or specifics','It names the wrong trade','It cites code'],a:1,e:'It\'s an opinion the client can\'t act on and the inspector can\'t defend — no item detail, condition, implication, or clear recommendation.'},
  {q:'The "implication" part of a comment answers:',o:['Who installed it','Why the condition matters','How much it costs','Which code applies'],a:1,e:'The implication is the consequence — why this condition is a problem. It\'s the analysis that turns an observation into a finding.'},
  {q:'The recommendation in a deficiency comment should:',o:['Tell the client how to do the repair themselves','Recommend evaluation/repair by a qualified, licensed contractor','State the exact replacement cost','Quote the relevant code section'],a:1,e:'Refer to the right qualified professional; don\'t prescribe the method, price the fix, or cite code beyond scope.'},
  {q:'Citing a specific building-code section in your comment is:',o:['Required for every deficiency','Generally outside scope and best avoided','The only defensible approach','Mandatory under the SOP'],a:1,e:'Inspectors report against the SOP, not code compliance. Code citations beyond scope create liability.'},
 ]},

/* ===== L4 ANALYZING FINDINGS ===== */
{id:'l4',kind:'Lesson 4',label:'Analyzing Findings',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Severity, not size</span><h1>Two homes have a hundred findings each — analysis is what sorts them.</h1>
 <p class="lead">Listing defects is data entry. <b>Analysis</b> is judging each finding's severity so the report conveys what actually matters. You report everything reportable — but you write a safety hazard differently than a worn caulk line.</p>
 <h2>The three severity buckets</h2>
 ${conds('',[['Safety hazard','A risk to people — exposed wiring, missing GFCI/AFCI where required, a blocked flue, a trip hazard, no smoke alarms. Report plainly and recommend prompt correction.'],['Deferred maintenance / deferred-cost','Functional now, but neglected or near end of life — an aging roof, a 22-year-old furnace, peeling paint. The client should anticipate the upkeep or the foreseeable expense.'],['Cosmetic','A blemish that doesn\'t affect function or safety — a hairline tile crack, a scuffed wall. Note it with appropriate (low) weight.']])}
 <p>Severity is about <b>risk and urgency</b>, not the price tag — and definitely not whether to include the item. A cheap fix (a missing $2 GFCI) can be a serious safety hazard; an expensive one (a cosmetic re-paint) may be trivial. Your wording carries the weight.</p>
 <h2>Deferred-cost items: the foreseeable expense</h2>
 <p>A special, valuable kind of finding is the <b>deferred-cost item</b>: a component that works today but is clearly near the end of its service life. The roof that's "fine for now" at 23 years, the original 1990s water heater, the furnace past its expectancy. You don't price it — but you note the age and condition and the implication so the client can plan for the expense that's coming.</p>
 ${W('match','cat')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Report it all — weight it right</div><p>Analysis never means dropping small items. Every reportable deficiency goes in the report. Analysis means <b>conveying severity</b> through clear language and, where the form allows, a summary that surfaces the safety items — so a real hazard doesn't sit buried between two cosmetic notes.</p></div></div>
 ${story('Inspector in the house',`A report once buried "open ground at the panel — shock hazard" in the middle of a paragraph about a sticky window. The client skimmed past it. **A hazard you mention but don't elevate is a hazard you've half-reported.** Name safety findings plainly and put them where they\'ll be seen.`)}`,
 quiz:[
  {q:'Analyzing findings primarily means:',o:['Listing the cheapest repairs first','Sorting findings by severity — safety vs. deferred vs. cosmetic','Removing minor items','Estimating each cost'],a:1,e:'Analysis judges severity and urgency so the report conveys what matters — not cost, and not by omitting items.'},
  {q:'A missing $2 GFCI at a kitchen counter is:',o:['Cosmetic — it\'s cheap','A safety hazard, regardless of the low repair cost','Deferred maintenance only','Not reportable'],a:1,e:'Severity is about risk, not price. A cheap fix can still be a real safety hazard.'},
  {q:'A "deferred-cost item" is:',o:['A defect the seller deferred','A functional component near the end of its service life — a foreseeable future expense','A cosmetic blemish','A safety hazard needing immediate action'],a:1,e:'It works now but is aging out (old roof, old water heater). You note the condition and implication so the client can anticipate the cost.'},
  {q:'When analysis shows a finding is "only cosmetic," you:',o:['Leave it out of the report','Report it, with appropriately low weight','Mark it Deficient as a hazard','Estimate its repair cost'],a:1,e:'Report everything reportable; weight it correctly. Cosmetic items are noted, not dropped or overstated.'},
  {q:'The best way to keep a real safety hazard from being missed is to:',o:['Bury it among minor notes','State it plainly and elevate it (e.g., in a summary of safety items)','Skip the implication','Add a repair estimate'],a:1,e:'Name safety findings clearly and surface them so they aren\'t lost among cosmetic notes.'},
 ]},

/* ===== L5 PHOTOS & SCOPE ===== */
{id:'l5',kind:'Lesson 5',label:'Photos & Staying in Scope',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · Evidence and boundaries</span><h1>Photograph what you found — and report only what you inspected.</h1>
 <p class="lead">Two professional-practice habits protect every comment you write: <b>good photo documentation</b> backs your findings, and <b>staying inside the SOP scope</b> keeps you out of trouble. They're the evidence and the boundary of the report.</p>
 <h2>Photo documentation done right</h2>
 ${conds('',[['Clear and in focus','A blurry, dark photo documents nothing. The defect should be plainly visible.'],['In context','Show enough surroundings to locate the item — the valve and its discharge, not just a pipe floating in black.'],['Tied to the comment','Each key deficiency photo should connect to its written finding, ideally with a caption. The words carry the finding; the photo is the evidence.'],['Supplement, not substitute','A photo never replaces the comment. "See photo" is not a finding.']])}
 <div class="field brass"><div class="ic">${sv(ic.book)}</div><div><div class="t">The photo supports the words</div><p>Think of the photo as the exhibit and the comment as the testimony. A clear, captioned image of the cracked TPR discharge proves what your sentence already said. If a complaint ever lands, the comment plus the photo together are what defend you.</p></div></div>
 <h2>Staying within the SOP scope</h2>
 <p>The Standards of Practice define exactly what you inspect, how, and the limits. You report what's <b>visible and accessible</b> — and you document the limitations. When insulation, stored items, weather, or safety stop you, you say so: <em>what</em> you couldn't inspect and <em>why</em>.</p>
 <ul class="clean"><li><b>In scope:</b> observe accessible components, report deficiencies and implications, recommend qualified evaluation.</li><li><b>Out of scope:</b> repair-cost estimates, code-compliance rulings, value/price opinions, predicting future failures, dismantling or moving the owner\'s property.</li><li><b>Always documented:</b> any area or component you could not fully inspect, and the reason.</li></ul>
 ${W('sort','scope')}
 ${story('Inspector in the house',`On a rainy-day inspection the roof was wet and unsafe to walk, so the inspector noted "roof inspected from the eaves due to wet conditions." Months later, when a leak appeared, that one documented limitation ended the dispute. **What you couldn't inspect — and why — belongs in the report as much as what you could.**`)}`,
 quiz:[
  {q:'A defect photo in a report should:',o:['Replace the written comment','Support the comment — clear, in context, tied to the finding','Be a wide shot of the whole room','Be omitted to save space'],a:1,e:'Photos are evidence that supports the words; they never replace the written finding.'},
  {q:'"See photo" used as the entire finding is:',o:['Fine — the photo says it all','Inadequate — the comment must state the finding; the photo supports it','Best practice','Required by TREC'],a:1,e:'The words carry the finding. A photo supplements but cannot substitute for the comment.'},
  {q:'Which is OUTSIDE the home-inspection scope?',o:['Reporting a visible deficiency','Recommending qualified evaluation','Estimating the dollar cost to repair it','Documenting an access limitation'],a:2,e:'Cost estimating (along with code rulings and value opinions) is outside scope. You report conditions and refer out.'},
  {q:'When stored items block your access to a component, you should:',o:['Inspect from memory and mark it Inspected','Document the limitation — what you couldn\'t inspect and why','Ignore it','Void the inspection'],a:1,e:'Staying in scope means reporting limitations: state what was not inspected and the reason.'},
  {q:'The Standards of Practice (SOP) define:',o:['Repair prices','What to inspect, how, and the limits of the inspection','The market value of the home','The building code'],a:1,e:'The SOP sets scope and method — the boundary of the inspection and the report.'},
 ]},

/* ===== L6 DELIVERY, TIMELINESS & RECORDS ===== */
{id:'l6',kind:'Lesson 6',label:'Delivery, Timeliness & Records',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · Professional practice</span><h1>The work isn't done until the report is delivered — and filed.</h1>
 <p class="lead">A finished report still has to reach the client on time, in a usable form, and then live in your records. These professional-practice duties are unglamorous and routine — and they're where a lot of complaints and license issues actually start.</p>
 <h2>Delivery and timeliness</h2>
 ${conds('',[['Deliver per the agreement','The inspection agreement sets when and how the report is delivered. Deliver promptly and in the agreed format — a report sitting on your laptop helps no one against a closing deadline.'],['Deliver to the client','The report goes to your client (the person who engaged you). Releasing it to others is governed by the agreement and your obligations — don\'t hand it around casually.'],['Complete and consistent','Every line answered, every D commented, photos attached, pages intact. A delivered report missing pages is a delivery failure.']])}
 <h2>Recordkeeping and retention</h2>
 <p>Keep a copy of every report — and the supporting records — on file for the <b>required retention period</b>. If a question or claim surfaces months or years later, the report in your file is the record of what you actually observed and wrote. No file, no defense.</p>
 <ul class="clean"><li><b>Retain the report</b> and key documentation for the period your licensing rules require.</li><li><b>Keep it retrievable</b> — an organized, backed-up archive, not a shoebox.</li><li><b>Protect client information</b> — handle it professionally and confidentially.</li></ul>
 <div class="dgm"><svg viewBox="0 0 720 200">
   <g ${_gs}>
     <rect x="40" y="70" width="120" height="60" rx="6"/>${_mono(100,105,11,'Inspect','#2c4153')}
     <rect x="220" y="70" width="120" height="60" rx="6"/>${_mono(280,105,11,'Write','#2c4153')}
     <rect x="400" y="70" width="120" height="60" rx="6"/>${_mono(460,105,11,'Deliver','#2c4153')}
     <rect x="580" y="70" width="100" height="60" rx="6"/>${_mono(630,105,11,'Retain','#7f520a')}
   </g>
   <g stroke="#b85436" stroke-width="2.4" fill="none" stroke-linecap="round">
     <path d="M168 100 H 212"/><path d="M206 94 l8 6 l-8 6"/>
     <path d="M348 100 H 392"/><path d="M342 94 l8 6 l-8 6"/>
     <path d="M528 100 H 572"/><path d="M522 94 l8 6 l-8 6"/>
   </g>
   ${_mono(360,160,10,'the report\'s life doesn\'t end at delivery — it lives in your records','#7f520a')}
 </svg><div class="cap">The report's lifecycle: inspect, write, deliver on time — then retain it for the required period.</div></div>
 ${story('Inspector in the house',`Three years after an inspection, a buyer\'s attorney requested the file. The inspector pulled the dated, photo-backed report from the archive in minutes — and the matter closed. **Your records are your memory under oath.** Deliver on time, then keep the copy; the report you can\'t produce is the one that hurts you.`)}`,
 quiz:[
  {q:'When and how the report is delivered is primarily governed by:',o:['Whatever is convenient','The inspection agreement','The buyer\'s agent','The lender'],a:1,e:'The inspection agreement sets delivery terms; you deliver promptly and in the agreed form.'},
  {q:'After delivery, the inspector should:',o:['Delete the report to save space','Retain a copy and supporting records for the required period','Mail it to the seller','Post it publicly'],a:1,e:'Retention for the required period is a core duty — the file is your record of what you observed and wrote.'},
  {q:'A report delivered with missing pages is:',o:['Acceptable if the client is busy','A delivery failure — it must be complete and intact','Better, because it\'s shorter','Only a problem for the seller'],a:1,e:'Delivery means a complete, consistent report — every line answered, every D commented, all pages present.'},
  {q:'The main reason to retain reports on file is:',o:['To resell them','To have the record if a question or claim arises later','Because clients lose theirs','To pad the archive'],a:1,e:'A retained, dated, photo-backed report is the evidence of what you actually observed — your defense if a dispute surfaces.'},
 ]},

/* ===== L7 COMMUNICATION, LIABILITY & EXPECTATIONS ===== */
{id:'l7',kind:'Lesson 7',label:'Liability & Expectations',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Communication &amp; liability</span><h1>Most claims aren't about what you missed — they're about what they expected.</h1>
 <p class="lead">The last skill ties the whole section together: communicating clearly and managing the client\'s expectations. A client who understands what the inspection <em>is</em> — a snapshot of accessible conditions, not a guarantee — rarely becomes an angry call.</p>
 <h2>Set the expectation, in writing</h2>
 <p>The inspection agreement and the report itself should make the limits clear <b>before</b> they ever become a dispute. The report is:</p>
 <ul class="clean"><li><b>A one-day snapshot</b> — accessible conditions as they were on inspection day, not a prediction of the future.</li><li><b>Not a warranty or guarantee</b> — it doesn't promise nothing will fail after closing.</li><li><b>Limited to the visible and accessible</b> — with every limitation documented.</li><li><b>Not the same as a repair quote, appraisal, or code ruling</b> — those are other professionals\' jobs.</li></ul>
 <h2>How clear reporting limits liability</h2>
 <p>Your strongest protection isn't a disclaimer — it's <b>accurate, factual, in-scope reporting with documented limitations</b>. A finding written with item, condition, implication, and recommendation, backed by a photo, inside your scope, is one that holds up. Vague or over-reaching comments are the ones that come back.</p>
 ${conds('',[['Be factual, not opinionated','"Widespread granule loss observed," not "terrible roof." Facts are defensible; opinions invite argument.'],['Stay in scope','No cost estimates, no code rulings, no value opinions, no predictions of future failure.'],['Document every limitation','What you couldn\'t inspect and why — it protects the client and you.'],['Recommend, don\'t reassure','Refer to qualified professionals; never promise the home is problem-free or "fine."']])}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The inspector\'s through-line</div><p>Every finding, start to finish: <b>observe</b> the accessible condition, <b>analyze</b> its severity, <b>classify</b> it on the form (I/NI/NP/D), <b>comment</b> with item-condition-implication-recommendation, and <b>deliver</b> it on time — in scope, factual, and documented. Do that and the report defends itself.</p></div></div>
 ${story('Inspector in the house',`The angriest call most inspectors get starts with "but you said the house was fine." You never said that — but did the report make clear you couldn\'t? **The expectation you set in writing is the argument you don\'t have later.** Honest scope language up front turns a lawsuit into a phone call.`)}`,
 quiz:[
  {q:'Most client disputes arise from:',o:['Missed hidden defects','Mismatched expectations about what the inspection covers','Too many photos','Overly detailed comments'],a:1,e:'A client who understands the inspection is a one-day snapshot — not a guarantee — rarely becomes a dispute.'},
  {q:'A home inspection report is:',o:['A warranty against future defects','A snapshot of accessible conditions on inspection day','An insurance policy','A code-compliance certificate'],a:1,e:'It documents accessible conditions on one day; it is explicitly not a warranty, insurance, or certificate.'},
  {q:'The strongest protection against liability is:',o:['A long disclaimer','Accurate, factual, in-scope reporting with documented limitations','Reporting only major items','Reassuring the client the home is fine'],a:1,e:'Factual, in-scope findings with documented limitations hold up; vague or over-reaching comments are what come back.'},
  {q:'"The roof is terrible" is a weaker comment than "widespread granule loss observed" because:',o:['It\'s shorter','It\'s an opinion rather than a factual, defensible observation','It names the roof','It includes a recommendation'],a:1,e:'Factual, observable language is defensible; opinion-based language invites argument and liability.'},
  {q:'The inspector\'s through-line for the whole reporting process is:',o:['Estimate, certify, and guarantee','Observe, analyze, classify, comment, and deliver — in scope and documented','Grade the home and reassure the client','Cite code on every finding'],a:1,e:'Observe the condition, analyze severity, classify on the form, comment fully, deliver on time — factual, in-scope, and documented.'},
 ]},
