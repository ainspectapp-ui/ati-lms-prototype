<!-- ATI · Module III — Analysis of Findings & Reporting — full interactive section -->
<title>ATI · Module III — Analysis of Findings &amp; Reporting</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f2ea;--surf:#fffdf8;--surf-2:#faf7ef;--surf-3:#efeae0;
    --line:#e6e1d4;--line-2:#efeae0;--line-brass:rgba(197,129,42,.32);
    --ink:#21242b;--ink-2:#5b616b;--ink-3:#8b909a;
    --brass:#c5812a;--brass-2:#e0a043;--brass-deep:#9a6214;--brass-soft:#f4e7cd;
    --slate:#1f6f73;--slate-2:#2f8a8d;--slate-soft:#dde9e9;--slate-deep:#123f43;
    --pass:#2f7a4e;--pass-soft:#e2efe5;--fail:#bd4a31;--fail-soft:#f6e6df;
    --r:16px;--display:'Fraunces',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --sh-1:0 1px 2px rgba(25,28,34,.05),0 1px 3px rgba(25,28,34,.05);--sh-2:0 4px 14px rgba(25,28,34,.06),0 12px 32px rgba(25,28,34,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;background-image:radial-gradient(120% 80% at 88% -8%,rgba(197,129,42,.06),transparent 52%),radial-gradient(90% 60% at -8% 108%,rgba(31,111,115,.06),transparent 52%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--brass);color:#fff}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:11px;border:3px solid var(--bg)}

  .top{position:sticky;top:0;z-index:30;background:rgba(244,242,234,.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
  .top .row{max-width:1150px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:linear-gradient(150deg,var(--brass-2),var(--brass-deep));box-shadow:0 3px 12px rgba(168,109,16,.3),inset 0 1px 0 rgba(255,255,255,.35)}
  .mark svg{width:20px;height:20px;color:#fff}
  .top .tt{font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:-.01em;line-height:1.1}.top .tt b{color:var(--brass-deep)}
  .top .sub{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:2px}
  .top .prog{margin-left:auto;display:flex;align-items:center;gap:12px}
  .top .prog .bar{width:150px;height:7px;background:var(--surf-3);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .top .prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:7px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .top .prog .pc{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--brass-deep);min-width:34px;text-align:right}

  .wrap{max-width:1150px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start}
  .rail{position:sticky;top:88px;margin-top:28px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
  .rail .h{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);padding:0 8px 10px}
  .step{display:block;padding:9px 10px 9px 43px;border-radius:10px;width:100%;text-align:left;transition:.13s;color:var(--ink-2);font-size:12.5px;font-weight:500;position:relative}
  .step:hover{background:var(--surf-2)}
  .step.active{background:var(--surf);box-shadow:var(--sh-1);color:var(--ink)}
  .step.active::before{content:"";position:absolute;left:-8px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--brass)}
  .step .dot{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--bg);transition:.2s}
  .step.done .dot{background:var(--brass);border-color:var(--brass);color:#fff}.step.done .dot svg{width:11px;height:11px}
  .step .lbl{flex:1;line-height:1.2}
  .step .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);display:block;margin-top:1px}
  .step.locked{opacity:.42;pointer-events:none}

  .view{min-width:0;margin-top:28px;animation:rise .38s cubic-bezier(.2,.7,.2,1);padding-bottom:40px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:31px;letter-spacing:-.02em;line-height:1.08;margin:8px 0 0}
  h2{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.01em;margin:32px 0 10px}
  h3{font-family:var(--display);font-weight:700;font-size:16px;margin:24px 0 8px}
  p{font-size:15.5px;color:#33312a;margin-bottom:14px;line-height:1.74}
  p b,li b{color:var(--ink);font-weight:700}
  .lead{font-size:16.5px;color:var(--ink-2);margin-top:12px;max-width:64ch}
  ul.clean{list-style:none;margin:2px 0 16px}
  ul.clean li{font-size:14.5px;color:#33312a;padding-left:22px;position:relative;margin-bottom:9px;line-height:1.6}
  ul.clean li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:2px;background:var(--brass);transform:rotate(45deg)}
  ul.num{margin:0 0 16px 20px}ul.num li{font-size:14.5px;color:#33312a;margin-bottom:7px;line-height:1.6}

  .field{background:var(--slate-deep);color:#e9edf0;border-radius:13px;padding:18px 20px;margin:22px 0;display:flex;gap:14px}
  .field.brass{background:linear-gradient(135deg,#3a3526,#2c2818)}
  .field .ic{flex:none;color:var(--brass-2)}.field .ic svg{width:20px;height:20px}
  .field .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-bottom:5px}
  .field p{color:#c4cdd4;font-size:14px;margin:0 0 8px;line-height:1.65}.field p:last-child{margin-bottom:0}.field p b{color:#fff}

  .story{background:var(--surf);border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:0 13px 13px 0;padding:16px 19px;margin:22px 0;box-shadow:var(--sh-1)}
  .story .st{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .story .st svg{width:14px;height:14px}
  .story p{font-size:14.5px;color:#403d33;font-style:italic;margin:0;line-height:1.7}
  .story p b{font-style:normal}

  .loop{display:flex;align-items:stretch;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:18px 0 8px;box-shadow:var(--sh-1)}
  .loop .seg{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--line-2)}.loop .seg:last-child{border-right:none}
  .loop .seg .n{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.1em}
  .loop .seg .w{font-family:var(--display);font-weight:700;font-size:12.5px;margin-top:3px}
  .loop .seg.on{background:var(--brass-soft)}.loop .seg.on .w{color:var(--brass-deep)}

  .dgm{background:#bdb8a8;border:1px solid var(--line);border-radius:var(--r);padding:8px;margin:20px 0;box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .dgm::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.1) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
  .dgm svg{display:block;width:100%;height:auto;position:relative}
  .dgm .cap{position:relative;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--slate-deep);padding:4px 6px 8px}

  .defect{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--sh-1);margin:12px 0}
  .defect .dh{display:flex;align-items:center;gap:11px;margin-bottom:8px}
  .defect .dh .n{width:26px;height:26px;border-radius:8px;background:var(--fail-soft);color:var(--fail);display:grid;place-items:center;flex:none;font-family:var(--mono);font-weight:600;font-size:12px}
  .defect .dh .nm{font-family:var(--display);font-weight:700;font-size:15px}
  .defect p{font-size:14px;margin-bottom:9px}
  .defect .meta{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;align-items:start}
  .defect .meta .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding-top:3px;white-space:nowrap}
  .defect .meta .val{color:#33312a;line-height:1.5}
  .defect .rep{font-family:var(--mono);font-size:11px;background:var(--slate-soft);border-radius:8px;padding:8px 11px;color:var(--slate-deep);line-height:1.5;margin-top:8px}.defect .rep b{color:var(--slate-deep)}

  .pills{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
  .pill{font-family:var(--mono);font-size:11.5px;background:var(--surf);border:1px solid var(--line);color:var(--ink-2);padding:6px 12px;border-radius:20px}.pill b{color:var(--brass-deep)}
  .tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;background:var(--surf);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbl th{background:var(--slate-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:600}
  .tbl td{padding:9px 12px;border-top:1px solid var(--line-2);color:#33312a}
  .tbl td:first-child{font-family:var(--mono);font-weight:600;color:var(--brass-deep);white-space:nowrap}

  /* ---- quiz (multi-question) ---- */
  .quiz{background:var(--surf);border:1.5px solid var(--line-brass);border-radius:var(--r);padding:24px;margin:30px 0 0;box-shadow:var(--sh-1)}
  .quiz .qh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-deep);display:flex;align-items:center;gap:8px;margin-bottom:4px}.quiz .qh svg{width:15px;height:15px}
  .quiz .qt{font-family:var(--display);font-weight:700;font-size:18px}.quiz .qsub{font-size:13.5px;color:var(--ink-2);margin:4px 0 4px}
  .qblock{border-top:1px solid var(--line-2);padding-top:18px;margin-top:18px}.qblock:first-of-type{border-top:none;padding-top:14px}
  .qnum{font-family:var(--mono);font-size:11px;color:var(--brass-deep);font-weight:600;margin-bottom:6px}
  .q{font-family:var(--display);font-weight:600;font-size:15.5px;margin-bottom:13px;line-height:1.4}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.13s;font-size:14px;font-weight:500;background:var(--surf-2)}
  .opt:hover:not(.lk){border-color:var(--brass);background:var(--surf)}
  .opt .k{font-family:var(--mono);font-weight:600;width:23px;height:23px;border-radius:6px;background:var(--surf-3);display:grid;place-items:center;font-size:11px;flex:none;color:var(--ink-2)}
  .opt.correct{border-color:var(--pass);background:var(--pass-soft)}.opt.correct .k{background:var(--pass);color:#fff}
  .opt.wrong{border-color:var(--fail);background:var(--fail-soft)}.opt.wrong .k{background:var(--fail);color:#fff}
  .opt .mk{margin-left:auto}.opt .mk svg{width:16px;height:16px}.opt.lk{cursor:default}
  .exp{font-size:13px;color:var(--ink-2);line-height:1.62;padding:11px 13px;background:var(--surf-2);border-left:3px solid var(--brass);border-radius:0 9px 9px 0;margin-top:4px}.exp b{color:var(--ink)}
  .qscore{margin-top:20px;padding-top:18px;border-top:1px solid var(--line-2);font-family:var(--mono);font-size:13px;color:var(--ink-2);display:flex;align-items:center;gap:10px}.qscore svg{width:18px;height:18px;flex:none}.qscore b{font-size:15px}

  .foot{display:flex;align-items:center;gap:12px;margin:30px 0 10px;padding-top:22px;border-top:1px solid var(--line)}.foot .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s;font-family:var(--body)}.btn svg{width:16px;height:16px}
  .btn.brass{background:linear-gradient(150deg,var(--brass-2),var(--brass));color:#fff;box-shadow:0 5px 14px rgba(168,109,16,.28)}.btn.brass:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(168,109,16,.36)}
  .btn.brass:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:var(--surf);border:1px solid var(--line);color:var(--ink-2)}.btn.ghost:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn.slate{background:var(--slate);color:#fff}.btn.slate:hover{background:var(--slate-deep)}

  /* ---- WIDGETS ---- */
  .wlabel{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--brass);padding:4px 9px;border-radius:20px;display:inline-block;margin-bottom:6px}
  .wtitle{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:3px}
  .wsub{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
  .widget{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:24px 0;box-shadow:var(--sh-1)}

  .sd-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px}@media(max-width:760px){.sd-wrap{grid-template-columns:1fr}}
  .sd-stage{background:#bdb8a8;border:1px solid var(--line);border-radius:13px;padding:8px;position:relative;overflow:hidden}
  .sd-stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(44,65,83,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(44,65,83,.09) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
  .sd-stage svg{display:block;width:100%;height:auto;position:relative}
  .hot{cursor:pointer}.hot circle.zone{fill:transparent;stroke:transparent}
  .hot.found circle.zone{fill:rgba(61,125,80,.16);stroke:var(--pass);stroke-width:2.5;stroke-dasharray:4 3}
  .sd-side{display:flex;flex-direction:column;gap:11px}
  .sd-count{background:var(--slate-deep);color:#fff;border-radius:12px;padding:13px 15px;text-align:center}
  .sd-count .big{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1}.sd-count .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass-2);margin-top:5px}
  .sd-found{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
  .fcard{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--pass);border-radius:9px;padding:9px 11px;animation:pop .3s}@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .fcard .fn{font-family:var(--display);font-weight:700;font-size:13px;color:var(--pass)}.fcard .fd{font-size:12px;color:var(--ink-2);margin-top:2px;line-height:1.45}
  .sd-empty{font-size:12.5px;color:var(--ink-3);font-style:italic;text-align:center;padding:18px 8px}
  .sd-done{background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .gfi-stage{background:var(--slate-deep);border-radius:13px;padding:20px;position:relative;overflow:hidden;height:220px}
  .lane{position:absolute;left:120px;right:120px;height:3px;background:rgba(255,255,255,.18);border-radius:3px}.lane.hot{top:66px}.lane.neu{top:146px}
  .lane .lab{position:absolute;top:-19px;left:0;font-family:var(--mono);font-size:10px;color:#9fb0bd}
  .dot{position:absolute;width:9px;height:9px;border-radius:50%;top:-3px}
  .dot.h{background:var(--brass-2);animation:flowR 2.4s linear infinite}.dot.n{background:#7fa8c4;animation:flowL 2.4s linear infinite}
  @keyframes flowR{from{left:0}to{left:100%}}@keyframes flowL{from{left:100%}to{left:0}}
  .gbox{position:absolute;left:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center;text-align:center}
  .gbox .gt{font-family:var(--mono);font-size:10px;color:#fff}.gbox .gs{font-family:var(--mono);font-size:8px;color:#7fa8c4;margin-top:3px}
  .load{position:absolute;right:28px;top:66px;width:68px;height:80px;border:2px solid #9fb0bd;border-radius:8px;display:grid;place-items:center}.load .lt{font-family:var(--mono);font-size:10px;color:#fff}
  .leak{position:absolute;left:50%;top:69px;width:2px;height:88px;background:repeating-linear-gradient(180deg,var(--fail),var(--fail) 5px,transparent 5px,transparent 10px);opacity:0;transition:.3s}.leak.on{opacity:1}
  .person{position:absolute;left:calc(50% - 13px);top:160px;font-size:22px;opacity:0;transition:.3s}.person.on{opacity:1}
  .trip{position:absolute;inset:0;background:rgba(184,84,54,.92);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.3s}.trip.on{opacity:1}
  .trip .tw{text-align:center;color:#fff}.trip .tw .b{font-family:var(--display);font-weight:800;font-size:25px}.trip .tw .s{font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-top:6px;opacity:.9}
  .gfi-status{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}.gfi-status .pip{width:11px;height:11px;border-radius:50%;background:var(--pass)}.gfi-status.fault .pip{background:var(--fail)}
  .gfi-controls{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.gfi-read{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-top:10px}.gfi-read b{color:var(--brass-deep)}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.match{grid-template-columns:1fr}}
  .mcol{display:flex;flex-direction:column;gap:9px}.mcol .ch{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin-bottom:2px}
  .chip{padding:13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surf);font-family:var(--mono);font-weight:600;font-size:14px;text-align:center;transition:.13s;color:var(--ink)}
  .chip:hover:not(.locked){border-color:var(--brass)}.chip.sel{border-color:var(--brass);background:var(--brass-soft);color:var(--brass-deep)}
  .chip.locked{border-color:var(--pass);background:var(--pass-soft);color:var(--pass);cursor:default;opacity:.85}
  .chip.miss{border-color:var(--fail);background:var(--fail-soft);animation:shake .3s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .w-done{margin-top:14px;background:var(--pass-soft);border:1px solid var(--pass);border-radius:11px;padding:12px;text-align:center;font-size:13px;color:var(--pass);font-weight:600}

  .est{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.est{grid-template-columns:1fr}}
  .est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
  .est select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surf);font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .est-out{grid-column:1/-1;margin-top:4px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--surf);transition:.2s}
  .est-out.ok{border-color:var(--pass);background:var(--pass-soft)}.est-out.bad{border-color:var(--fail);background:var(--fail-soft)}

  match(el,k){const c=MATCH[k];const sh=a=>a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);let sel=null,locked=0;

/* ================= ENGINE ================= */
const KEY='ati_reporting_ix_v1';
let S={done:{},quiz:{},assessBest:0,cur:0};
async function load(){try{const r=await window.storage.get(KEY,false);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}S.done=S.done||{};S.quiz=S.quiz||{};}
async function save(){try{await window.storage.set(KEY,JSON.stringify(S),false);}catch(e){}}
const stepDone=i=>!!S.done[STEPS[i].id];
const pct=()=>Math.round(Object.keys(S.done).length/STEPS.length*100);
const unlocked=i=>i===0?true:stepDone(i-1);
const view=document.getElementById('view');
function updTop(){const p=pct();document.getElementById('pbar').style.width=p+'%';document.getElementById('ppc').textContent=p+'%';}
function rail(){document.getElementById('rail').innerHTML=STEPS.map((s,i)=>{const d=stepDone(i),u=unlocked(i),a=i===S.cur;return `<button class="step ${d?'done':''} ${a?'active':''} ${u?'':'locked'}" ${u?`onclick="goStep(${i})"`:''}><span class="dot">${d?sv(ic.check,3):(i+1)}</span><span class="lbl">${s.label}<span class="kind">${s.kind}</span></span></button>`;}).join('');}
function goStep(i){if(!unlocked(i))return;S.cur=i;save();render();window.scrollTo({top:0,behavior:'smooth'});}
function markDoneAndNext(){S.done[STEPS[S.cur].id]=true;save();updTop();rail();if(S.cur<STEPS.length-1)goStep(S.cur+1);else render();}
function render(){updTop();rail();const s=STEPS[S.cur];({lesson:renderLesson,scenario:renderScenarios,assess:renderAssess,glossary:renderGlossary,source:renderSource}[s.type])(s);}
function navFoot(label,gated){const last=S.cur===STEPS.length-1;return `<div class="foot">${S.cur>0?`<button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button>`:''}<div class="sp"></div><button class="btn brass" id="nextBtn" ${gated?'disabled':''} onclick="markDoneAndNext()">${label||(last?'Finish section':'Mark complete & continue')} ${sv(ic.arrow)}</button></div>`;}

function renderLesson(s){
  let h=(typeof s.body==='function'?s.body():s.body);
  if(s.quiz&&s.quiz.length){
    h+=`<div class="quiz"><div class="qh">${sv(ic.brain)} Check your understanding</div><div class="qt">${s.label}</div><div class="qsub">${s.quiz.length} questions covering the lesson — answer each to see the reasoning.</div><div class="qbody">${
      s.quiz.map((q,qi)=>`<div class="qblock"><div class="qnum">Question ${qi+1} of ${s.quiz.length}</div><div class="q">${q.q}</div><div class="opts" data-qi="${qi}">${q.o.map((o,k)=>`<button class="opt" onclick="qAns(${qi},${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="qexp" data-qi="${qi}"></div></div>`).join('')
    }</div><div class="qscore" style="display:none"></div></div>`;
  }
  const gated=!!(s.quiz&&s.quiz.length&&!S.quiz[s.id]);
  view.innerHTML=h+navFoot(null,gated);
  wireWidgets(view);
  window._ql={answered:{},total:s.quiz?s.quiz.length:0};
}
function qAns(qi,k){const s=STEPS[S.cur],q=s.quiz[qi];if(window._ql.answered[qi]!==undefined)return;window._ql.answered[qi]=k;
  const opts=view.querySelector('.opts[data-qi="'+qi+'"]');opts.querySelectorAll('.opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});
  view.querySelector('.qexp[data-qi="'+qi+'"]').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;
  if(Object.keys(window._ql.answered).length===window._ql.total){
    const right=s.quiz.filter((q,i)=>window._ql.answered[i]===q.a).length,sc=view.querySelector('.qscore');sc.style.display='flex';
    sc.innerHTML=`${sv(ic.check,2.4)}<span>You scored <b style="color:${right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)'}">${right}/${s.quiz.length}</b> on this lesson.</span>`;
    sc.querySelector('svg').style.color=right>=Math.ceil(s.quiz.length*0.8)?'var(--pass)':'var(--fail)';
    S.quiz[s.id]=true;save();const b=document.getElementById('nextBtn');if(b)b.disabled=false;}
}

let SC={i:0,answered:false};
function renderScenarios(){SC={i:0,answered:false};paintScen();}
function paintScen(){const sc=SCEN[SC.i];view.innerHTML=`<span class="eyebrow">Apply it · Inspector's Call</span><h1>Make the call</h1><p class="lead">The decisions you'll actually make standing in front of the system. Read it, choose, see the reasoning.</p><div class="scount mono">Scenario ${SC.i+1} of ${SCEN.length}</div><div class="scen"><div class="sh"><div class="t">${sc.t}</div><div class="n">${sc.n}</div></div><div class="body"><div class="situation">${sc.s}</div><div class="ask">${sc.ask}</div><div class="scopts">${sc.o.map((o,k)=>`<button class="opt" onclick="scAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="scexp"></div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><div class="scnext"></div></div>`;}
function scAns(k){if(SC.answered)return;SC.answered=true;const sc=SCEN[SC.i];view.querySelectorAll('.scopts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===sc.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.scexp').innerHTML=`<div class="exp"><b>${k===sc.a?'Right call.':'Here\'s the call:'}</b> ${sc.e}</div>`;const last=SC.i===SCEN.length-1;view.querySelector('.scnext').innerHTML=`<button class="btn brass" onclick="${last?'markDoneAndNext()':'scNext()'}">${last?'Mark complete & continue':'Next scenario'} ${sv(ic.arrow)}</button>`;}
function scNext(){SC.i++;SC.answered=false;paintScen();window.scrollTo({top:0,behavior:'smooth'});}

let AS=null;
function renderAssess(){if(!AS||AS.done)AS={i:0,answers:[],done:false};view.innerHTML=`<span class="eyebrow">Assessment</span><h1>Mastery check — Analysis of Findings &amp; Reporting</h1><p class="lead">${ASSESS.length} application questions across the whole chapter. 80% to pass; reasoning shown on every answer.</p><div class="panelcard" style="text-align:left;padding:0;overflow:hidden"><div style="background:linear-gradient(120deg,#1f6f73,#123f43);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-2)">Analysis of Findings &amp; Reporting</div><div style="font-family:var(--display);font-weight:700;font-size:17px;margin-top:3px">${ASSESS.length} questions · 80% to pass</div></div><div style="color:var(--brass-2)">${sv(ic.award)}</div></div><div style="padding:26px 22px;text-align:center">${S.assessBest?`<div class="mono" style="font-size:13px;color:var(--ink-2);margin-bottom:16px">Best score: <b style="color:${S.assessBest>=80?'var(--pass)':'var(--fail)'}">${S.assessBest}%</b></div>`:''}<button class="btn brass" style="margin:0 auto" onclick="asStart()">${S.assessBest?'Retake assessment':'Begin assessment'} ${sv(ic.arrow)}</button></div></div>`;}
function asStart(){AS={i:0,answers:[],done:false};asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asPaint(){const q=ASSESS[AS.i];view.innerHTML=`<span class="eyebrow">Assessment · Reporting</span><h1 style="font-size:24px">Question ${AS.i+1} <span style="color:var(--ink-3)">/ ${ASSESS.length}</span></h1><div style="margin:14px 0 0"><div style="width:100%;height:6px;background:var(--surf-3);border-radius:6px;overflow:hidden;border:1px solid var(--line)"><i style="display:block;height:100%;width:${AS.i/ASSESS.length*100}%;background:var(--brass)"></i></div></div><div class="quiz" style="border-color:var(--line);margin-top:22px"><div class="q">${q.q}</div><div class="opts">${q.o.map((o,k)=>`<button class="opt" onclick="asAns(${k})"><span class="k">${'ABCD'[k]}</span>${o}<span class="mk"></span></button>`).join('')}</div><div class="asexp"></div></div><div class="foot"><div class="sp"></div><div class="asnext"></div></div>`;}
function asAns(k){if(AS.answers[AS.i]!==undefined)return;AS.answers[AS.i]=k;const q=ASSESS[AS.i];view.querySelectorAll('.opts .opt').forEach((el,idx)=>{el.classList.add('lk');if(idx===q.a){el.classList.add('correct');el.querySelector('.mk').innerHTML=sv(ic.check,2.6);}else if(idx===k){el.classList.add('wrong');el.querySelector('.mk').innerHTML=sv(ic.x,2.6);}});view.querySelector('.asexp').innerHTML=`<div class="exp"><b>${k===q.a?'Correct.':'Review:'}</b> ${q.e}</div>`;const last=AS.i===ASSESS.length-1;view.querySelector('.asnext').innerHTML=`<button class="btn brass" onclick="${last?'asFinish()':'asNext()'}">${last?'See results':'Next'} ${sv(ic.arrow)}</button>`;}
function asNext(){AS.i++;asPaint();window.scrollTo({top:0,behavior:'smooth'});}
function asFinish(){const correct=AS.answers.filter((a,i)=>a===ASSESS[i].a).length,p=Math.round(correct/ASSESS.length*100),pass=p>=80;S.assessBest=Math.max(S.assessBest||0,p);AS.done=true;if(pass)S.done['assess']=true;save();updTop();rail();const circ=2*Math.PI*62;
  view.innerHTML=`<span class="eyebrow">Assessment · Result</span><h1 style="margin-bottom:18px">${pass?'Section mastered':'Not quite there'}</h1><div class="panelcard"><div class="ring"><svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)"><circle cx="75" cy="75" r="62" fill="none" stroke="var(--surf-3)" stroke-width="11"/><circle cx="75" cy="75" r="62" fill="none" stroke="${pass?'var(--pass)':'var(--fail)'}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"><animate attributeName="stroke-dashoffset" from="${circ}" to="${circ-circ*p/100}" dur=".8s" fill="freeze" calcMode="spline" keySplines=".2 .7 .2 1"/></circle></svg><div class="rv"><div><div class="n" style="color:${pass?'var(--pass)':'var(--fail)'}">${p}%</div><div class="p">${correct}/${ASSESS.length} correct</div></div></div></div><span class="verdict ${pass?'pass':'fail'}">${pass?'Passed':'Below 80%'}</span><p>${pass?'You\'ve mastered Analysis of Findings &amp; Reporting — naming the item, condition, implication, and recommendation in clear, defensible language is the craft that turns a good inspection into a good report.':'You need 80% to pass. Revisit the lessons and explanations, then retake — your best score counts.'}</p><div style="display:flex;gap:12px;justify-content:center"><button class="btn ghost" onclick="asStart()">${sv(ic.retake)} Retake</button>${pass?`<button class="btn brass" onclick="goStep(${STEPS.length-1})">Continue ${sv(ic.arrow)}</button>`:`<button class="btn brass" onclick="goStep(1)">Review lessons ${sv(ic.arrow)}</button>`}</div></div><div style="height:30px"></div>`;}

function renderGlossary(){view.innerHTML=`<span class="eyebrow">Reference</span><h1>Reporting glossary</h1><p class="lead">Every key term in one place — quick reference for a real inspection.</p><div class="gloss" style="margin-top:20px">${GLOSSARY.map(([w,d])=>`<div class="term"><div class="tw">${w}</div><div class="td">${d}</div></div>`).join('')}</div>${navFoot('Continue')}`;}
function renderSource(){view.innerHTML=`<span class="eyebrow">Reference · wrap-up</span><h1>Field reference &amp; section recap</h1><p class="lead">Everything required is taught in the lessons above. This is the one-screen recap to carry into the field — the TREC report form, the four-part comment, and the practice that keeps a report clear and defensible.</p><div class="srcnote">${sv(ic.book,2)} Built on the TREC <i>Standards of Practice</i> (22 TAC §535.227–.233) and the mandatory <b>Property Inspection Report Form REI 7-6</b>, alongside the reporting chapters of <i>Principles of Home Inspection: Systems and Standards</i>. There's no separate PDF for this section — the interactive lessons are the complete reference.</div><div class="gloss" style="margin-top:18px"><div class="term"><div class="tw">1 · The form — REI 7-6 is mandatory</div><div class="td">Every TREC inspection is reported on the standard form. Each item gets an I / NI / NP / D box — <b>Inspected, Not Inspected, Not Present, Deficient</b> — and every box checked <b>D</b> must carry a written comment.</div></div><div class="term"><div class="tw">2 · The comment — four parts, every time</div><div class="td">Name the <b>item</b> and <b>location</b>, the <b>observed condition</b>, the <b>implication</b> (why it matters), and a <b>recommendation</b> (evaluate / repair / replace by a qualified contractor). No repair cost; no code citations beyond your scope.</div></div><div class="term"><div class="tw">3 · The analysis — sort what you found</div><div class="td">Separate <b>safety hazards</b> (report plainly, recommend prompt correction) from <b>deferred-maintenance / deferred-cost</b> items (aging, near end of life) from <b>cosmetic</b> notes. Severity drives how you write it, not whether you write it.</div></div><div class="term"><div class="tw">4 · The evidence — photos &amp; scope</div><div class="td">Photograph each deficiency in context; the photo supports the comment, it doesn't replace it. Stay inside the SOP — report what's <em>visible and accessible</em>, and state where access, weather, or stored items limited the inspection.</div></div><div class="term"><div class="tw">Delivery, records &amp; expectations</div><div class="td">Deliver the report promptly per your agreement; keep a copy on file for the required retention period. The report is a snapshot of accessible conditions on one day — not a warranty, guarantee, or insurance policy. Manage that expectation in writing.</div></div></div><div class="foot"><button class="btn ghost" onclick="goStep(${S.cur-1})">${sv(ic.back)} Back</button><div class="sp"></div><a class="btn slate" href="index.html" style="text-decoration:none;margin-right:10px">${sv(ic.back)} Module III</a><button class="btn brass" onclick="finishAll()">${sv(ic.check)} Complete section</button></div>`;}
function finishAll(){S.done['source']=true;save();updTop();rail();toast('Analysis of Findings & Reporting section complete');}
let tT;function toast(m){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);}

/* ================= DATA: scenarios / assessment / glossary ================= */
const SCEN=[
 {t:'Wording the comment',n:'"Roof is bad"',s:'A new inspector\'s draft comment for the roof covering reads, in full: "Roof is bad, needs work."',ask:'What\'s wrong with this comment, and how do you fix it?',o:['Nothing — it tells the client to get the roof looked at','It\'s a conclusion with no facts: no item detail, no location, no observed condition, no implication, and a vague recommendation. Rewrite naming the material, the specific condition observed, why it matters, and a recommendation to evaluate/repair.','Add the estimated repair cost so the client can budget','Add the building-code section the roof violates'],a:1,e:'A defensible comment names the item, location, and the observed condition, then the implication and a recommendation. "Roof is bad" is an opinion the client can\'t act on or verify. You don\'t add a dollar estimate or cite code beyond your scope — you describe what you saw and recommend qualified evaluation.'},
 {t:'Choosing the box',n:'I, NI, NP, or D?',s:'The home has no fireplace or chimney of any kind. On the TREC report form there is a line item for "Fireplaces and Chimneys."',ask:'Which box do you check?',o:['Leave it blank — it doesn\'t apply','Inspected (I)','Not Present (NP)','Deficient (D)'],a:2,e:'When a listed component simply isn\'t in the home, you check Not Present (NP). "Not Inspected" (NI) is for a present item you couldn\'t inspect (and you must say why). Leaving it blank is never an option on the TREC form — every line gets a box.'},
 {t:'Severity sorting',n:'Two ways out',s:'You find (a) an open, energized junction box with exposed wire splices in the attic, and (b) a faucet in the hall bath with a slow drip at the handle.',ask:'How should the report treat these two findings?',o:['Both are simply "Deficient" — list them together with equal weight','Both are Deficient, but write the open junction box plainly as a safety hazard recommending prompt correction by a qualified electrician, while the dripping faucet is a minor/maintenance repair — severity shapes the wording','Only the junction box goes in the report; the faucet is too small','Estimate the repair cost of each so the client can prioritize'],a:1,e:'Both are deficiencies and both belong in the report, but analysis means conveying severity. Name the safety hazard clearly and recommend prompt correction; the minor leak is reported too, but as routine maintenance. You sort by severity — you don\'t omit small items or rank them by a cost you\'re not allowed to estimate.'},
 {t:'Staying in scope',n:'The client asks the dollar question',s:'On site, the buyer points at a 22-year-old furnace you\'ve reported as near the end of its service life and asks, "So what will a new one run me?"',ask:'How do you handle it in the report and on site?',o:['Write "$6,000–$8,000 for replacement" in the report so they have a number','Report the observed age/condition and the implication, and recommend evaluation/replacement by a qualified HVAC contractor — you decline to estimate cost, which is outside the inspection scope','Tell them it\'s not your job and refuse to discuss it','Cite the mechanical code chapter that governs furnace replacement'],a:1,e:'Repair-cost estimating is outside the home-inspection scope and creates liability. Report what you observed (age, condition, implication) and recommend a qualified contractor evaluate and quote. You can verbally acknowledge the question, but the report points them to the right professional — it doesn\'t put a price in writing.'},
 {t:'Documenting access limits',n:'The blocked panel',s:'The electrical panel is completely boxed in by the seller\'s stacked storage shelving; you can\'t safely remove the cover or reach it.',ask:'What does the report say?',o:['Check Inspected (I) and write your usual panel comment from memory','Check Not Inspected (NI) and state that storage blocked safe access to the panel, recommending it be made accessible and inspected','Skip the line and tell the client verbally','Check Deficient (D) because you couldn\'t inspect it'],a:1,e:'A present component you could not inspect is Not Inspected (NI) — and the SOP requires you to say why. Document the limitation ("access obstructed by storage"), recommend the item be made accessible and inspected, and protect both the client and yourself. You never report on something you didn\'t actually observe.'},
 {t:'Photo documentation',n:'One blurry photo, no caption',s:'Your report flags a deficient water heater TPR-valve discharge that terminates too high off the floor. The only image is a dark, zoomed-out shot of the whole utility closet with no caption.',ask:'What\'s the reporting weakness?',o:['Nothing — there\'s a photo, so it\'s documented','The photo doesn\'t support the specific comment: it lacks context and clarity tying it to the named deficiency. Add a clear, captioned photo showing the valve and discharge, but keep the written comment as the primary record','Delete the photo — comments are enough on their own','Add five more photos of the closet to be safe'],a:1,e:'Photos support a comment; they don\'t replace it. A useful defect photo is clear, shows the item in context, and is tied to the written finding (ideally captioned). The words carry the finding — the image is the evidence that backs them up.'},
 {t:'Managing expectations',n:'"You said the roof was fine"',s:'Four months after closing, a client calls angry about a roof leak; your report had checked the roof "Inspected" with no deficiencies noted, and it had rained for two days before the inspection so you noted you inspected from the eaves.',ask:'What protects you here — and what should the report have made clear?',o:['Nothing — if it leaks, the inspection was wrong','The report is a snapshot of accessible conditions on inspection day, not a warranty; the documented limitation (wet roof, inspected from the eaves) and clear scope language manage exactly this expectation','Promise to pay for the repair to keep the client happy','Tell the client roofs always leak eventually'],a:1,e:'A home inspection reports the accessible condition on one day; it is not a warranty or guarantee of future performance. Clearly stating scope and documenting limitations (you inspected from the eaves because the roof was wet) is what manages the client\'s expectation and limits liability. Honest, well-documented limits are your protection.'},
];
const ASSESS=[
 {q:'The fundamental purpose of the home inspection report is to:',o:['Estimate repair costs so the buyer can negotiate','Communicate the inspector\'s observations of accessible conditions and their implications in writing','Certify the home is safe and code-compliant','Guarantee the home against future defects'],a:1,e:'The report communicates what was observed and why it matters. It is not a cost estimate, a code certification, or a warranty.'},
 {q:'In Texas, an inspection performed for a real estate transaction must be reported on:',o:['Any format the inspector prefers','The TREC Property Inspection Report Form REI 7-6','A one-page summary letter','The buyer\'s mortgage lender form'],a:1,e:'TREC requires the standard Property Inspection Report Form (REI 7-6). Its format and content are mandatory, not optional.'},
 {q:'On the TREC report form, the four checkbox choices for each item are:',o:['Pass, Fail, Marginal, N/A','Excellent, Good, Fair, Poor','Inspected, Not Inspected, Not Present, Deficient','Yes, No, Maybe, Later'],a:2,e:'I / NI / NP / D — Inspected, Not Inspected, Not Present, Deficient. There is no "good/fair/poor" rating system on the TREC form.'},
 {q:'A component is present in the home but you could not safely access it. You check:',o:['Inspected (I)','Not Inspected (NI), and state why','Not Present (NP)','Deficient (D)'],a:1,e:'A present item you couldn\'t inspect is Not Inspected (NI) — and the SOP requires you to explain the reason for the limitation.'},
 {q:'The home has no water-softener loop of any kind. The correct box is:',o:['Inspected (I)','Not Inspected (NI)','Not Present (NP)','Leave it blank'],a:2,e:'When a listed component is simply absent, the answer is Not Present (NP). Blank is never acceptable on the TREC form — every line gets a response.'},
 {q:'A clear, defensible deficiency comment should include all of these EXCEPT:',o:['The item and its location','The observed condition','The implication and a recommendation','A specific repair-cost estimate'],a:3,e:'Name the item, location, observed condition, implication, and recommendation. You do NOT estimate repair cost — that\'s outside the inspection scope.'},
 {q:'Which comment is the most defensible?',o:['"Roof needs work."','"Roof is in poor condition — replace it."','"Composition shingles on the south slope show widespread granule loss and curling; this shortens remaining service life and risks leaks. Recommend evaluation by a qualified roofer."','"Roof violates code section R905 — fix immediately."'],a:2,e:'It names the item, location, observed condition, implication, and a recommendation, without estimating cost or citing code beyond scope. The others are vague conclusions or step outside scope.'},
 {q:'When you write a recommendation in a deficiency comment, the appropriate action is to:',o:['Tell the client exactly how to repair it themselves','Recommend evaluation/repair/replacement by a qualified, licensed contractor in that trade','State that no further action is needed','Provide the name of a contractor you partner with'],a:1,e:'Refer to the right qualified professional. You report the deficiency and recommend qualified evaluation or correction — you don\'t prescribe the repair method or self-refer.'},
 {q:'Citing specific building-code sections in your comments is generally:',o:['Required on every deficiency','Beyond the home-inspection scope and best avoided','The only way to be defensible','Mandatory under the TREC SOP'],a:1,e:'Home inspectors report deficiencies against the SOP, not code compliance. Quoting code beyond your scope invites liability and is outside the inspection\'s purpose.'},
 {q:'Analyzing findings means primarily distinguishing:',o:['Cheap repairs from expensive ones','Safety hazards from deferred maintenance from cosmetic items','Interior defects from exterior defects','New construction from old construction'],a:1,e:'Severity analysis sorts findings by risk and urgency — safety hazard vs. deferred-maintenance/deferred-cost vs. cosmetic — which shapes how plainly and urgently you write them.'},
 {q:'A "deferred-cost" item in a report is best described as:',o:['A defect the seller deferred fixing','A component that is functional now but aging or near the end of its service life, signaling a foreseeable future expense','A cosmetic blemish with no cost','A safety hazard requiring immediate action'],a:1,e:'Deferred-cost items work today but are near end of life (an old roof, an aging water heater). You note the condition and implication so the client can anticipate the expense.'},
 {q:'A photograph in an inspection report should:',o:['Replace the written comment entirely','Support and document the written comment, ideally in context and captioned','Be omitted to keep the file small','Show only wide shots of each room'],a:1,e:'Photos are evidence that supports the words — they don\'t replace the comment. A useful defect photo is clear, in context, and tied to the finding.'},
 {q:'If insulation, stored items, or weather prevent you from inspecting part of the home, you must:',o:['Inspect it anyway and report from memory','Report the limitation — note what you could not inspect and why','Ignore it; limitations don\'t belong in the report','Mark the whole inspection void'],a:1,e:'Staying in scope means documenting limitations. State what was not inspected and the reason — it protects the client and you.'},
 {q:'Regarding report delivery and recordkeeping, the inspector should:',o:['Deliver whenever convenient and discard the file after delivery','Deliver promptly per the agreement and retain a copy of the report for the required period','Deliver only verbally to avoid a paper trail','Let the client write the final report'],a:1,e:'Timely delivery per the inspection agreement and retaining the report on file for the required retention period are core professional-practice duties.'},
 {q:'A home inspection report is best understood as:',o:['A warranty guaranteeing the home for one year','An insurance policy against defects','A snapshot of accessible conditions on the day of inspection — not a guarantee of future performance','A code-compliance certificate'],a:2,e:'It documents accessible conditions on one day. It is not a warranty, guarantee, or insurance policy — making that clear manages client expectations and limits liability.'},
 {q:'The single best way to limit liability and manage client expectations is to:',o:['Report only major defects and skip the small ones','Write clear, factual, well-scoped comments and document every limitation','Avoid recommending further evaluation','Promise the client the home is problem-free'],a:1,e:'Accurate, factual, in-scope reporting with documented limitations is the inspector\'s strongest protection — and it sets honest expectations for the client.'},
];
const GLOSSARY=[
 ['Inspection report','The written record of the inspector\'s observations of accessible conditions and their implications — the deliverable of the inspection.'],
 ['REI 7-6','The TREC Property Inspection Report Form — the mandatory format for inspections in a Texas real estate transaction.'],
 ['TREC','Texas Real Estate Commission — the agency that licenses inspectors and sets the Standards of Practice and report form.'],
 ['Standards of Practice (SOP)','The minimum scope and method an inspector must follow (22 TAC §535.227–.233) — what to inspect, what to report, and the limits.'],
 ['Inspected (I)','The form box meaning the component was present and inspected; check any related deficiency separately.'],
 ['Not Inspected (NI)','A present component the inspector did not inspect — the reason for the limitation must be stated.'],
 ['Not Present (NP)','The listed component does not exist in this home.'],
 ['Deficient (D)','A condition that, in the inspector\'s judgment, adversely affects function or is a hazard; every D requires a written comment.'],
 ['Deficiency','A reportable defect, hazard, or condition that does not perform as intended — what the D box and the comment describe.'],
 ['Deficiency comment','The written finding for a D item: the item, location, observed condition, implication, and recommendation.'],
 ['Implication','The "why it matters" part of a comment — the consequence of the observed condition for safety, function, or cost.'],
 ['Recommendation','The suggested next step — typically evaluation, repair, or replacement by a qualified, licensed contractor.'],
 ['Safety hazard','A finding that poses a risk to people — reported plainly with a recommendation for prompt correction.'],
 ['Deferred maintenance','Upkeep that has been put off; a functional but neglected condition the client should address.'],
 ['Deferred-cost item','A component working now but near the end of its service life — a foreseeable future expense to flag.'],
 ['Cosmetic item','A blemish that doesn\'t affect function or safety; noted with appropriate (low) weight.'],
 ['Scope of inspection','The boundary of what the inspection covers — visible and accessible components, per the SOP; everything else is excluded.'],
 ['Limitation','A documented reason a component or area could not be fully inspected (access, weather, stored items, safety).'],
 ['Visible and accessible','The standard for what an inspector reports — conditions that can be seen and safely reached on inspection day.'],
 ['Photo documentation','Clear, in-context (ideally captioned) images that support — but do not replace — the written comments.'],
 ['Report delivery','Providing the completed report to the client, promptly and per the inspection agreement.'],
 ['Recordkeeping / retention','Keeping a copy of the report and related records on file for the required retention period.'],

 ['Liability','The inspector\'s legal exposure for errors or omissions — limited by accurate, in-scope reporting and documented limitations.'],
 ['Managing expectations','Making clear, in writing, that the report is a one-day snapshot — not a warranty, guarantee, or insurance policy.'],
