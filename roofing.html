/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'The roof system',type:'lesson',
 body:()=>`<span class="eyebrow">Roofing &amp; Attic · Orientation</span><h1>The first line of defense — and the most expensive thing to get wrong.</h1>
 <p class="lead">The roof keeps water out of everything below it, and a roof problem rarely stays a roof problem. Your job isn't to certify how many years are left or to re-roof anything. It's to <b>observe what's accessible, recognize what's deficient, and report the implication</b> so your client can decide.</p>
 <p>A roof inspection is really five jobs, and every finding in this section belongs to one of them:</p>
 <ul class="num"><li><b>Covering</b> — the material that sheds water, and how worn it is.</li><li><b>Flashing</b> — the metal at transitions; the <em>#1 leak source</em>.</li><li><b>Drainage</b> — gutters and downspouts carrying water away.</li><li><b>Structure</b> — rafters, trusses, ties, and decking holding shape.</li><li><b>The attic</b> — the underside truth: leaks, framing, and decking.</li></ul>
 <p>Keep those five jobs separate and you can read any roof — from a 3-tab tract house to a slate-and-copper original — the same disciplined way.</p>
 <p>Every component runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>What you'll inspect</h2>
 <ul class="clean"><li><b>Roof covering</b> — type, age, condition, and layers</li><li><b>Flashing</b> — valleys, walls, chimney, and penetrations</li><li><b>Drainage</b> — gutters, downspouts, and discharge</li><li><b>Roof structure</b> — rafters/trusses, ties, sheathing, and sag</li><li><b>The attic</b> — framing, leak staining, and decking condition</li><li><b>Method &amp; SOP limits</b> — walked vs. from the eaves/ladder/binoculars</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Safety &amp; scope</div><p>Falls are the inspector's biggest hazard. Walk a roof only when it's <b>safe, dry, and won't be damaged</b> by your weight — never a wet, steep, brittle, or deteriorated roof. When you can't walk it, inspect from the <b>eaves, a ladder, or with binoculars</b>, and <b>say so in the report</b>. You report what's visible and accessible, and note where you couldn't see.</p></div></div>`,
 quiz:[
  {q:'The inspector\'s role with the roof is to:',o:['Certify the exact years of remaining life','Observe accessible conditions, recognize deficiencies, and report the implications','Re-roof or repair what\'s found','Guarantee the roof against leaks'],a:1,e:'Observe and report — material, condition, and implications. You don\'t certify remaining life, repair, or guarantee.'},
  {q:'Across the whole roof, the most common source of leaks is:',o:['The open field of the covering','Flashing at transitions and penetrations','The ridge board','The drip edge'],a:1,e:'Most leaks begin at flashing — valleys, walls, chimneys, and pipe/vent boots — not in the field of the shingles.'},
  {q:'When a roof is wet, steep, or brittle and unsafe to walk, you should:',o:['Walk it anyway to be thorough','Inspect from the eaves, a ladder, or with binoculars and report the method and limitation','Skip the roof and say nothing','Certify it as defect-free'],a:1,e:'Safety governs method. Inspect from below, report what you could and couldn\'t see, and state the limitation.'},
  {q:'The attic is valuable on a roof inspection because it:',o:['Is required to be finished','Shows the underside truth — leak staining, framing, and decking condition','Replaces inspecting the covering','Is where the gutters connect'],a:1,e:'From inside you read leaks, framing, and decking that the finished surface hides — the underside tells the truth.'},
 ]},

/* ===== L1 ROOF COVERINGS ===== */
{id:'l1',kind:'Lesson 1',label:'Covering Materials & Life',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · What's on top</span><h1>Name the covering, and you already know what to look for.</h1>
 <p class="lead">Every roof covering wears out a different way and on a different clock. You won't specify a roof, but you have to identify what's there, judge it against typical service life, and report what's failing.</p>
 <h2>The families you'll see</h2>
 ${conds('',[['Asphalt / composition shingle','By far the most common. 3-tab (flat) or architectural/laminated (dimensional, longer-lived). Wears by losing granules, curling, cupping, and shedding tabs. ~15–25 yr.'],['Wood shake / shingle','Split (shake) or sawn (shingle) cedar. Fails by curling, splitting, and going missing; moss decays shaded slopes. ~20–40 yr.'],['Clay &amp; concrete tile','Heavy and long-lived (50+ yr) — but the underlayment beneath fails first. Broken and slipped tiles are the write-ups.'],['Metal','Standing-seam or panels/shingles, 40–60 yr. Watch loose/exposed fasteners, rust, and seam failures, not field wear.'],['Slate','Natural stone, 75–100+ yr but brittle. Broken/missing slates and failed fasteners ("nail sickness") are the findings.'],['Roll &amp; built-up (flat/low-slope)','Roll roofing and tar-and-gravel BUR. Short-lived; look at seams, blisters, alligatoring, exposed nails, and ponding.']])}
 ${W('era','cover')}
 <h2>Reading age and condition</h2>
 <p>You don't certify remaining life — you describe condition and judge it against the typical clock. <b>Granules</b> are the giveaway on asphalt: they shield the asphalt from UV, so bald spots and a gutter full of granules mean the roof is aging out. <b>Curling and cupping</b> say the same. The point is the implication: a roof at or past service life is a near-term replacement your client should budget for.</p>
 ${W('match','life')}
 ${story('Inspector in the house',`A seller called the roof "newer." From the eaves you could see the architectural shingles were laid over an old 3-tab roof — and the tabs of the bottom layer telegraphed through as ripples. **The covering wasn't new; it was a layover hiding a worn roof and the decking under it.** You report the layers, the telegraphing, and that the next re-roof needs a tear-off.`)}`,
 quiz:[
  {q:'The most common residential roof covering is:',o:['Slate','Asphalt / composition shingle','Clay tile','Built-up roofing'],a:1,e:'Asphalt/composition shingles cover the majority of homes — 3-tab or architectural/laminated.'},
  {q:'Typical service life of a 3-tab asphalt roof is about:',o:['5–10 years','15–25 years','50–60 years','100+ years'],a:1,e:'Standard composition runs ~15–25 yr; architectural longer. Tile/slate far longer; wood ~20–40 yr.'},
  {q:'Heavy granule loss, curling, and cupping on asphalt shingles mean:',o:['A new roof','Age and weathering — the covering is wearing out','A drainage defect','A framing problem'],a:1,e:'Granules protect the asphalt from UV; losing them, plus curling/cupping, is classic end-of-life weathering.'},
  {q:'On a clay or concrete tile roof, what usually fails first?',o:['The tiles themselves','The underlayment beneath the tiles','The ridge board','The gutters'],a:1,e:'Tiles can last 50+ yr, but the underlayment wears out sooner and is the usual leak point; broken/slipped tiles are also common.'},
  {q:'Moss growing on a wood shake roof tends to:',o:['Protect the shakes','Hold moisture and accelerate decay, especially on shaded slopes','Improve the appearance only','Have no effect'],a:1,e:'Moss traps moisture against the wood and speeds curling, splitting, and rot — a condition you note on shaded slopes.'},
 ]},

/* ===== L2 FLASHING ===== */
{id:'l2',kind:'Lesson 2',label:'Flashing — the #1 Leak Source',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · The transitions</span><h1>Roofs don't leak in the field — they leak at the edges.</h1>
 <p class="lead">Wherever the covering is interrupted — a valley, a wall, a chimney, a pipe — water needs help to keep moving downhill over the joint. That help is <b>flashing</b>, and it is the single most common source of roof leaks.</p>
 <h2>The flashing locations</h2>
 ${conds('',[['Valley','Where two slopes meet and channel the most concentrated water. Open (exposed metal), closed-cut, or woven — all high-wear, high-leak.'],['Step flashing','Bent metal pieces lapped with each shingle course where a slope meets a vertical wall. A continuous strip or a smear of tar there is a defect.'],['Headwall &amp; apron','Flashing where the top of a slope meets a wall (headwall) or a vertical face meets the slope below (apron).'],['Chimney','The hardest spot: base/step flashing plus counter-flashing let into the mortar, and a cricket on the up-slope side of a wide chimney.'],['Pipe / vent boots','The collar that seals a plumbing-vent or pipe penetration. Cracked, sun-rotted boots are one of the most common leaks of all.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <path d="M120 200 L300 70 L300 200 Z"/><line x1="120" y1="200" x2="640" y2="200"/>
     <rect x="300" y="60" width="120" height="140"/>${_mono(360,52,10,'wall','#918c7d')}
     <!-- step flashing pieces up the wall -->
     <g stroke="#7f520a" stroke-width="2"><path d="M300 180 l-26 0 l0 -16"/><path d="M300 152 l-46 0 l0 -16"/><path d="M300 124 l-66 0 l0 -16"/><path d="M300 96 l-86 0 l0 -16"/></g>
     ${_mono(210,108,9,'step flashing','#7f520a','start')}
     <!-- counter flashing into mortar -->
     <line x1="300" y1="92" x2="332" y2="92" stroke="#3c5870" stroke-width="2.4"/>${_mono(338,90,9,'counter-flashing','#3c5870','start')}
     <!-- vent boot -->
     <line x1="170" y1="160" x2="170" y2="128" stroke="#6a6557" stroke-width="4"/><path d="M158 162 h24" stroke="#7f520a" stroke-width="2.4"/>${_mono(170,120,9,'vent boot','#7f520a')}
   </g>
 </svg><div class="cap">Step flashing climbs the wall course-by-course, counter-flashing is let into the mortar above it, and each penetration gets its own boot.</div></div>
 <h2>What goes wrong</h2>
 <ul class="clean"><li><b>Roofing cement instead of flashing</b> — troweled-on tar cracks and fails; the classic amateur chimney "repair."</li><li><b>Missing or reverse-lapped flashing</b> — water runs <em>behind</em> it instead of over it.</li><li><b>Cracked or sun-rotted boots</b> — the neoprene collar splits and leaks at the pipe.</li><li><b>No counter-flashing</b> — step flashing left exposed with nothing let into the masonry above.</li><li><b>No cricket</b> on a wide chimney — water pools on the up-slope side and finds its way in.</li></ul>
 ${W('match','flash')}
 ${story('Inspector in the house',`A ceiling stain two rooms away from any plumbing turned out to start at a chimney where someone had buried the whole joint in roofing cement instead of flashing. **Tar is a patch, not a flashing.** The report names the absent step/counter-flashing, the amateur tar repair, and the active leak path down to the stain.`)}`,
 quiz:[
  {q:'The single most common source of roof leaks is:',o:['The field of the shingles','Flashing at transitions and penetrations','The ridge','The drip edge'],a:1,e:'Most leaks start where the covering is interrupted — valleys, walls, chimneys, and boots — not in the open field.'},
  {q:'Flashing where a roof slope meets a vertical side wall is:',o:['Counter-flashing','Step flashing','Valley flashing','Apron flashing'],a:1,e:'Step flashing is a series of bent metal pieces lapped with each shingle course up the wall. A continuous strip or tar there is a defect.'},
  {q:'Black roofing cement troweled over a chimney joint is:',o:['A proper permanent flashing','An amateur patch that cracks and leaks — report it','Required by code','Superior to metal'],a:1,e:'Roofing cement is not flashing. Tar-patched flashing is an amateur repair you call out, recommending proper step/counter-flashing.'},
  {q:'A cracked, sun-rotted neoprene collar around a plumbing vent is a:',o:['Cricket problem','Failed pipe/vent boot — a very common leak','Drip-edge issue','Valley defect'],a:1,e:'The boot seals the penetration; when the collar splits it leaks right at the pipe. It\'s one of the most common roof leaks.'},
  {q:'A cricket (saddle) is installed to:',o:['Hold the gutters','Divert water around the up-slope side of a wide chimney','Seal a vent pipe','Cap the ridge'],a:1,e:'A cricket is a small peaked structure on the high side of a wide chimney that splits and diverts water around it.'},
 ]},

/* ===== L3 ROOF DRAINAGE ===== */
{id:'l3',kind:'Lesson 3',label:'Roof Drainage',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · Getting water away</span><h1>The roof's last job is to put the water where it can't hurt the house.</h1>
 <p class="lead">Shedding water off the covering is only half the job. <b>Gutters and downspouts</b> have to carry it down and <em>away</em> — because roof water dumped at the foundation becomes a basement, crawlspace, and structural problem.</p>
 <h2>The drainage path</h2>
 ${conds('',[['Gutters','The trough at the eave. Must be secured to the fascia, sloped to the downspouts, and clear of debris. Sagging, detached, or clogged gutters overflow at the wall.'],['Downspouts','The verticals that carry water down. They must connect to the gutter and actually discharge — a downspout that ends at the foundation is no better than no gutter.'],['Discharge &amp; extensions','Splash blocks or extensions must move water well away from the foundation. Discharge at the wall erodes soil and drives moisture in.'],['Low-slope drainage','Flat and low-slope roofs drain to internal drains or scuppers; clogged drainage causes ponding.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <path d="M120 90 L360 40 L600 90"/><line x1="100" y1="90" x2="620" y2="90"/>
     <!-- house wall -->
     <line x1="150" y1="90" x2="150" y2="210"/><line x1="570" y1="90" x2="570" y2="210"/><line x1="150" y1="210" x2="570" y2="210"/>
     <!-- gutter at eave -->
     <path d="M100 96 h40 q8 0 8 8 l2 10" stroke="#7f520a" stroke-width="2"/>
     <!-- downspout -->
     <line x1="150" y1="114" x2="150" y2="214" stroke="#7f520a" stroke-width="2.4"/>
     <!-- discharge away from foundation (good) -->
     <path d="M150 214 l40 0" stroke="#3d7d50" stroke-width="2.4"/><path d="M186 210 l8 4 l-8 4" stroke="#3d7d50" stroke-width="2"/>${_mono(196,210,9,'away — good','#3d7d50','start')}
     <!-- discharge at wall (bad) -->
     <line x1="570" y1="114" x2="570" y2="214" stroke="#7f520a" stroke-width="2.4"/><path d="M570 214 l0 8" stroke="#b85436" stroke-width="2.4"/>${_mono(584,222,9,'at wall — bad','#b85436','start')}
     ${_mono(360,80,9,'roof sheds → gutter → downspout → away','#918c7d')}
   </g>
 </svg><div class="cap">Roof water must be carried to the gutter, down the downspout, and discharged well away from the foundation.</div></div>
 <h2>What you'll write up</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Clogged / sagging / detached gutters</span></div><p>Debris-filled or pulling off the fascia, sloped wrong.</p><div class="meta"><span class="lab">Implication</span><span class="val">Overflow at the wall — soil erosion, foundation and basement moisture, fascia rot.</span><span class="lab">Report</span><span class="val">Recommend cleaning, resecuring, and correcting slope to the downspouts.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Downspout discharging at the foundation</span></div><p>Ends right at the wall, or a splash block flush against it.</p><div class="meta"><span class="lab">Implication</span><span class="val">Concentrated water at the foundation — the #1 cause of wet basements and crawlspaces.</span><span class="lab">Report</span><span class="val">Recommend extensions to carry discharge well away from the foundation.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Ponding on a flat/low-slope roof</span></div><p>Standing water not draining within ~48 hr.</p><div class="meta"><span class="lab">Implication</span><span class="val">Added load and a leak path; accelerates membrane failure.</span><span class="lab">Report</span><span class="val">Recommend clearing drains/scuppers and evaluating slope and drainage.</span></div></div>
 ${story('Inspector in the house',`A basement with efflorescence and a musty smell traced straight up to a single downspout dumping right at that corner of the house, with eroded soil to match. **The wet wall in the basement was a roof-drainage problem.** The report ties the clogged gutter and at-the-wall discharge to the moisture below and recommends extending the discharge.`)}`,
 quiz:[
  {q:'A downspout should discharge:',o:['Right at the foundation','Well away from the foundation','Into the crawlspace','Onto the lower roof'],a:1,e:'Roof water must be carried away from the foundation; discharge at the wall erodes soil and wets basements/crawls.'},
  {q:'A clogged, sagging gutter most directly causes:',o:['A framing failure','Overflow at the wall — soil erosion and foundation/basement moisture','Granule loss','Ice on the ridge'],a:1,e:'Water that can\'t reach the downspout overflows at the eave and dumps at the wall — a moisture and erosion problem.'},
  {q:'Standing water that doesn\'t drain within ~48 hr on a flat roof is:',o:['Normal and fine','Ponding — added load and a leak path; report it','Required for the membrane','A gutter problem only'],a:1,e:'Ponding stresses the membrane and finds leaks. Recommend clearing drains/scuppers and evaluating the slope.'},
  {q:'Why is roof drainage a foundation issue too?',o:['It isn\'t — they\'re unrelated','Water dumped at the wall is a leading cause of wet basements and crawlspaces','Gutters hold up the foundation','Downspouts feed the footing drains by design'],a:1,e:'Roof drainage and foundation moisture are linked — discharge at the wall drives water into the structure below.'},
 ]},

/* ===== L4 ROOF STRUCTURE ===== */
{id:'l4',kind:'Lesson 4',label:'Roof Structure & Decking',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Holding the shape</span><h1>A roof that's losing its shape is telling you something.</h1>
 <p class="lead">Under the covering is the frame that holds it all up — <b>rafters or trusses, ties, and the sheathing</b> they carry. When the structure moves, you can read it from the street and confirm it in the attic.</p>
 <h2>Rafters vs. trusses</h2>
 ${conds('',[['Rafters (stick-framed)','Cut on site, running ridge to wall plate, with a ridge board at the peak and a ceiling joist or rafter tie at the bottom. Members can be sistered or reinforced.'],['Trusses (engineered)','Triangulated, factory-built units engineered as a whole. Strong and efficient — but you must <em>never</em> field-cut or modify a truss member; doing so destroys its design.'],['Ridge board vs. ridge beam','A ridge board just aligns rafters; a structural ridge beam actually carries load. Know which you\'re looking at before judging a sag.'],['Ties','<b>Rafter/ceiling-joist ties</b> low at the plate resist the rafters spreading; <b>collar ties</b> high near the ridge resist separation under uplift.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <path d="M120 200 L360 60 L600 200"/><line x1="120" y1="200" x2="600" y2="200"/>
     ${_mono(360,52,9,'ridge','#918c7d')}
     <!-- collar tie -->
     <line x1="290" y1="120" x2="430" y2="120" stroke="#3c5870" stroke-width="2"/>${_mono(360,114,9,'collar tie (high)','#3c5870')}
     <!-- bottom tie / ceiling joist -->
     <line x1="120" y1="200" x2="600" y2="200" stroke="#7f520a" stroke-width="2.4"/>${_mono(360,216,9,'rafter / ceiling-joist tie (low)','#7f520a')}
     <!-- spread arrows when tie missing -->
     <path d="M120 184 l-16 0" stroke="#b85436" stroke-width="2"/><path d="M104 180 l-6 4 l6 4" stroke="#b85436" stroke-width="2"/>
     <path d="M600 184 l16 0" stroke="#b85436" stroke-width="2"/><path d="M616 180 l6 4 l-6 4" stroke="#b85436" stroke-width="2"/>
     ${_mono(360,150,9,'no bottom tie → walls spread, ridge sags','#b85436')}
   </g>
 </svg><div class="cap">The bottom tie keeps the walls from spreading; the collar tie up high resists separation. Lose the bottom tie and the ridge sags.</div></div>
 <h2>Reading sag and the decking</h2>
 <p>From the ground, a <b>sagging or wavy ridge</b>, a dished roof plane, or walls bowing out say the structure is overloaded or missing ties — a referral for evaluation, never a "looks fine." From the attic, the <b>sheathing/decking</b> tells the rest: delamination, soft spots, stains, and inadequate or cut framing. A roof's shape and its decking are one story read from two sides.</p>
 ${W('spot','atticframe')}
 ${story('Inspector in the house',`A converted attic had a beautiful finished ceiling — and from the street the ridge had a clear dip. Up in the remaining attic space, the bottom rafter ties had been cut out to make headroom. **Someone traded the structure for living space.** The report flags the sag, the removed ties, and recommends a structural evaluation — not a cosmetic fix.`)}`,
 quiz:[
  {q:'You must never field-cut or modify a:',o:['Rafter','Ceiling joist','Engineered truss member','Ridge board'],a:2,e:'A truss is engineered as a whole; cutting any member destroys its design. Field-modified trusses are a structural referral.'},
  {q:'A sagging or wavy ridge seen from the street indicates:',o:['Normal settling — don\'t report it','A structural problem — overload or missing/failed ties; recommend evaluation','A flashing defect','Granule loss'],a:1,e:'A visible sag is a framing finding. Report it and recommend evaluation by a qualified contractor or engineer.'},
  {q:'Rafters spreading and pushing the walls out is resisted by:',o:['Collar ties high near the ridge','Rafter/ceiling-joist ties low at the wall plates','The ridge board','Drip edge'],a:1,e:'The bottom tie keeps the walls from spreading; collar ties up high resist ridge separation. Missing bottom ties let walls bow and the ridge sag.'},
  {q:'From the attic, soft, delaminated sheathing means:',o:['Normal aging','Chronic moisture has damaged the decking — report it','Good ventilation','Proper underlayment'],a:1,e:'Delamination and soft spots are moisture damage to the deck — report the condition and the likely leak source.'},
  {q:'A structural ridge beam differs from a ridge board in that it:',o:['Is only decorative','Actually carries roof load, where a ridge board just aligns rafters','Is always smaller','Is the same thing'],a:1,e:'A ridge beam carries load; a ridge board only aligns the rafter tops. Know which you have before judging a sag.'},
 ]},

/* ===== L5 ATTIC INSPECTION ===== */
{id:'l5',kind:'Lesson 5',label:'Inspecting the Attic',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · The underside truth</span><h1>The attic shows you what the finished surface hides.</h1>
 <p class="lead">If you can get into the attic, you should — it's where leaks confess, framing is visible, and the decking shows its real condition. Many roof problems are confirmed (or first found) from inside.</p>
 <h2>What you're checking from inside</h2>
 ${conds('',[['Access &amp; safety','Find and use the access where it\'s safe — watch your footing on joists (not the ceiling), low clearances, and unknown insulation. Note where access was blocked or limited.'],['Framing','Read the rafters/trusses and ties: cut, notched, sistered, or missing members, and any sag visible from below.'],['Leak staining','Dark stains and rings on the underside of the sheathing — especially at penetrations, valleys, and the chimney — mark current or past leaks.'],['Decking condition','Press and look for soft, spongy, delaminated, or stained decking; that\'s the damage a leak leaves behind.'],['Ventilation interplay','Blocked soffits, an exhaust fan dumping into the attic, or moisture on the deck connect the roof to the attic\'s air and moisture story.']])}
 ${W('spot','surface')}
 <h2>The conditions you'll write up</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Leak staining on the sheathing</span></div><p>Dark stains/rings at a penetration, valley, or the chimney.</p><div class="meta"><span class="lab">Implication</span><span class="val">Current or past water entry — and deteriorating decking where it persists.</span><span class="lab">Report</span><span class="val">Note the staining and likely source; recommend evaluation/repair of the flashing or boot.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Deteriorated / delaminated decking</span></div><p>Soft, spongy, or separating sheathing.</p><div class="meta"><span class="lab">Implication</span><span class="val">Compromised structure and fastening; the covering above it isn't supported.</span><span class="lab">Report</span><span class="val">Recommend replacing the affected decking and correcting the leak source.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Exhaust dumping into the attic</span></div><p>A bath/kitchen fan or dryer terminating in the attic, not outside.</p><div class="meta"><span class="lab">Implication</span><span class="val">Moisture (and lint) condensing on the cold deck — staining, rot, mold.</span><span class="lab">Report</span><span class="val">Recommend ducting the exhaust fully to the exterior.</span></div></div>
 ${story('Inspector in the house',`The roof surface looked tired but intact. Up in the attic, a constellation of dark rings on the sheathing under the back valley — and one soft, black patch you could push a thumb into — told the real story. **The surface said "old"; the attic said "leaking."** The report leads with the staining, the soft decking, and the valley as the source.`)}`,
 quiz:[
  {q:'The attic is valuable because it lets you read:',o:['Only the insulation','Leak staining, framing, and the real decking condition','The shingle brand','The gutter slope'],a:1,e:'From inside you see the underside truth — leaks, framing, and decking that the finished surface hides.'},
  {q:'Dark staining on the underside of the sheathing usually indicates:',o:['Normal wood color','Current or past roof leakage — report it and the likely source','Proper ventilation','A new roof'],a:1,e:'Stains and rings mark water entry, especially at penetrations, valleys, and the chimney. Report the staining and source.'},
  {q:'Soft, spongy, delaminated decking means:',o:['Good decking','Moisture has deteriorated the sheathing — recommend replacement and fixing the leak','It\'s simply old plywood','Nothing to report'],a:1,e:'Delamination and softness are moisture damage; recommend replacing the affected decking and correcting the source.'},
  {q:'A bathroom fan terminating inside the attic should be:',o:['Left — it ventilates the attic','Reported — moisture condenses on the cold deck; recommend ducting it fully outside','Made larger','Connected to the soffit'],a:1,e:'Exhaust dumped in the attic condenses on the deck and causes staining, rot, and mold. It must terminate outside.'},
  {q:'When attic access is blocked or limited, you should:',o:['Force entry','Note the limitation in the report and inspect what is accessible','Skip the roof entirely','Assume it\'s fine'],a:1,e:'You report what\'s visible and accessible and note where access was limited — never guess at what you couldn\'t see.'},
 ]},

/* ===== L6 INSPECTION METHOD & SOP ===== */
{id:'l6',kind:'Lesson 6',label:'Method, Safety & SOP',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · How you look</span><h1>The right method is the safe one — and you report which you used.</h1>
 <p class="lead">How you inspect a roof depends on whether it's safe to walk and whether walking would damage it. The Standards of Practice don't require you to risk a fall — they require you to inspect what's accessible and <b>state your method and limits</b>.</p>
 <h2>The ways to inspect a roof</h2>
 ${conds('',[['Walked','The best view — when the roof is safe, dry, low enough in slope, and sound enough to bear your weight without damage. Read covering, flashing, and penetrations up close.'],['From the eaves / ladder','Inspect from a ladder at the edge and along the eaves when you can\'t safely walk it — still close, still useful.'],['Binoculars / from the ground','For steep, tall, or unsafe roofs, observe from the ground with binoculars. You\'ll see condition and major defects, but not fine detail.'],['Drone or other aids','Some inspectors use a camera or drone where allowed — still observation, still with stated limits.']])}
 <p>When <em>not</em> to walk it is just as important as when to: a <b>wet, icy, or steep</b> roof; a <b>brittle</b> tile or slate roof you'd crack; a <b>deteriorated</b> roof with soft decking; or anything beyond safe ladder reach. Walking such a roof endangers you and can damage the covering.</p>
 ${W('sort','method')}
 <h2>The SOP language that protects you and the client</h2>
 <ul class="clean"><li><b>State the method</b> — "inspected by walking the roof," or "from the eaves with binoculars; not walked due to wet/steep conditions."</li><li><b>State the limitation</b> — note areas not visible: snow, ponding, layers you can't count, blocked attic access.</li><li><b>Don't certify life or guarantee against leaks</b> — you report condition and implications, not a warranty.</li><li><b>Recommend evaluation</b> — for active leaks, structural sag, and anything beyond a visual call.</li></ul>
 ${story('Inspector in the house',`A buyer pushed: "Just get up there, the slate looks fine from here." It was a wet, steep slate roof — exactly the kind that cracks underfoot and sends inspectors to the ER. **You inspect from the eaves and with binoculars, and you write the limitation.** Being thorough never means being unsafe — and a fabricated clean roof helps no one.`)}`,
 quiz:[
  {q:'The Standards of Practice require you to:',o:['Walk every roof no matter what','Inspect what\'s accessible and report your method and limitations','Certify the roof against leaks','Refuse to inspect roofs you can\'t walk'],a:1,e:'The SOP requires accessible inspection plus stated method and limits — not risking a fall or guaranteeing the roof.'},
  {q:'You should NOT walk a roof when it is:',o:['Dry and low-slope','Wet, steep, brittle, or deteriorated','Newly installed','Easily reached by ladder'],a:1,e:'Wet/icy, steep, brittle (tile/slate), or deteriorated roofs are unsafe or damageable — inspect from below instead.'},
  {q:'When you can\'t safely walk a roof, an acceptable method is:',o:['Skipping the roof and saying nothing','Inspecting from the eaves, a ladder, or with binoculars and stating the limitation','Certifying it as fine','Walking it anyway'],a:1,e:'Inspect from below, report what you could and couldn\'t see, and state the limitation in the report.'},
  {q:'On a brittle tile or slate roof, walking it risks:',o:['Nothing','Cracking the covering and injuring you — inspect from below','Improving the inspection','Voiding the SOP'],a:1,e:'Brittle coverings crack underfoot and the height/slope is dangerous. Observe from the eaves/ladder/binoculars.'},
  {q:'In your report, the method and limitations should be:',o:['Left out to keep it short','Clearly stated — how you inspected and what you couldn\'t see','Implied only','Replaced with a guarantee'],a:1,e:'Always state how you inspected and note areas not visible. It protects you and informs the client honestly.'},
 ]},

/* ===== L7 ASPHALT & WOOD CONDITIONS ===== */
{id:'l7',kind:'Lesson 7',label:'Shingle & Wood Conditions',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Reading the field</span><h1>On the most common roofs, learn to read the surface.</h1>
 <p class="lead">Most roofs you inspect are asphalt or wood, and most of your write-ups live right in the field of the covering. Train your eye on the conditions that say "aging," "installed wrong," or "repaired badly."</p>
 <h2>Asphalt / composition conditions</h2>
 ${conds('',[['Curling &amp; cupping','Edges or centers lifting as the shingle ages and dries — a weathering/end-of-life sign.'],['Granule loss','Bald, shiny spots and granules in the gutter; the asphalt is now exposed to UV.'],['Missing / damaged tabs','Wind-torn or broken tabs leave the underlayment and deck exposed — a leak path.'],['Exposed / popped fasteners','Nails backing out or face-nailed through the surface — each is a pinhole leak; common amateur sign.'],['Multiple layers','Two is the common max; a third overloads the structure, hides the deck, and forces a future tear-off.']])}
 <h2>Wood shake / shingle conditions</h2>
 ${conds('',[['Curling, cupping &amp; splitting','Cedar dries, curls, and splits with age — the classic wear pattern.'],['Missing shakes','Gaps where units have blown off or rotted away expose the felt and deck.'],['Moss &amp; decay','Moss on shaded slopes holds moisture and accelerates rot.'],['Exposed felt','Underlayment showing through means the covering is failing.']])}
 ${W('sort','write')}
 <h2>The cardinal write-ups</h2>
 <ul class="clean"><li><b>Damaged, missing, or curling shingles</b> — report the condition and the leak risk.</li><li><b>Exposed or improper fasteners</b> — each is a potential leak; note face-nailing.</li><li><b>Multiple layers</b> — count what you can see and flag a third layer.</li><li><b>Amateur repairs</b> — tar smears, mismatched patches, caulk where flashing belongs.</li></ul>
 ${story('Inspector in the house',`A roof "fixed" before listing had five different shingle colors, a ridge line of caulk, and exposed nail heads marching across the slope where someone face-nailed loose tabs. **A patchwork of amateur repairs is itself a finding.** You report each leak path and recommend a qualified roofer evaluate — the repairs are a symptom, not a fix.`)}`,
 quiz:[
  {q:'Curling and cupping on asphalt shingles indicate:',o:['A new roof','Age and weathering — the covering is wearing out','A drainage defect','A framing problem'],a:1,e:'Lifting edges/centers are end-of-life weathering on asphalt. Report the condition and that it\'s at/near service life.'},
  {q:'Exposed or popped fasteners on a shingle roof are:',o:['Decorative','Potential leak points — each is a pinhole into the deck','Required for ventilation','A sign of quality work'],a:1,e:'Nails backing out or face-nailed through the surface each let water in. Note them and the amateur installation.'},
  {q:'Granules in the gutter and bald spots on the shingles mean:',o:['The roof is new','The protective layer is wearing off and the asphalt is exposed to UV','A gutter problem only','Nothing to report'],a:1,e:'Granules shield the asphalt from UV; losing them is an aging sign that accelerates failure.'},
  {q:'Three layers of shingles on the deck should be:',o:['Left — more is better','Reported — overloads structure, hides the deck, and forces a full tear-off next time','Topped with a fourth','Ignored if it looks flat'],a:1,e:'Two is the common max. A third adds load, hides the decking, and means the next re-roof needs a tear-off.'},
  {q:'A patchwork of tar smears, caulk, and mismatched shingles is:',o:['A proper repair','Amateur repair — itself a finding; report the leak paths and recommend evaluation','Better than re-roofing','Only cosmetic'],a:1,e:'Amateur repairs are a symptom of an aging or leaking roof. Report each leak path and recommend a qualified evaluation.'},
 ]},

/* ===== L8 PENETRATIONS & SKYLIGHTS ===== */
{id:'l8',kind:'Lesson 8',label:'Penetrations & Skylights',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · The holes in the roof</span><h1>Every hole through the roof is a leak waiting for bad flashing.</h1>
 <p class="lead">Plumbing vents, flues, skylights, fans, and antennas all punch through the covering — and every one depends on its flashing to stay dry. Penetrations are where the field meets the #1 leak source up close.</p>
 <h2>The penetrations you'll find</h2>
 ${conds('',[['Plumbing vent pipes','Flashed with a boot — the neoprene collar cracks and rots in the sun. One of the most common leaks of all.'],['Flues &amp; B-vents','Metal chimneys/vents flashed with a storm collar and base flashing; need clearance from combustibles and a rain cap.'],['Skylights','A glazed hole in the roof with its own step/head/sill flashing. Curbs, seals, and flashing all age — a classic leak and condensation source.'],['Roof/attic vents &amp; fans','Box vents, turbines, powered fans, and ridge vents — each flashed where it penetrates; look for damaged housings and missing flashing.'],['Abandoned penetrations','Old antenna mounts, removed vents, and stray fastener holes left unsealed are quiet, persistent leaks.']])}
 <div class="dgm"><svg viewBox="0 0 720 240">
   <g ${_gs}>
     <path d="M80 200 L360 70 L640 200"/><line x1="80" y1="200" x2="640" y2="200"/>
     ${_mono(360,62,9,'ridge','#918c7d')}
     <!-- vent pipe with boot -->
     <line x1="200" y1="150" x2="200" y2="110" stroke="#6a6557" stroke-width="4"/><path d="M186 152 h28" stroke="#7f520a" stroke-width="2.4"/>${_mono(200,102,8,'vent boot','#7f520a')}
     <!-- skylight curb with flashing -->
     <path d="M420 150 l60 -28 l40 18 l-60 28 z"/><path d="M420 150 l60 -28" stroke="#7f520a" stroke-width="2"/>${_mono(486,128,8,'skylight','#918c7d')}
     <path d="M420 150 l-10 5 M520 140 l10 -5" stroke="#7f520a" stroke-width="2"/>${_mono(404,170,8,'flashing','#7f520a','start')}
     <!-- abandoned hole -->
     <circle cx="300" cy="135" r="4" fill="#b85436" stroke="none"/>${_mono(300,124,8,'open hole','#b85436')}
   </g>
 </svg><div class="cap">Each penetration lives or dies by its flashing — a cracked boot, a tired skylight curb, or an unsealed abandoned hole all leak.</div></div>
 <h2>What goes wrong</h2>
 <ul class="clean"><li><b>Cracked / rotted vent boots</b> — the single most common penetration leak.</li><li><b>Skylight flashing &amp; seal failure</b> — leaks at the curb, plus condensation fogging the glazing.</li><li><b>Tar instead of flashing</b> — the same amateur patch you see at chimneys, smeared around pipes and skylights.</li><li><b>Abandoned penetrations</b> — old mounts and holes left open after equipment is removed.</li><li><b>No clearance / rain cap on a flue</b> — a combustion and water-entry concern.</li></ul>
 <p>The discipline is the same everywhere: a penetration is just another transition, and you read its flashing the way you read a valley or a wall — over the joint, not patched on top of it.</p>
 ${story('Inspector in the house',`A "mystery" hallway leak sat nowhere near any plumbing — until the attic showed staining running down from an old satellite-dish lag bolt someone left in the deck when the dish came off. **A removed antenna can leak for years.** The report names the abandoned penetration as the source and recommends proper sealing, not another bead of caulk.`)}`,
 quiz:[
  {q:'The most common penetration leak on a roof is a:',o:['Cracked / sun-rotted plumbing vent boot','Sagging gutter','Missing ridge board','Loose downspout'],a:0,e:'The neoprene boot collar splits and rots in the sun, leaking right at the pipe — one of the most common roof leaks of all.'},
  {q:'A skylight is best understood as:',o:['A maintenance-free feature','A glazed hole in the roof that depends on its own flashing and seals — a classic leak/condensation source','Part of the gutter system','A structural member'],a:1,e:'Skylights leak at curbs and flashing and fog from failed seals. Inspect the flashing and glazing and report condition.'},
  {q:'An old antenna or satellite mount removed but left in place is:',o:['Harmless','A potential abandoned penetration that can leak — recommend proper sealing','A structural upgrade','Required to stay'],a:1,e:'Unsealed fastener holes and mounts are quiet, persistent leaks. Report the abandoned penetration and recommend sealing.'},
  {q:'Roofing cement smeared around a vent pipe or skylight instead of flashing is:',o:['A permanent fix','The same amateur patch as at a chimney — it cracks and leaks; report it','Better than flashing','Code-required'],a:1,e:'Tar is a patch, not flashing, at any penetration. Report the amateur repair and recommend proper flashing.'},
  {q:'A penetration through the covering should be treated as:',o:['Different from all other flashing','Another transition — read its flashing the way you read a valley or wall','Never a leak source','The gutter\'s responsibility'],a:1,e:'A penetration is just another interruption in the covering; its flashing must direct water over the joint, not patch on top of it.'},
 ]},

/* ===== L9 TILE, METAL, SLATE & FLAT ===== */
{id:'l9',kind:'Lesson 9',label:'Tile, Metal, Slate & Flat',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 9 · The other coverings</span><h1>The long-lived and the low-slope roofs have their own rules.</h1>
 <p class="lead">Tile, metal, slate, and flat roofs last longer or behave differently than asphalt — and they fail differently too. You inspect them mostly from below or the edge, because walking them either cracks them or isn't safe.</p>
 <h2>The other families, and how they fail</h2>
 ${conds('',[['Clay &amp; concrete tile','Long-lived but heavy; the underlayment fails first and is the leak point. Findings: broken, cracked (often from being walked on), or slipped tiles.'],['Metal','40–60 yr; failures are at the details — loose or exposed fasteners, rust, oil-canning, and seam/flashing problems, not field wear.'],['Slate','Very long life but brittle; broken/missing slates and failed fasteners ("nail sickness") are the findings. Never walk or pry it casually.'],['Roll roofing','Asphalt rolls on low-slope/utility roofs — short-lived; seams and exposed nails are the weak points.'],['Built-up (BUR) &amp; flat','Plies of felt and asphalt with gravel/cap. Look for blisters, alligatoring, splits, exposed felt, and — the big one — ponding water.']])}
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- flat/low-slope roof with ponding -->

 <h2>Inspecting them without damage</h2>
 <p>The through-line: you mostly inspect these from the <b>eaves, a ladder, or with binoculars</b>. Walking tile cracks it; walking slate is brittle and dangerous; flat membranes can be damaged. You report what you can see of the covering and its details, and you note the method and limits — the same discipline as every other roof, applied to coverings that punish a careless step.</p>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The inspector's summary</div><p>Read every roof as five jobs: <b>covering</b> (type, age, condition, layers), <b>flashing</b> (the #1 leak source, at every transition), <b>drainage</b> (off the roof and away from the foundation), <b>structure</b> (rafters/trusses, ties, sag, decking), and the <b>attic</b> (the underside truth). Name the deficiency, the implication, and the recommendation — and state how you inspected it.</p></div></div>
 ${story('Inspector in the house',`A flat-roofed addition had a dinner-plate of standing water two days after the last rain, ringed with a chalky tide line and a soft blister beside the clogged drain. **Flat roofs tell you they're failing in still water.** The report names the ponding, the clogged drain, and the blistered membrane, and recommends evaluation — observed from the edge, never by wading across it.`)}`,
