/* ===== ORIENTATION ===== */
{id:'intro',kind:'Start here',label:'The structure, top to bottom',type:'lesson',
 body:()=>`<span class="eyebrow">Structure &amp; Foundation · Orientation</span><h1>The house stands on one idea — and you learn to read it.</h1>
 <p class="lead">The structural system is what holds everything up and ties it to the ground. Your job is not to certify it or engineer a repair. It is to <b>observe what's accessible, recognize visible distress, and report the performance and implications</b> so your client — and, when it matters, a licensed engineer — can decide.</p>
 <p>Every load in a building follows one route, and almost every structural finding is really about a break somewhere on it:</p>
 <ul class="num"><li><b>Roof &amp; ceiling framing</b> collect the load up top.</li><li><b>Walls</b> carry it down — bearing walls especially.</li><li><b>Floor joists &amp; girders</b> hand it to the supports.</li><li><b>The foundation</b> spreads it onto the <b>soil</b> — which, in Texas, moves.</li></ul>
 <p>When any link weakens — a cut joist, a settling pier, swelling clay — the load finds another path and the house tells on itself: cracks, sticking doors, sloping floors. You learn to read those signals and trace them back to the link that failed.</p>
 <p>Every component runs through the same five-step loop you've used in the other systems:</p>
 <div class="loop"><div class="seg on"><div class="n">01</div><div class="w">Component</div></div><div class="seg"><div class="n">02</div><div class="w">Function</div></div><div class="seg"><div class="n">03</div><div class="w">Common defect</div></div><div class="seg"><div class="n">04</div><div class="w">Implication</div></div><div class="seg"><div class="n">05</div><div class="w">How you report</div></div></div>
 <h2>What you'll inspect</h2>
 <ul class="clean"><li><b>Foundations</b> — slab-on-grade, pier &amp; beam, and basement</li><li><b>Soil &amp; movement</b> — Texas expansive clay, heave and settlement</li><li><b>Distress indicators</b> — cracks, sticking openings, sloping floors</li><li><b>Reading cracks</b> — shrinkage vs. structural movement</li><li><b>Framing</b> — joists, girders, walls, ceiling and roof, load paths</li><li><b>Framing damage</b> — cut/notched/over-spanned members, deflection, rot</li><li><b>Water &amp; the foundation</b> — drainage, grading, plumbing, trees</li></ul>
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Scope &amp; the TREC line</div><p>Under the <b>TREC Standards of Practice</b>, you inspect and report on the structural components that are <em>visible and accessible</em>. You note significant distress and recommend evaluation by a licensed professional engineer — you do <b>not</b> certify the foundation, quantify movement, or design repairs. Crawlspaces and attics are the most hazardous spaces you'll enter; report where access was limited.</p></div></div>`,
 quiz:[
  {q:'The inspector\'s role with the structural system is to:',o:['Certify the foundation is sound','Observe accessible components, recognize distress, and report performance and implications','Calculate the load on each member','Design the repair'],a:1,e:'You observe and report under the TREC SOP. Certifying, engineering, and quantifying movement are outside a home inspection.'},
  {q:'The "load path" describes:',o:['How wiring is routed','How loads travel from roof and floors down through framing to the foundation and soil','The route water takes off the roof','The path of the inspector through the house'],a:1,e:'Loads flow downward: roof → walls → joists/girders → foundation → soil. A break anywhere shows up as cracking, sagging, or deflection.'},
  {q:'In Texas, the soil under the foundation is significant because:',o:['It never moves','Expansive clay swells and shrinks with moisture, moving the foundation','It is always rock','It is irrelevant to structure'],a:1,e:'Much of Texas sits on expansive clay; seasonal moisture changes drive heave and settlement — the root of most foundation distress here.'},
  {q:'When you find significant structural distress, you should:',o:['Tell the client the exact repair','Report the visible distress and recommend evaluation by a licensed structural/foundation engineer','Certify the home is safe','Say nothing'],a:1,e:'Report performance and refer significant distress to an engineer. The inspection is not a structural certification.'},
 ]},

/* ===== L1 LOAD PATH & SCOPE ===== */
{id:'l1',kind:'Lesson 1',label:'Load Path & the Inspector',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 1 · How a house carries weight</span><h1>Follow the load down, and the structure makes sense.</h1>
 <p class="lead">Before you can spot a problem you have to know how the building is supposed to work. Every structural finding is a break somewhere on a single chain that runs from the roof to the dirt.</p>
 <h2>The chain of support</h2>
 ${conds('',[['Roof &amp; ceiling framing','Rafters or trusses collect roof loads and ceiling weight and push them onto the walls below.'],['Walls','Bearing walls carry the load straight down; non-bearing (partition) walls mostly divide space. Knowing which is which matters when owners remove them.'],['Floor joists &amp; girders','Joists span the floor and rest on a girder (beam) and the foundation; the girder hands its load to piers or columns.'],['Foundation &amp; soil','The foundation spreads all of it onto the soil. If the soil moves, everything above moves with it.']])}
 <div class="dgm"><svg viewBox="0 0 720 280">
   <g ${_gs}>
     <path d="M150 90 L360 30 L570 90"/>
     <line x1="180" y1="90" x2="180" y2="210"/><line x1="540" y1="90" x2="540" y2="210"/>
     <line x1="360" y1="60" x2="360" y2="210" stroke-width="1"/>
     <line x1="180" y1="150" x2="540" y2="150" stroke-width="1"/>
     <line x1="180" y1="210" x2="540" y2="210" stroke-width="2.2"/>
     ${_mono(360,128,9,'floor joists / girder','#918c7d')}${_mono(360,205,9,'foundation','#918c7d')}
     <rect x="160" y="210" width="400" height="22" fill="#cdb892" opacity="0.5" stroke="none"/>${_mono(360,226,9,'soil','#8a8475')}
   </g>
   <g stroke="#b85436" stroke-width="2.6" fill="none" stroke-linecap="round">
     <path d="M360 44 V 200"/><path d="M353 192 l7 9 l7 -9"/>
     <path d="M220 96 V 144"/><path d="M213 136 l7 9 l7 -9"/>
     <path d="M500 96 V 144"/><path d="M493 136 l7 9 l7 -9"/>
   </g>
   ${_mono(372,120,9,'load travels DOWN','#b85436','start')}
 </svg><div class="cap">The load path: roof and floor loads run down through walls and framing to the foundation, which spreads them onto the soil.</div></div>
 <h2>Why this is the inspector's mental model</h2>
 <p>When you see a crack, a sag, or a sticking door, you ask the same question: <b>where on the load path did something move or weaken?</b> A sloping floor sends you to the joists, girder, and piers below it. A stair-step crack in the brick sends you to the foundation and the soil. The symptom is upstairs; the cause is usually downstairs — or in the ground.</p>
 ${W('era','found')}
 ${story('Inspector in the house',`A buyer pointed at a long ceiling crack and asked if the roof was failing. It wasn't. Following the load path down, the real story was a girder sagging between two settled piers in the crawlspace — the ceiling crack was just the top of the house reporting what the bottom was doing. **You read the symptom, then trace the load down to the cause.**`)}`,
 quiz:[
  {q:'Loads in a house travel:',o:['Up from the soil to the roof','Down from the roof and floors through walls and framing to the foundation and soil','Sideways through the windows','Randomly'],a:1,e:'The load path runs downward; a break anywhere on it produces visible distress.'},
  {q:'A bearing wall differs from a partition wall in that it:',o:['Is always brick','Carries structural load from above down to the framing or foundation','Is always exterior','Holds the wiring'],a:1,e:'Bearing walls carry load; partition walls mostly divide space. Removing a bearing wall without proper support causes sagging and cracking.'},
  {q:'A sloping floor most directly sends you to inspect:',o:['The roof shingles','The joists, girder, and piers/supports beneath that area','The paint','The windows'],a:1,e:'Floor slope is a framing/foundation-support issue below the floor — follow the load path down.'},
  {q:'The inspector\'s core question when reading distress is:',o:['Who built the house','Where on the load path did something move or weaken','What color to paint over it','How old the carpet is'],a:1,e:'Symptoms appear up top; causes are usually down the load path or in the soil. Trace it down.'},
 ]},

/* ===== L2 FOUNDATION TYPES ===== */
{id:'l2',kind:'Lesson 2',label:'Foundation Types',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 2 · What it sits on</span><h1>Three foundations — each fails, and is read, differently.</h1>
 <p class="lead">You can't inspect a foundation you can't identify. The type tells you how to access it, how it moves, and which symptoms to trust.</p>
 <h2>The three you'll meet</h2>
 ${conds('',[['Slab-on-grade','A concrete slab poured on prepared ground — the most common foundation in Texas. You usually can\'t see the underside, so you read it from the performance above: cracks, sloping floors, sticking doors, and separations.'],['Pier &amp; beam (crawlspace)','The structure is raised on piers/posts and beams (girders) over a crawlspace. The big advantage: you can crawl under and directly inspect joists, girders, piers, sill, and moisture.'],['Basement','A below-grade story with foundation walls retaining soil — less common in much of Texas, seen in the Hill Country and the north. You read its walls for vertical, diagonal, and especially horizontal cracking and bowing.']])}
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- slab -->
     <rect x="40" y="120" width="170" height="20" fill="#cdc6b4" opacity="0.6"/>${_mono(125,112,9,'slab-on-grade')}
     <line x1="40" y1="140" x2="210" y2="140" stroke-width="2"/>
     <!-- pier & beam -->
     <line x1="260" y1="110" x2="430" y2="110" stroke-width="2.2"/>${_mono(345,102,9,'pier &amp; beam')}
     <rect x="278" y="140" width="16" height="40"/><rect x="338" y="140" width="16" height="40"/><rect x="398" y="140" width="16" height="40"/>
     <line x1="260" y1="180" x2="430" y2="180"/>${_mono(345,196,8,'crawlspace','#918c7d')}
     <!-- basement -->
     <rect x="500" y="60" width="170" height="120" fill="none"/>${_mono(585,52,9,'basement')}
     <line x1="500" y1="80" x2="670" y2="80" stroke-width="2"/>
     <line x1="500" y1="80" x2="500" y2="180" stroke-width="2"/><line x1="670" y1="80" x2="670" y2="180" stroke-width="2"/>
     <line x1="500" y1="180" x2="670" y2="180"/>${_mono(585,140,8,'below grade','#918c7d')}
   </g>
 </svg><div class="cap">Three foundation types: a slab on grade, a raised pier-and-beam over a crawlspace, and a basement with retaining walls.</div></div>
 <h2>How access shapes the inspection</h2>
 <p>On a <b>slab</b>, you're inferring foundation behavior from the building above — so the movement indicators carry the report. On <b>pier &amp; beam</b>, you get to look directly, so framing and support conditions dominate. In a <b>basement</b>, the walls themselves are the evidence, and horizontal cracking with bowing is the finding you never wave off.</p>
 ${W('spot','crawl')}
 ${story('Inspector in the house',`Two nearly identical-looking ranch homes, two different foundations. The slab home I had to read entirely from the cracks and door swings upstairs; the pier-and-beam next door let me crawl under and see a sagging girder with my own eyes. **Same distress, completely different evidence — identify the foundation first, and you'll know what your report can and can't say.**`)}`,
 quiz:[
  {q:'The most common foundation type in much of Texas is:',o:['Full basement','Slab-on-grade','Stone rubble','Floating dock'],a:1,e:'Slab-on-grade dominates Texas residential construction; you typically read it from the performance above since the underside isn\'t accessible.'},
  {q:'The key inspection advantage of pier &amp; beam is that:',o:['It never moves','You can enter the crawlspace and directly inspect joists, girders, piers, and moisture','It has no soil under it','It needs no foundation'],a:1,e:'Direct access lets you observe framing and support conditions rather than inferring them from above.'},
  {q:'On a slab-on-grade home, foundation movement is mainly read from:',o:['The underside of the slab','Indicators above: cracks, sloping floors, sticking doors, and separations','The roof','The attic insulation'],a:1,e:'Since the slab underside is hidden, the building above is your evidence — that\'s why the movement indicators carry the report.'},
  {q:'In a basement, the most serious crack pattern to watch for is:',o:['A thin vertical hairline','A horizontal crack with the wall bowing inward','A painted-over crack','Floor-tile grout cracks'],a:1,e:'Horizontal cracking with inward bowing signals lateral soil/water pressure — among the more serious foundation findings.'},
 ]},

/* ===== L3 EXPANSIVE CLAY ===== */
{id:'l3',kind:'Lesson 3',label:'Texas Clay & Movement',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 3 · The ground that moves</span><h1>In Texas, the foundation's worst enemy is the soil itself.</h1>
 <p class="lead">More than any single construction defect, <b>expansive clay</b> explains the foundation distress you'll see across Texas. Understand how the soil moves and most of this section becomes obvious.</p>
 <h2>Why the clay moves</h2>
 <p>Much of Texas — the Blackland Prairie, the Gulf coast, and beyond — sits on <b>expansive clay</b> (high in montmorillonite). The clay particles grab water: when the soil gets wet it <b>swells</b>; when it dries it <b>shrinks</b>. That volume change, repeated season after season, lifts and drops whatever sits on it.</p>
 ${conds('',[['Heave','Upward movement when the clay gains moisture and swells — after heavy rain, a plumbing leak, or watering one side of the house.'],['Settlement','Downward movement when the clay loses moisture and shrinks — in drought, or where a large tree draws water out of the soil.'],['Differential movement','The real damage-maker: when one part of a foundation heaves while another settles, the structure is racked and finishes crack. Uniform movement rarely cracks a house; <em>uneven</em> movement does.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <line x1="60" y1="150" x2="660" y2="150" stroke-width="2"/>${_mono(70,142,9,'foundation','#918c7d','start')}
     <rect x="60" y="150" width="600" height="60" fill="#cdb892" opacity="0.45" stroke="none"/>${_mono(360,196,9,'expansive clay','#8a8475')}
     <!-- wet side swelling up -->
     <path d="M120 150 q40 -22 90 0" stroke="#5a7b97" stroke-width="2.2"/><path d="M160 132 V 110"/><path d="M154 116 l6 -8 l6 8" stroke-width="1.6"/>${_mono(165,104,8,'wet → heave','#5a7b97')}
     <!-- dry side shrinking down -->
     <path d="M500 150 q40 26 90 0" stroke="#b85436" stroke-width="2.2"/><path d="M545 178 V 200"/><path d="M539 194 l6 8 l6 -8" stroke="#b85436" stroke-width="1.6"/>${_mono(545,218,8,'dry → settle','#b85436')}
   </g>
 </svg><div class="cap">Differential movement: clay swells and heaves on the wet side while it dries, shrinks, and settles on the other — racking the structure between them.</div></div>
 <h2>The seasonal signature</h2>
 <p>This is the tell that points straight at clay: distress that <b>changes with the seasons</b>. Drywall cracks that open in the late-summer drought and close after the fall rains; doors that stick in one season and free up in another. When a homeowner describes cracks that "come and go," you're almost certainly hearing expansive-clay movement.</p>
 ${W('match','driver')}
 <div class="field brass"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Keep the moisture even</div><p>Because the clay reacts to water, the single best thing an owner can do is keep soil moisture <b>stable and even</b> around the whole foundation — consistent grading and drainage, no downspouts dumping at one corner, no soaker hose on one side only. You'll connect this to drainage in a later lesson; for now, file it as the master cause.</p></div></div>
 ${story('Inspector in the house',`A seller swore the house was "fixed" because the cracks had closed up. They had — it was a rainy October and the clay had swelled back. Come August they'd be wide open again. **The cracks didn't heal; the soil just inhaled.** I reported the visible distress and the reported seasonal pattern, and recommended evaluation plus steady moisture management.`)}`,
 quiz:[
  {q:'Expansive clay causes foundation movement because it:',o:['Burns','Swells when wet and shrinks when dry','Conducts electricity','Attracts termites'],a:1,e:'Clay (montmorillonite) changes volume with moisture — swelling wet, shrinking dry — moving anything resting on it.'},
  {q:'"Heave" is:',o:['Downward settlement','Upward movement as the clay gains moisture and swells','A type of crack','Roof uplift'],a:1,e:'Heave is upward; it follows added moisture — rain, a leak, or one-sided watering.'},
  {q:'What actually cracks the house is:',o:['Uniform movement of the whole slab','Differential movement — part heaving while part settles','Sunlight on the brick','New paint'],a:1,e:'Even movement rarely damages finishes; uneven (differential) movement racks the structure and cracks it.'},
  {q:'Drywall cracks that open in summer drought and close after fall rains indicate:',o:['A roof leak','Seasonal expansive-clay movement','Bad drywall tape','Foundation certification'],a:1,e:'The open/close-with-the-seasons signature is textbook clay: shrink in drought, swell in wet weather.'},
  {q:'The best owner action against clay movement is to:',o:['Water only one side heavily','Keep soil moisture stable and even around the whole foundation','Remove all the soil','Ignore drainage'],a:1,e:'Even, stable moisture limits the swell/shrink cycle. Uneven watering or drainage causes the differential movement that cracks the house.'},
 ]},

/* ===== L4 SIGNS OF DISTRESS ===== */
{id:'l4',kind:'Lesson 4',label:'Signs of Distress',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 4 · Reading the building</span><h1>The house tells you where it moved — if you read the signs together.</h1>
 <p class="lead">No single crack proves foundation movement. But the <b>cluster</b> of indicators, in the same area, tells a story you can report with confidence.</p>
 <h2>The movement indicators</h2>
 ${conds('',[['Stair-step masonry cracks','Diagonal cracks climbing the mortar joints of brick or block — the signature of differential movement in veneer.'],['Diagonal drywall cracks at openings','Cracks running off the upper corners of doors and windows, where stress concentrates.'],['Sticking doors &amp; windows','Doors that drag or won\'t latch, windows that bind — the opening has racked out of square.'],['Sloping or uneven floors','Floors that visibly slope or feel out of level, often toward an exterior wall or a settled support.'],['Brick separations &amp; trim gaps','Vertical separations in the veneer, gaps opening where trim meets the wall, or a fascia/soffit pulling away.']])}
 ${W('spot','facade')}
 <h2>The conditions you'll write up</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Significant differential cracking</span></div><p>Wide, offset, or stair-step cracks — especially clustered with other indicators.</p><div class="meta"><span class="lab">Implication</span><span class="val">Active or past foundation movement; possible ongoing distress.</span><span class="lab">Report</span><span class="val">Describe location, width, and pattern; recommend evaluation by a structural/foundation engineer.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Sticking openings &amp; sloping floors</span></div><p>Doors that won\'t latch and floors out of level in the same area.</p><div class="meta"><span class="lab">Implication</span><span class="val">The structure is racked or the supports below have moved.</span><span class="lab">Report</span><span class="val">Report the cluster and its location; recommend evaluation.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Brick separations / trim gaps</span></div><p>Veneer pulling apart or trim gaps at openings and corners.</p><div class="meta"><span class="lab">Implication</span><span class="val">Movement of the supporting foundation behind the veneer.</span><span class="lab">Report</span><span class="val">Note the separations and recommend evaluation; don\'t call it cosmetic if it clusters with other signs.</span></div></div>
 ${W('match','signs')}
 ${story('Inspector in the house',`A homeowner had repaired and repainted a corner crack three times. By itself, fine. But the same corner also had a door that wouldn't latch and a floor that sloped toward it — three indicators pointing at one spot. **One sign is a question; three signs in one place is an answer.** I reported the cluster and recommended an engineer.`)}`,
 quiz:[
  {q:'A stair-step crack in brick veneer is a sign of:',o:['Normal brick aging','Differential foundation movement','Wind load only','Bad paint'],a:1,e:'Stair-step cracking follows the mortar joints as the foundation moves differentially — a primary masonry indicator.'},
  {q:'Diagonal drywall cracks from foundation movement usually start at:',o:['The middle of a blank wall','The corners of door and window openings','The ceiling fan','Light switches'],a:1,e:'Openings concentrate stress, so movement cracks radiate from their upper corners.'},
  {q:'Why is a single sticking door weak evidence on its own?',o:['Doors never stick from movement','Many things make a door stick; you want the cluster of indicators in one area to confirm movement','It always means movement','It is irrelevant'],a:1,e:'Humidity, a bad install, or settling hardware can stick a door. The confident call comes from several indicators together in the same location.'},
  {q:'Which of these is a movement indicator?',o:['Uniform sun-fading of paint','A floor sloping toward a settled support','Clean grout lines','A new light fixture'],a:1,e:'Sloping floors join cracks, sticking openings, separations, and trim gaps as movement indicators; sun-fading is not structural.'},
  {q:'The most reportable situation is:',o:['One isolated hairline','Several indicators clustered in the same area','A freshly painted wall','A level floor'],a:1,e:'A cluster of indicators in one location is the strong, reportable pattern — recommend an engineer evaluate.'},
 ]},

/* ===== L5 READING CRACKS ===== */
{id:'l5',kind:'Lesson 5',label:'Reading Cracks',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 5 · Shrinkage vs. movement</span><h1>Not every crack is structural — and saying so is part of the skill.</h1>
 <p class="lead">Over-calling cracks scares clients and burns your credibility; under-calling them is worse. The skill is reading a crack's <b>character</b> and <b>company</b> to tell shrinkage from real movement.</p>
 <h2>Character: what the crack itself looks like</h2>
 ${conds('',[['Likely shrinkage / cosmetic','Thin and hairline, fairly uniform in width, not offset, often vertical. Concrete cures and dries and almost always develops some fine cracking; map-cracking on a slab surface is usually superficial.'],['Likely structural movement','Wider, often tapering (wider at one end), with the two sides offset/displaced, or running as a stair-step in masonry. Cracks wide enough to slide a coin into, or that have moved out of plane, get your attention.']])}
 <div class="dgm"><svg viewBox="0 0 720 220">
   <g ${_gs}>
     <rect x="60" y="40" width="260" height="150"/>${_mono(190,32,9,'shrinkage — thin, uniform','#3d7d50')}
     <path d="M190 50 L188 180" stroke="#3d7d50" stroke-width="1.4"/>
     <rect x="400" y="40" width="260" height="150"/>${_mono(530,32,9,'movement — wide, offset, stepped','#b85436')}
     <path d="M430 80 l18 0 l0 -22 l20 0 l0 -22" stroke="#b85436" stroke-width="2.6"/>
     <path d="M540 60 q4 50 -10 110" stroke="#b85436" stroke-width="2.6"/><path d="M540 60 l8 4" stroke="#b85436" stroke-width="2.6"/>
   </g>
 </svg><div class="cap">Left: thin, uniform, non-offset shrinkage cracking. Right: wide, offset, and stair-stepped cracking that points to movement.</div></div>
 <h2>Company: what else is around it</h2>
 <p>A crack rarely stands alone in a structural problem. Ask: are there <b>sticking doors, sloping floors, exterior cracks, or separations</b> nearby? A thin vertical crack with no other indicators reads cosmetic. The same-looking crack <em>plus</em> a door that won't latch and a sloping floor reads as movement. You document both kinds — but you describe them differently.</p>
 ${W('sort','crackread')}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">Describe, don't diagnose</div><p>Your report records what you <b>see</b> — width, length, location, offset, pattern, and associated indicators — and your <b>recommendation</b>. It does not pronounce the cause, the severity in engineering terms, or whether it's "still moving." Those are an engineer's calls. <b>Width and offset are facts you can state; cause is not.</b></p></div></div>
 ${story('Inspector in the house',`A nervous buyer wanted me to condemn a house over a thin vertical crack above a doorway. It was uniform, not offset, with no sticking doors, no sloping floors, and nothing outside. I described it as minor cosmetic cracking to monitor — and explained why. **Calling a cosmetic crack structural is as much an error as missing a real one.**`)}`,
 quiz:[
  {q:'A crack that is thin, uniform-width, and not offset is most likely:',o:['Structural movement','Shrinkage / cosmetic','A plumbing leak','An engineering emergency'],a:1,e:'Uniform, non-offset, hairline cracks typically come from curing/drying, not movement.'},
  {q:'A crack that is wide, tapering, and offset/displaced suggests:',o:['Normal shrinkage','Structural movement','Fresh paint','Nothing at all'],a:1,e:'Width, taper, and offset are character clues that point toward movement rather than shrinkage.'},
  {q:'Beyond the crack itself, the strongest confirmation of movement is:',o:['The wall color','Associated indicators nearby — sticking doors, sloping floors, exterior cracks','The age of the house','The thermostat setting'],a:1,e:'The crack\'s "company" matters: clustered indicators turn a question into an answer.'},
  {q:'In your report, you should:',o:['State the engineering cause and severity','Describe what you see (width, offset, location, pattern) and recommend evaluation where warranted','Certify whether it is still moving','Say nothing about cracks'],a:1,e:'Describe facts and recommend the right professional; diagnosing cause and severity is an engineer\'s job.'},
  {q:'Over-calling a cosmetic crack as structural is:',o:['Always the safe choice','A real error that erodes your credibility, just like missing a real one','Required by TREC','Impossible'],a:1,e:'Accuracy cuts both ways — describe cosmetic cracking as such and reserve "movement" for cracks that show it.'},
 ]},

/* ===== L6 FRAMING SYSTEMS ===== */
{id:'l6',kind:'Lesson 6',label:'Framing Systems',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 6 · The skeleton</span><h1>Know the skeleton, and you'll know when a bone is broken.</h1>
 <p class="lead">Between the foundation and the roof is the framing — the network of members that actually carries the load. You need the names and the jobs to describe what you find.</p>
 <h2>The framing layers</h2>
 ${conds('',[['Floor framing','Joists span between the foundation/sill and a girder (beam); the girder rests on piers or columns. Subfloor sits on the joists. This is what you see and read in a crawlspace.'],['Wall framing','Vertical studs with a bottom (sole) plate and top plate; headers bridge over door and window openings. Bearing walls stack over the framing/supports below.'],['Ceiling &amp; roof framing','Either stick-framed (ceiling joists + rafters, sometimes with a ridge board) or engineered roof trusses. Both deliver the roof load down to the bearing walls.'],['Engineered members','I-joists, glulam/LVL beams, and trusses are now common. They\'re strong as designed but unforgiving of field modification — never cut or notch them without an engineer\'s say.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <!-- foundation -->
     <line x1="80" y1="200" x2="640" y2="200" stroke-width="2.2"/>${_mono(90,216,9,'foundation','#918c7d','start')}
     <!-- piers + girder -->
     <rect x="150" y="170" width="14" height="30"/><rect x="356" y="170" width="14" height="30"/><rect x="556" y="170" width="14" height="30"/>
     <line x1="100" y1="170" x2="620" y2="170" stroke-width="2"/>${_mono(360,164,8,'girder','#918c7d')}
     <!-- joists -->
     <g stroke-width="1.3">${Array.from({length:10},(_,i)=>`<line x1="${110+i*55}" y1="170" x2="${110+i*55}" y2="140"/>`).join('')}</g>
     <line x1="100" y1="140" x2="620" y2="140" stroke-width="1.6"/>${_mono(360,134,8,'joists / subfloor','#918c7d')}
     <!-- studs -->
     <g stroke-width="1.3">${Array.from({length:9},(_,i)=>`<line x1="${130+i*60}" y1="140" x2="${130+i*60}" y2="70"/>`).join('')}</g>
     <line x1="120" y1="70" x2="600" y2="70" stroke-width="1.6"/>${_mono(360,64,8,'wall top plate','#918c7d')}
     <!-- roof -->
     <path d="M120 70 L360 20 L600 70" stroke-width="2"/>${_mono(360,40,8,'rafters / truss','#918c7d')}
   </g>
 </svg><div class="cap">The framing skeleton: piers and girder carry joists, joists carry the floor and walls, walls carry the roof.</div></div>
 <h2>Reading bearing vs. partition</h2>
 <p>You won't always be certain, but clues help: walls that run <em>perpendicular</em> to the joists above, walls stacked over a girder or beam below, and walls with headers over openings are usually <b>bearing</b>. It matters because a removed or altered bearing wall — a common DIY remodel — drops the load and shows up as sagging ceilings and cracks.</p>
 ${W('era','found')}
 ${story('Inspector in the house',`An open-concept remodel had taken out a wall to join the kitchen and living room — and the ceiling above the old wall line now sagged in a gentle smile, with cracks at both ends. The "wall" had been bearing, and nothing replaced its load path. **When a wall disappears, ask what's now carrying what it used to.**`)}`,
 quiz:[
  {q:'In conventional floor framing, joists bear on:',o:['The drywall','A girder/beam and the foundation or sill','The roof','Nothing'],a:1,e:'Joists span between the foundation/sill and a girder, which is supported by piers or columns — the chain you trace in a crawlspace.'},
  {q:'A header in wall framing:',o:['Holds the roof to the foundation','Bridges over a door or window opening to carry the load around it','Is decorative trim','Is part of the slab'],a:1,e:'Headers span openings so the load above can bridge across the door or window.'},
  {q:'Roof loads are delivered down to:',o:['The windows','The bearing walls and the framing below them','The paint','The gutters'],a:1,e:'Rafters or trusses push the roof load onto bearing walls, which carry it down the load path.'},
  {q:'Engineered members like I-joists and trusses:',o:['Can be cut and notched freely','Are strong as designed but must not be cut or notched without an engineer','Have no load capacity','Are only decorative'],a:1,e:'Field-modifying engineered members can drastically weaken them — a common and serious reportable defect.'},
  {q:'A wall is likely bearing if it:',o:['Runs perpendicular to the joists above and/or stacks over a girder below','Is freshly painted','Holds a TV','Has a light switch'],a:1,e:'Perpendicular-to-joist orientation, stacking over supports, and headers over openings are clues to a bearing wall.'},
 ]},

/* ===== L7 FRAMING PROBLEMS ===== */
{id:'l7',kind:'Lesson 7',label:'Framing Problems',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 7 · Where framing goes wrong</span><h1>Most framing failures are something added, removed, or soaked.</h1>
 <p class="lead">In the crawlspace and attic you'll find framing that's been cut, overloaded, modified, or rotted. Each is reportable — and each traces back to the load path.</p>
 <h2>The problems you'll see</h2>
 ${conds('',[['Cut &amp; notched members','Joists, beams, and studs hacked for plumbing, ducts, or wiring. Notching the bottom of a joist near mid-span — the tension zone — is especially damaging.'],['Over-spanned / undersized framing','Members spanning farther than their size allows, producing a springy, sagging floor (deflection).'],['Deflection &amp; sag','Visible bow or bounce under load — the symptom of over-spanning, undersizing, damage, or rot.'],['Moisture &amp; rot','Soft, decayed wood from leaks, damp crawlspaces, or earth-to-wood contact — a wood-destroying condition that loses strength.'],['Improper modifications','DIY beam removals, sistered-on scraps, jacks on dirt, missing supports — anything that breaks the intended load path.']])}
 <div class="dgm"><svg viewBox="0 0 720 230">
   <g ${_gs}>
     <!-- supports -->
     <rect x="90" y="150" width="16" height="50"/><rect x="600" y="150" width="16" height="50"/><line x1="60" y1="200" x2="660" y2="200" stroke-width="2"/>
     <!-- deflecting joist -->
     <path d="M106 150 Q 360 210 600 150" stroke="#b85436" stroke-width="2.6" fill="none"/>${_mono(360,200,9,'deflection / sag','#b85436')}
     <!-- straight reference -->
     <line x1="106" y1="150" x2="600" y2="150" stroke="#3d7d50" stroke-width="1.2" stroke-dasharray="5 4"/>${_mono(360,142,8,'original line','#3d7d50')}
     <!-- notch -->
     <path d="M300 150 l0 18 l-12 0 l0 -18" fill="#bdb8a8" stroke="#b85436" stroke-width="2"/>${_mono(294,186,8,'notch','#b85436')}
   </g>
 </svg><div class="cap">An over-notched, over-spanned joist deflects below its original line — a reportable framing condition.</div></div>
 <h2>The conditions you'll write up</h2>
 <div class="defect"><div class="dh"><span class="n">1</span><span class="nm">Cut / notched framing member</span></div><p>Significant material removed for a pipe, duct, or wire — especially in the tension zone.</p><div class="meta"><span class="lab">Implication</span><span class="val">Reduced strength; deflection or failure of the member.</span><span class="lab">Report</span><span class="val">Describe the member, the cut, and the location; recommend repair by a qualified contractor.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">2</span><span class="nm">Excessive deflection / sag</span></div><p>A bouncy, visibly sagging floor between supports.</p><div class="meta"><span class="lab">Implication</span><span class="val">Over-spanned, undersized, or weakened framing.</span><span class="lab">Report</span><span class="val">Report the deflection and location; recommend evaluation and repair.</span></div></div>
 <div class="defect"><div class="dh"><span class="n">3</span><span class="nm">Moisture damage / rot</span></div><p>Soft, decayed, or fungal-stained framing, often at sills, joist ends, or under leaks.</p><div class="meta"><span class="lab">Implication</span><span class="val">Lost structural capacity; conducive conditions for further decay.</span><span class="lab">Report</span><span class="val">Report the rot and its location, recommend repair, and call out the moisture source to correct.</span></div></div>
 ${W('sort','scope')}
 ${story('Inspector in the house',`A "handyman special" crawlspace had a girder propped on a stack of patio pavers, a joist notched halfway through for a drain, and a sistered 2x4 scrap "fixing" a cracked beam. None of it followed the load path. **Improvised support isn't support.** I reported each item, the resulting deflection, and recommended a qualified contractor and, given the extent, an engineer.`)}`,
 quiz:[
  {q:'Notching the bottom of a floor joist near mid-span is harmful because it:',o:['Looks messy','Removes material from the tension zone and seriously weakens the joist','Improves drainage','Adds strength'],a:1,e:'The bottom at mid-span is in tension; notching there is an improper modification that can cause deflection or failure.'},
  {q:'A bouncy, visibly sagging floor most likely indicates:',o:['A perfect new floor','Over-spanned, undersized, or weakened framing (deflection)','Too much paint','Good ventilation'],a:1,e:'Deflection points to members spanning too far, undersized, cut, or rotted — all reportable.'},
  {q:'Rot in framing is usually caused by:',o:['Sunlight','Sustained moisture — leaks, damp crawlspaces, earth-to-wood contact','Cold air','Fresh lumber'],a:1,e:'Moisture drives fungal decay; report the rot and the moisture source that caused it.'},
  {q:'A girder propped up on stacked pavers is:',o:['A proper permanent support','An improper modification that doesn\'t follow the load path — report it','Better than a pier','Required by code'],a:1,e:'Improvised supports aren\'t reliable load paths; report the condition and recommend proper repair.'},
  {q:'Engineered I-joists and trusses found cut or altered in the field should be:',o:['Ignored','Reported, with a recommendation for evaluation — field modification can drastically weaken them','Cut further to match','Painted'],a:1,e:'Modifying engineered members voids their design capacity; report and recommend evaluation.'},
 ]},

/* ===== L8 WATER & THE FOUNDATION ===== */
{id:'l8',kind:'Lesson 8',label:'Water & the Foundation',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 8 · The master cause</span><h1>Foundation performance, on clay, is mostly a water story.</h1>
 <p class="lead">If you understand how water reaches and leaves the soil around a house, you understand why most foundations move — and what an owner can actually do about it.</p>
 <h2>The four water drivers</h2>
 ${conds('',[['Drainage','Where roof and surface water goes. Gutters and downspouts that discharge at the foundation soak one area and drive heave; extensions that carry water away stabilize it.'],['Grading','The slope of the soil. Positive grade falls away from the house to shed water; negative grade ponds water against the foundation — a leading cause of movement.'],['Plumbing leaks','Supply or drain leaks under or beside a slab pump water into the clay, causing localized heave (or erosion). A persistent, one-spot wet area is a red flag.'],['Large trees','Big trees transpire enormous amounts of water, drying and shrinking nearby clay and causing localized settlement — and removing a mature tree can later let the soil rehydrate and heave.']])}
 <div class="dgm"><svg viewBox="0 0 720 250">
   <g ${_gs}>
     <path d="M150 90 L300 40 L450 90"/><line x1="150" y1="90" x2="150" y2="180"/><line x1="450" y1="90" x2="450" y2="180"/><line x1="150" y1="180" x2="450" y2="180" stroke-width="2.2"/>
     ${_mono(300,140,9,'house','#918c7d')}
     <rect x="120" y="180" width="560" height="50" fill="#cdb892" opacity="0.4" stroke="none"/>${_mono(560,206,9,'clay soil','#8a8475')}
     <!-- negative grade left -->
     <path d="M120 200 q20 -18 30 -20" stroke="#5a7b97" stroke-width="2"/><path d="M142 184 l8 -4 l1 9" stroke="#5a7b97" stroke-width="1.6"/>${_mono(120,176,8,'negative grade','#5a7b97','start')}
     <!-- downspout at foundation -->
     <line x1="440" y1="92" x2="440" y2="178" stroke="#5a7b97" stroke-width="2"/><path d="M440 178 q-6 8 -16 8" stroke="#5a7b97" stroke-width="1.6"/>${_mono(458,150,8,'downspout','#5a7b97','start')}
     <!-- tree pulling moisture -->
     <path d="M600 180 V 150" stroke="#6a6557" stroke-width="2.2"/><circle cx="600" cy="135" r="20" stroke="#3d7d50" stroke-width="1.6"/><path d="M600 180 q-30 6 -55 0" stroke="#b85436" stroke-width="1.6"/>${_mono(600,108,8,'tree dries clay','#b85436')}
   </g>
 </svg><div class="cap">Water in, water out: downspouts and negative grade wet the clay (heave); a big tree dries it (settlement). Differences between spots crack the house.</div></div>
 <h2>What this means for your report</h2>
 <p>When you see foundation distress, look for its <b>drivers</b> and report them alongside the symptom: the downspout dumping at the corner with the worst cracking, the soil sloping back toward the house, the persistent damp spot under the slab, the big oak by the settling corner. You're not proving cause — you're noting the conditions that contribute, and recommending the corrective steps (drainage, grading, leak repair) plus engineering evaluation where the distress is significant.</p>
 <ul class="clean"><li><b>Extend downspouts</b> and roof drainage away from the foundation.</li><li><b>Re-grade</b> so soil falls away from the house on all sides.</li><li><b>Repair plumbing leaks</b> promptly — under-slab leaks especially.</li><li><b>Manage trees and watering</b> to keep soil moisture even.</li></ul>
 ${W('match','driver')}
 ${story('Inspector in the house',`The worst-cracked corner of a slab home had three things going on at once: a downspout emptying right there, soil graded back toward the house, and a mature pecan ten feet away. **The foundation wasn't the villain — the water around it was.** My report tied the distress to its drivers, recommended the drainage and grading fixes, and referred the movement to an engineer.`)}`,
 quiz:[
  {q:'The single biggest driver of foundation performance you can advise on is:',o:['Paint color','Water management — drainage, grading, gutters/downspouts, and plumbing leaks','Roof age','Brick brand'],a:1,e:'On clay, keeping soil moisture stable is the master control: positive grade, downspouts away, and no leaks.'},
  {q:'Negative grade around a house:',o:['Sheds water away','Ponds water against the foundation and drives movement','Has no effect','Is required'],a:1,e:'Negative grade keeps soil wet at the foundation (heave); positive grade falls away to shed water.'},
  {q:'A persistent wet spot in one area under a slab suggests:',o:['Good drainage','A possible plumbing leak feeding moisture into the clay (localized heave/erosion)','Nothing','Dry soil'],a:1,e:'Under-slab leaks pump water into the clay and cause localized movement — a red flag to report.'},
  {q:'A large tree close to a slab on clay tends to cause:',o:['Heave only','Localized settlement as roots dry and shrink the clay (and heave later if removed)','No effect','Floating'],a:1,e:'Trees transpire heavily, drying nearby clay and causing differential settlement; removal can later allow rehydration and heave.'},
  {q:'In your report, you should treat the downspout, grading, and tree as:',o:['Irrelevant to the foundation','Contributing drivers to note alongside the distress, with corrective recommendations','Proof of the exact cause','Cosmetic only'],a:1,e:'Note the contributing conditions and recommend corrections plus engineering evaluation; you don\'t pronounce the definitive cause.'},
 ]},

/* ===== L9 THE INSPECTOR'S STANCE ===== */
{id:'l9',kind:'Lesson 9',label:'The Inspector\'s Stance',type:'lesson',
 body:()=>`<span class="eyebrow">Lesson 9 · Where your job ends</span><h1>Report the performance, recommend the engineer, and know the line.</h1>
 <p class="lead">Everything in this section converges on one professional stance. Get it right and you serve your client without overstepping your scope — or your license.</p>
 <h2>What you do — and don't — do</h2>
 ${conds('',[['You report performance &amp; visible distress','Describe what you observe: the cracks (width, location, pattern, offset), the sticking openings, the sloping floors, the framing conditions, and the contributing drivers.'],['You recommend evaluation','For significant distress, recommend evaluation by a licensed <b>structural or foundation engineer</b> — the professional who can diagnose cause, quantify movement, and design repairs.'],['You do NOT certify','A home inspection is <b>not</b> a structural certification, an engineering report, or a guarantee. You don\'t pronounce a foundation "sound," "fixed," or "still moving."'],['You note limits of access','Report where furniture, storage, finishes, or unsafe conditions kept you from inspecting — you\'re responsible for what was visible and accessible.']])}
 <div class="field"><div class="ic">${sv(ic.alert)}</div><div><div class="t">The TREC through-line</div><p>Under the Standards of Practice you inspect and report the structural components and deficiencies you can <b>see</b> and <b>safely reach</b>, and you refer significant findings to the right professional. Describing distress is your job; diagnosing and certifying are the engineer's. <b>When distress is significant, the safest, most professional sentence in your report is a recommendation for evaluation by a licensed engineer.</b></p></div></div>
 <h2>The conditions you'll always write up</h2>
 <ul class="clean"><li><b>Significant cracking</b> — wide, offset, or stair-step cracks, especially clustered with other indicators.</li><li><b>Movement indicators</b> — sticking doors/windows, sloping floors, brick separations, trim gaps.</li><li><b>Framing damage</b> — cut/notched, over-spanned, or rotted members; improper modifications and missing supports.</li><li><b>Moisture intrusion</b> — leaks, standing water, damp soil, and rot in crawlspaces and basements.</li><li><b>Inadequate crawlspace ventilation</b> — trapped moisture that promotes rot and mold under the floor.</li></ul>
 ${W('sort','scope')}
 ${story('Inspector in the house',`A seller pushed me to write that the foundation was "fine" because a contractor had installed piers. I couldn't — and didn't. I reported the visible repairs and the remaining distress I observed, recommended the buyer obtain the engineer's documentation and an evaluation, and noted the limits of what I could see. **My signature reports what I observed; it never certifies a structure.**`)}`,
 quiz:[
  {q:'For significant structural distress, the professional you refer to is a:',o:['Painter','Licensed structural / foundation engineer','Real estate agent','Roofer'],a:1,e:'An engineer can diagnose cause, quantify movement, and design repairs — work outside a home inspection.'},
  {q:'A home inspection of the structure is:',o:['A structural certification','A report of observed performance and visible distress, not a certification or guarantee','An engineering report','A repair contract'],a:1,e:'You report what you observe and recommend further evaluation; you don\'t certify, engineer, or guarantee.'},
  {q:'When access is limited by storage or finishes, you should:',o:['Guess what\'s behind them','Note the limits of access in your report','Move all the furniture yourself','Skip the section'],a:1,e:'You\'re responsible for visible, accessible conditions — document where access was restricted.'},
  {q:'Inadequate crawlspace ventilation is reportable because it:',o:['Improves the view','Traps moisture that promotes rot and mold in the framing below the floor','Adds strength','Is purely cosmetic'],a:1,e:'Trapped crawlspace moisture is a conducive condition for decay — report it and the resulting/anticipated damage.'},
  {q:'The safest, most professional response to significant distress is to:',o:['Certify it is fine','Recommend evaluation by a licensed engineer','Tell the client the repair cost','Ignore it'],a:1,e:'Report the distress and recommend the right professional evaluate it — that\'s squarely within your scope.'},
 ]},
